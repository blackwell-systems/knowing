# Cross-system benchmark evaluation corpus.
# 6 repos spanning different sizes, languages, and architectures.
# Commits are pinned for reproducibility.

repos:
  - name: kubernetes
    url: https://github.com/kubernetes/kubernetes
    commit: v1.30.0  # Pin to a release tag
    language: Go
    size_class: large  # ~3.5M LOC
    clone_depth: 1
    notes: "Large Go monorepo. Deep call hierarchies, generated code, multi-package architecture."

  - name: typescript
    url: https://github.com/microsoft/TypeScript
    commit: v5.5.4
    language: TypeScript
    size_class: large  # ~800K LOC
    clone_depth: 1
    notes: "Self-hosting compiler. Dense internal APIs, complex type relationships."

  - name: flask
    url: https://github.com/pallets/flask
    commit: "3.1.0"
    language: Python
    size_class: small  # ~15K LOC
    clone_depth: 1
    notes: "Small Python framework. Well-defined public API, extension architecture."

  - name: cargo
    url: https://github.com/rust-lang/cargo
    commit: "0.82.0"
    language: Rust
    size_class: medium  # ~150K LOC
    clone_depth: 1
    notes: "Rust build tool. Complex dependency resolution, multi-crate workspace."

  - name: django
    url: https://github.com/django/django
    commit: "5.1"
    language: Python
    size_class: large  # ~300K LOC
    clone_depth: 1
    notes: "Large Python framework. ORM, views, middleware. SWE-bench tasks available."

  - name: ocelot
    url: https://github.com/ThreeMammals/Ocelot
    commit: "23.4.2"
    language: CSharp
    size_class: medium  # ~80K LOC
    clone_depth: 1
    notes: ".NET API gateway. Middleware pipeline, load balancing, rate limiting, service discovery, request aggregation."

  - name: caddy
    url: https://github.com/caddyserver/caddy
    commit: "4d60d936"
    language: Go
    size_class: medium  # ~120K LOC
    clone_depth: 1
    notes: "Go web server / reverse proxy. Modular architecture, automatic HTTPS, Caddyfile config adaptation, middleware pipeline, health checks."

  - name: fastapi
    url: https://github.com/fastapi/fastapi
    commit: "2bd97a6"
    language: Python
    size_class: medium  # ~14K LOC core, large docs_src
    clone_depth: 1
    notes: "Modern Python web framework on Starlette/Pydantic. Dependency injection, type-based parameter resolution, OpenAPI generation, security schemes."

  - name: spark-java
    url: https://github.com/perwendel/spark
    commit: "master"
    language: Java
    size_class: small  # ~14K LOC
    clone_depth: 1
    notes: "Micro web framework for Java (Sinatra-inspired). Embedded Jetty, route matching, filters, WebSocket, template engines, SSL."
