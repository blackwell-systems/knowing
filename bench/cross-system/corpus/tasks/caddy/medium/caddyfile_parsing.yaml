id: caddy-medium-005
repo: caddy
tier: medium
description: "How does caddy parse a Caddyfile into tokens and then into structured configuration directives?"
source: manual
ground_truth:
  - caddyfile.Adapter
  - caddyfile.Adapter.Adapt
  - caddyfile.Dispenser
  - caddyfile.Dispenser.Next
  - caddyfile.Dispenser.NextBlock
  - caddyfile.ServerType
tags: [caddyfile, parsing, config, cross-package]
notes: "Adapter.Adapt converts Caddyfile bytes to JSON. Dispenser provides the token iteration API (Next, NextBlock for block-scoped tokens). ServerType interface defines how the parsed tokens get translated into app-specific config."
