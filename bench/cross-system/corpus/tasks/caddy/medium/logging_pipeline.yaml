id: caddy-medium-006
repo: caddy
tier: medium
description: "How does caddy configure per-site structured logging with custom log outputs and filtering?"
source: manual
ground_truth:
  - caddy/v2.Logging
  - caddy/v2.Logging.openLogs
  - caddy/v2.Logging.Logger
  - caddy/v2.CustomLog
  - caddy/v2.CustomLog.matchesModule
  - caddy/v2.BaseLog
  - caddy/v2.BaseLog.provisionCommon
tags: [logging, structured, filtering, cross-package]
notes: "Logging holds all log config. openLogs provisions writers. Logger routes log entries. CustomLog defines per-module log filtering via matchesModule. BaseLog.provisionCommon sets up the zap core."
