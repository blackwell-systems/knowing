id: flask-easy-100
repo: flask
tier: easy
description: "url_for() with _external=True generates wrong host when SERVER_NAME differs from the actual request host behind a reverse proxy"
source: swe-bench
ground_truth:
  - url_for
  - Flask.url_for
  - Flask.create_url_adapter
  - Config
tags: [routing, url-generation, swe-bench, bug-fix]
notes: "Based on Flask issue #3628. The url_for function prefers SERVER_NAME over the actual request host header, which breaks when behind a reverse proxy that sets X-Forwarded-Host."
