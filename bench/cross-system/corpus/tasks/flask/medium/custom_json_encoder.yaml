id: flask-medium-001
repo: flask
tier: medium
description: "Replace Flask's default JSON serialization to handle datetime objects and custom SQLAlchemy model serialization"
source: manual
ground_truth:
  - flask.json.provider.DefaultJSONProvider
  - flask.json.provider.DefaultJSONProvider.dumps
  - flask.json.provider.DefaultJSONProvider.response
  - flask.json.provider.JSONProvider
  - flask.json.provider.JSONProvider.dumps
