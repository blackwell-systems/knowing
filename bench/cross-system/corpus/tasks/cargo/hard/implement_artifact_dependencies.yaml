id: cargo-hard-003
repo: cargo
tier: hard
description: "Implement artifact dependencies (RFC 3028) where a crate can depend on the binary output of another crate as a build input, requiring changes to resolution, compilation, and fingerprinting"
source: manual
ground_truth:
  - rs
  - resolve
  - compute_deps
  - calculate
  - Dependency
  - Dependency.set_artifact
  - Target
  - TargetInfo
tags: [artifact-deps, resolver, compiler, cross-package, cross-cutting, feature-addition]
notes: "Artifact dependencies span multiple subsystems: resolution (resolver/mod.rs), dependency graph computation (unit_dependencies), fingerprinting for incremental builds, the dependency type itself (set_artifact), target metadata (Target, TargetInfo), and the dedicated artifact module."
