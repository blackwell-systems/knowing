id: kafka-hard-001
repo: kafka
tier: hard
description: "Debug why a consumer group rebalances unexpectedly by tracing through the coordinator, heartbeat thread, and partition assignment strategy"
source: manual
ground_truth:
  - ConsumerCoordinator
  - ConsumerCoordinator.poll
  - AbstractCoordinator.joinGroupIfNeeded
  - AbstractCoordinator.HeartbeatThread
  - ConsumerPartitionAssignor
  - RangeAssignor
  - AbstractCoordinator.sendJoinGroupRequest
tags: [consumer, rebalance, coordinator, cross-package, debugging]
notes: "Consumer rebalance debugging requires the ConsumerCoordinator (orchestrates group membership), its poll loop, joinGroupIfNeeded (triggers rebalance), HeartbeatThread (detects session timeout), the assignment strategy interface, and the join request that initiates the protocol."
