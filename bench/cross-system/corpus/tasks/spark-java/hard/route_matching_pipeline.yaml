  - SparkUtils.convertRouteToList
tags: [routing, matching, architectural]
notes: "Full matching pipeline: Routes.find -> findTargetsForRequestedRoute iterates RouteEntry -> RouteEntry.matches checks path patterns -> RouteMatch holds result. SparkUtils.convertRouteToList tokenizes paths for comparison."
