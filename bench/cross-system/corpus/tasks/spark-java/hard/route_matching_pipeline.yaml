id: spark-java-hard-006
repo: spark-java
tier: hard
description: "Understand how URL patterns are matched to route handlers including path parameters and wildcards"
source: manual
ground_truth:
  - Routes.find
  - Routes.findTargetsForRequestedRoute
  - Routes.findTargetWithGivenAcceptType
  - RouteEntry
  - RouteEntry.matches
  - RouteMatch
