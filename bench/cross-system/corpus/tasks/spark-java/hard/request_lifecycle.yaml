id: spark-java-hard-001
repo: spark-java
tier: hard
description: "Trace how an HTTP request flows through the Spark framework from Jetty handler to route execution"
source: manual
ground_truth:
  - JettyHandler.doHandle
  - MatcherFilter.doFilter
  - BeforeFilters.execute
  - Routes.execute
  - AfterFilters.execute
  - AfterAfterFilters.execute
  - Body.serializeTo
  - Routes.find
  - RouteMatch.getMatchUri
tags: [request-lifecycle, architectural, cross-package]
notes: "Full request lifecycle: JettyHandler -> MatcherFilter -> Before -> Routes -> After -> AfterAfter. Requires understanding the entire matching pipeline."
