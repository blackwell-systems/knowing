id: ocelot-hard-005
repo: ocelot
tier: hard
description: "Trace the full configuration pipeline from JSON file loading through validation, creation, and storage of the internal configuration used at runtime"
source: manual
ground_truth:
  - Ocelot.DependencyInjection.ConfigurationBuilderExtensions.AddOcelot
  - ConfigurationBuilderExtensions.GetMergedOcelotJson
  - Ocelot.Configuration.File.FileConfiguration.FileConfiguration
  - IConfigurationValidator.IsValid
  - FileConfigurationFluentValidator.IsValid
  - IInternalConfigurationCreator.Create
  - IInternalConfigurationRepository.AddOrReplace
  - IFileConfigurationRepository
  - OcelotMiddlewareExtensions.CreateConfiguration
tags: [configuration, validation, pipeline, cross-namespace, architectural]
notes: "Config pipeline: ConfigurationBuilderExtensions.AddOcelot loads and merges JSON files. FileConfigurationFluentValidator validates routes, aggregates, and global config. IInternalConfigurationCreator.Create transforms FileConfiguration into the runtime InternalConfiguration. IInternalConfigurationRepository stores it. CreateConfiguration orchestrates the full flow at startup."
