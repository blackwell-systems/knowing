id: ocelot-hard-002
repo: ocelot
tier: hard
description: "Understand how Ocelot's dependency injection container wires together all subsystems: configuration loading, validation, middleware pipeline, and feature registration"
source: manual
ground_truth:
  - Ocelot.DependencyInjection.ServiceCollectionExtensions.AddOcelot
  - ServiceCollectionExtensions.AddOcelotUsingBuilder
  - IOcelotBuilder
  - Features.AddOcelotCache
  - Features.AddOcelotRateLimiting
  - Features.AddOcelotQualityOfService
  - Features.AddConfigurationValidators
  - Ocelot.DependencyInjection.ConfigurationBuilderExtensions.AddOcelot
  - Ocelot.Middleware.OcelotMiddlewareExtensions.UseOcelot
  - OcelotMiddlewareExtensions.CreateConfiguration
tags: [dependency-injection, architectural, cross-namespace, bootstrap]
notes: "Full DI bootstrap: AddOcelot registers all services via ServiceCollectionExtensions, Feature methods wire subsystems (cache, rate limiting, QoS, validation). ConfigurationBuilderExtensions loads JSON config. UseOcelot creates the pipeline. Requires understanding the entire startup path from IServiceCollection to running middleware."
