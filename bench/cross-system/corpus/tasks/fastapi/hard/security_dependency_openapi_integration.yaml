notes: "Requires understanding the dual role of security classes: they are both callable dependencies (OAuth2PasswordBearer.__call__) and OpenAPI schema contributors (via SecurityBase.model). The Dependant model tracks security schemes, and get_openapi_security_definitions collects them during schema generation."
