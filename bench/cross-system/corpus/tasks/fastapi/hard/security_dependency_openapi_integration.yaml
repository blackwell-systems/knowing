description: "How do security dependencies in FastAPI integrate with both the dependency injection system and the OpenAPI schema generation, so that declaring OAuth2PasswordBearer as a dependency automatically adds the security scheme to the docs?"
source: synthetic
ground_truth:
  - OAuth2PasswordBearer
  - OAuth2PasswordBearer.__init__
