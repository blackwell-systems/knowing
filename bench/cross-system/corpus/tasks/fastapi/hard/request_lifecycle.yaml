id: fastapi-hard-001
repo: fastapi
tier: hard
description: "I want to understand the full request lifecycle in FastAPI from when a route is matched to when the response is serialized, including dependency resolution, validation, and response encoding"
source: synthetic
ground_truth:
  - APIRoute.get_route_handler
  - get_request_handler
  - request_response
  - solve_dependencies
  - run_endpoint_function
  - serialize_response
  - jsonable_encoder
  - request_params_to_args
  - request_body_to_args
tags: [broad-scope, architecture, request-lifecycle, cross-package]
notes: "Tests retrieval breadth. Requires understanding the full chain: route matching yields get_route_handler, which calls get_request_handler to build the ASGI app, request_response wraps it, solve_dependencies resolves all params, run_endpoint_function calls the user code, and serialize_response + jsonable_encoder handle the output."
