id: kubernetes-hard-003
repo: kubernetes
tier: hard
description: "Trace how a PersistentVolumeClaim gets bound to a PersistentVolume through the volume controller, then provisioned via a CSI driver, to debug why dynamic provisioning is timing out"
source: manual
ground_truth:
  - PersistentVolumeController
  - PersistentVolumeController.syncClaim
  - PersistentVolumeController.syncVolume
  - csiPlugin
  - newProvisioner
  - CSIDriver
  - PersistentVolumeClaim
  - NewController
tags: [storage, csi, volume-controller, cross-package, cross-cutting, understanding]
notes: "Tracing dynamic provisioning requires the PV controller (syncClaim/syncVolume for binding logic), the CSI plugin interface (csiPlugin, NewProvisioner), the storage types (CSIDriver, PersistentVolumeClaim), and controller initialization (NewController) to understand queue and informer setup."
