id: ripgrep-medium-006
repo: ripgrep
tier: medium
description: "Fix a bug where binary file detection incorrectly classifies UTF-16 encoded files as binary and skips them"
source: manual
ground_truth:
  - Searcher
  - SearcherBuilder
  - SearcherBuilder.binary_detection
  - BinaryDetection
  - LineStep
tags: [searcher, encoding, binary, bug-fix]
notes: "Binary detection is configured via SearcherBuilder.binary_detection with BinaryDetection specifying the strategy. LineStep controls how lines are scanned, which interacts with encoding detection."
