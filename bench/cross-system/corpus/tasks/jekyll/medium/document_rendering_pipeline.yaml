id: jekyll-medium-006
repo: jekyll
tier: medium
description: "Fix a bug where documents with multiple converter passes lose layout assignments between conversion steps"
source: manual
ground_truth:
  - Jekyll::Renderer
  - Jekyll::Renderer.run
  - Jekyll::Renderer.render_document
  - Jekyll::Renderer.convert
  - Jekyll::Renderer.place_in_layouts
  - Jekyll::Renderer.validate_layout
  - Jekyll::Convertible.render_liquid
tags: [rendering, layouts, converters, bug-fix]
notes: "The rendering pipeline flows through Renderer.run -> render_document -> convert -> place_in_layouts. The Convertible module provides render_liquid for Liquid template processing. Layout validation happens in validate_layout before place_in_layouts applies the layout chain."
