id: jekyll-medium-001
repo: jekyll
tier: medium
description: "Fix a bug where incremental builds fail to regenerate pages that depend on a modified data file in _data/"
source: manual
ground_truth:
  - Jekyll::Regenerator
  - Jekyll::Regenerator.regenerate?
  - Jekyll::Regenerator.modified?
  - Jekyll::Regenerator.add_dependency
  - Jekyll::Reader.read_data
  - Jekyll::Site.read
tags: [regeneration, incremental, data-files, bug-fix]
notes: "Incremental regeneration tracks file dependencies via add_dependency. The bug is that data file changes don't trigger regeneration of pages that consume them because Reader.read_data doesn't register dependencies with the Regenerator."
