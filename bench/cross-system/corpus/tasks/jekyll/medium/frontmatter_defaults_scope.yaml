id: jekyll-medium-002
repo: jekyll
tier: medium
description: "Fix a bug where frontmatter defaults with glob patterns in the scope path don't apply to documents in nested subdirectories"
source: manual
ground_truth:
  - Jekyll::FrontmatterDefaults
  - Jekyll::FrontmatterDefaults.all
  - Jekyll::FrontmatterDefaults.applies?
  - Jekyll::FrontmatterDefaults.applies_path?
  - Jekyll::FrontmatterDefaults.glob_scope
  - Jekyll::FrontmatterDefaults.matching_sets
tags: [frontmatter, defaults, configuration, bug-fix]
notes: "Default resolution flows through all -> matching_sets -> applies? -> applies_path?. The glob_scope method handles glob pattern matching against document paths, and the bug is in how nested paths are matched against glob patterns."
