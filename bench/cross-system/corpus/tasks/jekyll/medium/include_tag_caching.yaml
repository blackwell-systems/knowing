id: jekyll-medium-003
repo: jekyll
tier: medium
description: "Fix a performance issue where include tags with variable file names bypass the partial cache, causing the same file to be parsed repeatedly"
source: manual
ground_truth:
  - Jekyll::Tags::IncludeTag
  - Jekyll::Tags::IncludeTag.render
  - Jekyll::Tags::IncludeTag.load_cached_partial
  - Jekyll::Tags::IncludeTag.render_variable
  - Jekyll::Tags::IncludeTag.locate_include_file
  - Jekyll::Tags::IncludeTag.read_file
tags: [tags, include, caching, performance]
notes: "The include tag resolves variable filenames via render_variable, locates the file with locate_include_file, and should cache parsed partials in load_cached_partial. When the filename is dynamic, the cache key may not account for the resolved value."
