tags: [auth, backends, signals, cross-package, feature-addition]
notes: "A custom auth backend requires the ModelBackend as a reference implementation, the authenticate method contract, user model access (get_user_model), the login signal for post-auth hooks, AbstractBaseUser for the user interface, and password handling (make_password) for account creation."
