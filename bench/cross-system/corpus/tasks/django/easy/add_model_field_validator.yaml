id: django-easy-001
repo: django
tier: easy
description: "Add a custom field validator to a Django model that validates email format and checks against a blocklist"
source: manual
ground_truth:
  - django.core.validators.EmailValidator
  - django.core.validators.EmailValidator.__call__
  - django.db.models.fields.CharField.validators
  - django.core.validators.validate_email
  - django.core.exceptions.ValidationError
tags: [validation, models, single-package, feature-addition]
notes: "Developer needs the existing EmailValidator as a reference for writing validators, the validators field attribute on model fields, and ValidationError for the exception type to raise."
