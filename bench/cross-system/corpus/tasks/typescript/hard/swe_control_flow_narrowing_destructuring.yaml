id: typescript-hard-100
repo: typescript
tier: hard
description: "Control flow narrowing of discriminated union breaks after destructuring when the discriminant variable is reassigned in a nested scope that the control flow graph doesn't account for"
source: swe-bench
ground_truth:
  - typescript.checker.getFlowTypeOfReference
  - typescript.checker.getTypeAtFlowCondition
  - typescript.checker.narrowTypeByDiscriminant
  - typescript.binder.bindDestructuringAssignment
  - typescript.checker.getDiscriminantPropertyAccess
  - typescript.checker.isMatchingReference
tags: [control-flow, narrowing, discriminated-unions, destructuring, swe-bench, bug-fix]
notes: "Based on TypeScript issue #46680. The flow analysis doesn't track that destructuring assignment into the discriminant variable creates a new assignment node that should invalidate prior narrowing."
