id: typescript-medium-101
repo: typescript
tier: medium
description: "Declaration emit produces invalid .d.ts when a mapped type uses 'as' clause with a template literal key and the source type has optional properties"
source: swe-bench
ground_truth:
  - typescript.declarationEmitter.emitMappedType
  - typescript.checker.resolveMappedTypeMembers
  - typescript.checker.getNameTypeFromMappedType
  - typescript.declarationEmitter.ensureType
  - typescript.checker.getTypeFromMappedTypeNode
tags: [declaration-emit, mapped-types, swe-bench, bug-fix]
notes: "Based on TypeScript issue #48070. The declaration emitter doesn't properly serialize the 'as' clause when it involves template literal types combined with optional modifiers from the source type."
