id: typescript-medium-100
repo: typescript
tier: medium
description: "Module resolution with package.json 'exports' field fails to resolve conditional exports when moduleResolution is 'node16' and the import uses a subpath pattern with wildcard"
source: swe-bench
ground_truth:
  - src/compiler/moduleNameResolver.ts.loadModuleFromExports
  - src/compiler/moduleNameResolver.ts.loadModuleFromImportsOrExports
  - src/compiler/moduleNameResolver.ts.getLoadModuleFromTargetImportOrExport
  - src/compiler/moduleNameResolver.ts.nodeModuleNameResolverWorker
  - src/compiler/moduleNameResolver.ts.PackageJson
tags: [module-resolution, package-json-exports, swe-bench, bug-fix]
notes: "Based on TypeScript issue #49271. The wildcard pattern matching in exports field resolution doesn't properly handle nested subpath patterns when combined with conditional exports."
