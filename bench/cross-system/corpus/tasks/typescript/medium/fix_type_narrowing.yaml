id: typescript-medium-001
repo: typescript
tier: medium
description: "Fix a bug where type narrowing does not work correctly inside a switch statement with a discriminated union when fallthrough occurs between cases"
source: manual
ground_truth:
  - src/compiler/checker.ts.NodeLinks
  - src/compiler/checker.ts.IterationTypesResolver
  - src/compiler/binder.ts.createBinder
  - src/compiler/binder.ts.lookupSymbolForName
  - src/compiler/checker.ts.isNotAccessor
tags: [type-narrowing, flow-analysis, cross-package, bug-fix]
notes: "Type narrowing bugs in switch statements involve the checker's narrowing logic (narrowTypeByDiscriminant, getNarrowedTypeByFlowNode), how the binder sets up flow nodes for switches (bindSwitchStatement), and the flow node types (FlowSwitchClause)."
