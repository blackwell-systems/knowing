name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: clang
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compiler (linux/arm64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run tests
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: GOWORK=off go test $(go list ./... | grep -v /bench/) -timeout 5m

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOWORK: "off"
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA:0:7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -ldflags "-s -w -X main.Version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o knowing ./cmd/knowing

      - name: Package archive
        run: |
          ARCHIVE="knowing_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar czf "${ARCHIVE}" knowing README.md CHANGELOG.md
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: knowing_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifacts
        run: |
          mkdir -p release/
          find dist/ -name '*.tar.gz' -exec mv {} release/ \;
          cd release && sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: false
          body: |
            See [CHANGELOG.md](https://github.com/blackwell-systems/knowing/blob/main/CHANGELOG.md) for details.

            ## Install

            ```bash
            brew install blackwell-systems/tap/knowing
            go install github.com/blackwell-systems/knowing/cmd/knowing@${{ github.ref_name }}
            ```

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DARWIN_ARM64_SHA=$(sha256sum release/knowing_darwin_arm64.tar.gz | cut -d' ' -f1)
          DARWIN_AMD64_SHA=$(sha256sum release/knowing_darwin_amd64.tar.gz | cut -d' ' -f1)
          LINUX_AMD64_SHA=$(sha256sum release/knowing_linux_amd64.tar.gz | cut -d' ' -f1)
          LINUX_ARM64_SHA=$(sha256sum release/knowing_linux_arm64.tar.gz | cut -d' ' -f1)
          BASE_URL="https://github.com/blackwell-systems/knowing/releases/download/${GITHUB_REF_NAME}"

          cat > formula.rb << 'FORMULA'
          class Knowing < Formula
            desc "Content-addressed graph artifact for software systems"
            homepage "https://github.com/blackwell-systems/knowing"
            license "MIT"
            version "VERSION_PLACEHOLDER"

            on_macos do
              if Hardware::CPU.arm?
                url "BASE_URL_PLACEHOLDER/knowing_darwin_arm64.tar.gz"
                sha256 "DARWIN_ARM64_SHA_PLACEHOLDER"
              else
                url "BASE_URL_PLACEHOLDER/knowing_darwin_amd64.tar.gz"
                sha256 "DARWIN_AMD64_SHA_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "BASE_URL_PLACEHOLDER/knowing_linux_arm64.tar.gz"
                sha256 "LINUX_ARM64_SHA_PLACEHOLDER"
              else
                url "BASE_URL_PLACEHOLDER/knowing_linux_amd64.tar.gz"
                sha256 "LINUX_AMD64_SHA_PLACEHOLDER"
              end
            end

            def install
              bin.install "knowing"
            end

            test do
              system "#{bin}/knowing", "version"
            end
          end
          FORMULA

          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" formula.rb
          sed -i "s|BASE_URL_PLACEHOLDER|${BASE_URL}|g" formula.rb
          sed -i "s|DARWIN_ARM64_SHA_PLACEHOLDER|${DARWIN_ARM64_SHA}|g" formula.rb
          sed -i "s|DARWIN_AMD64_SHA_PLACEHOLDER|${DARWIN_AMD64_SHA}|g" formula.rb
          sed -i "s|LINUX_AMD64_SHA_PLACEHOLDER|${LINUX_AMD64_SHA}|g" formula.rb
          sed -i "s|LINUX_ARM64_SHA_PLACEHOLDER|${LINUX_ARM64_SHA}|g" formula.rb

          # Push to homebrew-tap
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/blackwell-systems/homebrew-tap.git" tap
          mkdir -p tap/Formula
          mv formula.rb tap/Formula/knowing.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/knowing.rb
          git commit -m "knowing ${VERSION}"
          git push

  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download linux/amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: knowing_linux_amd64
          path: dist/

      - name: Extract binary
        run: tar xzf dist/knowing_linux_amd64.tar.gz knowing

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/blackwell-systems/knowing:latest
            ghcr.io/blackwell-systems/knowing:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/knowing:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/knowing:${{ github.ref_name }}

  npm-publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish npm packages
        run: bash scripts/npm-publish.sh "${{ github.ref_name }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi-publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install wheel setuptools twine

      - name: Build and publish wheels
        run: |
          bash scripts/pypi-build-wheels.sh "${{ github.ref_name }}"
          twine upload pypi/dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  mcp-registry-publish:
    needs: npm-publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Update server.json version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const s = JSON.parse(fs.readFileSync('server.json'));
            s.version = '${VERSION}';
            s.packages[0].version = '${VERSION}';
            fs.writeFileSync('server.json', JSON.stringify(s, null, 2) + '\n');
          "

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
