name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests before release
        run: GOWORK=off go test $(go list ./... | grep -v /bench/) -timeout 5m

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

  winget:
    name: Publish to winget
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: BlackwellSystems.knowing
          installers-regex: 'windows.*\.zip$'
          max-versions-to-keep: 5
          fork-user: blackwell-systems
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  npm-publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish npm packages
        run: bash scripts/npm-publish.sh "${{ github.ref_name }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi-publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install wheel setuptools twine

      - name: Build and publish wheels
        run: |
          bash scripts/pypi-build-wheels.sh "${{ github.ref_name }}"
          twine upload pypi/dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  mcp-registry-publish:
    needs: npm-publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Update server.json version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const s = JSON.parse(fs.readFileSync('server.json'));
            s.version = '${VERSION}';
            s.packages[0].version = '${VERSION}';
            fs.writeFileSync('server.json', JSON.stringify(s, null, 2) + '\n');
          "

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
