name: Semantic PR Diff

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  semantic-diff:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build knowing binary
        run: go build -o knowing ./cmd/knowing

      - name: Index base branch
        id: index-base
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          ./knowing index -db base.db -url "${{ github.repository }}" -commit "${{ github.event.pull_request.base.sha }}" .
          BASE_SNAPSHOT=$(./knowing export -db base.db -format json | jq -r '.snapshot_hash')
          echo "snapshot=$BASE_SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Index head branch
        id: index-head
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          ./knowing index -db head.db -url "${{ github.repository }}" -commit "${{ github.event.pull_request.head.sha }}" .
          HEAD_SNAPSHOT=$(./knowing export -db head.db -format json | jq -r '.snapshot_hash')
          echo "snapshot=$HEAD_SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Merge base data into head database
        run: |
          sqlite3 head.db "ATTACH 'base.db' AS base; INSERT OR IGNORE INTO nodes SELECT * FROM base.nodes; INSERT OR IGNORE INTO edges SELECT * FROM base.edges; INSERT OR IGNORE INTO files SELECT * FROM base.files; INSERT OR IGNORE INTO repos SELECT * FROM base.repos; INSERT OR IGNORE INTO snapshots SELECT * FROM base.snapshots; INSERT OR IGNORE INTO edge_events SELECT * FROM base.edge_events;"

      - name: Compute semantic diff
        id: diff
        run: |
          DIFF_OUTPUT=$(./knowing diff -db head.db -format json "${{ steps.index-base.outputs.snapshot }}" "${{ steps.index-head.outputs.snapshot }}")
          echo "$DIFF_OUTPUT" > diff-result.json

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = JSON.parse(fs.readFileSync('diff-result.json', 'utf8'));

            const nodesAdded = diff.nodes_added || [];
            const nodesRemoved = diff.nodes_removed || [];
            const nodesModified = diff.nodes_modified || [];
            const edgesAdded = diff.edges_added || [];
            const edgesRemoved = diff.edges_removed || [];

            const MAX_NODES = 20;
            const MAX_EDGES = 15;

            function formatNodeList(nodes, limit) {
              if (nodes.length === 0) return '_None_';
              const shown = nodes.slice(0, limit);
              const lines = shown.map(n => {
                const name = n.qualified_name || n.name || n.id;
                const file = n.file_path ? ` (${n.file_path})` : '';
                return `- \`${name}\`${file}`;
              });
              if (nodes.length > limit) {
                lines.push(`- _...and ${nodes.length - limit} more_`);
              }
              return lines.join('\n');
            }

            function formatEdgeList(edges, limit) {
              if (edges.length === 0) return '_None_';
              const shown = edges.slice(0, limit);
              const lines = shown.map(e => {
                const src = e.source_name || e.source;
                const tgt = e.target_name || e.target;
                const kind = e.kind ? ` [${e.kind}]` : '';
                return `- \`${src}\` -> \`${tgt}\`${kind}`;
              });
              if (edges.length > limit) {
                lines.push(`- _...and ${edges.length - limit} more_`);
              }
              return lines.join('\n');
            }

            const body = `## Semantic PR Diff

            | Metric | Count |
            |--------|-------|
            | Nodes added | ${nodesAdded.length} |
            | Nodes removed | ${nodesRemoved.length} |
            | Nodes modified | ${nodesModified.length} |
            | Edges added | ${edgesAdded.length} |
            | Edges removed | ${edgesRemoved.length} |

            ### Added Symbols
            ${formatNodeList(nodesAdded, MAX_NODES)}

            ### Removed Symbols
            ${formatNodeList(nodesRemoved, MAX_NODES)}

            ### Modified Symbols
            ${formatNodeList(nodesModified, MAX_NODES)}

            ### New Relationships
            ${formatEdgeList(edgesAdded, MAX_EDGES)}

            ### Removed Relationships
            ${formatEdgeList(edgesRemoved, MAX_EDGES)}

            ---
            _Generated by [knowing](https://github.com/${{ github.repository }}) semantic analysis_
            `.replace(/^            /gm, '');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Semantic PR Diff')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
