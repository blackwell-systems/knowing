name: "Supply Chain Scanner: PyPI"

on:
  schedule:
    - cron: '30 */3 * * *'  # every 3 hours, offset 30 min from npm scanner
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build knowing
        run: GOWORK=off go build -o knowing ./cmd/knowing

      - name: Fetch PyPI packages to scan
        run: |
          chmod +x scripts/fetch-recent-publishes-pypi.sh
          ./scripts/fetch-recent-publishes-pypi.sh > packages.txt
          echo "Packages to scan:"
          cat packages.txt | grep -v "^#"

      - name: Scan packages for supply chain anomalies
        run: |
          mkdir -p scan-output
          while IFS=' ' read -r pkg new_ver prev_ver; do
            [[ "$pkg" == \#* ]] && continue
            [ -z "$pkg" ] && continue

            echo ""
            echo "=== Scanning $pkg: $prev_ver -> $new_ver ==="

            WORK=$(mktemp -d)

            # Download both versions (sdist/wheel, no install)
            pip download --no-deps --no-binary :all: "${pkg}==${prev_ver}" -d "$WORK/dl-old" 2>/dev/null || \
              pip download --no-deps "${pkg}==${prev_ver}" -d "$WORK/dl-old" 2>/dev/null || continue
            pip download --no-deps --no-binary :all: "${pkg}==${new_ver}" -d "$WORK/dl-new" 2>/dev/null || \
              pip download --no-deps "${pkg}==${new_ver}" -d "$WORK/dl-new" 2>/dev/null || continue

            # Extract
            mkdir -p "$WORK/old" "$WORK/new"
            for f in "$WORK/dl-old"/*.tar.gz; do
              [ -f "$f" ] && tar xzf "$f" -C "$WORK/old" --strip-components=1 && break
            done
            for f in "$WORK/dl-old"/*.whl; do
              [ -f "$f" ] && python3 -m zipfile -e "$f" "$WORK/old" && break
            done
            for f in "$WORK/dl-new"/*.tar.gz; do
              [ -f "$f" ] && tar xzf "$f" -C "$WORK/new" --strip-components=1 && break
            done
            for f in "$WORK/dl-new"/*.whl; do
              [ -f "$f" ] && python3 -m zipfile -e "$f" "$WORK/new" && break
            done

            # Check we got something
            [ -z "$(ls "$WORK/old" 2>/dev/null)" ] && { rm -rf "$WORK"; continue; }
            [ -z "$(ls "$WORK/new" 2>/dev/null)" ] && { rm -rf "$WORK"; continue; }

            # Init git (knowing needs git)
            (cd "$WORK/old" && git init -q && git add . && git commit -q -m "old" 2>/dev/null) || true
            (cd "$WORK/new" && git init -q && git add . && git commit -q -m "new" 2>/dev/null) || true

            # Index both
            ./knowing index -db "$WORK/old.db" -no-enrich "$WORK/old" 2>/dev/null || { rm -rf "$WORK"; continue; }
            ./knowing index -db "$WORK/new.db" -no-enrich "$WORK/new" 2>/dev/null || { rm -rf "$WORK"; continue; }

            # Get snapshots
            OLD_SNAP=$(./knowing query -db "$WORK/old.db" --latest-snapshot 2>/dev/null || echo "")
            NEW_SNAP=$(./knowing query -db "$WORK/new.db" --latest-snapshot 2>/dev/null || echo "")

            if [ -n "$OLD_SNAP" ] && [ -n "$NEW_SNAP" ]; then
              ./knowing audit-supply-chain \
                --db "$WORK/new.db" \
                --base "$OLD_SNAP" \
                --head "$NEW_SNAP" \
                -o "$WORK/report.json" 2>/dev/null || true

              if [ -f "$WORK/report.json" ]; then
                MAX_SCORE=$(python3 -c "
import json
with open('$WORK/report.json') as f:
    d = json.load(f)
    print(d.get('summary', {}).get('max_isolation_score', 0))
" 2>/dev/null || echo "0")

                echo "  Max isolation score: $MAX_SCORE"

                if python3 -c "exit(0 if float('$MAX_SCORE') > 0.7 else 1)" 2>/dev/null; then
                  echo "  *** SUSPICIOUS: isolation score > 0.7 ***"
                  cp "$WORK/report.json" "scan-output/${pkg}_${new_ver}.json"
                fi
              fi
            fi

            rm -rf "$WORK"
          done < packages.txt

      - name: Create issue for suspicious findings
        if: always()
        run: |
          ALERTS=$(ls scan-output/*.json 2>/dev/null | wc -l | tr -d ' ')
          echo "Scan complete. Suspicious packages: $ALERTS"

          if [ "$ALERTS" -gt 0 ]; then
            BODY="## PyPI Supply Chain Scanner Alert\n\n"
            BODY+="Detected **$ALERTS** suspicious package update(s):\n\n"
            for f in scan-output/*.json; do
              PKG=$(basename "$f" .json)
              BODY+="### $PKG\n\`\`\`json\n$(python3 -m json.tool "$f" 2>/dev/null || cat "$f")\n\`\`\`\n\n"
            done
            echo -e "$BODY" > alert-body.md
            gh issue create \
              --title "[DRAFT] PyPI supply chain alert: $(date -u +%Y-%m-%d)" \
              --body "$(cat alert-body.md)" \
              --label "supply-chain-alert,draft-disclosure" || echo "No alerts to report"
          else
            echo "No suspicious packages detected."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pypi-scan-${{ github.run_id }}
          path: scan-output/
          retention-days: 90
