name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -short ./... -timeout 5m

      - name: Eval (retrieval regression gate)
        run: go test ./eval/ -run TestEval -timeout 5m -count=1

      - name: Cross-repo edges
        run: go test ./test/... -timeout 2m -count=1

      - name: Binary smoke test
        run: |
          go build -o knowing ./cmd/knowing
          ./knowing version
          rm knowing

  mcp-assert:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
      KNOWING_EMBEDDINGS: "0"  # skip model download in CI (no pre-cached vectors)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build knowing
        run: go build -o knowing ./cmd/knowing

      - name: Index self for test assertions
        run: ./knowing index -db knowing.db .

      - name: Run mcp-assert audit
        uses: blackwell-systems/mcp-assert-action@v1
        with:
          suite: examples/mcp-assert
          server: "./knowing mcp -db knowing.db"
          threshold: 100
          timeout: 30s

      - name: Run mcp-assert lint
        run: |
          mcp-assert lint --server "./knowing mcp -db knowing.db" --threshold 0
