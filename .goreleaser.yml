version: 2

project_name: knowing

before:
  hooks:
    - go mod tidy

builds:
  - id: knowing
    main: ./cmd/knowing
    binary: knowing
    env:
      - CGO_ENABLED=1
      - GOWORK=off
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.Version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: knowing
    ids:
      - knowing
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

brews:
  - name: knowing
    repository:
      owner: blackwell-systems
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/blackwell-systems/knowing"
    description: "Content-addressed knowledge graph daemon for software systems"
    license: "MIT"
    install: |
      bin.install "knowing"
    caveats: |
      Index a repository:

        knowing index /path/to/repo

      Start the daemon with MCP server:

        knowing serve /path/to/repo

      Query the knowledge graph:

        knowing query "pkg.FunctionName"

      Documentation: https://github.com/blackwell-systems/knowing
    test: |
      system "#{bin}/knowing", "version"

dockers:
  - image_templates:
      - "ghcr.io/blackwell-systems/knowing:latest"
      - "ghcr.io/blackwell-systems/knowing:{{ .Version }}"
      - "{{ .Env.DOCKERHUB_USERNAME }}/knowing:latest"
      - "{{ .Env.DOCKERHUB_USERNAME }}/knowing:{{ .Version }}"
    goarch: amd64
    dockerfile: docker/Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"

release:
  github:
    owner: blackwell-systems
    name: knowing
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
