title: Runtime Trace Ingestion Pipeline
feature_slug: runtime-traces
verdict: SUITABLE
suitability_assessment: |
    All five suitability gate questions resolve cleanly:

    1. File decomposition: The work decomposes into 7+ distinct new files across
       separate packages (internal/trace/, internal/store/migrations/, internal/mcp/)
       plus modifications to existing files (types/types.go, daemon/daemon.go,
       cmd/knowing/main.go). No two agents need conflicting modifications to the
       same file. Disjoint ownership is achievable.

    2. Investigation-first items: None. The design doc (docs/runtime-traces.md)
       fully specifies all components including interfaces, SQL schema, confidence
       scoring rules, and integration points. No unknowns requiring investigation.

    3. Interface discoverability: Yes. The TraceIngestor interface, TraceSpan
       struct, confidence scoring table, and SQL schema are fully specified in the
       design doc. Cross-agent interfaces can be defined as binding contracts.

    4. Pre-implementation status: No existing runtime trace code exists. All items
       are TODO status. The Edge struct needs two new fields (ObservationCount,
       LastObserved); the edges table needs two new columns via migration 004.

    5. Parallelization value: High. Build+test cycle is ~15s (Go project with
       SQLite). 5 agents in wave 1 with 2-4 files each, independent work. Wave 2
       handles integration (daemon wiring, CLI flags, MCP tools). Clear speedup
       over sequential implementation.

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~15 min (5 wave-1 agents x 8 min avg, parallel)
    - Wave 2 execution: ~10 min (2 agents x 8 min avg, parallel)
    - Merge and verification: ~5 min per wave
    Total Polywave time: ~43 min

    Sequential baseline: ~56 min (7 agents x 8 min avg sequential)
    Time savings: ~13 min (23% faster)

    Recommendation: Clear speedup. Wave 1 agents are fully independent
    (new packages with no cross-dependencies). Proceed.
