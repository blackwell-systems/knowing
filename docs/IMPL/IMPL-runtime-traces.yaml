scaffolds:
    - file_path: internal/trace/types.go
      contents: |
        package trace

        import (
            "time"
            "github.com/blackwell-systems/knowing/internal/types"
        )

        // TraceSpan is a normalized representation of a single span from any
        // tracing system.
        type TraceSpan struct {
            TraceID       string
            SpanID        string
            ParentSpanID  string
            ServiceName   string
            OperationName string
            PeerService   string
            Attributes    map[string]string
            StartTime     time.Time
            Duration      time.Duration
        }

        // HTTPLogEntry represents a single HTTP access log line.
        type HTTPLogEntry struct {
            Timestamp   time.Time
            Method      string
            Path        string
            StatusCode  int
            ServiceName string
            ClientIP    string
            Duration    time.Duration
        }

        // RuntimeStats holds aggregated statistics for runtime edges.
        type RuntimeStats struct {
            TotalEdges    int
            BySourceType  map[string]int
            ActiveCount   int   // edges with observations in last 7 days
            StaleCount    int   // edges with no observations in last 30 days
            GCEligible    int   // edges with no observations in last 90 days
        }

        // IngestResult reports the outcome of a batch ingestion.
        type IngestResult struct {
            Created int
            Updated int
        }

        // ConfidenceFromCount computes confidence score from observation count
        // within the last 7 days, per the design doc scoring table.
        func ConfidenceFromCount(count int) float64 {
            switch {
            case count > 1000:
                return 0.95
            case count >= 100:
                return 0.85
            case count >= 10:
                return 0.7
            case count >= 1:
                return 0.5
            default:
                return 0.2
            }
        }

        // RouteMapping represents a mapping from a runtime identifier (HTTP route,
        // gRPC method, queue topic) to a graph node.
        type RouteMapping struct {
            ServiceName  string
            RoutePattern string
            NodeHash     types.Hash
            MappingType  string // "http_route", "grpc_method", "queue_topic"
        }

        // HealthState represents the connection health of the trace ingestor.
        type HealthState string

        const (
            HealthConnected    HealthState = "CONNECTED"
            HealthReconnecting HealthState = "RECONNECTING"
            HealthDisconnected HealthState = "DISCONNECTED"
            HealthDisabled     HealthState = "DISABLED"
        )

        // TraceIngestConfig holds configuration for the trace ingestion pipeline.
        type TraceIngestConfig struct {
            Enabled                bool
            OTLPEndpoint           string
            BatchSize              int
            BatchInterval          time.Duration
            ConfidenceDecayInterval time.Duration
            GCThresholdDays        int
            ServiceMap             map[string]string // OTel name -> knowing repo name
        }
      import_path: github.com/blackwell-systems/knowing/internal/trace
      status: committed (d5562c7)
pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Agent B's migration adds columns to edges table, but the existing
            scanEdge/scanEdges helpers in sqlite.go only scan 9 columns. If Agent B
            accidentally modifies sqlite.go, it conflicts with other store work.
          likelihood: medium
          impact: high
          mitigation: |
            Agent B is explicitly constrained to NOT modify sqlite.go. New scan helpers
            are defined in sqlite_runtime.go. Existing queries continue to SELECT only
            the original 9 columns and work unchanged.
        - scenario: |
            Agent F's ingestor tests need an in-memory SQLite database with all
            migrations applied (including migration 004 from Agent B). If Agent B's
            migration SQL has issues, Agent F's tests fail.
          likelihood: low
          impact: medium
          mitigation: |
            Agent F creates the schema directly in test setup using raw SQL, not
            the migration system. This makes Agent F's tests independent of the
            migration file format.
        - scenario: |
            The OTel proto dependency (go.opentelemetry.io/proto/otlp) pulls in a
            large transitive dependency tree that causes go.sum conflicts or version
            incompatibilities with existing dependencies.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent F's otlp.go uses an abstraction layer. If the OTel dependency causes
            issues, the receiver can be compiled with a build tag. The core ingestor
            and resolver work without OTel protos.
        - scenario: |
            Agent C modifies types.go (adding fields to Edge struct) but existing
            tests that construct Edge literals break because Go requires all fields
            in struct literals to be named or all to be present.
          likelihood: low
          impact: low
          mitigation: |
            Existing test code uses named field initialization (e.g., Edge{EdgeHash: ...,
            SourceHash: ...}), not positional initialization. Adding new fields with
            zero defaults does not break named-field construction.
        - scenario: |
            Agent D's resolver imports internal/trace for TraceSpan type, creating
            a same-package dependency that compiles fine but couples the resolver
            to the types file.
          likelihood: low
          impact: low
          mitigation: |
            Both are in the same package (internal/trace). The scaffold types.go is
            created before wave 1 agents run, so Agent D's imports resolve correctly.
