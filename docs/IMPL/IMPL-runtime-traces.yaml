interface_contracts:
    - name: TraceIngestor
      description: |
        Interface for converting raw observability data into graph edges.
        Implemented by the OTel-based ingestor in internal/trace/ingestor.go.
      definition: |
        type TraceIngestor interface {
            IngestSpans(ctx context.Context, spans []TraceSpan) (IngestResult, error)
            IngestHTTPLogs(ctx context.Context, entries []HTTPLogEntry) (IngestResult, error)
            RuntimeEdgeStats(ctx context.Context, snapshot types.Hash) (*RuntimeStats, error)
            DecayConfidence(ctx context.Context) (updated int, err error)
        }
      location: internal/trace/types.go
    - name: SymbolResolver
      description: |
        Resolves runtime identifiers (routes, RPC methods) to graph node hashes
        using the route_symbols table built during static indexing.
        Uses *sql.DB directly to keep the trace package independent of the store package.
      definition: |
        type SymbolResolver struct {
            db *sql.DB
        }
        func NewSymbolResolver(db *sql.DB) *SymbolResolver
        func (r *SymbolResolver) Resolve(ctx context.Context, serviceName, routePattern, mappingType string) (types.Hash, float64, error)
      location: internal/trace/resolver.go
    - name: RouteSymbolStore
      description: |
        Extended store methods for route_symbols table operations.
        Added to SQLiteStore in sqlite_runtime.go, not to the GraphStore interface (keeps interface stable).
        Uses individual params and local RouteSymbolRow struct to avoid importing trace package.
      definition: |
        type RouteSymbolRow struct { ServiceName, RoutePattern, MappingType string; NodeHash types.Hash; CreatedAt int64 }
        func (s *SQLiteStore) PutRouteSymbol(ctx context.Context, serviceName, routePattern string, nodeHash types.Hash, mappingType string) error
        func (s *SQLiteStore) GetRouteSymbol(ctx context.Context, serviceName, routePattern, mappingType string) (*RouteSymbolRow, error)
        func (s *SQLiteStore) UpdateObservation(ctx context.Context, edgeHash types.Hash, count int, lastObserved int64, confidence float64) error
        func (s *SQLiteStore) RuntimeEdgesByProvenance(ctx context.Context, provenancePrefix string) ([]types.Edge, error)
        func (s *SQLiteStore) DecayRuntimeConfidence(ctx context.Context, staleDays int, newConfidence float64) (int, error)
      location: internal/store/sqlite_runtime.go
    - name: Edge struct extension
      description: |
        Two new fields added to the Edge struct for runtime observation tracking.
        Static edges use default zero values for both fields.
      definition: |
        // Added to types.Edge:
        ObservationCount int   // total observations in current window (0 for static edges)
        LastObserved     int64 // unix timestamp of last observation (0 for static edges)
      location: internal/types/types.go
    - name: OTLPReceiver
      description: |
        gRPC server that implements the OTLP trace receiver protocol.
        Receives ExportTraceServiceRequest, normalizes spans to TraceSpan,
        and passes them to the TraceIngestor.
      definition: |
        type OTLPReceiver struct {
            ingestor TraceIngestor
            addr     string
        }
        func NewOTLPReceiver(addr string, ingestor TraceIngestor) *OTLPReceiver
        func (r *OTLPReceiver) Start(ctx context.Context) error
        func (r *OTLPReceiver) Stop() error
      location: internal/trace/otlp.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            # Scaffold: Shared Types for Runtime Trace Ingestion

            Create the `internal/trace/types.go` file containing all shared types
            used by the runtime trace ingestion pipeline. This is a scaffold task:
            define types only, no logic beyond the ConfidenceFromCount helper.

            ## What to implement

            File: `internal/trace/types.go`

            Package declaration: `package trace`

            Types to define (exact definitions in the scaffolds section above):
            - `TraceSpan` struct: normalized span representation
            - `HTTPLogEntry` struct: HTTP access log entry
            - `RuntimeStats` struct: aggregated runtime edge statistics
            - `IngestResult` struct: batch ingestion outcome (Created, Updated int)
            - `RouteMapping` struct: route-to-node mapping entry
            - `HealthState` type (string) with constants: CONNECTED, RECONNECTING, DISCONNECTED, DISABLED
            - `TraceIngestConfig` struct: configuration for the pipeline
            - `ConfidenceFromCount(count int) float64` function: implements the
              confidence scoring table from the design doc
            - `TraceIngestor` interface with methods: IngestSpans, IngestHTTPLogs,
              RuntimeEdgeStats, DecayConfidence

            ## Interfaces consumed
            - `types.Hash` from `github.com/blackwell-systems/knowing/internal/types`

            ## Tests
            No test file needed for type definitions. ConfidenceFromCount is tested
            by Agent E in internal/trace/confidence_test.go.

            ## Verification gate
            ```bash
            go build ./internal/trace/...
            ```
            Postconditions:
            - `grep -c "type TraceSpan struct" internal/trace/types.go` => 1
            - `grep -c "type TraceIngestor interface" internal/trace/types.go` => 1
            - `grep -c "func ConfidenceFromCount" internal/trace/types.go` => 1

            ## Constraints
            - Do NOT add any implementation logic beyond ConfidenceFromCount.
            - Do NOT create files outside internal/trace/types.go.
            - Do NOT import any external OTel dependencies; these types are
              knowing-internal representations, not OTel protobuf types.
          files:
            - internal/trace/types.go
        - id: B
          task: |
            # Store Layer: Runtime Columns Migration and Route Symbol Methods

            Add the SQLite migration for runtime observation columns on the edges
            table and the route_symbols table. Implement store methods for route
            symbol CRUD and runtime edge observation updates.

            ## What to implement

            ### File 1: internal/store/migrations/004_add_runtime_columns.sql

            ```sql
            ALTER TABLE edges ADD COLUMN observation_count INTEGER NOT NULL DEFAULT 0;
            ALTER TABLE edges ADD COLUMN last_observed INTEGER NOT NULL DEFAULT 0;

            CREATE TABLE route_symbols (
                service_name  TEXT NOT NULL,
                route_pattern TEXT NOT NULL,
                node_hash     BLOB NOT NULL,
                mapping_type  TEXT NOT NULL,
                created_at    INTEGER NOT NULL,
                PRIMARY KEY (service_name, route_pattern, mapping_type)
            );

            CREATE INDEX idx_route_symbols_node ON route_symbols(node_hash);
            CREATE INDEX idx_edges_provenance ON edges(provenance);
            CREATE INDEX idx_edges_last_observed ON edges(last_observed);
            ```

            ### File 2: internal/store/sqlite_runtime.go

            Package `store`. Methods on `*SQLiteStore`:

            - `PutRouteSymbol(ctx, serviceName, routePattern, nodeHash types.Hash, mappingType string) error`
              INSERT OR REPLACE into route_symbols with created_at = now.

            - `GetRouteSymbol(ctx, serviceName, routePattern, mappingType string) (*RouteSymbolRow, error)`
              Returns nil, nil if not found. RouteSymbolRow is a local struct:
              `type RouteSymbolRow struct { ServiceName, RoutePattern, MappingType string; NodeHash types.Hash; CreatedAt int64 }`

            - `UpdateObservation(ctx, edgeHash types.Hash, observationCount int, lastObserved int64, confidence float64) error`
              UPDATE edges SET observation_count=?, last_observed=?, confidence=?
              WHERE edge_hash=?

            - `RuntimeEdgesByProvenance(ctx, provenancePrefix string) ([]types.Edge, error)`
              SELECT ... FROM edges WHERE provenance LIKE provenancePrefix+'%'
              Must scan all edge columns including observation_count and last_observed.

            - `DecayRuntimeConfidence(ctx, staleDays int, newConfidence float64) (int, error)`
              UPDATE edges SET confidence=? WHERE provenance LIKE 'otel_%'
              AND last_observed < (unix_now - staleDays*86400) AND last_observed > 0
              AND confidence > ?. Returns rows affected.

            ### File 3: internal/store/sqlite_runtime_test.go

            Test all five methods. Use the existing `tempDB` helper pattern from
            sqlite_test.go. Test PutRouteSymbol + GetRouteSymbol round-trip, test
            UpdateObservation modifies the correct edge, test
            DecayRuntimeConfidence only affects otel_ edges older than threshold.

            ## Important: Edge scanning must handle new columns

            The existing `scanEdge` / `scanEdges` helpers in sqlite.go scan 9 columns.
            Your new methods that return `[]types.Edge` must scan 11 columns
            (including observation_count and last_observed). Define local scan
            helpers in sqlite_runtime.go that scan all 11 columns:
            `scanEdgeRuntime(row scannable) (*types.Edge, error)` and
            `scanEdgesRuntime(rows *sql.Rows) ([]types.Edge, error)`.

            Note: Agent C will add ObservationCount and LastObserved fields to the
            Edge struct in types.go. Your scan helpers should populate those fields.
            The scaffold for internal/trace/types.go will be available.

            ## Verification gate
            ```bash
            go build ./internal/store/...
            go test ./internal/store/ -run TestRuntime -v
            ```
            Postconditions:
            - `grep -c "route_symbols" internal/store/migrations/004_add_runtime_columns.sql` => >= 1
            - `grep -c "PutRouteSymbol" internal/store/sqlite_runtime.go` => >= 1
            - `grep -c "DecayRuntimeConfidence" internal/store/sqlite_runtime.go` => >= 1

            ## Constraints
            - Do NOT modify internal/store/sqlite.go. Put all new methods in the
              new sqlite_runtime.go file.
            - Do NOT modify the existing scanEdge/scanEdges helpers. Define new
              local scan helpers that handle all 11 columns.
            - Do NOT modify files outside your ownership list.
          files:
            - internal/store/migrations/004_add_runtime_columns.sql
            - internal/store/sqlite_runtime.go
            - internal/store/sqlite_runtime_test.go
        - id: C
          task: |
            # Types: Add Observation Fields to Edge Struct

            Extend the Edge struct with two new fields for runtime observation
            tracking. Static edges use default zero values for both.

            ## What to implement

            File: `internal/types/types.go`

            Add two fields to the `Edge` struct, after the existing CallSiteFile field:

            Insert after this exact text:
            ```go
            	CallSiteFile string // relative file path (within the repo) containing the call expression
            ```

            Add:
            ```go
            	// Runtime observation fields. Zero values for static edges.
            	ObservationCount int   // total observations in current window (0 for static edges)
            	LastObserved     int64 // unix timestamp of last observation (0 for static edges)
            ```

            These fields are not included in edge hash computation (observation
            updates do not change edge identity). The existing ComputeEdgeHash
            function remains unchanged.

            ## Tests
            No new tests needed. Existing tests continue to pass because the new
            fields default to zero values. Agent B tests the fields via store
            round-trips in sqlite_runtime_test.go.

            ## Verification gate
            ```bash
            go build ./...
            go test ./internal/types/...
            ```
            Postconditions:
            - `grep -c "ObservationCount" internal/types/types.go` => 1
            - `grep -c "LastObserved" internal/types/types.go` => 1

            ## Constraints
            - Do NOT change ComputeEdgeHash or ComputeNodeHash.
            - Do NOT modify any file other than internal/types/types.go.
            - Do NOT change any existing field order or type. Only append new fields
              to the Edge struct.

            IMPORTANT: After adding these fields, the existing scanEdge/scanEdges
            helpers in sqlite.go will still work because they scan 9 columns from
            the SELECT statement (edge_hash through callsite_file). The new columns
            are not in those SELECTs, so existing scan helpers do not break. Agent B
            creates separate scan helpers for runtime queries that include all 11
            columns.
          files:
            - internal/types/types.go
        - id: D
          task: |
            # Symbol Resolver: Route-to-Node Mapping

            Implement the symbol resolver that maps runtime identifiers (HTTP routes,
            gRPC methods, queue topics) to graph node hashes using the route_symbols
            table.

            ## What to implement

            ### File 1: internal/trace/resolver.go

            Package `trace`.

            ```go
            type SymbolResolver struct {
                db *sql.DB
            }

            func NewSymbolResolver(db *sql.DB) *SymbolResolver
            ```

            Methods:

            - `Resolve(ctx, serviceName, routePattern, mappingType string) (types.Hash, float64, error)`
              Query route_symbols for exact match on (service_name, route_pattern,
              mapping_type). If found, return (nodeHash, 1.0, nil). If not found,
              create a synthetic unresolved node hash:
              `types.ComputeNodeHash(serviceName, "UNRESOLVED", types.EmptyHash, routePattern, "runtime_endpoint")`
              Return (syntheticHash, 0.3, nil).

            - `ResolveSpan(ctx, span TraceSpan) (sourceHash, targetHash types.Hash, confidence float64, err error)`
              Extract runtime identifiers from span attributes:
              1. Source: serviceName -> compute node hash via
                 `types.ComputeNodeHash(span.ServiceName, "", types.EmptyHash, span.ServiceName, "service")`
              2. Target: determine mapping type from attributes:
                 - If `http.method` and `http.route` present: mappingType="http_route",
                   routePattern = method + " " + route (e.g., "POST /api/v2/users")
                 - If `rpc.service` and `rpc.method` present: mappingType="grpc_method",
                   routePattern = service + "." + method
                 - Otherwise: use span.OperationName as routePattern, mappingType="unknown"
              3. If span.PeerService is non-empty, resolve target against PeerService.
                 Otherwise, resolve against span.ServiceName.
              4. Call Resolve for the target. Return sourceHash, targetHash, confidence.

            ### File 2: internal/trace/resolver_test.go

            Tests:
            - TestResolve_ExactMatch: insert a route_symbol row, resolve it, verify hash matches
            - TestResolve_Unresolved: resolve a non-existent route, verify synthetic hash and 0.3 confidence
            - TestResolveSpan_HTTP: create span with http.method="POST", http.route="/api/users",
              verify correct route pattern construction
            - TestResolveSpan_GRPC: create span with rpc.service="UserService", rpc.method="GetUser"

            Use an in-memory SQLite database for tests. Create the route_symbols
            table directly in the test setup (copy the CREATE TABLE from migration 004).

            ## Verification gate
            ```bash
            go build ./internal/trace/...
            go test ./internal/trace/ -run TestResolve -v
            ```
            Postconditions:
            - `grep -c "func.*Resolve(" internal/trace/resolver.go` => >= 2
            - `grep -c "UNRESOLVED" internal/trace/resolver.go` => >= 1

            ## Constraints
            - Do NOT import the store package. Use *sql.DB directly for database
              access. This keeps the trace package independent of the store package.
            - Do NOT modify files outside your ownership list.
            - Do NOT duplicate the TraceSpan type; import it from internal/trace
              (the scaffold types.go will be available).
          files:
            - internal/trace/resolver.go
            - internal/trace/resolver_test.go
        - id: E
          task: |
            # Confidence Scoring and Decay Logic

            Implement the confidence scoring computation and decay logic for runtime
            edges. This is pure business logic with no database dependencies.

            ## What to implement

            ### File 1: internal/trace/confidence.go

            Package `trace`.

            Functions:

            - `ComputeConfidence(observationCount int, daysSinceLastObserved int) float64`
              Combines observation volume and recency:
              1. If daysSinceLastObserved > 90: return 0.0 (GC eligible)
              2. If daysSinceLastObserved > 30: return 0.2 (stale)
              3. Otherwise: return ConfidenceFromCount(observationCount) from types.go

            - `ShouldGarbageCollect(lastObserved int64, gcThresholdDays int) bool`
              Returns true if time.Now().Unix() - lastObserved > gcThresholdDays * 86400

            - `DecayBracket(daysSinceLastObserved int) string`
              Returns a human-readable decay bracket for diagnostics:
              "active" (0-7 days), "recent" (8-30 days), "stale" (31-90 days),
              "gc_eligible" (>90 days)

            - `BuildProvenance(traceIDs []string) string`
              Returns the provenance string for runtime edges:
              `otel_trace:{"trace_ids":["id1","id2"]}` (max 5 trace IDs, truncate if more).
              If traceIDs is empty, return "otel_trace".

            ### File 2: internal/trace/confidence_test.go

            Tests:
            - TestConfidenceFromCount: table-driven test covering all brackets
              (>1000, 100-1000, 10-100, 1-9, 0) from the design doc
            - TestComputeConfidence: test interaction of count and recency
            - TestComputeConfidence_Stale: daysSinceLastObserved > 30 returns 0.2
            - TestComputeConfidence_GCEligible: daysSinceLastObserved > 90 returns 0.0
            - TestShouldGarbageCollect: edge cases around threshold
            - TestBuildProvenance: empty, few, and >5 trace IDs
            - TestDecayBracket: all four brackets

            ## Verification gate
            ```bash
            go build ./internal/trace/...
            go test ./internal/trace/ -run TestConfidence -v
            go test ./internal/trace/ -run TestShouldGarbageCollect -v
            go test ./internal/trace/ -run TestBuildProvenance -v
            go test ./internal/trace/ -run TestDecayBracket -v
            ```
            Postconditions:
            - `grep -c "func ComputeConfidence" internal/trace/confidence.go` => 1
            - `grep -c "func BuildProvenance" internal/trace/confidence.go` => 1

            ## Constraints
            - Do NOT import database/sql or the store package. This is pure logic.
            - Do NOT duplicate ConfidenceFromCount; import it from the scaffold types.go.
            - Do NOT modify files outside your ownership list.
          files:
            - internal/trace/confidence.go
            - internal/trace/confidence_test.go
    - number: 2
      agents:
        - id: F
          task: |
            # Trace Ingestor and OTLP Receiver

            Implement the core TraceIngestor that processes span batches into graph
            edges, and the OTLP gRPC receiver that accepts spans from OTel collectors.

            ## What to implement

            ### File 1: internal/trace/ingestor.go

            Package `trace`. Implements the TraceIngestor interface.

            ```go
            type Ingestor struct {
                db       *sql.DB
                resolver *SymbolResolver
                config   TraceIngestConfig
                mu       sync.Mutex  // protects pendingBatch
                pending  []TraceSpan
            }

            func NewIngestor(db *sql.DB, resolver *SymbolResolver, config TraceIngestConfig) *Ingestor
            ```

            Methods:

            - `IngestSpans(ctx, spans []TraceSpan) (IngestResult, error)`
              For each span:
              1. Call resolver.ResolveSpan to get sourceHash, targetHash, confidence
              2. Determine edge type from span attributes:
                 - http.method present -> "runtime_calls"
                 - rpc.service present -> "runtime_rpc"
                 - messaging.system present -> "runtime_produces" or "runtime_consumes"
                 - default -> "runtime_calls"
              3. Build provenance string via BuildProvenance with sample trace IDs
              4. Compute edge hash: types.ComputeEdgeHash(sourceHash, targetHash, edgeType, "otel_trace")
                 Note: provenance in hash computation is always "otel_trace" (not the
                 JSON-enriched provenance string). This ensures the same relationship
                 always maps to the same edge hash regardless of sampled trace IDs.
              5. Check if edge exists (SELECT edge_hash FROM edges WHERE edge_hash=?)
                 - If exists: UPDATE observation_count, last_observed, confidence.
                   Increment observation_count. Update confidence from ComputeConfidence.
                 - If not exists: INSERT new edge with full provenance string.
                   Record an "added" EdgeEvent.
              Return IngestResult with counts.

            - `IngestHTTPLogs(ctx, entries []HTTPLogEntry) (IngestResult, error)`
              Convert each entry to a TraceSpan (method+path -> operationName,
              serviceName from entry) and delegate to IngestSpans.

            - `RuntimeEdgeStats(ctx, snapshot types.Hash) (*RuntimeStats, error)`
              Query edges WHERE provenance LIKE 'otel_%'. Aggregate by edge_type
              for BySourceType. Count active (last_observed within 7 days), stale
              (no observations in 30 days), gc_eligible (no observations in 90 days).

            - `DecayConfidence(ctx) (int, error)`
              Call DecayRuntimeConfidence on the store: all otel_ edges not observed
              in 30+ days get confidence set to 0.2. Return count of updated edges.

            - `FlushBatch(ctx) error`
              If pending spans exist, call IngestSpans with the pending batch and clear it.

            - `AddToBatch(span TraceSpan)`
              Append span to pending batch (mutex-protected). If len(pending) >= config.BatchSize,
              trigger FlushBatch.

            ### File 2: internal/trace/ingestor_test.go

            Tests:
            - TestIngestSpans_NewEdge: ingest a span, verify edge created with correct
              provenance, observation_count=1, confidence=0.5
            - TestIngestSpans_ExistingEdge: ingest same span twice, verify
              observation_count incremented, edge hash unchanged
            - TestIngestSpans_HTTPRoute: span with http.method/http.route attributes
            - TestIngestSpans_GRPCMethod: span with rpc.service/rpc.method attributes
            - TestIngestHTTPLogs: convert HTTP log entry to span and ingest
            - TestRuntimeEdgeStats: create mixed static/runtime edges, verify stats
            - TestDecayConfidence: create old runtime edge, run decay, verify confidence
            - TestBatchAccumulation: add spans via AddToBatch, verify FlushBatch works

            Use in-memory SQLite with migrations applied. Use the existing migration
            SQL to set up tables in tests.

            ### File 3: internal/trace/otlp.go

            Package `trace`. OTLP gRPC receiver.

            ```go
            type OTLPReceiver struct {
                ingestor *Ingestor
                addr     string
                server   *grpc.Server
                health   HealthState
                mu       sync.RWMutex
            }

            func NewOTLPReceiver(addr string, ingestor *Ingestor) *OTLPReceiver
            ```

            Methods:

            - `Start(ctx context.Context) error`
              Create a gRPC server, register the OTLP trace service
              (implement Export method from collectortrace.TraceServiceServer).
              Listen on addr. Set health to CONNECTED.

            - `Stop() error`
              GracefulStop the gRPC server. Set health to DISABLED.

            - `Health() HealthState`
              Return current health state (mutex-protected read).

            - `Export(ctx, req *collectortrace.ExportTraceServiceRequest) (*collectortrace.ExportTraceServiceResponse, error)`
              Convert OTLP ResourceSpans -> []TraceSpan:
              - Extract service.name from Resource attributes
              - For each InstrumentationLibrarySpans -> Spans:
                - Map Name to OperationName
                - Map Attributes to TraceSpan.Attributes
                - Extract http.method, http.route, rpc.service, rpc.method, etc.
                - Extract peer service from span links or attributes
              Call ingestor.AddToBatch for each span.
              Return empty response (success).

            Dependencies needed in go.mod (Agent G will add these):
            - go.opentelemetry.io/proto/otlp v1.5.0
            - google.golang.org/grpc v1.72.0

            For now, use build tags or interface abstraction so the package compiles
            without the OTel proto dependency. Define a local interface:

            ```go
            // otlpSpanData abstracts the OTLP span for testability.
            // The real implementation wraps collectortrace types.
            type otlpSpanData interface {
                GetTraceId() []byte
                GetSpanId() []byte
                GetParentSpanId() []byte
                GetName() string
                GetAttributes() []otlpAttribute
                GetStartTimeUnixNano() uint64
                GetEndTimeUnixNano() uint64
            }
            ```

            Actually, for wave 2 the OTel proto dependency should be available.
            Agent G adds the dependency in go.mod. If the dependency is not yet
            available when you compile, define a placeholder interface and document
            what the real implementation should look like.

            ## Verification gate
            ```bash
            go build ./internal/trace/...
            go test ./internal/trace/ -run TestIngest -v
            go test ./internal/trace/ -run TestBatch -v
            ```
            Postconditions:
            - `grep -c "func.*IngestSpans" internal/trace/ingestor.go` => >= 1
            - `grep -c "func.*FlushBatch" internal/trace/ingestor.go` => >= 1
            - `grep -c "OTLPReceiver" internal/trace/otlp.go` => >= 1

            ## Constraints
            - Do NOT modify any files outside your ownership list.
            - Do NOT duplicate types from internal/trace/types.go; import them.
