pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Wave 1 agents call cross-file functions that don't exist yet in their
            isolated worktrees (Agent C calls ParseTypeNode from Agent A's types.go).
          likelihood: high
          impact: low
          mitigation: |
            All wave 1 agents are in the same Go package (javaresolve). Their files
            compile together only after merge. The build gate runs post-merge.
            Individual agent worktrees will not compile in isolation, which is
            expected and acceptable. Identical to the Go and Python resolver patterns.
        - scenario: |
            Java tree-sitter node type names differ from what the agent task
            descriptions use, causing nil returns and incorrect resolution.
          likelihood: medium
          impact: medium
          mitigation: |
            The existing Java extractor at internal/indexer/javaextractor/extractor.go
            already uses the Go tree-sitter Java bindings and demonstrates the correct
            node type names (class_declaration, method_declaration, method_invocation,
            object_creation_expression, field_access, identifier, etc.). Agents should
            cross-reference that file for node type names. Guard all ChildByFieldName
            calls with nil checks.
        - scenario: |
            Java's overloading (multiple methods with same name) causes incorrect
            method resolution when the registry only stores one entry per
            "ReceiverType.MethodName" key.
          likelihood: medium
          impact: medium
          mitigation: |
            The shared typresolve.Registry uses LookupMethod(receiverQN, methodName)
            which returns the first match. For overloaded methods, only one entry is
            stored. This is a known limitation (same as Go resolver where methods
            don't overload). The resolved edge will point to one of the overloads,
            which is still correct for reachability (the edge establishes that a call
            relationship exists). Full overload resolution would require parameter
            type matching, which is deferred to a future enhancement.
        - scenario: |
            Java's static imports (import static com.example.Utils.helper) cause
            unresolved calls because the import map only tracks class-level imports.
          likelihood: medium
          impact: low
          mitigation: |
            The BuildImportMap implementation handles static imports by extracting
            the class name (second-to-last segment). The class is registered in the
            import map, so static method calls on the class will resolve. Direct
            calls to statically imported methods (without class prefix) require
            additional handling in resolveCallsInNode: check the import map for
            static imports and try resolving bare method names against imported classes.
        - scenario: |
            Generics type erasure causes type information loss. List<String>.get()
            should return String, but if generics are erased, it returns Unknown.
          likelihood: high
          impact: medium
          mitigation: |
            ParseTypeNode maps generic containers (List, Map, Set, etc.) to
            typresolve Slice/Map/Optional types that preserve element type info.
            For user-defined generics, the type parameter is stored in TypeParams
            but not substituted during method dispatch. This is a deliberate
            simplification. The resolver handles the common cases (collections)
            and falls back to Unknown for complex generic scenarios.
        - scenario: |
            The module QN inference from package declarations produces qualified names
            that don't match the registry entries from the existing Java extractor.
          likelihood: medium
          impact: high
          mitigation: |
            Agent D must use the same package QN format as the existing Java extractor.
            The extractor uses the convention "repoURL://packagePath.ClassName" (see
            extractClassDeclWithImports at line 353). The resolver's ExtractPackage
