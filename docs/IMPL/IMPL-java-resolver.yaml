title: Java In-Process Type Resolver
feature_slug: java-resolver
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: All new files in internal/typresolve/java/ (10+ files).
       No existing files modified. Agents have fully disjoint file ownership.
       Follows the exact same pattern as the Go resolver (IMPL-go-resolver.yaml)
       and Python resolver (IMPL-python-resolver.yaml).

    2. Investigation-first: No unknowns. The C# resolver in codebase-memory
       (cs_lsp.c, 3,021 lines) provides the closest OOP analog. The shared
       infrastructure (typresolve package) is completed and defines the exact
       interface contracts. The Go resolver establishes the structural pattern.
       The existing Java tree-sitter extractor (internal/indexer/javaextractor/)
       documents all Java AST node types and their field names.

    3. Interface discoverability: All interfaces are defined. The typresolve.Resolver
       interface, Registry, Scope, and Type are implemented and tested. Cross-agent
       contracts are limited to Go function signatures within the new java/ subpackage.

    4. Pre-implementation: The shared infrastructure (in-process-resolver-infra) was
       completed previously. The Go resolver IMPL shows the exact structural pattern.
       No overlap with existing code. The Java extractor already uses the
       go-tree-sitter/java grammar that the resolver will share.

    5. Parallelization value: High. Build/test cycle is ~30s with GOWORK=off.
       3 agents in wave 1 with 2-4 files each. Wave 2 integrates and tests.
       Independent type system components (type parsing, builtins, scope binding)
       can be built in parallel, matching the Go/Python resolver decomposition.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (4 agents, 2 waves, ~5 min avg per agent)
    - Merge and verification: ~5 min
    Total Polywave time: ~30 min

    Sequential baseline: ~50 min (4 agents x 12 min avg)
    Time savings: ~20 min (40% faster)

    Recommendation: Clear speedup. Wave 1 agents are fully independent (type
    parsing + imports, builtins + method lookup, scope binding + expression eval).
    Wave 2 integrates them into the resolver. Identical pattern to Go and Python
    resolver IMPLs that completed successfully.
test_command: GOWORK=off go test -short ./... -timeout 5m
