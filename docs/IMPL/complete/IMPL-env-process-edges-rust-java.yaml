            ## Rust: Add reads_env and executes_process edge extraction

            ### What to implement

            Add two new files to `internal/indexer/rustextractor/` that extract
            reads_env and executes_process edges from Rust function/method bodies,
            following the identical pattern used in `internal/indexer/gotsextractor/env_edges.go`
            and `internal/indexer/gotsextractor/process_edges.go`.

            **Reference implementations to follow:**
            - `internal/indexer/gotsextractor/env_edges.go` (pattern for env edges)
            - `internal/indexer/gotsextractor/process_edges.go` (pattern for process edges)
            - `internal/indexer/rustextractor/field_access_edges.go` (pattern for wiring into Rust extractor)

            ### File 1: `internal/indexer/rustextractor/env_edges.go`

            Create `extractEnvReadEdges(funcNode *sitter.Node, opts types.ExtractOptions, basePath string, sourceHash types.Hash) ([]types.Node, []types.Edge)`

            **Rust patterns to detect in tree-sitter AST:**
            - `env::var("KEY")` - call_expression where function is scoped_identifier "env::var"
            - `env::var_os("KEY")` - same pattern with "env::var_os"
            - `std::env::var("KEY")` - scoped_identifier "std::env::var"
            - `std::env::var_os("KEY")` - scoped_identifier "std::env::var_os"

            Walk the function body recursively. For each call_expression, check if the
            function child is a scoped_identifier whose content matches the patterns above.
            Extract the first string_literal argument value as the env var name.

            Create synthetic env_var node with QN="env://VAR_NAME" and emit reads_env edge
            from sourceHash to the target. Use confidence 0.9, provenance "ast_inferred".
            Use the same `makeEnvEdge` helper pattern from the Go extractor.

            **Important tree-sitter Rust details:**
            - String literals in Rust are `string_literal` node type (not `interpreted_string_literal`)
            - Arguments are in the `arguments` field of call_expression
            - Scoped identifiers like `env::var` are `scoped_identifier` node type

            ### File 2: `internal/indexer/rustextractor/process_edges.go`

            Create `extractProcessExecEdges(funcNode *sitter.Node, opts types.ExtractOptions, basePath string, sourceHash types.Hash) ([]types.Node, []types.Edge)`

            **Rust patterns to detect:**
            - `Command::new("cmd")` - call_expression where function is scoped_identifier "Command::new"
            - `std::process::Command::new("cmd")` - full path variant

            Extract the first string_literal argument as the command name. If not a string
            literal, use "dynamic". Create synthetic process node with QN="process://cmd"
            and emit executes_process edge. Confidence 0.9, provenance "ast_inferred".

            ### Wiring into extractor.go

            In `extractFunctionItemWithImports` (line ~668), add env and process edge
            extraction alongside the existing field access extraction. Insert after this
            exact text:

            ```go
            	if implType != "" {
            		fieldEdges := extractFieldAccessEdges(node, opts, basePath, implType, nodeHash)
            		edges = append(edges, fieldEdges...)
            	}
            ```

            Add (OUTSIDE the if block, since env/process edges apply to all functions):
            ```go
            	envNodes, envEdges := extractEnvReadEdges(node, opts, basePath, nodeHash)
            	nodes = append(nodes, envNodes...)
            	edges = append(edges, envEdges...)

            	procNodes, procEdges := extractProcessExecEdges(node, opts, basePath, nodeHash)
            	nodes = append(nodes, procNodes...)
            	edges = append(edges, procEdges...)
            ```

            Also wire into `extractFunctionItem` (line ~290) after the call edges extraction.
            Insert after this exact text:

            ```go
            	callEdges := extractCallEdgesFromBody(body, opts, basePath, nodeHash)
            	edges = append(edges, callEdges...)
            ```

            Add:
            ```go
            	envNodes, envEdges := extractEnvReadEdges(node, opts, basePath, nodeHash)
            	nodes = append(nodes, envNodes...)
            	edges = append(edges, envEdges...)

            	procNodes, procEdges := extractProcessExecEdges(node, opts, basePath, nodeHash)
            	nodes = append(nodes, procNodes...)
            	edges = append(edges, procEdges...)
            ```

            ### Tests

            Create test files following the pattern in `field_access_edges_test.go`.
            Use the `makeOpts` helper already defined in `extractor_test.go`.

            **env_edges_test.go:** Test with Rust source containing `env::var("DB_HOST")`
            and `std::env::var_os("PATH")` inside a function. Verify reads_env edges are
            emitted with correct target hashes (env://DB_HOST, env://PATH).

            **process_edges_test.go:** Test with Rust source containing
            `Command::new("cargo")` inside a function. Verify executes_process edge
            emitted with target hash for process://cargo.

            ### Verification gate

            ```bash
            GOWORK=off go build ./internal/indexer/rustextractor/ && \
            GOWORK=off go vet ./internal/indexer/rustextractor/ && \
            GOWORK=off go test ./internal/indexer/rustextractor/ -timeout 60s -run "TestExtractEnvRead|TestExtractProcessExec"
            ```

            Postconditions:
            ```bash
            # env_edges.go defines extractEnvReadEdges
            grep -c "func extractEnvReadEdges" internal/indexer/rustextractor/env_edges.go
            # Expected: 1

            # process_edges.go defines extractProcessExecEdges
            grep -c "func extractProcessExecEdges" internal/indexer/rustextractor/process_edges.go
            # Expected: 1

            # extractor.go calls both new functions
            grep -c "extractEnvReadEdges\|extractProcessExecEdges" internal/indexer/rustextractor/extractor.go
            # Expected: >= 2 (at least one call site each)
            ```

            ### Constraints
