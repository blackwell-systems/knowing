            ## Java: Add reads_env and executes_process edge extraction

            ### What to implement

            Add two new files to `internal/indexer/javaextractor/` that extract
            reads_env and executes_process edges from Java method bodies, following the
            identical pattern used in `internal/indexer/gotsextractor/env_edges.go` and
            `internal/indexer/gotsextractor/process_edges.go`.

            **Reference implementations to follow:**
            - `internal/indexer/gotsextractor/env_edges.go` (pattern for env edges)
            - `internal/indexer/gotsextractor/process_edges.go` (pattern for process edges)
            - `internal/indexer/javaextractor/field_access_edges.go` (pattern for wiring into Java extractor)

            ### File 1: `internal/indexer/javaextractor/env_edges.go`

            Create `extractEnvReadEdges(methodNode *sitter.Node, opts types.ExtractOptions, pkgPath string, className string, methodHash types.Hash) ([]types.Node, []types.Edge)`

            **Java patterns to detect in tree-sitter AST:**
            - `System.getenv("KEY")` - method_invocation where object is "System" and
              name (method) is "getenv", with a string_literal argument.

            Walk the method body recursively. For each method_invocation node, check if
            object field content is "System" and name field content is "getenv".
            Extract the first string_literal argument value as the env var name.

            Create synthetic env_var node with QN="env://VAR_NAME" and emit reads_env edge
            from methodHash to the target. Use confidence 0.9, provenance "ast_inferred".

            **Important tree-sitter Java details:**
            - String literals are `string_literal` node type
            - method_invocation has `object` and `name` fields
            - Arguments are in `arguments` field of method_invocation

            ### File 2: `internal/indexer/javaextractor/process_edges.go`

            Create `extractProcessExecEdges(methodNode *sitter.Node, opts types.ExtractOptions, pkgPath string, className string, methodHash types.Hash) ([]types.Node, []types.Edge)`

            **Java patterns to detect:**
            - `Runtime.getRuntime().exec("cmd")` - method_invocation chain where the final
              method name is "exec" and the object is itself a method_invocation of
              "Runtime.getRuntime()". Extract the first string_literal arg.
            - `new ProcessBuilder("cmd")` - object_creation_expression where type is
              "ProcessBuilder". Extract the first string_literal argument.

            For both patterns, extract the command string. If not a string literal, use
            "dynamic". Create synthetic process node with QN="process://cmd" and emit
            executes_process edge. Confidence 0.9, provenance "ast_inferred".

            ### Wiring into extractor.go

            In `extractMethodDeclWithImports` (line ~710), add env and process edge
            extraction alongside the existing field access extraction. Insert after this
            exact text:

            ```go
            	// Extract field access edges (this.field patterns).
            	if body != nil {
            		fieldEdges := extractFieldAccessEdges(node, opts, pkgPath, className, nodeHash)
            		edges = append(edges, fieldEdges...)
            	}
            ```

            Add:
            ```go
            	// Extract env read and process exec edges.
            	if body != nil {
            		envNodes, envEdges := extractEnvReadEdges(node, opts, pkgPath, className, nodeHash)
            		nodes = append(nodes, envNodes...)
            		edges = append(edges, envEdges...)

            		procNodes, procEdges := extractProcessExecEdges(node, opts, pkgPath, className, nodeHash)
            		nodes = append(nodes, procNodes...)
            		edges = append(edges, procEdges...)
            	}
            ```

            Also wire into `extractConstructorDeclWithImports` (line ~750) after the call
            edges extraction. Insert after this exact text:

            ```go
            	// Walk the constructor body for call edges with import resolution.
            	body := node.ChildByFieldName("body")
            	if body != nil {
            		callEdges := extractCallEdgesWithImports(body, opts, pkgPath, nodeHash, javaImports)
            		edges = append(edges, callEdges...)
            	}
            ```

            Add:
            ```go
            	// Extract env read and process exec edges from constructor body.
            	if body != nil {
            		envNodes, envEdges := extractEnvReadEdges(node, opts, pkgPath, className, nodeHash)
            		nodes = append(nodes, envNodes...)
            		edges = append(edges, envEdges...)

            		procNodes, procEdges := extractProcessExecEdges(node, opts, pkgPath, className, nodeHash)
            		nodes = append(nodes, procNodes...)
            		edges = append(edges, procEdges...)
            	}
            ```

            ### Tests

            Create test files following the pattern in `field_access_edges_test.go`.
            Use the test helpers already defined in `extractor_test.go`.

            **env_edges_test.go:** Test with Java source containing
            `String val = System.getenv("API_KEY");` inside a method. Verify reads_env
