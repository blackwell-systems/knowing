            ## Cross-Repo Awareness for TypeScript Extractor

            ### What to implement

            Add `inferExternalRepoURL` logic to the TypeScript extractor so that import edges
            targeting external npm packages (bare specifiers like "react", "@nestjs/common",
            "typescript") produce target node hashes computed against an "external://{packageName}"
            repo URL instead of the local repo URL.

            **Reference pattern:** See `internal/indexer/goextractor/extractor.go` function
            `inferRepoURL` which returns "stdlib" for Go stdlib imports.

            1. **Add function `inferExternalRepoURL`** in `internal/indexer/tsextractor/extractor.go`:

               ```go
               // inferExternalRepoURL determines if a module path refers to an external npm package.
               // Bare specifiers (not starting with "." or "/") are external.
               // Returns "external://{packageName}" for external packages, "" for relative imports.
               func inferExternalRepoURL(modPath string) string {
                   // Relative imports start with "." or "/"
                   if strings.HasPrefix(modPath, ".") || strings.HasPrefix(modPath, "/") {
                       return ""
                   }
                   // Scoped packages: @scope/name -> "external://@scope/name"
                   // Regular packages: "react" -> "external://react"
                   // Handle subpath imports: "lodash/debounce" -> "external://lodash"
                   pkgName := modPath
                   if strings.HasPrefix(modPath, "@") {
                       // Scoped: @scope/name/subpath -> @scope/name
                       parts := strings.SplitN(modPath, "/", 3)
                       if len(parts) >= 2 {
                           pkgName = parts[0] + "/" + parts[1]
                       }
                   } else {
                       // Unscoped: name/subpath -> name
                       if idx := strings.Index(modPath, "/"); idx > 0 {
                           pkgName = modPath[:idx]
                       }
                   }
                   return "external://" + pkgName
               }
               ```

            2. **Modify `makeImportEdge`** to use the external repo URL for target hash computation
