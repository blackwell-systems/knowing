interface_contracts:
    - name: StaleNodesByFiles
      description: |
        New store method that returns nodes from files whose paths are in the
        given list. Used by the CLI 'stale' command to find nodes that belong
        to changed files without requiring a snapshot hash.
      definition: |
        func (s *SQLiteStore) StaleNodesByFiles(ctx context.Context, repoHash types.Hash, paths []string) ([]types.Node, error)
      location: internal/store/sqlite.go
    - name: GraphStore.StaleNodesByFiles
      description: |
        Interface method addition to types.GraphStore for the new store method.
      definition: |
        StaleNodesByFiles(ctx context.Context, repoHash Hash, paths []string) ([]Node, error)
      location: internal/types/interfaces.go
    - name: inferExternalRepoURL (TypeScript)
      description: |
        Determines if an import target is external (in node_modules/) and returns
        an "external://{packageName}" URL prefix. For relative imports, returns "".
      definition: |
        func inferExternalRepoURL(modPath string) string
        // Returns "external://react" for "react", "external://@nestjs/common" for "@nestjs/common"
        // Returns "" for "./foo", "../bar", or any relative import starting with "."
      location: internal/indexer/tsextractor/extractor.go
    - name: inferExternalRepoURL (Python)
      description: |
        Determines if a Python import target is an external package (not a relative
        import and not a local module). Returns "external://{packageName}" for
        third-party packages.
      definition: |
        func inferExternalRepoURL(moduleName string, opts types.ExtractOptions) string
        // Returns "external://flask" for "flask", "external://numpy" for "numpy"
        // Returns "" for relative imports (starting with ".") or same-repo modules
      location: internal/indexer/treesitter/extractor.go
    - name: inferExternalRepoURL (Rust)
      description: |
        Determines if a Rust use path refers to an external crate (not crate::,
        super::, or self::). Returns "external://{crateName}" for external crates.
      definition: |
        func inferExternalRepoURL(usePath string) string
        // Returns "external://tokio" for "tokio::...", "external://serde" for "serde::..."
        // Returns "" for "crate::...", "super::...", "self::..."
      location: internal/indexer/rustextractor/extractor.go
    - name: inferExternalRepoURL (Java)
      description: |
        Determines if a Java import is from an external package by checking if it
        does NOT share the same base package as the current file. Returns
        "external://{groupId}" for external packages.
      definition: |
        func inferExternalRepoURL(importPath string, localPkg string) string
        // Returns "external://org.springframework" for "org.springframework.web.bind..."
        // Returns "" for imports sharing the same top-2 package segments as localPkg
      location: internal/indexer/javaextractor/extractor.go
    - name: inferExternalRepoURL (C#)
      description: |
        Determines if a C# using directive refers to an external namespace.
        Returns "external://{rootNamespace}" for known external namespaces
        (System.*, Microsoft.*, etc.) or non-project namespaces.
      definition: |
        func inferExternalRepoURL(namespace string) string
        // Returns "external://System" for "System.Collections.Generic"
        // Returns "external://Newtonsoft.Json" for "Newtonsoft.Json"
        // Returns "" for project-local namespaces (heuristic: not matching known externals)
      location: internal/indexer/csharpextractor/extractor.go
