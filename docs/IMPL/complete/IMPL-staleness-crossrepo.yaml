            ## Cross-Repo Awareness for Rust Extractor

            ### What to implement

            Add `inferExternalRepoURL` logic to the Rust extractor so that use declarations
            and call edges targeting external crates produce target node hashes computed
            against an "external://{crateName}" repo URL.

            **Reference pattern:** See `internal/indexer/goextractor/extractor.go` function
            `inferRepoURL` which returns "stdlib" for Go stdlib imports.

            1. **Add function `inferExternalRepoURL`** in `internal/indexer/rustextractor/extractor.go`:

               ```go
               // inferExternalRepoURL determines if a Rust use path refers to an external crate.
               // Returns "external://{crateName}" for external crates, "stdlib" for std/core/alloc,
               // and "" for crate-local paths (crate::, super::, self::).
               func inferExternalRepoURL(usePath string) string {
                   parts := strings.SplitN(usePath, "::", 2)
                   if len(parts) == 0 {
                       return ""
                   }
                   first := parts[0]
                   switch first {
                   case "crate", "super", "self":
                       return ""
                   case "std", "core", "alloc":
                       return "stdlib"
                   default:
                       return "external://" + first
                   }
               }
               ```

            2. **Modify `extractUseDeclaration`** to use the external repo URL for the target hash:

               Current code (line 412-429) computes targetHash with `opts.RepoURL`:
               ```go
               fileNodeHash := types.ComputeNodeHash(opts.RepoURL, basePath, types.EmptyHash, filepath.Base(opts.FilePath), "file")
               targetHash := types.ComputeNodeHash(opts.RepoURL, crateName, types.EmptyHash, crateName, "package")
               ```

               Change to:
               ```go
               fileNodeHash := types.ComputeNodeHash(opts.RepoURL, basePath, types.EmptyHash, filepath.Base(opts.FilePath), "file")
               targetRepoURL := opts.RepoURL
               if extURL := inferExternalRepoURL(usePath); extURL != "" {
                   targetRepoURL = extURL
               }
               targetHash := types.ComputeNodeHash(targetRepoURL, crateName, types.EmptyHash, crateName, "package")
               ```

               Note: the `usePath` variable is the full path from `argNode.Content(opts.Content)`.

            3. **Modify `resolveCallEdgeWithImports`** so that when a call target's first segment
               is resolved through rustImports and the source path is "" (meaning it was an external
