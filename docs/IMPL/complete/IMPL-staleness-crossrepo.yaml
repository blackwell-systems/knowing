          mitigation: |
            Interface contracts specify exact format: "external://{packageName}" for all.
            Each agent's task includes the exact string format with examples.
        - scenario: |
            Python stdlib list in Agent C is incomplete, causing some stdlib imports to
            be classified as external.
          likelihood: medium
          impact: low
          mitigation: |
            The list covers the ~50 most common stdlib modules. False positives (stdlib
            classified as external) produce functional but suboptimal edges; they do not
            break anything. The list can be expanded incrementally.
        - scenario: |
            The `knowing stale` CLI command fails when no git history is available
            (fresh clone with depth 1, or no commits since last snapshot).
          likelihood: medium
          impact: low
          mitigation: |
            Agent A's task specifies fallback to file mtime comparison when git diff
            fails or returns empty. The command should handle the no-snapshot case
            gracefully (report all files as stale or suggest running `knowing index`).
        - scenario: |
            Agent A and Agent G both edit internal/mcp/handlers_test.go causing merge
            conflict between waves.
          likelihood: low
          impact: low
