            logic correctness; compilation errors on daemon.PIDFilePath etc are acceptable
            pre-merge.
        - scenario: Agent C's untrack.go fails to compile because DeleteRepoData doesn't exist on SQLiteStore
          likelihood: high
          impact: low
          mitigation: |
            Same pattern as above. Post-merge build succeeds. Agent C writes correct
            code assuming the method exists.
        - scenario: DeleteRepoData misses a table (e.g., community_assignments referenced in stats)
          likelihood: medium
          impact: medium
          mitigation: |
            community_assignments is queried in cmdStats but stored in graph_notes table.
            Agent A's DeleteRepoData already covers graph_notes. The stats query
            (SELECT COUNT(DISTINCT community_id) FROM community_assignments) may reference
            a view or virtual table not in the schema. If it exists as a separate table,
            Agent A should include it. Mitigate by running full test suite post-merge.
        - scenario: Daemon start --detach on non-Unix systems fails (SysProcAttr.Setsid)
          likelihood: low
          impact: low
          mitigation: |
            This is a Unix-only feature. Add build tags if needed later. The project
            targets Linux/macOS (the CI runs on ubuntu-latest) so this is acceptable.
