            **3. internal/daemon/pidfile.go** (new file)

            Implement PID file management for the daemon:

            ```go
            package daemon

            import (
                "fmt"
                "os"
                "path/filepath"
                "strconv"
                "strings"
                "syscall"
            )

            // PIDFilePath returns the path to the daemon PID file: ~/.knowing/daemon.pid
            func PIDFilePath() string {
                home, err := os.UserHomeDir()
                if err != nil {
                    return "/tmp/knowing-daemon.pid"
                }
                dir := filepath.Join(home, ".knowing")
                os.MkdirAll(dir, 0755)
                return filepath.Join(dir, "daemon.pid")
            }

            // WritePIDFile writes the current process PID to the PID file.
            func WritePIDFile() error

            // ReadPIDFile reads the PID from the PID file.
            func ReadPIDFile() (int, error)

            // RemovePIDFile removes the PID file. Safe if file does not exist.
            func RemovePIDFile()

            // IsDaemonRunning checks whether a daemon process is alive by reading
            // the PID file and sending signal 0. Returns (pid, true) if running.
            func IsDaemonRunning() (int, bool)
            ```

            WritePIDFile: create/truncate the PID file, write `fmt.Sprintf("%d\n", os.Getpid())`.
            ReadPIDFile: read file, parse int from trimmed content, return (pid, nil) or (0, err).
            RemovePIDFile: `os.Remove(PIDFilePath())` ignoring errors.
            IsDaemonRunning: call ReadPIDFile, then `syscall.Kill(pid, 0)` (signal 0 checks existence).
            If Kill returns nil, the process is alive. If it returns ESRCH, the process is gone.

