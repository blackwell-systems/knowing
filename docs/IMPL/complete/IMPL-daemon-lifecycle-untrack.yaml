    - name: DeleteRepoData
      description: |
        Deletes all graph data for a repository identified by repo_hash. Removes
        nodes, edges, edge_events, files, snapshots, feedback (by symbol_hash join),
        task_memory (by symbol_hash join), and graph_notes (by object_hash join).
        Does NOT remove the repos table entry itself (roster handles that).
      definition: |
        func (s *SQLiteStore) DeleteRepoData(ctx context.Context, repoHash types.Hash) (DeleteRepoResult, error)

        type DeleteRepoResult struct {
            Nodes     int64
            Edges     int64
            Files     int64
            Snapshots int64
            Feedback  int64
            Notes     int64
        }
      location: internal/store/evict.go
    - name: PID file management
      description: |
        WritePIDFile writes the current process PID to ~/.knowing/daemon.pid.
        ReadPIDFile reads the PID from that file.
        RemovePIDFile removes the PID file.
        IsDaemonRunning checks if the PID in the file is alive.
