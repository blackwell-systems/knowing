            ## Agent B: CLI Daemon Lifecycle Commands

            ### What to implement

            **1. cmd/knowing/daemon.go** (new file)

            Add a `cmdDaemon` function that dispatches to subcommands: start, stop, status, restart.

            ```go
            package main

            func cmdDaemon(args []string) error {
                if len(args) == 0 {
                    return fmt.Errorf("usage: knowing daemon <start|stop|status|restart>")
                }
                switch args[0] {
                case "start":
                    return cmdDaemonStart(args[1:])
                case "stop":
                    return cmdDaemonStop(args[1:])
                case "status":
                    return cmdDaemonStatus(args[1:])
                case "restart":
                    return cmdDaemonRestart(args[1:])
                default:
                    return fmt.Errorf("unknown daemon subcommand: %s", args[0])
                }
            }
            ```

            **cmdDaemonStart:**
            - Parse flags: `--detach` (bool, default false), `--db` (string, default defaultDB()),
              `--addr` (string, default ":8080")
            - If `--detach`: fork the process using `os/exec.Command` with the same binary,
              passing `serve --db <db> --addr <addr>` args. Set `cmd.SysProcAttr` for
              detachment (`Setsid: true` on Unix). Start the subprocess, write its PID
              to `~/.knowing/daemon.pid` using the PID file functions from internal/daemon,
              then exit the parent.
            - If not `--detach`: print a message suggesting `--detach` and call cmdServe directly.
            - Before starting, check `daemon.IsDaemonRunning()`. If already running, print
              error and exit.

            Implementation for detach:
            ```go
            func cmdDaemonStart(args []string) error {
                fs := flag.NewFlagSet("daemon start", flag.ExitOnError)
                detach := fs.Bool("detach", false, "Run as background daemon")
                dbPath := fs.String("db", defaultDB(), "Database path")
                addr := fs.String("addr", ":8080", "MCP server address")
                fs.Parse(args)

                // Check if already running.
                if pid, running := daemon.IsDaemonRunning(); running {
                    return fmt.Errorf("daemon already running (PID %d)", pid)
                }

                if !*detach {
                    // Foreground mode: just run serve.
                    fmt.Fprintln(os.Stderr, "Running in foreground. Use --detach to daemonize.")
                    return cmdServe([]string{"-db", *dbPath, "-addr", *addr})
                }

                // Detach: re-exec ourselves with "serve" subcommand.
                exe, err := os.Executable()
                if err != nil {
                    return fmt.Errorf("finding executable: %w", err)
                }
                cmd := exec.Command(exe, "serve", "-db", *dbPath, "-addr", *addr)
                cmd.SysProcAttr = &syscall.SysProcAttr{Setsid: true}
                // Redirect stdout/stderr to log file.
                logDir := filepath.Dir(daemon.PIDFilePath())
                logFile, err := os.OpenFile(filepath.Join(logDir, "daemon.log"),
                    os.O_CREATE|os.O_WRONLY|os.O_APPEND, 0644)
                if err != nil {
                    return fmt.Errorf("opening log file: %w", err)
                }
                cmd.Stdout = logFile
                cmd.Stderr = logFile

                if err := cmd.Start(); err != nil {
                    logFile.Close()
                    return fmt.Errorf("starting daemon: %w", err)
                }
                logFile.Close()

                // Write the child's PID to the PID file.
                pid := cmd.Process.Pid
                pidPath := daemon.PIDFilePath()
                os.MkdirAll(filepath.Dir(pidPath), 0755)
                if err := os.WriteFile(pidPath, []byte(fmt.Sprintf("%d\n", pid)), 0644); err != nil {
                    return fmt.Errorf("writing PID file: %w", err)
                }

                fmt.Printf("Daemon started (PID %d)\n", pid)
                fmt.Printf("  Database: %s\n", *dbPath)
                fmt.Printf("  Address:  %s\n", *addr)
                fmt.Printf("  Log:      %s\n", filepath.Join(logDir, "daemon.log"))
                return nil
            }
            ```

            **cmdDaemonStop:**
            - Read PID from `daemon.ReadPIDFile()`
            - If not found or not running: print "daemon not running" and return nil
            - Send SIGTERM via `syscall.Kill(pid, syscall.SIGTERM)`
            - Wait briefly (up to 5 seconds, polling every 200ms) for the process to exit
            - If still alive after 5s, send SIGKILL
            - Remove the PID file via `daemon.RemovePIDFile()`
            - Print confirmation

            **cmdDaemonStatus:**
            - Call `daemon.IsDaemonRunning()`
            - If running: print "Daemon running (PID {pid})", calculate uptime from PID file mtime,
              list tracked repos from roster
            - If not running: print "Daemon not running"
            - Return appropriate exit code (0 if running, 1 if not)

            **cmdDaemonRestart:**
            - Call cmdDaemonStop (ignore "not running" case)
            - Call cmdDaemonStart with the same args (pass through flags)

