            ## Agent A: Store DeleteRepoData + Daemon PID File Management

            ### What to implement

            **1. internal/store/evict.go** (new file)

            Add a `DeleteRepoData` method to `SQLiteStore` that removes all data associated
            with a given repo_hash. The method should:

            1. Find all file_hashes for the repo: `SELECT file_hash FROM files WHERE repo_hash = ?`
            2. Find all node_hashes in those files: `SELECT node_hash FROM nodes WHERE file_hash IN (...)`
            3. Delete edges where source_hash OR target_hash is in the node set
            4. Delete edge_events where edge_hash matches deleted edges
            5. Delete feedback where symbol_hash is in the node set
            6. Delete task_memory where symbol_hash is in the node set
            7. Delete graph_notes where object_hash is in the node set (community assignments, etc.)
            8. Delete nodes
            9. Delete files for the repo
            10. Delete snapshots for the repo: `DELETE FROM snapshots WHERE repo_hash = ?`

            All operations should be wrapped in a single transaction for atomicity.
            Return a `DeleteRepoResult` struct with counts of deleted rows per table.

            ```go
            // DeleteRepoResult summarizes what was deleted.
            type DeleteRepoResult struct {
                Nodes     int64
                Edges     int64
                Files     int64
                Snapshots int64
                Feedback  int64
                Notes     int64
            }

            func (s *SQLiteStore) DeleteRepoData(ctx context.Context, repoHash types.Hash) (DeleteRepoResult, error)
            ```

            Important: Do NOT delete from the `repos` table itself. The roster/CLI layer
            handles that separately. This method only deletes the graph data.

            Use a transaction (`s.db.BeginTx`) and collect file_hashes/node_hashes into
            temporary tables or IN clauses. For large repos, use a temp table approach:

            ```sql
            CREATE TEMP TABLE _evict_files (file_hash BLOB);
            INSERT INTO _evict_files SELECT file_hash FROM files WHERE repo_hash = ?;
            CREATE TEMP TABLE _evict_nodes (node_hash BLOB);
            INSERT INTO _evict_nodes SELECT node_hash FROM nodes WHERE file_hash IN (SELECT file_hash FROM _evict_files);
            -- then DELETE FROM edges WHERE source_hash IN (SELECT node_hash FROM _evict_nodes) OR target_hash IN (...)
            -- etc.
            DROP TABLE _evict_files;
            DROP TABLE _evict_nodes;
            ```

