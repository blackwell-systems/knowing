suitability_assessment: |
    SUITABLE. The work decomposes cleanly into 6 agents across 3 waves with
    disjoint file ownership. The dependency graph has a clear layered structure:

    Wave 1 builds the store/interface layer (Agent A), the indexer incremental
    pipeline with edge event recording (Agent B), and replaces the fsnotify
    file watcher with a git-based .git/HEAD watcher plus git diff utilities
    (Agent C) -- all three are independent.

    Wave 2 wires the daemon to use the new GitWatcher and pass changed files
    from git diff through to IndexFunc/EnrichFunc (Agent D), and adds scoped
    enrichment to the Enricher (Agent E) -- both depend on Wave 1 interfaces
    but are independent of each other.

    Wave 3 (integration) fixes cascading signature changes in main.go, MCP
    handlers, and mock implementations (Agent F).

    File decomposition: 15+ files across 7 packages (types, store, indexer,
    enrichment, daemon, mcp, cmd/knowing) with clear ownership boundaries.

    Investigation-first items: None. The architecture is fully specified in
    docs/architecture.md under "Change Detection and Incremental Indexing".
    The issues are well-understood: edge_events table is never populated,
    no delete-before-reinsert logic, enricher has no file-scoping, watcher
    uses fsnotify on all files instead of .git/HEAD.

    Interface discoverability: All cross-agent interfaces can be defined upfront.
    The new GraphStore methods, git diff functions, GitWatcher type, and
    Enricher.RunScoped all have clear signatures.

    Pre-implementation status: All items are TODO. The store has RecordEdgeEvent
    and SnapshotDiff methods but they are never called by the indexer, so
    edge_events is always empty. GitHeadCommit already exists in daemon.go.

    Parallelization value: High. Build+test cycle is ~5s. 6 agents across
    3 waves with 2-3 files each. Clear independence in Wave 1 (store vs
    indexer vs watcher), and Wave 2 (daemon wiring vs enricher scoping).

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (6 agents, 3 waves, ~5 min avg per wave)
    - Merge and verification: ~5 min
    Total Polywave time: ~30 min
    Sequential baseline: ~45 min (6 agents x ~7.5 min avg)
    Time savings: ~15 min (33% faster)
    Recommendation: Clear speedup with coordination value from the IMPL doc.
