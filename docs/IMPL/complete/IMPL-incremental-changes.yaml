            ## Agent C: Git-based watcher and git diff utilities

            ### What to implement

            Create two new files in the daemon package that implement git-based
            change detection per the architecture spec. The GitWatcher replaces
            the current fsnotify-on-everything approach by watching only
            `.git/HEAD` and `.git/refs/heads/*`, then resolving the exact change
            set via `git diff --name-status`.

            **1. Create `internal/daemon/gitdiff.go`.**

            This file provides utility functions for resolving changed files from git.

            ```go
            package daemon

            import (
                "fmt"
                "os/exec"
                "strings"
            )

            // GitDiffFiles resolves changed, added, and deleted files between two
            // commits using git diff --name-status. If oldCommit is empty, all
            // tracked files are returned as added (initial index).
            // Returns paths relative to repoPath.
            func GitDiffFiles(repoPath, oldCommit, newCommit string) (changed, added, deleted []string, err error) {
                if oldCommit == "" {
                    // No previous commit: treat all tracked files as added.
                    cmd := exec.Command("git", "-C", repoPath, "ls-files")
                    out, err := cmd.Output()
                    if err != nil {
                        return nil, nil, nil, fmt.Errorf("git ls-files: %w", err)
                    }
                    for _, line := range strings.Split(strings.TrimSpace(string(out)), "\n") {
                        if line != "" {
                            added = append(added, line)
                        }
                    }
                    return nil, added, nil, nil
                }

                cmd := exec.Command("git", "-C", repoPath, "diff", "--name-status", oldCommit, newCommit)
                out, err := cmd.Output()
                if err != nil {
                    return nil, nil, nil, fmt.Errorf("git diff: %w", err)
                }

                for _, line := range strings.Split(strings.TrimSpace(string(out)), "\n") {
                    if line == "" {
                        continue
                    }
                    parts := strings.SplitN(line, "\t", 2)
                    if len(parts) != 2 {
                        continue
                    }
                    status, path := parts[0], parts[1]
                    switch {
                    case strings.HasPrefix(status, "M"):
                        changed = append(changed, path)
                    case strings.HasPrefix(status, "A"):
                        added = append(added, path)
                    case strings.HasPrefix(status, "D"):
                        deleted = append(deleted, path)
                    case strings.HasPrefix(status, "R"):
                        // Renamed: treat as delete old + add new
                        renameParts := strings.SplitN(path, "\t", 2)
                        if len(renameParts) == 2 {
                            deleted = append(deleted, renameParts[0])
                            added = append(added, renameParts[1])
                        }
                    }
                }
                return changed, added, deleted, nil
            }
            ```

            **2. Create `internal/daemon/gitwatcher.go`.**

            This replaces the role of watcher.go. It uses fsnotify on only
            `.git/HEAD` and `.git/refs/heads/` (one or two file descriptors,
            not thousands). When HEAD changes, it resolves the old and new commit
            hashes and runs git diff to produce a CommitEvent.

            ```go
            package daemon

            import (
                "path/filepath"
                "sync"
                "time"

                "github.com/fsnotify/fsnotify"
            )

            // CommitEvent describes a commit-level change detected in a repository.
            type CommitEvent struct {
                RepoPath     string
                OldCommit    string
                NewCommit    string
                ChangedFiles []string // modified files (relative paths)
                AddedFiles   []string // new files (relative paths)
                DeletedFiles []string // removed files (relative paths)
            }

            // GitWatcher monitors repositories for git commits by watching .git/HEAD
            // and .git/refs/heads/*. It uses fsnotify on these specific paths (one or
            // two file descriptors per repo) rather than watching all files.
            type GitWatcher struct {
                debounce time.Duration
                watcher  *fsnotify.Watcher
                events   chan CommitEvent
                done     chan struct{}

                mu          sync.Mutex
                repos       map[string]string // repoPath -> last known commit hash
            }
            ```

            Implement `NewGitWatcher`, `Add`, `Remove`, `Events`, `Close`, and the
            internal `loop` method.

            Key behaviors:
            - `Add(repoPath)`: Read current HEAD commit via `GitHeadCommit(repoPath)`
              (already exists in daemon.go), store it as last known. Watch
              `filepath.Join(repoPath, ".git", "HEAD")` and
              `filepath.Join(repoPath, ".git", "refs", "heads")` via fsnotify.
            - `loop()`: On any fsnotify event for watched paths, debounce, then:
              1. Determine which repo the event belongs to
              2. Read new HEAD commit via GitHeadCommit
              3. Compare to stored last known commit
              4. If changed: call `GitDiffFiles(repoPath, oldCommit, newCommit)`
              5. Update stored commit hash
              6. Emit CommitEvent on the events channel
