            **5. Update `watchLoop` to consume CommitEvents instead of WatchEvents.**

            Replace the entire `watchLoop` method. The new version reads from
            `d.watcher.Events()` which now returns `<-chan CommitEvent`. Build the
            changedFiles as the union of ChangedFiles, AddedFiles, and DeletedFiles
            from the CommitEvent:

            ```go
            func (d *Daemon) watchLoop(ctx context.Context) {
            	if d.watcher == nil {
            		return
            	}
            	for {
            		select {
            		case <-ctx.Done():
            			return
            		case ev, ok := <-d.watcher.Events():
            			if !ok {
            				return
            			}
            			d.mu.RLock()
            			repoURL := d.repos[ev.RepoPath]
            			d.mu.RUnlock()
            			if repoURL == "" {
            				repoURL = ev.RepoPath
            			}
            			// Combine all changed paths for downstream consumers.
            			allChanged := make([]string, 0, len(ev.ChangedFiles)+len(ev.AddedFiles)+len(ev.DeletedFiles))
            			allChanged = append(allChanged, ev.ChangedFiles...)
            			allChanged = append(allChanged, ev.AddedFiles...)
            			allChanged = append(allChanged, ev.DeletedFiles...)
            			select {
            			case d.indexQueue <- indexRequest{
            				repoURL:      repoURL,
            				repoPath:     ev.RepoPath,
            				changedFiles: allChanged,
            			}:
            			default:
            				// Queue full; skip this event.
            			}
            		}
            	}
            }
            ```

