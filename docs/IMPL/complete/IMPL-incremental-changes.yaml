pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Agent B's branch won't compile because GraphStore lacks the new methods
          likelihood: low
          impact: low
          mitigation: |
            Agent B uses a local cleanupStore interface with type assertion, matching
            the existing batchStore pattern. The branch compiles without the new
            GraphStore methods. At merge time, the store will implement both interfaces.
        - scenario: mockStore in multiple test files falls out of sync with new GraphStore methods
          likelihood: high
          impact: medium
          mitigation: |
            Agent B adds stubs to indexer mockStore. Agent E adds stubs to enricher
            mockStore. Agent F adds stubs to mcp and snapshot mockGraphStores. All are
            explicitly instructed with exact stub code. Post-merge compilation will
            catch any missed methods immediately.
        - scenario: GitWatcher tests are flaky due to fsnotify timing on macOS
          likelihood: medium
          impact: low
          mitigation: |
            Agent C should use generous timeouts (3+ seconds) and debounce intervals
            in tests. The test creates real git commits, which produce deterministic
            .git/HEAD changes. If flaky, the test can be marked with a build tag.
        - scenario: git diff shell-out fails in CI environments without git
          likelihood: low
          impact: medium
          mitigation: |
            All tests use temp dirs with real git repos initialized. CI environments
            have git available. GitDiffFiles returns an error if git is not found,
            and the daemon handles this gracefully (falls back to full re-index).
        - scenario: Edge event recording uses wrong snapshot hash or empty hash
          likelihood: low
          impact: low
          mitigation: |
            Agent B records edge events after ComputeSnapshot returns, using the
            actual snapshot hash. If ComputeSnapshot fails, IndexRepo returns an
            error and no events are recorded, which is correct behavior.
        - scenario: Enricher RunScoped requires gopls running, making unit tests fragile
          likelihood: medium
          impact: low
          mitigation: |
            Agent E tests filtering logic at the unit level (verifying file filter
            application on upgradeCallEdges) without starting gopls. Integration
            testing of the full enrichment pipeline is separate.
        - scenario: MCP handler invokes IndexFunc with nil changedFiles, causing nil pointer in downstream code
          likelihood: medium
          impact: medium
          mitigation: |
            Agent F passes nil for changedFiles in MCP-triggered indexing. Agent B's
            cleanup logic checks hasCleanup (store implements cleanupStore) and only
            runs cleanup when files are in existingByPath. The changedFilePaths slice
            is built from the loop, not from the parameter. No nil dereference risk.
        - scenario: Daemon test TestDaemon_GitWatcherIntegration flaky on slow CI
          likelihood: medium
          impact: low
          mitigation: |
            Agent D should use generous timeouts and ensure git commits are
            fully written before asserting. The test pattern follows the existing
            TestGitHeadCommit pattern which works reliably.
