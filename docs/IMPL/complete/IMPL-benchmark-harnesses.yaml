suitability_assessment: |
    File decomposition: 4 completely independent benchmark directories, each with its own
    _test.go file and FINDINGS.md. Zero shared files between agents. Perfect parallelism.

    Investigation-first items: None. All benchmark methodologies are defined upfront.
    The APIs under test (context engine, store, indexer, test-scope) are stable and documented.

    Interface discoverability: Each benchmark is self-contained. No cross-agent interfaces needed.
    All benchmarks use the same public APIs (store.NewSQLiteStore, indexer.NewIndexer,
    context.NewContextEngine, etc.) which are already stable.

    Pre-implementation status: The bench/feedback-loop/ benchmark exists as prior art showing
    the pattern (temp DB, index repo, measure precision). No existing implementations of these
    4 benchmarks exist.

    Parallelization value: HIGH. Each benchmark requires indexing the repo into a temp DB
    (30-60s each). 4 independent agents running in parallel saves ~3x wall time vs sequential.
    Build+test cycle is >30s per agent. All agents are in a single wave (fully independent).

    Estimated times:
    - Scout phase: ~5 min
    - Agent execution: ~8 min (4 agents x 8 min avg, fully parallel = 8 min wall)
    - Merge & verification: ~3 min
    Total Polywave time: ~16 min

    Sequential baseline: ~35 min (4 agents x 8 min + context switching overhead)
    Time savings: ~19 min (54% faster)

    Recommendation: Clear speedup. Proceed.
