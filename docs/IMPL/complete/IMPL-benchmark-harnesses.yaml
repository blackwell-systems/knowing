pre_mortem:
    overall_risk: low
    rows:
        - scenario: Indexing the repo takes too long in CI, causing test timeout
          likelihood: medium
          impact: low
          mitigation: All benchmarks skip in short mode. CI runs with -short flag. Full benchmarks run locally only.
        - scenario: Git history traversal in test-scope-accuracy fails on shallow clones
          likelihood: medium
          impact: medium
          mitigation: Agent A should detect shallow clone (check .git/shallow) and skip gracefully with t.Skip.
        - scenario: Edge accuracy benchmark finds zero ast_resolved edges because goextractor is not registered
          likelihood: low
          impact: high
          mitigation: Agent B must register BOTH gotsextractor AND goextractor in the indexer to get both provenance tiers.
        - scenario: Context relevance Config A (keyword-only) returns empty results with tiny budget
          likelihood: medium
          impact: low
          mitigation: Agent C should filter by Distance==0 on full results rather than restricting token budget, to isolate keyword-only precision.
        - scenario: Token savings grep simulation produces different results on different OS (macOS vs Linux grep)
          likelihood: low
          impact: low
          mitigation: Agent D should use Go's os/exec with explicit grep flags or use Go's built-in file scanning for portability.
