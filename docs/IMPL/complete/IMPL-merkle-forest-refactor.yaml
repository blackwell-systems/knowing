title: 'Refactor internal Merkle tree to use merkle-forest library'
feature_slug: merkle-forest-refactor
verdict: SUITABLE
state: COMPLETE

suitability_assessment: |
  1. File decomposition: The work decomposes into 2 agents across disjoint files:
     (a) Replace internal merkle.go and hierarchical.go with a thin adapter over
         merkle-forest, maintaining the existing exported API surface.
     (b) Update tests to use the refactored API (hierarchical_test.go,
         hierarchical_bench_test.go, forest_parity_test.go becomes a regression test).

     Since proof.go is being KEPT (per requirements) and it depends on
     HierarchicalTree and combineHashes, the adapter layer must preserve these symbols.
     The adapter in hierarchical.go will re-export HierarchicalTree (now backed by
     forest.MultiLevel), and combineHashes stays as a thin wrapper so proof.go compiles
     unchanged. This makes proof.go NOT need changes, and the whole thing fits in 1 wave
     with 2 agents: one for the implementation files, one for the test files.

  2. Investigation-first items: None. The parity test already passes, proving the
     library produces identical output. The migration path is clear.

  3. Interface discoverability: Yes. The exported API of the snapshot package is
     well-defined. The mapping between internal types and forest types is documented
     in the feature request. Zero-cost casts are confirmed (both [32]byte).

  4. Pre-implementation status: The parity test proves the approach works. merkle-forest
     is already in go.mod (indirect). The refactor replaces internals while preserving
     the exported surface.

  5. Parallelization value: 2 agents in 1 wave. Build/test cycle is ~30s (go test ./...).
     Agent A touches 2 implementation files; Agent B touches 3 test files. Both are
     non-trivial (implementation logic, not just string edits). Single wave means maximum
     parallelization. Clear speedup over sequential: both agents work simultaneously.

  Estimated times:
  - Scout phase: ~5 min
  - Agent execution: ~8 min (2 agents x 8 min, running in parallel = 8 min)
  - Merge and verification: ~3 min
  Total Polywave time: ~16 min

  Sequential baseline: ~20 min (2 agents x 10 min sequential)
  Time savings: ~4 min (20% faster)

  Recommendation: Clear speedup. The coordination value is high because the interface
  contract between implementation and tests must be precise to avoid post-merge breaks.

  Note on pre-wave validation warnings: The finalize-scout tool reports test cascade
  and wave structure warnings because external test files (bench/, internal/cache/,
  internal/mcp/) call functions that Agent A modifies. These are false positives for
  this refactoring because ALL exported signatures are PRESERVED (API-compatible
  internal delegation). The parity test proves output identity. External tests require
  no changes and will pass post-merge without modification.

