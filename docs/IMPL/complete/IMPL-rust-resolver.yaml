completion_date: "2026-05-30"
title: Rust In-Process Type Resolver
feature_slug: rust-resolver
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: All new files in internal/typresolve/rust/ (10+ files).
       No existing files modified. Agents have fully disjoint file ownership.
       Follows the exact same pattern as the Go resolver (internal/typresolve/go/)
       and the Ruby resolver IMPL (IMPL-ruby-resolver.yaml).

    2. Investigation-first: No unknowns. There is no C reference implementation
       for Rust, but the Go resolver establishes the structural template. The
       existing Rust extractor (internal/indexer/rustextractor/) documents the
       tree-sitter node types (function_item, struct_item, enum_item, trait_item,
       impl_item, use_declaration, macro_invocation, call_expression, scoped_identifier,
       field_expression) and qualified name conventions. Rust's trait-based polymorphism
       maps to the existing interface/implements model in the type system.

    3. Interface discoverability: All interfaces defined. The typresolve.Resolver
       interface, Registry, Scope, and Type are implemented and tested. Cross-agent
       contracts are limited to Go function signatures within the new rust/ subpackage.
       KindReference and KindOptional already exist in the shared Type system for &T
       and Option<T>.

    4. Pre-implementation: The shared infrastructure (in-process-resolver-infra) was
       completed previously. The Go resolver and Ruby resolver IMPLs show the exact
       structural pattern. No overlap with existing code.

    5. Parallelization value: High. Build/test cycle is ~30s with GOWORK=off.
       3 agents in wave 1 with 2-4 files each. Wave 2 integrates and tests.
       Independent components (use/mod resolution, builtins/trait-based method lookup,
       scope binding/expression eval) can be built in parallel.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (4 agents, 2 waves, ~5 min avg per agent)
    - Merge and verification: ~5 min
    Total Polywave time: ~30 min

    Sequential baseline: ~40 min (4 agents x 10 min avg)
    Time savings: ~10 min (25% faster)

    Recommendation: Clear speedup. Wave 1 agents are fully independent (use/mod
    resolution, builtins/trait dispatch, scope binding/expression eval). Wave 2
    integrates them into the resolver.
