            ## Agent D: Resolver Integration, Registry Builder, and Call Resolution

            Integrate all wave 1 components into the RustResolver that implements
            typresolve.Resolver, build the registry builder, and implement call
            resolution with edge emission.

            ### What to implement

            **File 1: `internal/typresolve/rust/resolver.go`**
            Package: `rustresolve`

            The main RustResolver struct implementing `typresolve.Resolver`.
            Follow the exact pattern from the Go resolver at
            `internal/typresolve/go/resolver.go`.

            ```go
            // Compile-time check that RustResolver implements typresolve.Resolver.
            var _ typresolve.Resolver = (*RustResolver)(nil)

            type RustResolver struct {
                registry *typresolve.Registry
            }

            func NewRustResolver() *RustResolver {
                return &RustResolver{}
            }

            func (r *RustResolver) Language() string { return "rust" }
            ```

            `InitWorkspace(ctx context.Context, defs []typresolve.ResolverDef) error`:
            - Call BuildRegistry(defs) to populate r.registry
            - Return nil on success

            `ResolveFile(ctx context.Context, opts typresolve.ResolveFileOpts) ([]types.Edge, error)`:
            1. Get tree-sitter root node from opts.ParsedTree:
               ```go
               var root *sitter.Node
               switch v := opts.ParsedTree.(type) {
               case *sitter.Node:
                   root = v
               default:
                   // Try rootProvider interface (same as Go resolver).
                   type rootProvider interface {
                       GetRoot() *sitter.Node
                   }
                   if rp, ok := opts.ParsedTree.(rootProvider); ok {
                       if r := rp.GetRoot(); r != nil {
                           root = r
                       }
                   }
               }
               if root == nil {
                   // Re-parse the content as fallback.
                   if len(opts.Content) == 0 {
                       return nil, fmt.Errorf("no parsed tree and no content for %s", opts.FilePath)
                   }
                   parser := sitter.NewParser()
                   parser.SetLanguage(rust.GetLanguage())
                   tree, err := parser.ParseCtx(ctx, nil, opts.Content)
                   if err != nil {
                       return nil, fmt.Errorf("parse %s: %w", opts.FilePath, err)
                   }
                   root = tree.RootNode()
               }
               ```

            2. Build per-file use map:
               `uses := BuildUseMap(root, opts.Content, opts.FilePath)`

            3. Infer module QN from file path:
               `moduleQN := InferModuleQN(opts.FilePath)`

            4. Extract the repo URL from existing edges (if available):
               ```go
               repoURL := ""
               // Edges may not contain repo URL directly; use empty string as fallback
               ```

            5. Create ResolveContext:
               ```go
               rctx := &ResolveContext{
                   Registry:    r.registry,
                   Scope:       typresolve.NewScope(nil),
                   Uses:        uses,
                   ModuleQN:    moduleQN,
                   ImplType:    "",
                   Content:     opts.Content,
               }
               ```

            6. Call `ResolveCallsInFile(rctx, root, opts.FileHash, repoURL, opts.FilePath)`

            7. Return the edges.

            **File 2: `internal/typresolve/rust/registry_builder.go`**
            Package: `rustresolve`

            Implement `BuildRegistry(defs []typresolve.ResolverDef) *typresolve.Registry`:

            1. Create a new registry via `typresolve.NewRegistry()`
            2. For each def, register based on Kind:
               - "function": register as RegisteredFunc with
                 QualifiedName=def.QualifiedName,
                 ShortName=last segment after "."
               - "method": register as RegisteredFunc with
                 ReceiverType extracted from QualifiedName.
                 Rust QualifiedName format from the extractor:
                 `repoURL://moduleRoot/basePath.ImplType.methodName`
                 ReceiverType is the part between the last basePath segment and methodName.
                 ShortName is the methodName.
               - "type": register as RegisteredType with
                 QualifiedName, IsInterface=false.
                 Parse Signature field (e.g. "struct Config", "enum Option") to determine
                 the declaration kind.
               - "interface": register as RegisteredType with
                 QualifiedName, IsInterface=true (traits map to interfaces).

            3. Process edges from defs to populate type relationships:
               For defs with Kind "implements" (trait impl edges from extractor):
               find the source type (the implementing struct/enum) and add the
               target (the trait) to its EmbeddedTypes. This enables trait-based
               method dispatch in LookupMethod.

            4. Return the registry

            Helper functions:
            ```go
            // shortName extracts the last segment after "." from a qualified name.
            func shortName(qn string) string {
                if idx := strings.LastIndex(qn, "."); idx >= 0 {
                    return qn[idx+1:]
                }
                return qn
            }

            // extractReceiverType extracts the receiver type QN from a method's
            // qualified name. Format: "repoURL://pkg.ReceiverType.MethodName"
            // Returns "repoURL://pkg.ReceiverType".
            func extractReceiverType(methodQN string) string {
                if idx := strings.LastIndex(methodQN, "."); idx >= 0 {
                    return methodQN[:idx]
                }
                return ""
            }
            ```

            **File 3: `internal/typresolve/rust/resolve.go`**
            Package: `rustresolve`

            Implement `ResolveCallsInFile(ctx *ResolveContext, root *sitter.Node, fileHash types.Hash, repoURL string, filePath string) []types.Edge`:

            This function walks the file's AST and resolves call expressions to edges.

            Structure:
            1. Walk top-level children of root
            2. For each `function_item` (top-level function):
               a. Extract function name for enclosing context
               b. Set ctx.EnclosingFuncQN = moduleQN + "::" + funcName
               c. Push function scope
               d. Bind function parameters into scope (parse parameter types)
               e. Walk function body via resolveCallsInNode
               f. Pop scope and clear enclosing QN
            3. For each `impl_item`:
               a. Get the impl target type (the `type` field child)
               b. Set ctx.ImplType = resolved type QN
               c. Check for trait name (the `trait` field child for `impl Trait for Type`)
               d. Walk the body's function_item children:
                  - For each method: set enclosing QN to implType + "." + methodName
                  - Push method scope, bind `self` parameter to Named(implType)
                  - Bind other parameters
                  - Walk method body
                  - Pop scope
               e. Clear ctx.ImplType
            4. For top-level `macro_invocation` nodes: resolve and emit edges

            Internal function `resolveCallsInNode(ctx *ResolveContext, node *sitter.Node, edges *[]types.Edge, fileHash types.Hash, repoURL string, filePath string)`:

            1. Call `ProcessStatement(ctx, node)` to bind variables from let bindings
            2. If node is `call_expression`:
               - Get `function` field child and `arguments` field child
               - If function is `scoped_identifier` (e.g., `Type::method()`):
                 a. Get the full path text
                 b. Try to resolve through uses map
                 c. Look up in registry as function
                 d. Emit call edge to resolved QN
               - If function is `identifier` (bare function call):
                 a. Skip builtin functions (IsBuiltinFunc check)
                 b. Look up in current module context
                 c. Look up in uses map
                 d. Emit call edge
               - If function is `field_expression` (method call: `obj.method()`):
                 a. Evaluate receiver type
                 b. Deref to base via DerefToBase
                 c. If base is Named, look up method via LookupMethod
                 d. Emit call edge to resolved method QN
                 e. If not resolved: emit edge using receiver type + "." + method
                    as target (heuristic)

            3. If node is `macro_invocation`:
               - Get macro name from `macro` field child
               - Skip standard macros (println!, etc.) that don't produce meaningful edges
               - For user-defined macros: emit call edge

            4. If node is `function_item` (nested function):
               Push new scope, set enclosing QN, bind parameters, recurse, pop

            5. If node is `block`:
               Push scope, recurse into children, pop scope

            6. If node is `if_expression`, `while_expression`, `loop_expression`,
               `for_expression`: push scope for body, recurse, pop

            7. If node is `if_let_expression` or `while_let_expression`:
               Push scope, process let pattern binding, recurse, pop

            8. If node is `match_expression`:
               For each `match_arm`: push scope, process arm pattern, recurse, pop

            9. If node is `closure_expression`:
               Push scope, bind parameters, recurse, pop

            10. Recurse into children for all other node types

            Edge construction (follow the Go resolver pattern exactly):
            ```go
            func buildCallEdge(ctx *ResolveContext, callNode *sitter.Node, calleeQN string, strategy string, fileHash types.Hash, repoURL string, filePath string) types.Edge {
                // Source: enclosing function
                srcPkgPath, srcFuncName, srcKind := splitQualifiedName(ctx.EnclosingFuncQN)
                sourceHash := types.ComputeNodeHash(repoURL, srcPkgPath, types.EmptyHash, srcFuncName, srcKind)

                // Target: callee
                tgtPkgPath, tgtFuncName, tgtKind := splitQualifiedName(calleeQN)
                targetHash := types.ComputeNodeHash(repoURL, tgtPkgPath, types.EmptyHash, tgtFuncName, tgtKind)

                edgeHash := types.ComputeEdgeHash(sourceHash, targetHash, edgetype.Calls, typresolve.ProvenanceResolverResolved)

                return types.Edge{
                    EdgeHash:     edgeHash,
                    SourceHash:   sourceHash,
                    TargetHash:   targetHash,
                    EdgeType:     edgetype.Calls,
                    Confidence:   typresolve.ResolverConfidence,
                    Provenance:   typresolve.ProvenanceResolverResolved,
                    CallSiteLine: int(callNode.StartPoint().Row) + 1,
                    CallSiteCol:  int(callNode.StartPoint().Column),
                    CallSiteFile: filePath,
                }
            }
            ```

            The `splitQualifiedName` function should handle Rust QN formats.
            Rust uses `::` as namespace separator in source code but the extractor
            uses `.` in qualified names (matching the Go resolver convention):
            `repoURL://moduleRoot/basePath.ImplType.methodName`

            ```go
            // splitQualifiedName splits a qualified name into module path,
            // symbol name, and kind.
            func splitQualifiedName(qn string) (modulePath string, symbolName string, kind string) {
                lastDot := strings.LastIndex(qn, ".")
                if lastDot == -1 {
                    return "", qn, types.KindFunction
                }
                secondLastDot := strings.LastIndex(qn[:lastDot], ".")
                if secondLastDot >= 0 {
                    // Two dots: module.Type.Method
                    return qn[:secondLastDot], qn[secondLastDot+1:], types.KindMethod
                }
                // One dot: module.Function
                return qn[:lastDot], qn[lastDot+1:], types.KindFunction
            }
            ```

            Use these imports:
            - `github.com/blackwell-systems/knowing/internal/types`
            - `github.com/blackwell-systems/knowing/internal/edgetype`
            - `github.com/blackwell-systems/knowing/internal/typresolve`
            - `sitter "github.com/smacker/go-tree-sitter"`
            - `"github.com/smacker/go-tree-sitter/rust"`

            **File 4: `internal/typresolve/rust/resolver_test.go`**
            Package: `rustresolve`

            Integration tests for the full resolver pipeline.

