pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Wave 1 agents call cross-file functions that don't exist yet in their
            isolated worktrees (Agent C calls IsBuiltinFunc from Agent B's builtins.go).
          likelihood: high
          impact: low
          mitigation: |
            All wave 1 agents are in the same Go package (rustresolve). Their files
            compile together only after merge. The build gate runs post-merge.
            Individual agent worktrees will not compile in isolation, which is
            expected and acceptable. Agent verification gates should focus on
            go vet (per-file syntax) and defer full compilation to post-merge.
        - scenario: |
            Tree-sitter Rust AST node types differ from expectations. The Rust
            grammar may use different field names or node structures than assumed
            (e.g., let_declaration pattern/value field names).
          likelihood: medium
          impact: medium
          mitigation: |
            The existing Rust extractor (internal/indexer/rustextractor/extractor.go)
            demonstrates the correct tree-sitter Rust patterns for function_item,
            impl_item, struct_item, enum_item, trait_item, use_declaration,
            call_expression, scoped_identifier, and field_expression. Agents should
            reference the extractor for node type names and field access patterns.
            Guard all ChildByFieldName calls with nil checks.
        - scenario: |
            Rust's multiple impl blocks per type cause method registration conflicts.
            A type can have inherent impl blocks and trait impl blocks, potentially
            with methods of the same name (trait method vs inherent method).
          likelihood: medium
          impact: low
          mitigation: |
            The registry uses a map keyed by receiverType.methodName. Later
            registrations overwrite earlier ones. For Tier 1, inherent impl methods
            take priority (registered last since they appear after trait impls in
            typical Rust code). This matches Rust's actual method resolution order
            where inherent methods shadow trait methods.
        - scenario: |
            Rust's ownership types (&T, &mut T, Box<T>, Arc<T>) cause method
            resolution failures because the base type is wrapped in a reference
            or smart pointer layer.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent B implements DerefToBase which strips reference and smart pointer
            wrappers before method lookup. Agent C's EvalExprType and Agent D's
            resolve.go both use DerefToBase before calling LookupMethod. This
            handles the common case. Deep nesting (e.g., &Arc<Box<T>>) is handled
            by DerefToBase's iterative stripping (max 4 levels).
        - scenario: |
            Agent A and Agent C both define nodeContent helper with the same
            signature, causing a duplicate function error at merge.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent C is instructed to define nodeContent in eval.go. Agent A should
            NOT define nodeContent. If a conflict occurs, Agent D resolves it in
            wave 2 by removing the duplicate.
        - scenario: |
            Macro invocations in Rust look syntactically different from function
            calls (they use `!` and can have different delimiters: (), [], {}).
            The resolver may miss macro calls or misidentify them.
          likelihood: low
          impact: low
          mitigation: |
            Tree-sitter Rust grammar has a dedicated `macro_invocation` node type
            distinct from `call_expression`. The resolver handles both node types
            separately. The extractor already demonstrates this pattern with
            `walkForCalls` handling both `call_expression` and `macro_invocation`.
