          task: |
            ## Agent C: Expression Evaluator, Type Parser, and Scope Binding

            Build the expression type evaluator, Rust type node parser, and
            statement-level scope binding for the Rust resolver.

            ### What to implement

            **File 1: `internal/typresolve/rust/eval.go`**
            Package: `rustresolve`

            Define the resolution context and expression evaluator for Rust.
            Rust has a strong static type system, but the resolver operates without
            full type inference. It relies on: explicit type annotations in let
            bindings, literal types, constructor patterns, scope tracking through
            assignments, and method return types from the registry.

            Define the resolution context:
            ```go
            // ResolveContext holds per-file state for type resolution.
            type ResolveContext struct {
                Registry        *typresolve.Registry
                Scope           *typresolve.Scope
                Uses            map[string]string  // short name -> module path
                ModuleQN        string             // current module qualified name
                ImplType        string             // current impl block type QN (empty if not in impl)
                Content         []byte             // source file content
                EnclosingFuncQN string             // QN of the current function being resolved
            }
            ```

            Also define a helper:
            ```go
            // nodeContent extracts the source text for a tree-sitter node.
            func nodeContent(node *sitter.Node, content []byte) string {
                return node.Content(content)
            }
            ```

            Implement `EvalExprType(ctx *ResolveContext, node *sitter.Node) *typresolve.Type`

            Handle these Rust expression node types:

            1. `identifier`:
               - Scope lookup: `ctx.Scope.Lookup(name)`
               - If found and not Unknown, return it
               - Check if it's a builtin type: `IsBuiltinType(name)` (from builtins.go,
                 same package). If so, return `ResolveBuiltinType(name)`.
               - Check if it's an enum variant constructor: "Some", "None", "Ok", "Err"
                 - "Some": return Named("std::Option") (wraps a value into Option)
                 - "None": return Named("std::Option")
                 - "Ok": return Named("std::Result")
                 - "Err": return Named("std::Result")
               - Check in uses map for imported type
               - Default: return Unknown

            2. `scoped_identifier`:
               Path expressions like `module::Type`, `std::collections::HashMap`,
               `Type::method`, `Enum::Variant`.
               - Get full path text from node
               - Split on `::`
               - If first segment is in uses map, resolve through import
               - If first segment is a known type and second is a method/variant:
                 return Named(resolved type QN)
               - Look up full path in registry as type
               - If found, return Named(typeQN)
               - Default: return Named(fullPath) (best effort)

            3. `call_expression`:
               - Get `function` field child
               - Get `arguments` field child
               - If function is `identifier`:
                 Check builtins: `IsBuiltinFunc(name)`. If builtin macro-like
                 (this won't catch actual macros, which are macro_invocation nodes,
                 but handles `Box::new` etc.)
               - If function is `scoped_identifier`:
                 Resolve the path. Common patterns:
                 - `Type::new(...)`: return Named(Type)
                 - `Type::from(...)`: return Named(Type)
                 - `Type::default()`: return Named(Type)
                 - `module::func(...)`: look up in registry, return signature's return type
               - If function is `field_expression`:
                 This is a method call: `obj.method(args)`
                 Evaluate receiver type, deref to base, look up method
               - Evaluate function type recursively
               - If KindFunc with returns, return first return type
               - If KindNamed, this is a type conversion / constructor: return the type
               - Default: return Unknown

            4. `macro_invocation`:
               - Get `macro` field child for the macro name
               - Call `EvalMacroReturnType(macroName)` (from builtins.go)
               - Return its result

            5. `field_expression`:
               `expr.field` - could be field access or method (without call parens).
               - Get operand and field children
               - Evaluate operand type
               - Deref to base: `DerefToBase(baseType)` (from methods.go, Agent B)
               - If base is Named, look up field: `LookupField(ctx.Registry, typeQN, fieldName)`
               - If found, return field type
               - Default: return Unknown

            6. `reference_expression`:
               `&expr` or `&mut expr` - creates a reference.
               - Evaluate inner expression
               - Return typresolve.Ref(innerType)

            7. `dereference_expression`:
               `*expr` - dereferences a reference/pointer.
               - Evaluate inner expression
               - If KindReference or KindPointer, return Elem
               - Default: return Unknown

            8. `try_expression`:
               `expr?` - unwraps Result<T, E> or Option<T>.
               - Evaluate inner expression
               - If Named with name containing "Result" or "Option" and has Elem,
                 return Elem (the success/some type)
               - Default: return Unknown

            9. Literals:
               - `string_literal`, `raw_string_literal`: return Builtin("str")
               - `char_literal`: return Builtin("char")
               - `integer_literal`: return Builtin("i32") (default integer type)
               - `float_literal`: return Builtin("f64") (default float type)
               - `boolean_literal`, `true`, `false`: return Builtin("bool")

            10. `array_expression`:
                return typresolve.Slice(typresolve.Unknown()) (array/vec literal)

            11. `tuple_expression`:
                Evaluate children, return Tuple of their types

            12. `struct_expression`:
                Struct literal `MyStruct { field: value }`.
                - Get `name` field child
                - Resolve the type name through uses/registry
                - Return Named(typeQN)

            13. `unary_expression`:
                - `!expr`: if operand is bool, return Builtin("bool")
                - `-expr`: return operand type

            14. `binary_expression`:
                - Comparison (==, !=, <, >, <=, >=): return Builtin("bool")
                - Logical (&&, ||): return Builtin("bool")
                - Arithmetic (+, -, *, /, %): return left operand type
                - Bitwise (&, |, ^, <<, >>): return left operand type

            15. `index_expression`:
                `expr[index]` - array/vec/map indexing.
                - Evaluate operand type
                - If slice/array with Elem, return Elem
                - Default: return Unknown

            16. `type_cast_expression`:
                `expr as Type` - type cast.
                - Parse the target type node via `ParseTypeNode` (from types.go, same package)
                - Return the target type

            17. `closure_expression`:
                `|params| body` or `|params| -> RetType { body }`.
                - Return typresolve.Func(nil, nil) (opaque closure type)

            18. `if_expression`:
                Evaluate consequence block's last expression type

            19. `match_expression`:
                Evaluate first arm's body type

            20. `block`:
                Evaluate last statement/expression in the block

            21. `parenthesized_expression`:
                Unwrap and evaluate inner expression

            22. `await_expression`:
                `expr.await` - unwrap Future. Return Unknown (future output type
                not inferrable without full type info)

            23. `range_expression`:
                Return Named("std::ops::Range") or just Unknown

            **File 2: `internal/typresolve/rust/types.go`**
            Package: `rustresolve`

            Implement `ParseTypeNode(node *sitter.Node, content []byte, moduleQN string, uses map[string]string) *typresolve.Type`

            Convert a tree-sitter Rust type AST node to a typresolve.Type. Handle:

            1. `type_identifier` (simple type name):
               - Check primitives: IsBuiltinType(name). If primitive, return
                 Builtin(name).
               - Check uses map for imported type
               - Return Named(moduleQN + "::" + name) for local types

            2. `primitive_type` (i32, bool, etc.):
               return Builtin(name)

            3. `scoped_type_identifier` (qualified type like `std::io::Result`):
               - Get `path` and `name` field children
               - Resolve through uses map
               - Return Named(resolved path)

            4. `reference_type` (`&T` or `&mut T`):
               - Find the inner type child
               - Parse recursively
               - Return typresolve.Ref(inner)

            5. `generic_type` (`Vec<T>`, `HashMap<K, V>`, `Option<T>`, `Result<T, E>`):
               - Get the base type name
               - Parse type arguments
               - For Option<T>: return typresolve.Optional(inner)
               - For Box<T>, Arc<T>, Rc<T>: return Named("std::Box") with Elem set
               - For Vec<T>: return typresolve.Slice(inner)
               - For Result<T, E>: return Named("std::Result") with Elem set to T
               - For HashMap<K, V>: return typresolve.Map(K, V)
               - For other generics: return Named(baseName) (ignore type params)

            6. `array_type` (`[T; N]`):
               - Parse element type
               - Return typresolve.Array(elem)

            7. `slice_type` (`[T]`):
               - Parse element type
               - Return typresolve.Slice(elem)

            8. `tuple_type` (`(T1, T2, T3)`):
               - Parse each element type
               - Return typresolve.Tuple(elements)

            9. `function_type` (`fn(A) -> B`):
               - Parse parameter types and return type
               - Return typresolve.Func(params, returns)

            10. `unit_type` (`()`):
                return typresolve.Builtin("()")

            11. `pointer_type` (`*const T` or `*mut T`):
                - Parse inner type
                - Return typresolve.Pointer(inner)

            12. `never_type` (`!`):
                return typresolve.Unknown()

            13. `dynamic_type` (`dyn Trait`):
                - Parse trait name
                - Return Named(traitName) with KindInterface

            14. `bounded_type` (`T + Trait`):
                Parse first type, return it

            15. `macro_invocation` (in type position):
                return Unknown()

            Also implement a helper for Rust-specific builtin type detection:
            ```go
            var rustPrimitives = map[string]bool{
                "i8": true, "i16": true, "i32": true, "i64": true, "i128": true,
                "isize": true, "u8": true, "u16": true, "u32": true, "u64": true,
                "u128": true, "usize": true, "f32": true, "f64": true,
                "bool": true, "char": true, "str": true,
            }

            func isRustPrimitive(name string) bool {
                return rustPrimitives[name]
            }
            ```

            **File 3: `internal/typresolve/rust/scope_bind.go`**
            Package: `rustresolve`

            Implement `ProcessStatement(ctx *ResolveContext, node *sitter.Node)`

            Handle these Rust statement types:

            1. `let_declaration`:
               Rust's primary variable binding: `let x: Type = expr;`
               or `let x = expr;` or `let mut x = expr;`
               - Get `pattern` field child (the variable name/pattern)
               - Get `type` field child (optional type annotation)
               - Get `value` field child (optional initializer expression)
               - If type annotation present: parse it via ParseTypeNode, bind
                 pattern identifier to that type
               - If no type annotation but value present: evaluate value type
                 via EvalExprType, bind pattern identifier to result
               - If neither: bind to Unknown

               Handle pattern types:
               - `identifier`: bind directly (most common: `let x = ...`)
               - `mutable_specifier` + `identifier`: `let mut x = ...` - find the
                 identifier child and bind it
               - `tuple_pattern` (`let (a, b) = ...`): if value is Tuple, bind each
                 element. Otherwise bind all to Unknown.
               - `struct_pattern` (`let Foo { x, y } = ...`): bind each field
                 identifier to Unknown (field types require struct knowledge)
               - `ref_pattern` (`let ref x = ...`): bind x to Ref(valueType)
               - `_` (wildcard): skip

            2. `assignment_expression`:
               `x = expr;` or `x.field = expr;`
               - Evaluate right side
               - If left side is identifier, bind in scope
               - If left side is field_expression, skip (field mutation, doesn't
                 create new binding)

            3. `compound_assignment_expr`:
               `x += expr;`, `x -= expr;`, etc.
               - No new bindings created; skip or keep existing binding

            4. `for_expression`:
               `for item in iter { ... }`
               - Get `pattern` field child (loop variable)
               - Get `value` field child (iterable expression)
               - Evaluate iterable type
               - Bind loop variable to Unknown (element type not inferrable without
                 generics/iterator resolution)

            5. `if_let_expression`:
               `if let Some(x) = expr { ... }`
               - Get `pattern` field child
               - Get `value` field child
               - Evaluate value type
               - If pattern is `tuple_struct_pattern` (e.g., `Some(x)`):
                 - If value type is Optional (Option), bind inner identifier to
                   the Optional's Elem type
                 - If value type is Named("std::Result"), bind to Elem
               - Otherwise bind pattern identifiers to Unknown

            6. `while_let_expression`:
               Same pattern as if_let_expression.

            7. `match_expression`:
               Each match arm can introduce bindings in its pattern.
               ProcessStatement is called on individual nodes, not full match bodies.
               When called on a `match_arm`, extract pattern bindings:
               - `identifier` pattern: bind to the match scrutinee type (if known)
               - `tuple_struct_pattern`: destructure similarly to if-let
               - `struct_pattern`: bind field names to Unknown
               - Literal patterns: no bindings

            **File 4: `internal/typresolve/rust/eval_test.go`**
            Package: `rustresolve`

            Test helper to parse Rust and find specific expression nodes:
            ```go
            func parseRust(t *testing.T, src string) *sitter.Node {
                parser := sitter.NewParser()
                parser.SetLanguage(rust.GetLanguage())
                tree, err := parser.ParseCtx(context.Background(), nil, []byte(src))
                if err != nil {
                    t.Fatalf("parse: %v", err)
                }
                t.Cleanup(func() { tree.Close() })
                return tree.RootNode()
            }

            func findNode(root *sitter.Node, nodeType string) *sitter.Node {
                if root.Type() == nodeType {
                    return root
                }
                for i := 0; i < int(root.ChildCount()); i++ {
                    if found := findNode(root.Child(i), nodeType); found != nil {
                        return found
                    }
                }
                return nil
            }
            ```

