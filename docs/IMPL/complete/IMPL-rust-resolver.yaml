              - KindNamed with name starting with "std::Box", "std::Arc", "std::Rc":
                if type has Elem, return Elem (auto-deref). Otherwise return as-is.
              - All other kinds: return the type unchanged.
              Apply iteratively (max 4 levels) to handle things like &Box<T>.

