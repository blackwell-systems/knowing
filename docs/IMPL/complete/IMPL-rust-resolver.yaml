interface_contracts:
    - name: BuildUseMap
      description: |
        Builds a per-file use map from Rust AST root. Walks use_declaration
        nodes and resolves them to module-qualified paths. Returns a map
        from imported short name to fully qualified module path.
      definition: |
        func BuildUseMap(root *sitter.Node, content []byte, filePath string) map[string]string
      location: internal/typresolve/rust/uses.go
    - name: ResolveUsePath
      description: |
        Resolves a Rust use path (crate::module::Type, super::module::func,
        std::collections::HashMap) to a module-qualified path. Handles crate,
        self, super, and external crate prefixes.
      definition: |
        func ResolveUsePath(usePath string, currentFile string) (modulePath string, isExternal bool)
      location: internal/typresolve/rust/uses.go
    - name: ResolveModulePath
      description: |
        Converts a Rust module path prefix to a file-system relative path.
        Handles crate::, self::, super::, and external crate resolution.
      definition: |
        func ResolveModulePath(prefix string, currentFile string) string
      location: internal/typresolve/rust/modules.go
    - name: InferModuleQN
      description: |
        Infers the module qualified name from a file path. Converts
        src/foo/bar.rs to crate::foo::bar. Handles mod.rs -> parent module.
      definition: |
        func InferModuleQN(filePath string) string
      location: internal/typresolve/rust/modules.go
    - name: IsBuiltinFunc
      description: |
        Returns true if the name is a Rust builtin macro or function
        (println, eprintln, format, vec, todo, unimplemented, unreachable,
        assert, assert_eq, assert_ne, debug_assert, dbg, panic, write,
        writeln, cfg, include, include_str, include_bytes, concat, stringify,
        env, option_env, file, line, column, module_path, compile_error).
      definition: |
        func IsBuiltinFunc(name string) bool
      location: internal/typresolve/rust/builtins.go
    - name: IsBuiltinType
      description: |
        Returns true if the name is a Rust primitive or core type (i8, i16,
        i32, i64, i128, isize, u8, u16, u32, u64, u128, usize, f32, f64,
        bool, char, str, String, Vec, HashMap, HashSet, BTreeMap, BTreeSet,
        Option, Result, Box, Rc, Arc, Cell, RefCell, Mutex, RwLock, Pin,
        PhantomData, Iterator, IntoIterator, Display, Debug, Clone, Copy,
        Default, Drop, Fn, FnMut, FnOnce, Send, Sync, Sized, Unpin, From,
        Into, TryFrom, TryInto, AsRef, AsMut, Deref, DerefMut, Borrow).
      definition: |
        func IsBuiltinType(name string) bool
      location: internal/typresolve/rust/builtins.go
    - name: ResolveBuiltinType
      description: |
        Returns a typresolve type for a Rust builtin/primitive type.
        Primitives (i32, bool, char, str) return Builtin. Core types
        (String, Vec, HashMap, Option, Result, Box, Arc, Rc) return Named
        with "std::" prefix. Returns nil for non-builtins.
      definition: |
        func ResolveBuiltinType(name string) *typresolve.Type
      location: internal/typresolve/rust/builtins.go
    - name: EvalMacroReturnType
      description: |
        Returns the known return type of common Rust macros.
        vec![] -> Named("std::Vec"), format!/format_args! -> Builtin("str"),
        println!/eprintln!/print!/eprint! -> Builtin("()"),
        todo!/unimplemented!/unreachable! -> Unknown (diverges),
        assert!/assert_eq!/assert_ne!/debug_assert! -> Builtin("()"),
        dbg! -> evaluator returns inner expr type.
      definition: |
        func EvalMacroReturnType(macroName string) *typresolve.Type
      location: internal/typresolve/rust/builtins.go
    - name: LookupMethod
      description: |
        Looks up a method on a named type, following impl block resolution
        and trait implementations. Searches: direct methods on type, then
        methods from trait impls (via EmbeddedTypes which stores trait QNs),
        up to 8 levels deep.
      definition: |
        func LookupMethod(reg *typresolve.Registry, typeQN string, methodName string) *typresolve.RegisteredFunc
      location: internal/typresolve/rust/methods.go
    - name: LookupField
      description: |
        Looks up a struct field on a named type. Returns the field's type
        if found, nil otherwise.
      definition: |
        func LookupField(reg *typresolve.Registry, typeQN string, fieldName string) *typresolve.Type
      location: internal/typresolve/rust/methods.go
    - name: DerefToBase
      description: |
        Strips ownership/reference wrappers to find the base type for method
        resolution. &T -> T, &mut T -> T, Box<T> -> T, Arc<T> -> T,
        Rc<T> -> T, *const T -> T, *mut T -> T.
      definition: |
        func DerefToBase(t *typresolve.Type) *typresolve.Type
      location: internal/typresolve/rust/methods.go
    - name: ResolveContext
      description: |
        Per-file resolution context holding the registry, scope, use map,
        current module path, impl type context, content bytes, and
        enclosing function qualified name.
      definition: |
        type ResolveContext struct {
            Registry        *typresolve.Registry
            Scope           *typresolve.Scope
            Uses            map[string]string  // short name -> module path
            ModuleQN        string             // current module qualified name
            ImplType        string             // current impl block type (empty if not in impl)
            Content         []byte             // source file content
            EnclosingFuncQN string             // QN of the current function being resolved
        }
      location: internal/typresolve/rust/eval.go
    - name: EvalExprType
      description: |
        Recursive expression type evaluator for Rust. Evaluates the type of
        a Rust expression AST node using scope lookup, registry lookup,
        path resolution, and method dispatch.
      definition: |
        func EvalExprType(ctx *ResolveContext, node *sitter.Node) *typresolve.Type
      location: internal/typresolve/rust/eval.go
    - name: ProcessStatement
      description: |
        Processes a Rust statement node to bind variables into the current
        scope. Handles let bindings (with optional type annotation and
        pattern destructuring), for-in loops, if-let, while-let, and
        match arm bindings.
      definition: |
        func ProcessStatement(ctx *ResolveContext, node *sitter.Node)
      location: internal/typresolve/rust/scope_bind.go
    - name: ParseTypeNode
      description: |
        Converts a tree-sitter Rust type AST node to a typresolve.Type.
        Handles: type_identifier, scoped_type_identifier, reference_type,
        generic_type, array_type, tuple_type, function_type, unit_type,
        pointer_type, primitive_type.
      definition: |
        func ParseTypeNode(node *sitter.Node, content []byte, moduleQN string, uses map[string]string) *typresolve.Type
      location: internal/typresolve/rust/types.go
    - name: RustResolver
      description: |
        Implements typresolve.Resolver for Rust. Language() returns "rust".
        InitWorkspace builds a Registry from Rust definitions (functions,
        structs, enums, traits, impls, methods). ResolveFile walks the Rust
        AST and resolves calls and references.
      definition: |
        type RustResolver struct {
            registry *typresolve.Registry
        }
        func NewRustResolver() *RustResolver
        func (r *RustResolver) Language() string
        func (r *RustResolver) InitWorkspace(ctx context.Context, defs []typresolve.ResolverDef) error
        func (r *RustResolver) ResolveFile(ctx context.Context, opts typresolve.ResolveFileOpts) ([]types.Edge, error)
      location: internal/typresolve/rust/resolver.go
    - name: BuildRegistry
      description: |
        Builds a typresolve.Registry from ResolverDef entries. Registers
        structs, enums, traits (as IsInterface=true), functions, and methods
        (with ReceiverType from impl block). Processes "implements" edges
        to populate EmbeddedTypes for trait-based method dispatch.
      definition: |
        func BuildRegistry(defs []typresolve.ResolverDef) *typresolve.Registry
      location: internal/typresolve/rust/registry_builder.go
    - name: ResolveCallsInFile
      description: |
        Walks a Rust file's AST resolving call expressions, method calls,
        macro invocations, and path expressions, then emitting call edges.
      definition: |
        func ResolveCallsInFile(ctx *ResolveContext, root *sitter.Node, fileHash types.Hash, repoURL string, filePath string) []types.Edge
      location: internal/typresolve/rust/resolve.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A: Use Declaration Resolution and Module System

            Build the foundational use-statement resolution and module path
            inference for the Rust resolver.

            ### What to implement

            **File 1: `internal/typresolve/rust/doc.go`**
            Package doc comment for the `rustresolve` subpackage:
            ```go
            // Package rustresolve implements the Rust language in-process type resolver.
            // It implements the typresolve.Resolver interface, resolving Rust call
            // expressions, method calls, and type references using tree-sitter AST
            // walking and a shared type registry built from extracted definitions.
            package rustresolve
            ```

            **File 2: `internal/typresolve/rust/uses.go`**
            Package: `rustresolve`

            Implement use-declaration resolution for Rust files. Rust's `use` system
            maps paths like `crate::module::Type` and `std::collections::HashMap`
            to short names. The existing Rust extractor at
            `internal/indexer/rustextractor/extractor.go` has `buildRustImportMap`
            (lines 807-826) and `parseRustUsePath` (lines 837-892) which demonstrate
            the parsing pattern. Reimplement locally to avoid circular dependencies.

            Implement:

            - `ResolveUsePath(usePath string, currentFile string) (modulePath string, isExternal bool)`
              Break the use path into segments on `::`.
              - If first segment is `crate`: resolve relative to crate root.
                modulePath = remaining segments joined with `::`.
                isExternal = false.
              - If first segment is `self`: resolve relative to current module.
                Use `ResolveModulePath` from modules.go (same package).
                isExternal = false.
              - If first segment is `super`: resolve relative to parent module.
                Use `ResolveModulePath` from modules.go (same package).
                isExternal = false.
              - Otherwise (std, tokio, serde, etc.): external crate.
                modulePath = full path.
                isExternal = true.

            - `BuildUseMap(root *sitter.Node, content []byte, filePath string) map[string]string`
              Walk top-level children of the AST root looking for `use_declaration` nodes.

              For each use_declaration:
              1. Get the `argument` field child
              2. Get the full text of the argument node
              3. Handle three patterns:
                 a. Glob: `use crate::module::*` - skip (cannot resolve individual names)
                 b. Group: `use crate::module::{A, B, C}` - extract names from braces,
                    map each name to the resolved module path of the prefix
                 c. Simple: `use crate::module::Type` - map the last segment to the
                    resolved prefix path
              4. Handle `as` aliases: `use std::io::Read as IoRead` - use the alias
                 as the map key

              The tree-sitter Rust grammar represents `use crate::foo::Bar;` as:
              ```
              (use_declaration
                argument: (scoped_identifier
                  path: (scoped_identifier
                    path: (identifier) "crate"
                    name: (identifier) "foo")
                  name: (identifier) "Bar"))
              ```

              However, reading the full argument node content as a string and parsing
              with string operations (as the extractor does) is more reliable than
              walking the nested tree-sitter nodes. Use `argNode.Content(content)` to
              get the full path string, then parse with string splitting on `::`.

              For group imports `use crate::module::{A, B}`:
              ```
              (use_declaration
                argument: (scoped_use_list
                  path: (scoped_identifier ...)
                  list: (use_list
                    (identifier) "A"
                    (identifier) "B")))
              ```

              Parse these by detecting `::{` in the text and extracting names from
              within the braces.

              Return map: shortName -> modulePath (e.g., "HashMap" -> "std::collections")

            **File 3: `internal/typresolve/rust/modules.go`**
            Package: `rustresolve`

            Implement Rust module path resolution. Rust's module system maps
            file paths to module paths: `src/foo/bar.rs` -> `crate::foo::bar`,
            `src/foo/mod.rs` -> `crate::foo`.

            Implement:

            - `ResolveModulePath(prefix string, currentFile string) string`
              Convert a Rust module path prefix to a resolved module path.
              Split prefix on `::`.
              - `crate`: resolve from crate root. Return remaining segments
                joined with `::`.
              - `self`: resolve from current module. Get current module path
                from currentFile, append remaining segments.
              - `super`: resolve from parent module. Go up one directory from
                currentFile, append remaining segments.
              - External: return empty string (can't resolve to local path).

            - `InferModuleQN(filePath string) string`
              Convert a file path to a Rust module qualified name.
              - Normalize path separators to `/`
              - Strip `src/` prefix if present (standard Rust layout)
              - Strip `.rs` extension
              - Handle `mod.rs`: use the directory name instead
              - Handle `lib.rs` and `main.rs`: use `crate` or the crate name
              - Replace `/` with `::`
              - Prefix with `crate::`

              Examples:
              - `src/foo/bar.rs` -> `crate::foo::bar`
              - `src/foo/mod.rs` -> `crate::foo`
              - `src/lib.rs` -> `crate`
              - `src/main.rs` -> `crate`
              - `src/resolver/types.rs` -> `crate::resolver::types`

            **File 4: `internal/typresolve/rust/uses_test.go`**
            Package: `rustresolve`

            Test cases:

            - `TestResolveUsePath_Crate`: `crate::core::resolver::FeatureResolver`
              -> modulePath="crate::core::resolver", isExternal=false
            - `TestResolveUsePath_Self`: `self::helpers::resolve` with
              currentFile="src/core/mod.rs" -> modulePath contains current module, isExternal=false
            - `TestResolveUsePath_Super`: `super::utils` with
              currentFile="src/core/resolver.rs" -> modulePath contains parent, isExternal=false
            - `TestResolveUsePath_External`: `tokio::runtime::Runtime`
              -> modulePath="tokio::runtime", isExternal=true
            - `TestResolveUsePath_Std`: `std::collections::HashMap`
              -> modulePath="std::collections", isExternal=true
            - `TestBuildUseMap_Simple`: parse Rust source with
              `use crate::core::Config;` -> map["Config"] = "crate::core"
            - `TestBuildUseMap_Group`: parse Rust source with
              `use crate::core::{Config, Workspace};`
              -> map["Config"] = "crate::core", map["Workspace"] = "crate::core"
            - `TestBuildUseMap_Alias`: parse Rust source with
              `use std::io::Read as IoRead;` -> map["IoRead"] = "std::io"
            - `TestBuildUseMap_Glob`: `use crate::prelude::*` -> no entries (skipped)
            - `TestInferModuleQN_Regular`: `src/foo/bar.rs` -> `crate::foo::bar`
            - `TestInferModuleQN_ModRs`: `src/foo/mod.rs` -> `crate::foo`
            - `TestInferModuleQN_LibRs`: `src/lib.rs` -> `crate`
            - `TestInferModuleQN_MainRs`: `src/main.rs` -> `crate`

            For testing BuildUseMap, parse Rust source with tree-sitter:
            ```go
            func parseRust(t *testing.T, src string) *sitter.Node {
                parser := sitter.NewParser()
                parser.SetLanguage(rust.GetLanguage())
                tree, err := parser.ParseCtx(context.Background(), nil, []byte(src))
                if err != nil {
                    t.Fatalf("parse: %v", err)
                }
                t.Cleanup(func() { tree.Close() })
                return tree.RootNode()
            }
            ```

            ### Interfaces consumed
            - `sitter.Node` from `github.com/smacker/go-tree-sitter`
            - `rust.GetLanguage()` from `github.com/smacker/go-tree-sitter/rust`

            ### Constraints
            - Package name MUST be `rustresolve`
            - Do NOT modify any files outside your ownership list.
            - Do NOT import from `internal/indexer/rustextractor` (would create circular
              dependency risk). Reimplement use resolution and path logic locally.
            - Do NOT define any types from builtins.go or eval.go (Agent B and C scope).

            ### Verification
            ```bash
            GOWORK=off go build ./internal/typresolve/rust/...
            GOWORK=off go vet ./internal/typresolve/rust/...
            GOWORK=off go test ./internal/typresolve/rust/... -run TestResolveUsePath -v
            GOWORK=off go test ./internal/typresolve/rust/... -run TestBuildUseMap -v
            GOWORK=off go test ./internal/typresolve/rust/... -run TestInferModuleQN -v
            ```

            Postconditions:
            ```bash
            # ResolveUsePath function exists
            grep -c "func ResolveUsePath" internal/typresolve/rust/uses.go  # expect: 1
            # BuildUseMap function exists
            grep -c "func BuildUseMap" internal/typresolve/rust/uses.go  # expect: 1
            # InferModuleQN function exists
            grep -c "func InferModuleQN" internal/typresolve/rust/modules.go  # expect: 1
            # ResolveModulePath function exists
            grep -c "func ResolveModulePath" internal/typresolve/rust/modules.go  # expect: 1
            # Package declaration is rustresolve
            grep -c "package rustresolve" internal/typresolve/rust/doc.go  # expect: 1
            ```
          files:
            - internal/typresolve/rust/doc.go
            - internal/typresolve/rust/uses.go
            - internal/typresolve/rust/modules.go
            - internal/typresolve/rust/uses_test.go
        - id: B
          task: |
            ## Agent B: Builtins and Trait-Based Method Lookup

            Build the builtin function/type handling, macro return type inference,
            and trait-based method lookup for the Rust resolver.

            ### What to implement

            **File 1: `internal/typresolve/rust/builtins.go`**
            Package: `rustresolve`

            Implement Rust builtin and macro recognition. Rust has primitive types,
            standard library types, and macros that look like function calls with `!`.

            Implement:

            - `IsBuiltinFunc(name string) bool`
              Return true for Rust standard macros and functions:
              println, eprintln, print, eprint,
              format, format_args,
              vec,
              todo, unimplemented, unreachable,
              assert, assert_eq, assert_ne, debug_assert, debug_assert_eq, debug_assert_ne,
              dbg,
              panic,
              write, writeln,
              cfg, env, option_env,
              include, include_str, include_bytes,
              concat, stringify,
              file, line, column, module_path,
              compile_error,
              matches,
              thread_local,
              Box::new (as "Box"),
              Some, None, Ok, Err (enum variant constructors, treated as builtins)

            - `IsBuiltinType(name string) bool`
              Return true for Rust primitives and core types:
              Primitives: i8, i16, i32, i64, i128, isize, u8, u16, u32, u64,
                u128, usize, f32, f64, bool, char, str
              Core types: String, Vec, HashMap, HashSet, BTreeMap, BTreeSet,
                Option, Result, Box, Rc, Arc, Cell, RefCell, Mutex, RwLock,
                Pin, PhantomData, Cow
              Core traits: Iterator, IntoIterator, Display, Debug, Clone, Copy,
                Default, Drop, Fn, FnMut, FnOnce, Send, Sync, Sized, Unpin,
                From, Into, TryFrom, TryInto, AsRef, AsMut, Deref, DerefMut,
                Borrow, BorrowMut, ToOwned, ToString, PartialEq, Eq,
                PartialOrd, Ord, Hash, Add, Sub, Mul, Div, Rem, Neg, Not,
                Index, IndexMut, Read, Write, Seek, BufRead
              IO: stdin, stdout, stderr

            - `ResolveBuiltinType(name string) *typresolve.Type`
              - For primitives (i32, bool, char, str, f64, etc.): return
                `typresolve.Builtin(name)`
              - For core types (String, Vec, HashMap, Option, Result, Box, Arc, Rc):
                return `typresolve.Named("std::" + name)`
              - For unit type "()": return `typresolve.Builtin("()")`
              - Return nil for non-builtins

            - `EvalMacroReturnType(macroName string) *typresolve.Type`
              Return known return types for common Rust macros:
              - `vec`: return Named("std::Vec")
              - `format`, `format_args`: return Builtin("str") (actually String, but
                for resolution purposes str is sufficient)
              - `println`, `eprintln`, `print`, `eprint`, `write`, `writeln`:
                return Builtin("()")
              - `todo`, `unimplemented`, `unreachable`: return Unknown() (diverges, never returns)
              - `assert`, `assert_eq`, `assert_ne`, `debug_assert`, `debug_assert_eq`,
                `debug_assert_ne`: return Builtin("()")
              - `panic`: return Unknown() (diverges)
              - `dbg`: return Unknown() (returns inner expression type, can't infer here)
              - `include_str`: return Builtin("str")
              - `include_bytes`: return typresolve.Slice(typresolve.Builtin("u8"))
              - `concat`, `stringify`: return Builtin("str")
              - `env`, `option_env`: return Builtin("str")
              - `matches`: return Builtin("bool")
              - `cfg`: return Builtin("bool")
              - `file`, `module_path`: return Builtin("str")
              - `line`, `column`: return Builtin("u32")
              - Default: return Unknown()

            **File 2: `internal/typresolve/rust/methods.go`**
            Package: `rustresolve`

            Implement method and field lookup following Rust's impl-based dispatch.
            In Rust, methods live in `impl` blocks, not on the type directly.
            Multiple `impl` blocks can exist per type (inherent impls + trait impls).
            The registry stores methods with ReceiverType pointing to the type QN,
            and trait impl relationships as EmbeddedTypes on the RegisteredType.

            Implement:

            - `LookupMethod(reg *typresolve.Registry, typeQN string, methodName string) *typresolve.RegisteredFunc`
              Internal helper with depth limit (max 8):
              1. Direct method lookup: `reg.LookupMethod(typeQN, methodName)` - if found, return
              2. Get type: `reg.LookupType(typeQN)` - if nil, return nil
              3. Follow alias: if `type.AliasOf != ""`, recurse with alias target
              4. Check EmbeddedTypes (trait impls): for each `type.EmbeddedTypes[i]`,
                 look up method on the trait type (this handles `impl Trait for Type`)
              5. Return nil if not found

            - `LookupField(reg *typresolve.Registry, typeQN string, fieldName string) *typresolve.Type`
              Look up a struct field:
              1. Get type: `reg.LookupType(typeQN)` - if nil, return nil
              2. Follow alias: if `type.AliasOf != ""`, recurse
