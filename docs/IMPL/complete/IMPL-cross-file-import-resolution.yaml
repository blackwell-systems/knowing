pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A or B introduces a compilation error by incorrectly passing the import
            map through the existing function chain, breaking existing function signatures.
          likelihood: low
          impact: medium
          mitigation: |
            The pattern is well-established in the Rust extractor. Agents create new
            *WithImports variants rather than modifying existing function signatures.
            Existing functions remain unchanged; new code paths are additive. Build gate
            catches signature mismatches immediately.
        - scenario: |
            Agent changes the existing edge provenance/confidence for all edges instead of
            only for import-resolved edges, breaking the TestJavaExtractor_EdgeProvenanceAndConfidence
            or TestCSharpExtractor_EdgeProvenanceAndConfidence tests.
          likelihood: low
          impact: high
          mitigation: |
            Agent constraints explicitly state: "Do NOT change the behavior of existing edges
            that do not match import resolution." The existing test suites verify all edges
            have ast_inferred/0.7 and will fail if this invariant is broken. The import-resolved
            path must be a conditional branch, not a blanket change.
        - scenario: |
            Tree-sitter node types for Java import_declaration or C# using_directive have
            unexpected child structure, causing buildImportMap to silently produce an empty map.
          likelihood: medium
          impact: low
          mitigation: |
            Both extractors already successfully parse these node types (extractImportEdge
            in Java, extractUsingDirective in C#). The same parsing logic can be reused.
            Tests with known Java/C# source will catch empty-map issues immediately.
