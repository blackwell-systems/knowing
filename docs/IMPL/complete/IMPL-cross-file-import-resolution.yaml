        - id: B
          task: |
            ## Goal
            Add cross-file import resolution to the C# extractor following the established
            Rust pattern in internal/indexer/rustextractor/extractor.go.

            ## Reference Implementation
            Read internal/indexer/rustextractor/extractor.go for the full pattern:
            - buildRustImportMap (line 752): extracts use declarations, returns map[string]string
            - resolveCallEdgeWithImports (line 535): resolves call targets through import map
            - resolveRustModulePath (line 828): converts module path to file-system path

            ## Implementation Steps

            ### 1. Add buildCSharpImportMap function

            Add a new method on CSharpExtractor (or a standalone function) that walks the AST
            looking for "using_directive" nodes and builds a map[string]string from the last
            segment of the namespace to the full namespace path.

            Rules:
            - `using Microsoft.AspNetCore.Mvc;` -> map["Mvc"] = "Microsoft.AspNetCore.Mvc"
            - `using static System.Math;` -> map["Math"] = "System.Math"
            - `using System.Collections.Generic;` -> map["Generic"] = "System.Collections.Generic"
            - For the resolution heuristic, ALSO map the second-to-last segment for class resolution:
              `using Microsoft.AspNetCore.Mvc;` -> additionally map potential class names
            - The key is the last dot-separated segment of the namespace

            However, for C# the more useful mapping for call resolution is to map the
            class name to its namespace. Since using directives import entire namespaces
            (not individual types like Java), the approach is slightly different:
            - `using Namespace.Sub;` means any type from that namespace can be used unqualified
            - For `using static Namespace.Class;` map "Class" -> "Namespace.Class"
            - For regular using directives, we cannot resolve individual types without type info,
              BUT we can still map the last segment as a potential class name for the heuristic

            Recommended algorithm (matching the Rust pattern closely):
            ```
            for each using_directive node in the AST:
              extract the namespace text (e.g., "Microsoft.AspNetCore.Mvc")
              if it is a "using static" directive:
                lastDot = last index of "."
                className = text[lastDot+1:]
                map[className] = text
              else:
                // Map the last segment as a potential namespace/class reference
                lastDot = last index of "."
                if lastDot >= 0:
                  lastSegment = text[lastDot+1:]
                  map[lastSegment] = text
                else:
                  map[text] = text
            ```

            ### 2. Add extractInvocationEdgeWithImports method

            Create a new method on CSharpExtractor that enhances extractInvocationEdge:
            ```go
            func (e *CSharpExtractor) extractInvocationEdgeWithImports(node *sitter.Node, opts types.ExtractOptions, parentContext string, sourceHash types.Hash, csharpImports map[string]string) *types.Edge
            ```

            When the invocation_expression has a member_access_expression:
            - Get the expression (object) part of the member access
            - If it is an identifier whose first character is uppercase, look it up in csharpImports
            - If found, use the import path as the target base path for the target hash
            - Set provenance to "ast_resolved" and confidence to 0.85
            - If not found, fall back to existing behavior (provenance "ast_inferred", confidence 0.7)

            For member_access_expression nodes, the relevant tree-sitter fields are:
            - "expression" field: the object being accessed (e.g., "Console" in Console.WriteLine)
            - "name" field: the method name (e.g., "WriteLine")

            ### 3. Add walkForCallsWithImports method

            Create an import-aware variant of walkForCalls:
            ```go
            func (e *CSharpExtractor) walkForCallsWithImports(node *sitter.Node, opts types.ExtractOptions, parentContext string, sourceHash types.Hash, csharpImports map[string]string, edges *[]types.Edge)
            ```

            This should:
            - For "invocation_expression": call extractInvocationEdgeWithImports
            - For "object_creation_expression": call extractObjectCreationEdge (unchanged)
            - Recurse into children

            ### 4. Wire import map into Extract function

            In the Extract method, after creating the parser and getting the root node:
            ```go
            // Build C# import map for cross-file call resolution.
            csharpImports := e.buildCSharpImportMap(root, opts)
            ```

            Then modify walkNode to pass csharpImports through. The cleanest approach:
            - Add csharpImports as a parameter to walkNode, walkChildren, extractClassDecl,
              extractMethodDecl, and extractConstructorDecl
            - OR store it on the extractor instance during Extract (since Extract creates a fresh
              CSharpExtractor context per call anyway)
            - OR pass it through a context struct

            The recommended approach (matching Rust pattern): pass it as a parameter. Add
            csharpImports map[string]string parameter to walkNode and walkChildren. Then in
            method/constructor body walking, call walkForCallsWithImports instead of walkForCalls.

            ### 5. Add tests

            Add these test functions to extractor_test.go:

            **TestCSharpExtractor_ImportResolution**: Test that method calls on imported classes
            get provenance "ast_resolved" and confidence 0.85:
            ```csharp
            using Microsoft.Extensions.Logging;
            using System.Collections.Generic;

            public class App
            {
                public void Run()
                {
                    Logging.CreateLogger();
                    Generic.Create();
                    LocalMethod();
                }
            }
            ```
            Assert: call edges where the object name matches an import key have
            provenance "ast_resolved" and confidence 0.85. Call edge for LocalMethod
            has provenance "ast_inferred" and confidence 0.7.

            **TestCSharpExtractor_ImportResolution_Static**: Test static using resolution:
            ```csharp
            using static System.Console;
            using static MyApp.Helpers.StringHelper;

            public class App
            {
                public void Run()
                {
                    Console.WriteLine("hello");
                    StringHelper.Format("test");
                }
            }
            ```
            Assert: Console and StringHelper resolve through the static import map.

            **TestCSharpExtractor_ImportResolution_NoMatch**: Test that calls on
            unresolved objects stay at ast_inferred:
            ```csharp
            public class App
            {
                public void Run()
                {
                    unknownService.DoWork();
                }
            }
            ```
            Assert: call edge has provenance "ast_inferred" and confidence 0.7.

            ## Constraints
            - Do NOT modify files outside your ownership list (csharpextractor/ only)
            - Do NOT change the behavior of existing edges that do not match import resolution
              (all non-import-resolved edges must retain provenance "ast_inferred" and confidence 0.7)
            - Do NOT add stub definitions or types from the javaextractor package
            - Preserve all existing test behavior; new tests are additive

            ## Verification
            ```bash
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go build ./internal/indexer/csharpextractor/...
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go vet ./internal/indexer/csharpextractor/...
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go test ./internal/indexer/csharpextractor/ -v -timeout 60s
            ```

            Postconditions:
            ```bash
            # buildCSharpImportMap function/method exists
            grep -c "buildCSharpImportMap" /Users/dayna.blackwell/code/knowing/internal/indexer/csharpextractor/extractor.go
            # Expected: >= 1

            # ast_resolved provenance is used
            grep -c "ast_resolved" /Users/dayna.blackwell/code/knowing/internal/indexer/csharpextractor/extractor.go
            # Expected: >= 1

            # 0.85 confidence is used
            grep -c "0.85" /Users/dayna.blackwell/code/knowing/internal/indexer/csharpextractor/extractor.go
            # Expected: >= 1

            # Import resolution test exists
            grep -c "TestCSharpExtractor_ImportResolution" /Users/dayna.blackwell/code/knowing/internal/indexer/csharpextractor/extractor_test.go
            # Expected: >= 1
            ```
          files:
            - internal/indexer/csharpextractor/extractor.go
            - internal/indexer/csharpextractor/extractor_test.go
