interface_contracts:
    - name: buildJavaImportMap
      description: |
        Extracts all import declarations from a Java AST root and builds a map
        from simple class/type names to their fully-qualified package path.
        Handles: import com.pkg.Class (maps "Class" -> "com.pkg"),
        import static com.pkg.Class.method (maps "Class" -> "com.pkg").
        Wildcard imports (import com.pkg.*) are skipped (cannot resolve individual names).
      definition: |
        func buildJavaImportMap(root *sitter.Node, opts types.ExtractOptions) map[string]string
      location: internal/indexer/javaextractor/extractor.go
    - name: resolveMethodInvocationWithImports (Java)
      description: |
        Enhanced version of extractMethodInvocation that accepts the import map.
        When a method_invocation has an object node whose name matches an imported
        class (capitalized first letter = class reference heuristic), resolves the
        target hash against the import's qualified path instead of the local pkgPath.
        Uses provenance "ast_resolved" and confidence 0.85 for import-resolved edges;
        falls back to "ast_inferred" / 0.7 for unresolved edges.
      definition: |
        func extractMethodInvocationWithImports(node *sitter.Node, opts types.ExtractOptions, pkgPath string, sourceHash types.Hash, javaImports map[string]string) *types.Edge
      location: internal/indexer/javaextractor/extractor.go
    - name: buildCSharpImportMap
      description: |
        Extracts all using directives from a C# AST and builds a map from the
        last segment of each namespace to the full namespace path.
        Handles: using Namespace.Sub (maps "Sub" -> "Namespace.Sub"),
        using static Namespace.Class (maps "Class" -> "Namespace.Class").
        For standard using directives, maps the last dot-separated segment.
      definition: |
        func buildCSharpImportMap(root *sitter.Node, opts types.ExtractOptions) map[string]string
      location: internal/indexer/csharpextractor/extractor.go
    - name: resolveInvocationWithImports (C#)
      description: |
        Enhanced version of extractInvocationEdge that accepts the import map.
        When an invocation_expression has a member_access_expression whose object
        name matches an imported class/namespace (capitalized first letter heuristic),
        resolves the target hash against the import's qualified path.
        Uses provenance "ast_resolved" and confidence 0.85 for import-resolved edges;
        falls back to "ast_inferred" / 0.7 for unresolved edges.
      definition: |
        func (e *CSharpExtractor) extractInvocationEdgeWithImports(node *sitter.Node, opts types.ExtractOptions, parentContext string, sourceHash types.Hash, csharpImports map[string]string) *types.Edge
      location: internal/indexer/csharpextractor/extractor.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Goal
            Add cross-file import resolution to the Java extractor following the established
            Rust pattern in internal/indexer/rustextractor/extractor.go.

            ## Reference Implementation
            Read internal/indexer/rustextractor/extractor.go for the full pattern:
            - buildRustImportMap (line 752): extracts use declarations, returns map[string]string
            - resolveCallEdgeWithImports (line 535): resolves call targets through import map
            - resolveRustModulePath (line 828): converts module path to file-system path

            ## Implementation Steps

            ### 1. Add buildJavaImportMap function

            Add a new function that walks the AST root's top-level children looking for
            "import_declaration" nodes and builds a map[string]string from simple class name
            to qualified package path.

            Rules:
            - `import com.example.service.UserService;` -> map["UserService"] = "com.example.service"
            - `import static com.example.util.StringHelper.format;` -> map["StringHelper"] = "com.example.util"
            - `import com.example.model.*;` -> SKIP (wildcard, cannot resolve individual names)
            - The key is the last segment before the final `.` for regular imports
            - For static imports, the key is the class name (second-to-last segment after removing method)

            Algorithm:
            ```
            for each child of root:
              if child.Type() == "import_declaration":
                text = child text content
                trim "import ", "static ", and ";"
                if ends with ".*": skip
                lastDot = last index of "."
                if lastDot < 0: skip
                simpleName = text[lastDot+1:]
                packagePath = text[:lastDot]
                // For static imports, the simpleName is the method; we want the class
                if isStaticImport:
                  secondLastDot = lastIndex of "." in packagePath
                  className = packagePath[secondLastDot+1:]
                  classPackage = packagePath[:secondLastDot]
                  map[className] = classPackage
                else:
                  map[simpleName] = packagePath
            ```

            ### 2. Add extractMethodInvocationWithImports function

            Create a new function that enhances the existing extractMethodInvocation.
            When the method_invocation has an "object" field node:
            - Get the object name
            - Check if the first character is uppercase (class reference heuristic)
            - If yes, look up objectName in javaImports map
            - If found, use the import path as targetBasePath (replacing pkgPath for the target hash)
            - Set provenance to "ast_resolved" and confidence to 0.85

            The function signature:
            ```go
            func extractMethodInvocationWithImports(node *sitter.Node, opts types.ExtractOptions, pkgPath string, sourceHash types.Hash, javaImports map[string]string) *types.Edge
            ```

            ### 3. Add walkForCallsWithImports and extractCallEdgesWithImports

            Following the Rust pattern, create import-aware variants:
            ```go
            func extractCallEdgesWithImports(node *sitter.Node, opts types.ExtractOptions, pkgPath string, sourceHash types.Hash, javaImports map[string]string) []types.Edge

            func walkForCallsWithImports(node *sitter.Node, opts types.ExtractOptions, pkgPath string, sourceHash types.Hash, javaImports map[string]string, edges *[]types.Edge)
            ```

            walkForCallsWithImports should:
            - For "method_invocation": call extractMethodInvocationWithImports
            - For "object_creation_expression": call extractObjectCreation (unchanged; new() is always local)
            - Recurse into children

            ### 4. Wire import map into Extract function

            In the Extract function, after extracting the Java package:
            ```go
            // Build Java import map for cross-file call resolution.
            javaImports := buildJavaImportMap(root, opts)
            ```

            Then modify extractClassDecl (and through it extractMethodDecl and extractConstructorDecl)
            to pass javaImports through to the call edge extraction.

            The cleanest approach: add javaImports parameter to extractClassDecl, extractMethodDecl,
            and extractConstructorDecl. In the method body walking, replace:
            ```go
            callEdges := extractCallEdges(body, opts, pkgPath, nodeHash)
            ```
            with:
            ```go
            callEdges := extractCallEdgesWithImports(body, opts, pkgPath, nodeHash, javaImports)
            ```

            ### 5. Add tests

            Add these test functions to extractor_test.go:

            **TestJavaExtractor_ImportResolution**: Test that method calls on imported classes
            get provenance "ast_resolved" and confidence 0.85:
            ```java
            import com.example.service.UserService;
            import com.example.util.StringHelper;

            public class App {
                public void run() {
                    UserService.findAll();
                    StringHelper.format("test");
                    localMethod();
                }
            }
            ```
            Assert: call edges for UserService.findAll and StringHelper.format have
            provenance "ast_resolved" and confidence 0.85. Call edge for localMethod
            has provenance "ast_inferred" and confidence 0.7.

            **TestJavaExtractor_ImportResolution_Static**: Test static import resolution:
            ```java
            import static com.example.util.MathHelper.calculate;

            public class App {
                public void run() {
                    MathHelper.doWork();
                }
            }
            ```
            Assert: MathHelper resolves through the static import map.

            **TestJavaExtractor_ImportResolution_Wildcard**: Test that wildcard imports
            do NOT resolve (stay at ast_inferred):
            ```java
            import com.example.model.*;

            public class App {
                public void run() {
                    User.create();
                }
            }
            ```
            Assert: call edge for User.create has provenance "ast_inferred" (not resolved).

            ## Constraints
            - Do NOT modify files outside your ownership list (javaextractor/ only)
            - Do NOT change the behavior of existing edges that do not match import resolution
              (all non-import-resolved edges must retain provenance "ast_inferred" and confidence 0.7)
            - Do NOT add stub definitions or types from the csharpextractor package
            - Preserve all existing test behavior; new tests are additive

            ## Verification
            ```bash
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go build ./internal/indexer/javaextractor/...
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go vet ./internal/indexer/javaextractor/...
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go test ./internal/indexer/javaextractor/ -v -timeout 60s
            ```

            Postconditions:
            ```bash
            # buildJavaImportMap function exists
            grep -c "func buildJavaImportMap" /Users/dayna.blackwell/code/knowing/internal/indexer/javaextractor/extractor.go
            # Expected: 1

            # ast_resolved provenance is used
            grep -c "ast_resolved" /Users/dayna.blackwell/code/knowing/internal/indexer/javaextractor/extractor.go
            # Expected: >= 1

            # 0.85 confidence is used
            grep -c "0.85" /Users/dayna.blackwell/code/knowing/internal/indexer/javaextractor/extractor.go
            # Expected: >= 1

            # Import resolution test exists
            grep -c "TestJavaExtractor_ImportResolution" /Users/dayna.blackwell/code/knowing/internal/indexer/javaextractor/extractor_test.go
            # Expected: >= 1
