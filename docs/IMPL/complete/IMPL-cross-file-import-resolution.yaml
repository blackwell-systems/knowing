title: Cross-File Import Resolution for Java and C# Extractors
feature_slug: cross-file-import-resolution
verdict: SUITABLE
suitability_assessment: |
    Suitability gate analysis:

    1. File decomposition: YES. Two independent extractor packages (javaextractor, csharpextractor)
       each need their own buildImportMap and resolveCallEdgeWithImports functions. Each package
       has its own extractor.go and extractor_test.go. The packages share no code between them;
       only the established Rust pattern is referenced as a template.

    2. Investigation-first items: NONE. The Rust implementation is fully shipped and serves as
       the reference. The pattern is clear: (1) build import map from top-level declarations,
       (2) pass map into call edge extraction, (3) resolve first segment of call target through
       the import map.

    3. Interface discoverability: YES. The interface contract is defined by the Rust reference:
       buildXImportMap returns map[string]string, resolveCallEdgeWithImports accepts that map
       and uses provenance "ast_resolved" with confidence 0.85 for resolved edges. Both agents
       can implement independently without coordination.

    4. Pre-implementation status check: Both extractors currently have NO import resolution.
       All call edges use provenance "ast_inferred" at confidence 0.7. This is greenfield
       addition to existing extractors.

    5. Parallelization value: HIGH. Two fully independent agents in a single wave. The build/test
       cycle is >30s (go test ./... with tree-sitter). Each agent modifies 2 files (extractor.go
       + extractor_test.go) in separate packages. Zero inter-agent dependencies.

    Estimated times:
    - Scout phase: ~5 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~8 min (2 agents x 8 min avg, fully parallel = 8 min wall)
    - Merge and verification: ~3 min
    Total Polywave time: ~16 min

    Sequential baseline: ~18 min (2 agents x 8 min + 2 min overhead)
    Time savings: ~2 min (11% faster)

    Recommendation: Clear coordination value. Agents are fully independent (single wave),
    and the IMPL doc serves as a spec ensuring both follow the established Rust pattern
    consistently. The primary value is parallel execution plus consistent specification.
