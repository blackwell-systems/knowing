               Implementation strategy for both methods:
               a. Begin a transaction.
               b. Create a temporary table: `CREATE TEMP TABLE _gc_keep (hash BLOB PRIMARY KEY)`.
               c. Batch-insert all hashes from the keep set into the temp table (use prepared
                  statement, insert in batches of 500 for performance).
               d. Execute `DELETE FROM nodes WHERE node_hash NOT IN (SELECT hash FROM _gc_keep)`
                  (or `edges` / `edge_hash` for edges).
               e. Get rows affected via `result.RowsAffected()`.
               f. Drop the temp table: `DROP TABLE IF EXISTS _gc_keep`.
               g. Commit and return rows affected.

