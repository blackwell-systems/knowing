               package snapshot

               import "github.com/blackwell-systems/knowing/internal/types"

               // VerifyError represents a single integrity check finding.
               type VerifyError struct {
                   Level   string     // "ERROR" or "WARN"
                   Kind    string     // "dangling_edge", "hash_mismatch", "broken_chain", "missing_file"
                   Hash    types.Hash // hash of the entity with the issue
                   Message string     // human-readable description
               }
               ```

            2. Implement `Verify` on SnapshotManager:
               ```go
               // Verify performs integrity verification on a repo's graph.
               // Checks: edge referential integrity, hash recomputation, snapshot chain continuity.
               func (sm *SnapshotManager) Verify(ctx context.Context, repoHash types.Hash) ([]VerifyError, error)
               ```

               The method performs these checks:

               a. **Edge referential integrity**: Get all nodes for the repo via
                  `sm.store.NodesByName(ctx, repo.RepoURL)` (same pattern as
                  collectRepoEdgesHierarchical). For each node, get edges via
                  `sm.store.EdgesFrom(ctx, node.NodeHash, "")`. For each edge, verify
                  that `edge.SourceHash` and `edge.TargetHash` both have corresponding
                  nodes via `sm.store.GetNode()`. If GetNode returns nil, append a
                  VerifyError with Level="ERROR", Kind="dangling_edge",
                  Message="edge <edgeHash> references non-existent node <missingHash>".

               b. **Hash recomputation (edges)**: For each edge, call
                  `types.VerifyEdgeHash(edge)`. If it returns an error, append
                  VerifyError with Level="ERROR", Kind="hash_mismatch",
                  Message=err.Error().

               c. **Node hash verification**: For each node, extract repoURL from
                  the repo object and packagePath from the qualified name using the
                  `extractPackagePath` function (which now returns an error; skip
                  verification for nodes where extractPackagePath fails). Call
                  `types.VerifyNodeHash(node, repoURL, packagePath)`. On mismatch,
                  append VerifyError with Level="WARN", Kind="hash_mismatch"
                  (WARN because the node may pre-date the domain-prefix migration).

               d. **Snapshot chain continuity**: Walk the snapshot chain via
                  `sm.walkChain(ctx, repoHash)`. For each snapshot (except the first
                  in the chain, which has a zero ParentHash), verify `snap.ParentHash`
                  points to an existing snapshot by checking it appears in the chain.
                  Note: walkChain already walks the full chain, so a broken link would
                  cause walkChain itself to stop. Instead, check: for each snapshot,
                  if `!snap.ParentHash.IsZero()`, call
                  `sm.store.GetSnapshot(ctx, snap.ParentHash)`. If it returns nil,
                  append VerifyError with Level="ERROR", Kind="broken_chain",
                  Message="snapshot <snapHash> parent <parentHash> not found".

