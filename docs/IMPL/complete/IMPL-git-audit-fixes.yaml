               f. Print results: for each VerifyError, print to stderr:
                  `fmt.Fprintf(os.Stderr, "[%s] %s: %s (hash: %s)\n", ve.Level, ve.Kind, ve.Message, ve.Hash)`.
               g. Print a summary: `fmt.Printf("Checked N repos: X errors, Y warnings\n")`.
               h. If any ERROR-level findings exist, return `fmt.Errorf("integrity check failed: %d errors found", errorCount)`.

            **File: cmd/knowing/main.go**

            5. Register the `fsck` subcommand in the `run` function. Find this exact text:
