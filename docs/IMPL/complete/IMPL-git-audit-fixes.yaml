interface_contracts:
    - name: ComputeNodeHash (updated with domain prefix)
      description: |
        Add "node\0" domain prefix to node hash computation. The hash formula
        becomes: SHA-256("node" + NUL + repoURL + NUL + packagePath + NUL + symbolName + NUL + symbolKind).
        WARNING: This changes all node hash values. Existing databases must be re-indexed.
      definition: |
        func ComputeNodeHash(repoURL, packagePath string, _ Hash, symbolName, symbolKind string) Hash {
            data := fmt.Sprintf("node\x00%s\x00%s\x00%s\x00%s", repoURL, packagePath, symbolName, symbolKind)
            return NewHash([]byte(data))
        }
      location: internal/types/types.go
    - name: ComputeEdgeHash (updated with domain prefix)
      description: |
        Add "edge\0" domain prefix to edge hash computation. The hash formula
        becomes: SHA-256("edge" + NUL + sourceHash + NUL + targetHash + NUL + edgeType + NUL + provenance).
      definition: |
        func ComputeEdgeHash(sourceHash, targetHash Hash, edgeType, provenanceJSON string) Hash {
            data := fmt.Sprintf("edge\x00%s\x00%s\x00%s\x00%s", sourceHash, targetHash, edgeType, provenanceJSON)
            return NewHash([]byte(data))
        }
      location: internal/types/types.go
    - name: ComputeSnapshotHash
      description: |
        New function that wraps a Merkle root with a "snapshot\0" domain prefix.
        Called from snapshot/manager.go instead of using the raw Merkle root as
        the snapshot hash.
      definition: |
        func ComputeSnapshotHash(merkleRoot Hash) Hash {
            data := append([]byte("snapshot\x00"), merkleRoot[:]...)
            return NewHash(data)
        }
      location: internal/types/types.go
    - name: ComputeMerkleNodeHash
      description: |
        New function used inside merkle.go combineHashes to prefix Merkle interior
        node hashes with "merkle\0".
      definition: |
        func ComputeMerkleNodeHash(left, right Hash) Hash {
            var buf [71]byte
            copy(buf[:7], "merkle\x00")
            copy(buf[7:39], left[:])
            copy(buf[39:71], right[:])
            return NewHash(buf[:])
        }
      location: internal/types/types.go
    - name: VerifyNodeHash
      description: |
        Recomputes a node's hash from its stored fields and compares to the stored hash.
        Returns nil on match, descriptive error on mismatch.
      definition: |
        func VerifyNodeHash(n Node, repoURL, packagePath string) error
      location: internal/types/verify.go
    - name: VerifyEdgeHash
      description: |
        Recomputes an edge's hash from its stored fields and compares to the stored hash.
        Returns nil on match, descriptive error on mismatch.
      definition: |
        func VerifyEdgeHash(e Edge) error
      location: internal/types/verify.go
    - name: extractPackagePath (updated with error return)
      description: |
        Returns (packagePath, error) instead of bare string. Returns a non-nil error
        when the qualified name does not contain "://" or does not have a dot-separated
        symbol after the package path. Callers skip the edge and log a warning.
      definition: |
        func extractPackagePath(qualifiedName string) (string, error)
      location: internal/snapshot/manager.go
    - name: DeleteNodesNotIn
      description: |
        Deletes all node rows whose node_hash is not in the provided set.
        Uses a temporary table for efficient NOT IN checking with large sets.
      definition: |
        func (s *SQLiteStore) DeleteNodesNotIn(ctx context.Context, keep map[types.Hash]struct{}) (int64, error)
      location: internal/store/gc.go
    - name: DeleteEdgesNotIn
      description: |
        Deletes all edge rows whose edge_hash is not in the provided set.
        Uses a temporary table for efficient NOT IN checking with large sets.
      definition: |
        func (s *SQLiteStore) DeleteEdgesNotIn(ctx context.Context, keep map[types.Hash]struct{}) (int64, error)
      location: internal/store/gc.go
    - name: VerifyError
      description: |
        Struct representing a single integrity check finding.
      definition: |
        type VerifyError struct {
            Level   string // "ERROR" or "WARN"
            Kind    string // "dangling_edge", "hash_mismatch", "broken_chain", "missing_file"
            Hash    Hash   // hash of the entity with the issue
            Message string // human-readable description
        }
      location: internal/snapshot/verify.go
    - name: Verify
      description: |
        Performs integrity verification on a repo's graph: edge referential integrity,
        hash recomputation, snapshot chain continuity.
      definition: |
        func (sm *SnapshotManager) Verify(ctx context.Context, repoHash types.Hash) ([]VerifyError, error)
      location: internal/snapshot/verify.go
    - name: IntegrityCheck
      description: |
        Runs PRAGMA integrity_check on the SQLite database.
        Returns nil if the database is healthy, or an error with the first
        corruption message found.
      definition: |
        func (s *SQLiteStore) IntegrityCheck(ctx context.Context) error
      location: internal/store/sqlite.go
    - name: AcquireLockfile / ReleaseLockfile
      description: |
        Lockfile management to prevent multiple daemon instances on the same database.
        AcquireLockfile creates <dbPath>.lock with the current PID using O_CREAT|O_EXCL.
        If the file exists and the PID is alive, returns an error.
        ReleaseLockfile removes the lockfile.
      definition: |
        func AcquireLockfile(dbPath string) error
        func ReleaseLockfile(dbPath string)
      location: internal/daemon/lockfile.go
