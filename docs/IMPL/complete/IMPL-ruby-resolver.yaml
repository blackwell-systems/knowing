          files:
            - internal/typresolve/ruby/doc.go
            - internal/typresolve/ruby/requires.go
            - internal/typresolve/ruby/constants.go
            - internal/typresolve/ruby/requires_test.go
        - id: B
          task: |
            ## Agent B: Builtins and Mixin/Method Lookup

            Build the builtin function/type handling, attr_accessor method
            generation recognition, and MRO-based method/attribute lookup for
            the Ruby resolver.

            ### What to implement

            **File 1: `internal/typresolve/ruby/builtins.go`**
            Package: `rubyresolve`

            Implement Ruby builtin recognition. Unlike Go, Ruby has no static
            type system, so builtins are recognized by name for method dispatch.

            Implement:

            - `IsBuiltinFunc(name string) bool`
              Return true for Ruby builtin methods and Kernel methods that are
              available everywhere:
              puts, print, p, pp, printf, sprintf, gets, warn,
              raise, fail, throw, catch,
              require, require_relative, load, autoload,
              lambda, proc, block_given?, iterator?,
              loop, sleep, exit, abort, at_exit,
              rand, srand,
              open, select,
              freeze, frozen?, dup, clone, taint, untaint, tainted?,
              respond_to?, send, public_send, method, __send__, __method__,
              is_a?, kind_of?, instance_of?, nil?, class, object_id, hash, equal?,
              define_method, alias_method, method_defined?,
              attr_reader, attr_writer, attr_accessor,
              include, extend, prepend,
              public, private, protected, module_function,
              Array, Hash, String, Integer, Float, Rational, Complex

            - `IsBuiltinType(name string) bool`
              Return true for Ruby core classes and modules:
              Object, BasicObject, Kernel, Module, Class,
              String, Integer, Float, Numeric, Complex, Rational,
              Array, Hash, Set, Range, Regexp, MatchData,
              Symbol, NilClass, TrueClass, FalseClass,
              IO, File, Dir, Pathname,
              Proc, Method, UnboundMethod,
              Thread, Mutex, Fiber, Ractor,
              Enumerable, Comparable, Enumerator,
              Exception, StandardError, RuntimeError, TypeError, ArgumentError,
              NameError, NoMethodError, ZeroDivisionError, IOError, Errno,
              Struct, OpenStruct, Data,
              Time, Date, DateTime,
              Encoding, Marshal, ObjectSpace, GC

            - `ResolveBuiltinType(name string) *typresolve.Type`
              If IsBuiltinType(name), return typresolve.Named("Ruby::" + name).
              Otherwise return nil.
              The "Ruby::" prefix distinguishes Ruby builtins from user types
              in the registry namespace.

            - `EvalBuiltinCall(name string, args *sitter.Node, content []byte, ctx interface{}) *typresolve.Type`
              Evaluate return types of common Ruby builtin methods:
              - `puts`, `print`, `p`, `warn`: return typresolve.Named("Ruby::NilClass")
              - `gets`: return typresolve.Named("Ruby::String")
              - `rand`: return typresolve.Named("Ruby::Float")
              - `lambda`, `proc`: return typresolve.Named("Ruby::Proc")
              - `Array(x)`: return typresolve.Named("Ruby::Array")
              - `Hash(x)`: return typresolve.Named("Ruby::Hash")
              - `String(x)`: return typresolve.Named("Ruby::String")
              - `Integer(x)`: return typresolve.Named("Ruby::Integer")
              - `Float(x)`: return typresolve.Named("Ruby::Float")
              - `freeze`, `dup`, `clone`: return typresolve.Unknown() (returns self)
              - `is_a?`, `kind_of?`, `instance_of?`, `nil?`, `respond_to?`,
                `frozen?`, `tainted?`, `equal?`, `block_given?`, `iterator?`:
                return typresolve.Named("Ruby::TrueClass") (boolean approximation)
              - `class`: return typresolve.Named("Ruby::Class")
              - `object_id`, `hash`: return typresolve.Named("Ruby::Integer")
              - `method`: return typresolve.Named("Ruby::Method")
              - `__method__`: return typresolve.Named("Ruby::Symbol")
              - Default: return typresolve.Unknown()

              The `ctx interface{}` parameter is unused for now but allows future
              extension to pass the ResolveContext for richer inference.

            **File 2: `internal/typresolve/ruby/methods.go`**
            Package: `rubyresolve`

            Implement method and attribute lookup following Ruby's method resolution
            order (MRO). Ruby's MRO for a class C with `include M1, M2` is:
            C -> M2 -> M1 -> superclass -> ... -> Object -> Kernel -> BasicObject

            In the registry, included/extended modules are stored as EmbeddedTypes
            on RegisteredType, similar to Go's embedded fields.

            Implement:

            - `LookupAttribute(reg *typresolve.Registry, typeQN string, memberName string) *typresolve.RegisteredFunc`
              Internal helper with depth limit (max 8, Ruby MRO can be deeper than Go):
              1. Direct method lookup: `reg.LookupMethod(typeQN, memberName)` - if found, return
              2. Get type: `reg.LookupType(typeQN)` - if nil, return nil
              3. Follow alias: if `type.AliasOf != ""`, recurse with alias target
              4. Check embedded types (included modules + superclass): for each
                 `type.EmbeddedTypes[i]`, recurse with depth+1
              5. Return nil if not found

            - `LookupAttrAccessor(reg *typresolve.Registry, typeQN string, memberName string) *typresolve.RegisteredFunc`
              Check if memberName is an accessor method:
              1. Try exact method lookup (attr_reader generates a getter with the
                 attribute name, attr_writer generates "name=", attr_accessor generates both)
              2. For reader: look up memberName as a method on typeQN
              3. For writer: look up memberName + "=" as a method on typeQN
              4. If not found directly, delegate to LookupAttribute for MRO traversal
              5. Return nil if not found

              Note: The registry builder (wave 2, Agent D) will register
              attr_reader/attr_writer/attr_accessor generated methods as synthetic
              RegisteredFunc entries during InitWorkspace. This function just looks
              them up.

            - `ResolveNew(reg *typresolve.Registry, typeQN string) *typresolve.RegisteredFunc`
              When `ClassName.new` is called, Ruby dispatches to `initialize`.
              Look up the `initialize` method on typeQN via LookupAttribute.
              Return it if found, nil otherwise.

            **File 3: `internal/typresolve/ruby/builtins_test.go`**
            Package: `rubyresolve`

            Test cases:

            - `TestIsBuiltinFunc`: true for "puts", "lambda", "attr_reader", "include";
              false for "my_method", "calculate"
            - `TestIsBuiltinType`: true for "String", "Array", "Hash", "Enumerable",
              "Kernel"; false for "User", "ApplicationController"
            - `TestResolveBuiltinType`: returns Named("Ruby::String") for "String";
              nil for "User"
            - `TestEvalBuiltinCall_Puts`: returns Named("Ruby::NilClass")
            - `TestEvalBuiltinCall_Lambda`: returns Named("Ruby::Proc")
            - `TestEvalBuiltinCall_ArrayConversion`: `Array(x)` returns Named("Ruby::Array")
            - `TestEvalBuiltinCall_IsA`: returns Named("Ruby::TrueClass")
            - `TestLookupAttribute_DirectMethod`: register type with method, find it
            - `TestLookupAttribute_ViaInclude`: register class including module,
              module has method, find method on class
            - `TestLookupAttribute_ViaInheritance`: register class with superclass
              (in EmbeddedTypes[0]), superclass has method, find method on subclass
            - `TestLookupAttribute_DepthLimit`: chain of 10 includes, stops at depth 8
            - `TestLookupAttribute_NotFound`: returns nil for missing method
            - `TestLookupAttrAccessor_Reader`: register getter method, find it
            - `TestLookupAttrAccessor_Writer`: register "name=" method, look up
              write accessor
            - `TestResolveNew`: register type with initialize method, ResolveNew
              returns it

            For testing, build Registry manually with AddFunc and AddType.

            ### Interfaces consumed
