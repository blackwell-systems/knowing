interface_contracts:
    - name: ResolveRequire
      description: |
        Resolves a require or require_relative path to a file-level qualified
        name. For require, maps gem paths (e.g. "active_record") to module
        paths. For require_relative, resolves relative to the current file.
        Returns the resolved module path and whether resolution succeeded.
      definition: |
        func ResolveRequire(requirePath string, currentFile string, isRelative bool) (string, bool)
      location: internal/typresolve/ruby/requires.go
    - name: BuildRequireMap
      description: |
        Builds a per-file require map from the Ruby AST root. Walks top-level
        call nodes for require/require_relative, extracts string arguments,
        and resolves paths. Returns map[localBinding]modulePath.
      definition: |
        func BuildRequireMap(root *sitter.Node, content []byte, currentFile string) map[string]string
      location: internal/typresolve/ruby/requires.go
    - name: ResolveConstant
      description: |
        Resolves a Ruby constant path (Module::Class::CONST) relative to the
        current nesting context. Walks the nesting chain outward, then checks
        top-level. Returns the fully qualified constant name.
      definition: |
        func ResolveConstant(constPath string, nesting []string) string
      location: internal/typresolve/ruby/constants.go
    - name: ParseScopeResolution
      description: |
        Parses a scope_resolution tree-sitter node into its component parts.
        Handles nested scope resolution (A::B::C) by walking the tree
        recursively. Returns the fully qualified constant string.
      definition: |
        func ParseScopeResolution(node *sitter.Node, content []byte) string
      location: internal/typresolve/ruby/constants.go
    - name: IsBuiltinFunc
      description: |
        Returns true if the given name is a Ruby builtin method/function
        (puts, print, p, require, require_relative, raise, lambda, proc,
        attr_reader, attr_writer, attr_accessor, include, extend, prepend,
        freeze, dup, clone, respond_to?, send, method, is_a?, kind_of?,
        instance_of?, class, nil?, etc.).
      definition: |
        func IsBuiltinFunc(name string) bool
      location: internal/typresolve/ruby/builtins.go
    - name: IsBuiltinType
      description: |
        Returns true if the given name is a Ruby builtin class/module
        (Object, String, Integer, Float, Array, Hash, Symbol, NilClass,
        TrueClass, FalseClass, Numeric, Comparable, Enumerable, Kernel,
        IO, File, Regexp, Range, Proc, Method, Module, Class, BasicObject,
        Struct, Exception, StandardError, etc.).
      definition: |
        func IsBuiltinType(name string) bool
      location: internal/typresolve/ruby/builtins.go
    - name: ResolveBuiltinType
      description: |
        Returns a typresolve.Named type if the name is a Ruby builtin class,
        nil otherwise. Uses "Ruby::" prefix for builtin qualified names
        (e.g. "Ruby::String", "Ruby::Array").
      definition: |
        func ResolveBuiltinType(name string) *typresolve.Type
      location: internal/typresolve/ruby/builtins.go
    - name: LookupAttribute
      description: |
        Looks up a method or attribute on a named type, following the Ruby
        ancestor chain (include/extend/prepend stored as EmbeddedTypes)
        up to 8 levels deep. Returns the registered function if found.
        This is the Ruby equivalent of Go's LookupFieldOrMethod, following
        Ruby's MRO (method resolution order).
      definition: |
        func LookupAttribute(reg *typresolve.Registry, typeQN string, memberName string) *typresolve.RegisteredFunc
      location: internal/typresolve/ruby/methods.go
    - name: LookupAttrAccessor
      description: |
        Checks if a member name corresponds to an attr_reader/attr_writer/
        attr_accessor-generated method on the type. These are stored as
        methods with synthetic signatures in the registry. Returns the
        registered function if found, nil otherwise.
      definition: |
        func LookupAttrAccessor(reg *typresolve.Registry, typeQN string, memberName string) *typresolve.RegisteredFunc
      location: internal/typresolve/ruby/methods.go
    - name: ResolveContext
      description: |
        Per-file resolution context holding the registry, scope, require
        map, current module/class nesting, content bytes, and enclosing
        method qualified name.
      definition: |
        type ResolveContext struct {
            Registry        *typresolve.Registry
            Scope           *typresolve.Scope
            Requires        map[string]string  // local binding -> module path
            Nesting         []string           // current module/class nesting stack
            CurrentFile     string             // current file path
            Content         []byte             // source file content
            EnclosingFuncQN string             // QN of the current method being resolved
        }
      location: internal/typresolve/ruby/eval.go
    - name: EvalExprType
      description: |
        Recursive expression type evaluator for Ruby. Evaluates the type of
        a Ruby expression AST node using scope lookup, registry lookup,
        constant resolution, and method dispatch.
      definition: |
        func EvalExprType(ctx *ResolveContext, node *sitter.Node) *typresolve.Type
      location: internal/typresolve/ruby/eval.go
    - name: ProcessStatement
      description: |
        Processes a Ruby statement node to bind variables into the current
        scope. Handles assignment (=), multiple assignment, for-in, and
        rescue clauses with exception variable binding.
      definition: |
        func ProcessStatement(ctx *ResolveContext, node *sitter.Node)
      location: internal/typresolve/ruby/scope_bind.go
    - name: RubyResolver
      description: |
        Implements typresolve.Resolver for Ruby. Language() returns "ruby".
        InitWorkspace builds a Registry from Ruby definitions (classes,
        modules, methods, constants). ResolveFile walks the Ruby AST and
        resolves calls and references.
      definition: |
        type RubyResolver struct {
            registry *typresolve.Registry
        }
        func NewRubyResolver() *RubyResolver
        func (r *RubyResolver) Language() string
        func (r *RubyResolver) InitWorkspace(ctx context.Context, defs []typresolve.ResolverDef) error
        func (r *RubyResolver) ResolveFile(ctx context.Context, opts typresolve.ResolveFileOpts) ([]types.Edge, error)
      location: internal/typresolve/ruby/resolver.go
    - name: BuildRegistry
      description: |
        Builds a typresolve.Registry from ResolverDef entries. Registers
        classes, modules, methods (instance and singleton), and constants.
        Processes include/extend/prepend edges to populate EmbeddedTypes
        for MRO-based attribute lookup.
      definition: |
        func BuildRegistry(defs []typresolve.ResolverDef) *typresolve.Registry
      location: internal/typresolve/ruby/registry_builder.go
    - name: ResolveCallsInFile
      description: |
        Walks a Ruby file's AST resolving call expressions and emitting
        edges. Uses the shared registry, per-file scope chain, require map,
        and constant resolution.
      definition: |
        func ResolveCallsInFile(ctx *ResolveContext, root *sitter.Node, fileHash types.Hash, repoURL string, filePath string) []types.Edge
      location: internal/typresolve/ruby/resolve.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A: Require Resolution and Constant Namespacing

            Build the foundational require/require_relative resolution and Ruby
            constant (module/class) namespacing for the Ruby resolver.

            ### What to implement

            **File 1: `internal/typresolve/ruby/doc.go`**
            Package doc comment for the `ruby` subpackage:
            ```go
            // Package rubyresolve implements the Ruby language in-process type resolver.
            // It implements the typresolve.Resolver interface, resolving Ruby method
            // calls and constant references using tree-sitter AST walking and a
            // shared type registry built from extracted definitions.
            package rubyresolve
            ```

            **File 2: `internal/typresolve/ruby/requires.go`**
            Package: `rubyresolve`

            Implement require/require_relative resolution for Ruby files. Ruby's
            require system maps gem/library names to file paths. For in-process
            resolution, we resolve require paths to module-level qualified names
            that match the registry's namespace convention.

            Implement:

            - `ResolveRequire(requirePath string, currentFile string, isRelative bool) (string, bool)`
              For require_relative: resolve relative to currentFile's directory.
              Strip ".rb" extension if present, normalize path separators.
              For require: return the path as-is (gem paths are already qualified).
              Returns (resolvedModulePath, true) on success, ("", false) on failure.

            - `BuildRequireMap(root *sitter.Node, content []byte, currentFile string) map[string]string`
              Walk top-level children of the AST root looking for `call` nodes where
              the method is "require" or "require_relative".

              For each require call:
              1. Get the `method` field child, check if it's "require" or "require_relative"
              2. Get the `arguments` field child
              3. Extract the first string argument (walk arguments children, find "string"
                 node type, get content, trim quotes)
              4. Call ResolveRequire with isRelative=(method == "require_relative")
              5. Map the last path segment (or full path) as the local binding

              The Ruby tree-sitter grammar represents `require "foo"` as:
              ```
              (call
                method: (identifier) "require"
                arguments: (argument_list
                  (string (string_content) "foo")))
              ```

              Note: tree-sitter Ruby uses `string_content` as a child of `string`.
              To get the actual string value, find the `string_content` child inside
              the `string` node. The existing Ruby extractor at
              `internal/indexer/rubyextractor/extractor.go` (function extractFirstStringArg,
              lines 792-805) demonstrates the pattern: it walks `arguments` children
              looking for `string` type and trims quotes from the full `string` node content.
              However, the more reliable approach is to find the `string_content` child:
              ```go
              func extractStringContent(strNode *sitter.Node, content []byte) string {
                  for i := 0; i < int(strNode.ChildCount()); i++ {
                      child := strNode.Child(i)
                      if child.Type() == "string_content" {
                          return child.Content(content)
                      }
                  }
                  // Fallback: trim quotes from full node content.
                  val := strNode.Content(content)
                  return strings.Trim(val, `"'`)
              }
              ```

              Return map: last segment of require path -> full resolved module path.
              E.g., `require "active_record/base"` -> map["base"] = "active_record/base"
              Also map the full path: map["active_record/base"] = "active_record/base"

            **File 3: `internal/typresolve/ruby/constants.go`**
            Package: `rubyresolve`

            Implement Ruby constant and namespace resolution. Ruby constants use
            the `::` separator for namespacing (Module::Class::CONST).

            Implement:

            - `ParseScopeResolution(node *sitter.Node, content []byte) string`
              Parse a `scope_resolution` tree-sitter node into its fully qualified
              string. The node has children: `scope` (left side) and `name` (right side).

              Tree-sitter Ruby represents `A::B::C` as nested scope_resolution:
              ```
              (scope_resolution
                scope: (scope_resolution
                  scope: (constant) "A"
                  name: (constant) "B")
                name: (constant) "C")
              ```

              Algorithm:
              1. Get `scope` field child and `name` field child
              2. If scope is nil (top-level `::Foo`), return "::" + name content
              3. If scope is `scope_resolution`, recurse on scope, then append "::" + name
              4. If scope is `constant`, return scope content + "::" + name content
              5. Otherwise, return node.Content(content) as fallback

            - `ResolveConstant(constPath string, nesting []string) string`
              Resolve a constant path relative to the current nesting context.
              Ruby constant lookup walks outward from the current nesting:
              1. If constPath starts with "::", it's absolute: return constPath[2:]
              2. Try each nesting level from innermost to outermost:
                 - Join nesting[0:i] + constPath with "::"
              3. Fall back to constPath itself (top-level)

              Example: with nesting ["MyApp", "Models"], looking up "Base":
              - Try "MyApp::Models::Base"
              - Try "MyApp::Base"
              - Try "Base"
              Return the most specific match. Since we don't have a way to check
              existence at this stage (registry is used later), return the innermost
              candidate: nesting[0:len(nesting)] + constPath. The resolver in wave 2
              will check registry existence.

              Actually, for practical resolution: return the fully qualified name
              by joining the full nesting with the constant path. The registry
              builder will register types under their full nesting path, so lookups
              match. If the constant is not found with full nesting, the resolver
              falls back to progressively shorter prefixes.

            **File 4: `internal/typresolve/ruby/requires_test.go`**
            Package: `rubyresolve`

            Test cases:

            - `TestResolveRequire_Standard`: require "json" -> ("json", true)
            - `TestResolveRequire_Nested`: require "active_record/base" -> ("active_record/base", true)
            - `TestResolveRequire_Relative`: require_relative "../lib/helper" with
              currentFile="app/models/user.rb" -> ("app/lib/helper", true)
            - `TestResolveRequire_RelativeWithExtension`: require_relative "./foo.rb" strips .rb
            - `TestBuildRequireMap`: parse Ruby source with `require "json"` and
              `require_relative "../helper"`, verify map contents
            - `TestParseScopeResolution_Simple`: A::B -> "A::B"
            - `TestParseScopeResolution_Nested`: A::B::C -> "A::B::C"
            - `TestParseScopeResolution_TopLevel`: ::TopLevel -> "::TopLevel"
            - `TestResolveConstant_WithNesting`: nesting ["MyApp", "Models"], const "Base"
              -> "MyApp::Models::Base"
            - `TestResolveConstant_Absolute`: "::ActiveRecord::Base" -> "ActiveRecord::Base"
            - `TestResolveConstant_TopLevel`: no nesting, const "String" -> "String"

            For testing BuildRequireMap, parse Ruby source with tree-sitter:
            ```go
            func parseRuby(t *testing.T, src string) *sitter.Node {
                parser := sitter.NewParser()
                parser.SetLanguage(ruby.GetLanguage())
                tree, err := parser.ParseCtx(context.Background(), nil, []byte(src))
                require.NoError(t, err)
                t.Cleanup(func() { tree.Close() })
                return tree.RootNode()
            }
            ```

            ### Interfaces consumed
            - `sitter.Node` from `github.com/smacker/go-tree-sitter`
            - `ruby.GetLanguage()` from `github.com/smacker/go-tree-sitter/ruby`

            ### Constraints
            - Package name MUST be `rubyresolve`
            - Do NOT modify any files outside your ownership list.
            - Do NOT import from `internal/indexer/rubyextractor` (would create circular
              dependency risk). Reimplement require map and string extraction logic locally.
            - Do NOT define any types from builtins.go or eval.go (Agent B and C scope).

            ### Verification
            ```bash
            GOWORK=off go build ./internal/typresolve/ruby/...
            GOWORK=off go vet ./internal/typresolve/ruby/...
            GOWORK=off go test ./internal/typresolve/ruby/... -run TestResolveRequire -v
            GOWORK=off go test ./internal/typresolve/ruby/... -run TestParseScopeResolution -v
            GOWORK=off go test ./internal/typresolve/ruby/... -run TestResolveConstant -v
            ```

            Postconditions:
            ```bash
