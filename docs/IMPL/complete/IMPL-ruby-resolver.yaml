          task: |
            ## Agent C: Expression Evaluator and Scope Binding

            Build the expression type evaluator and statement-level scope binding
            for the Ruby resolver.

            ### What to implement

            **File 1: `internal/typresolve/ruby/eval.go`**
            Package: `rubyresolve`

            Define the resolution context and expression evaluator for Ruby.
            Ruby is dynamically typed, so type inference relies on:
            - Literal types (string, integer, symbol, array, hash)
            - Constructor calls (ClassName.new)
            - Scope tracking through assignments
            - Method return types from the registry

            Define the resolution context:
            ```go
            // ResolveContext holds per-file state for type resolution.
            type ResolveContext struct {
                Registry        *typresolve.Registry
                Scope           *typresolve.Scope
                Requires        map[string]string  // local binding -> module path
                Nesting         []string           // current module/class nesting stack
                CurrentFile     string             // current file path
                Content         []byte             // source file content
                EnclosingFuncQN string             // QN of the current method being resolved
            }
            ```

            Implement `EvalExprType(ctx *ResolveContext, node *sitter.Node) *typresolve.Type`

            Handle these Ruby expression node types:

            1. `identifier`:
               - Scope lookup: `ctx.Scope.Lookup(name)`
               - If found and not Unknown, return it
               - Check if it's a builtin: `IsBuiltinFunc(name)` (from builtins.go,
                 same package). If so, return Unknown (bare method reference).
               - Check if it's a local method in current class/module: look up in
                 registry using nesting. If nesting is non-empty, try
                 `ctx.Registry.LookupMethod(currentClassQN, name)` where
                 currentClassQN = last element of ctx.Nesting.
               - Default: return Unknown

            2. `constant`:
               - This is a Ruby constant reference (ClassName, ModuleName, CONSTANT).
               - Get name text from node
               - Check builtin type: `ResolveBuiltinType(name)` (from builtins.go)
               - If builtin, return it
               - Resolve constant in current nesting context:
                 `ResolveConstant(name, ctx.Nesting)` (from constants.go, Agent A)
               - Look up in registry: `ctx.Registry.LookupType(resolved)`
               - If found, return typresolve.Named(resolved)
               - Default: return typresolve.Named(name)

            3. `scope_resolution`:
               - Parse into qualified name: `ParseScopeResolution(node, ctx.Content)`
                 (from constants.go, Agent A)
               - Look up in registry as type
               - Return Named(qualifiedName)

            4. `call`:
               Ruby tree-sitter "call" node has: receiver, method, arguments, block.
               - Get `method` field child for the method name
               - Get `receiver` field child (may be nil for bare method calls)

               If receiver is nil (bare method call):
               - Check if builtin: `IsBuiltinFunc(methodName)`. If so, call
                 `EvalBuiltinCall(methodName, args, ctx.Content, nil)` (from builtins.go)
               - Look up as method in current class: if nesting non-empty,
                 `LookupAttribute(ctx.Registry, currentClassQN, methodName)`
                 (from methods.go, Agent B)
               - If found and has signature with returns, return first return type
               - Look up as package function: `ctx.Registry.LookupFunc(methodName)`
               - Default: return Unknown

               If receiver is present:
               - If receiver is `constant` and method is "new":
                 This is class instantiation: `ClassName.new(...)`
                 Resolve the constant to a type QN. Return Named(typeQN).
                 The edge should target the `initialize` method.
               - Evaluate receiver type recursively
               - If receiver type is Named, look up method:
                 `LookupAttribute(ctx.Registry, typeQN, methodName)` (from methods.go)
               - If found and has signature with returns, return first return type
               - Handle common Ruby method return types by name:
                 - `to_s`, `inspect`, `to_str`: return Named("Ruby::String")
                 - `to_i`, `to_int`: return Named("Ruby::Integer")
                 - `to_f`: return Named("Ruby::Float")
                 - `to_a`, `to_ary`, `entries`: return Named("Ruby::Array")
                 - `to_h`: return Named("Ruby::Hash")
                 - `to_sym`: return Named("Ruby::Symbol")
                 - `to_r`: return Named("Ruby::Rational")
                 - `to_c`: return Named("Ruby::Complex")
                 - `nil?`, `empty?`, `include?`, `respond_to?`, `is_a?`, `kind_of?`,
                   `instance_of?`, `frozen?`, `equal?`, `eql?`, `==`, `!=`, `===`:
                   return Named("Ruby::TrueClass") (boolean approximation)
                 - `size`, `length`, `count`, `index`, `rindex`, `object_id`, `hash`:
                   return Named("Ruby::Integer")
                 - `class`: return Named("Ruby::Class")
                 - `freeze`, `dup`, `clone`, `tap`, `then`, `yield_self`:
                   return receiver type (returns self)
                 - `map`, `collect`, `select`, `filter`, `reject`, `flat_map`,
                   `sort`, `sort_by`, `min_by`, `max_by`, `group_by`, `each_with_object`:
                   return Named("Ruby::Array")
                 - `each`, `each_with_index`, `each_slice`, `each_cons`:
                   return receiver type (returns self for chaining)
                 - `first`, `last`, `min`, `max`, `sample`, `find`, `detect`:
                   return Unknown (element type unknown without generics)
                 - `keys`: return Named("Ruby::Array")
                 - `values`: return Named("Ruby::Array")
                 - `merge`, `update`: return receiver type
               - Default: return Unknown

            5. `string`, `string_array`, `heredoc_body`:
               return Named("Ruby::String")

            6. `integer`:
               return Named("Ruby::Integer")

            7. `float`:
               return Named("Ruby::Float")

            8. `symbol`, `simple_symbol`:
               return Named("Ruby::Symbol")

            9. `true`, `false`:
               return Named("Ruby::TrueClass") / Named("Ruby::FalseClass")

            10. `nil`:
                return Named("Ruby::NilClass")

            11. `array`:
                return Named("Ruby::Array")

            12. `hash`:
                return Named("Ruby::Hash")

            13. `regex`:
                return Named("Ruby::Regexp")

            14. `range`:
                return Named("Ruby::Range")

            15. `lambda`, `proc`:
                If node type is `lambda`: return Named("Ruby::Proc")

            16. `parenthesized_statements`:
                Evaluate last child expression (Ruby returns last expression value)

            17. `conditional`, `if`, `unless`:
                Evaluate the consequence branch, return its type

            18. `binary`:
                - Comparison operators (==, !=, <, >, <=, >=, ===, <=>):
                  return Named("Ruby::TrueClass") for boolean, Named("Ruby::Integer") for <=>
                - Arithmetic (+, -, *, /, %, **): evaluate left operand, return its type
                - String operators: if left is String, return String
                - Logical (&&, ||, and, or): return Unknown (could be either branch)

            19. `unary`:
                - `!`, `not`: return Named("Ruby::TrueClass")
                - `-`, `+`: evaluate operand, return its type

            20. `element_reference` (array/hash indexing `obj[key]`):
                Evaluate receiver type. If Array, return Unknown (element type).
                If Hash, return Unknown. If String, return Named("Ruby::String").

            21. `assignment`:
                Evaluate right side, return its type (for chained assignments)

            22. `method` (method definition as expression, Ruby returns symbol):
                return Named("Ruby::Symbol")

            **File 2: `internal/typresolve/ruby/scope_bind.go`**
            Package: `rubyresolve`

            Implement `ProcessStatement(ctx *ResolveContext, node *sitter.Node)`

            Handle these Ruby statement types:

            1. `assignment`:
               - Get left (target) and right (value) children
               - Left is at index 0, operator at index 1, right at index 2
               - Or use field names: node children are: left, "=", right
               - Actually, Ruby tree-sitter assignment has children:
                 child(0) = left, child(1) = "=", child(2) = right
                 Use node.NamedChild(0) for left, node.NamedChild(1) for right
               - Evaluate right side type via EvalExprType
               - If left is `identifier`, bind name to type in scope
               - If left is `instance_variable` (@name), bind "@name" in scope
               - If left is `class_variable` (@@name), bind "@@name" in scope

            2. `operator_assignment` (+=, -=, ||=, &&=, etc.):
               - Get left child, evaluate its current type
               - For ||=, the type is the existing type or the right side type
               - For numeric operators, keep the existing type
               - Bind left to type

            3. `left_assignment_list` / `right_assignment_list` (multiple assignment):
               `a, b, c = 1, "two", :three`
               - Get left side children (identifiers)
               - Get right side children (values)
               - Pair up: bind each left identifier to the type of the
                 corresponding right value
               - If right side is a single expression (not a list), and it has
                 Array type, bind each left to Unknown

            4. `for` statement:
               - Get pattern (loop variable) and value (iterable)
               - Evaluate iterable type
               - Bind loop variable to Unknown (element type not inferrable
                 without generics)

            5. `rescue`:
               - If rescue has an exception variable (the `variable` field child
                 after `=>` in `rescue TypeError => e`), bind it to the
                 exception class type
               - Get the exception class from the `exceptions` field child
               - If the exceptions child is a constant, resolve it

            6. `block_parameters` and `method_parameters`:
               - When entering a block (do |x, y| ... end), bind block parameters
               - These are handled during resolve (wave 2), but ProcessStatement
                 should recognize `block_parameters` nodes and bind each parameter
                 to Unknown
               - For method parameters, bind each parameter name to Unknown
                 (Ruby has no type annotations in method signatures by default)
               - Note: ProcessStatement is called on individual nodes, not full
                 method bodies. Block parameters and method parameters will be
                 handled by the resolve.go walker when it enters blocks/methods.
                 ProcessStatement focuses on assignment-based bindings.

            **File 3: `internal/typresolve/ruby/eval_test.go`**
            Package: `rubyresolve`

            Test helper to parse Ruby and find specific expression nodes:
            ```go
            func parseRuby(t *testing.T, src string) *sitter.Node {
                parser := sitter.NewParser()
                parser.SetLanguage(ruby.GetLanguage())
                tree, err := parser.ParseCtx(context.Background(), nil, []byte(src))
                require.NoError(t, err)
                t.Cleanup(func() { tree.Close() })
                return tree.RootNode()
            }

            func findNode(root *sitter.Node, nodeType string) *sitter.Node {
                if root.Type() == nodeType {
                    return root
                }
                for i := 0; i < int(root.ChildCount()); i++ {
                    if found := findNode(root.Child(i), nodeType); found != nil {
                        return found
                    }
                }
                return nil
            }
            ```

