pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Wave 1 agents call cross-file functions that don't exist yet in their
            isolated worktrees (Agent C calls IsBuiltinFunc from Agent B's builtins.go).
          likelihood: high
          impact: low
          mitigation: |
            All wave 1 agents are in the same Go package (rubyresolve). Their files
            compile together only after merge. The build gate runs post-merge.
            Individual agent worktrees will not compile in isolation, which is
            expected and acceptable. Agent verification gates should focus on
            go vet (per-file syntax) and defer full compilation to post-merge.
        - scenario: |
            Tree-sitter Ruby AST node types differ from expectations. Ruby's
            tree-sitter grammar may use different field names or node structures
            than assumed (e.g., "call" node might not have "method" field in all cases).
          likelihood: medium
          impact: medium
          mitigation: |
            The existing Ruby extractor (internal/indexer/rubyextractor/extractor.go)
            demonstrates the correct tree-sitter Ruby patterns. Agents should
            reference the extractor for node type names and field access patterns.
            Guard all ChildByFieldName calls with nil checks.
        - scenario: |
            Ruby's open classes cause duplicate type registrations. The same class
            can be reopened across multiple files, leading to multiple RegisteredType
            entries for the same qualified name.
          likelihood: medium
          impact: low
          mitigation: |
            The registry uses a map, so later registrations overwrite earlier ones.
            This is acceptable for Tier 1: the last-seen definition wins. For Tier 2,
            we could merge definitions, but that's a future enhancement.
        - scenario: |
            Method resolution order (MRO) via EmbeddedTypes may not perfectly match
            Ruby's C3 linearization algorithm, causing incorrect method dispatch for
            complex mixin chains.
          likelihood: low
          impact: low
          mitigation: |
            Ruby's MRO (C3 linearization) is complex. Our implementation uses a
            simpler depth-first traversal of EmbeddedTypes, which handles the common
            cases (single include, single inheritance). Complex diamond inheritance
            patterns may resolve to a different method than Ruby's runtime, but this
            is acceptable for static analysis with 0.9 confidence. Document as a
            known limitation.
        - scenario: |
            Agent A and Agent C both define string extraction helpers with the same
            name, causing a duplicate function error at merge.
          likelihood: low
          impact: medium
          mitigation: |
            Agent A is instructed to define extractStringContent in requires.go.
            Agent C does not need string extraction (it operates on typed nodes).
            If a naming conflict occurs, Agent D resolves it in wave 2.
        - scenario: |
            Bare method calls (method without receiver) in Ruby are ambiguous:
            they could be local method calls (implicit self) or local variable
            references. The resolver may over-emit call edges for what are actually
            variable references.
          likelihood: medium
          impact: low
          mitigation: |
            The scope chain helps disambiguate: if a name is in scope as a variable,
            it's a variable reference, not a method call. The expression evaluator
            checks scope first. Remaining ambiguity is inherent to Ruby's semantics
            and is acceptable for static analysis.
