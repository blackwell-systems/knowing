completion_date: "2026-05-30"
title: Ruby In-Process Type Resolver
feature_slug: ruby-resolver
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: All new files in internal/typresolve/ruby/ (10+ files).
       No existing files modified. Agents have fully disjoint file ownership.
       Follows the exact same pattern as the Go resolver (IMPL-go-resolver.yaml)
       and Python resolver (IMPL-python-resolver.yaml).

    2. Investigation-first: No unknowns. There is no C reference implementation
       for Ruby, but the Python resolver (py_lsp.c, 3,248 lines) is structurally
       similar since Ruby and Python share many OOP patterns (classes, modules/mixins,
       method dispatch, duck typing). The Go resolver establishes the structural
       template. The existing Ruby extractor (internal/indexer/rubyextractor/)
       documents the tree-sitter node types and qualified name conventions.

    3. Interface discoverability: All interfaces are defined. The typresolve.Resolver
       interface, Registry, Scope, and Type are implemented and tested. Cross-agent
       contracts are limited to Go function signatures within the new ruby/ subpackage.

    4. Pre-implementation: The shared infrastructure (in-process-resolver-infra) was
       completed previously. The Go resolver IMPL shows the exact structural pattern.
       No overlap with existing code.

    5. Parallelization value: High. Build/test cycle is ~30s with GOWORK=off.
       3 agents in wave 1 with 2-4 files each. Wave 2 integrates and tests.
       Independent type system components (require resolution, builtins/mixin lookup,
       scope binding/expression eval) can be built in parallel, matching the Go and
       Python resolver decomposition.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (4 agents, 2 waves, ~5 min avg per agent)
    - Merge and verification: ~5 min
    Total Polywave time: ~30 min

    Sequential baseline: ~40 min (4 agents x 10 min avg)
    Time savings: ~10 min (25% faster)

    Recommendation: Clear speedup. Wave 1 agents are fully independent (require/constant
    resolution, builtins/mixin attribute lookup, scope binding/expression eval). Wave 2
    integrates them into the resolver.
