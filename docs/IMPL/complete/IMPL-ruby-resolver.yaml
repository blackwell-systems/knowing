            grep -c "func ResolveRequire" internal/typresolve/ruby/requires.go  # expect: 1
            # BuildRequireMap function exists
            grep -c "func BuildRequireMap" internal/typresolve/ruby/requires.go  # expect: 1
            # ParseScopeResolution function exists
            grep -c "func ParseScopeResolution" internal/typresolve/ruby/constants.go  # expect: 1
            # ResolveConstant function exists
            grep -c "func ResolveConstant" internal/typresolve/ruby/constants.go  # expect: 1
