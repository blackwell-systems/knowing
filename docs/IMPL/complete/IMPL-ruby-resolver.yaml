            ## Agent D: Resolver Integration, Registry Builder, and Call Resolution

            Integrate all wave 1 components into the RubyResolver that implements
            typresolve.Resolver, build the registry builder, and implement call
            resolution with edge emission.

            ### What to implement

            **File 1: `internal/typresolve/ruby/resolver.go`**
            Package: `rubyresolve`

            The main RubyResolver struct implementing `typresolve.Resolver`:

            ```go
            type RubyResolver struct {
                registry *typresolve.Registry
            }

            func NewRubyResolver() *RubyResolver {
                return &RubyResolver{}
            }

            func (r *RubyResolver) Language() string { return "ruby" }
            ```

            `InitWorkspace(ctx context.Context, defs []typresolve.ResolverDef) error`:
            - Call BuildRegistry(defs) to populate r.registry
            - Return nil on success

            `ResolveFile(ctx context.Context, opts typresolve.ResolveFileOpts) ([]types.Edge, error)`:
            1. Get tree-sitter root node from opts.ParsedTree:
               ```go
               var root *sitter.Node
               switch v := opts.ParsedTree.(type) {
               case *sitter.Node:
                   root = v
               default:
                   // Re-parse the content as fallback
                   parser := sitter.NewParser()
                   parser.SetLanguage(ruby.GetLanguage())
                   tree, err := parser.ParseCtx(ctx, nil, opts.Content)
                   if err != nil {
                       return nil, fmt.Errorf("parse: %w", err)
                   }
                   defer tree.Close()
                   root = tree.RootNode()
               }
               ```

            2. Build per-file require map:
               `requires := BuildRequireMap(root, opts.Content, opts.FilePath)`

            3. Determine the file-level qualified name prefix. Use the same convention
               as the Ruby extractor: file path without extension.
               ```go
               qnPrefix := strings.TrimSuffix(filepath.ToSlash(opts.FilePath), filepath.Ext(opts.FilePath))
               ```

            4. Extract the repo URL from existing edges in opts.Edges (if available):
               ```go
               repoURL := ""
               for _, e := range opts.Edges {
                   // Extract from edge metadata if available
               }
               ```

            5. Create ResolveContext:
               ```go
               rctx := &ResolveContext{
                   Registry:    r.registry,
                   Scope:       typresolve.NewScope(nil),
                   Requires:    requires,
                   Nesting:     nil,
                   CurrentFile: opts.FilePath,
                   Content:     opts.Content,
               }
               ```

            6. Call `ResolveCallsInFile(rctx, root, opts.FileHash, repoURL, opts.FilePath)`

            7. Set provenance and confidence on all returned edges:
               - Provenance: `typresolve.ProvenanceResolverResolved` ("resolver_resolved")
               - Confidence: `typresolve.ResolverConfidence` (0.9)

            8. Return the edges.

            **File 2: `internal/typresolve/ruby/registry_builder.go`**
            Package: `rubyresolve`

            Implement `BuildRegistry(defs []typresolve.ResolverDef) *typresolve.Registry`:

            1. Create a new registry via `typresolve.NewRegistry()`
            2. For each def, register based on Kind:
               - If Kind is "function": register as RegisteredFunc with
                 QualifiedName=def.QualifiedName,
                 ShortName=extract last segment after "."
               - If Kind is "method": register as RegisteredFunc with
                 ReceiverType extracted from QualifiedName.
                 Ruby QualifiedName format from the extractor:
                 "repoURL://filePath.ClassName.methodName"
                 ReceiverType is the part between the last filePath segment and methodName.
                 ShortName is the methodName.
               - If Kind is "type": register as RegisteredType with
                 QualifiedName, IsInterface=false
                 Parse the Signature field (e.g. "class User", "module Helpers")
                 to determine if it's a class or module.

            3. Process edges from defs to populate type relationships:
               - For defs with Kind "implements" (include/extend edges from extractor):
                 find the source type and add the target to its EmbeddedTypes
               - For defs with Kind "extends" (class inheritance):
                 find the source type and add the superclass to EmbeddedTypes[0]

               Note: The collectDefs function in resolver.go (typresolve package)
               produces minimal defs from edges. For richer registry population,
               scan the edges in the file results for "implements" and "extends"
               edge types and use them to populate EmbeddedTypes on RegisteredType.

            4. Register attr_accessor/attr_reader/attr_writer generated methods:
               For each "decorates" edge where the decorator name is attr_reader,
               attr_writer, or attr_accessor:
               - Extract the attribute name from the decorator arguments
               - For attr_reader/attr_accessor: register a getter method with
                 ShortName=attrName on the class
               - For attr_writer/attr_accessor: register a setter method with
                 ShortName=attrName + "=" on the class

               Note: This may not be directly available from ResolverDef entries.
               If decorator info is not in defs, skip this step; it can be
               added as a Tier 2 enhancement.

            5. Return the registry

            **File 3: `internal/typresolve/ruby/resolve.go`**
            Package: `rubyresolve`

            Implement `ResolveCallsInFile(ctx *ResolveContext, root *sitter.Node, fileHash types.Hash, repoURL string, filePath string) []types.Edge`:

            This function walks the file's AST and resolves call expressions to edges.

            Structure:
            1. Walk top-level children of root
            2. For each `class` node:
               a. Push class name onto ctx.Nesting
               b. Extract class name for enclosing context
               c. Walk class body via resolveCallsInNode
               d. Pop class from ctx.Nesting
            3. For each `module` node:
               a. Push module name onto ctx.Nesting
               b. Walk module body via resolveCallsInNode
               c. Pop module from ctx.Nesting
            4. For each `method` (def) node:
               a. Set ctx.EnclosingFuncQN based on nesting + method name
               b. Push method scope
               c. Bind method parameters into scope (as Unknown types)
               d. Walk method body via resolveCallsInNode
               e. Pop method scope
            5. For top-level `call` nodes: resolve directly

            Internal function `resolveCallsInNode(ctx *ResolveContext, node *sitter.Node, edges *[]types.Edge, fileHash types.Hash, repoURL string, filePath string, qnPrefix string)`:

            1. Call `ProcessStatement(ctx, node)` to bind variables from assignments
            2. If node is `call`:
               - Get method and receiver field children
               - If receiver is present:
                 a. If receiver is `constant` and method is "new":
                    Resolve constant to type QN.
                    Emit edge from enclosing method to "TypeQN.initialize"
                 b. Else: evaluate receiver type, look up method on that type
                    If found, emit edge to the resolved method's QN
                 c. If not resolved: emit edge using receiver text + "." + method
                    as target (heuristic, same as extractor but with higher confidence)
               - If receiver is nil (bare method call):
                 a. Skip builtin functions (IsBuiltinFunc check)
                 b. Look up in current class context (implicit self)
                 c. Look up as top-level function
                 d. Emit edge to resolved QN or fall back to method name

               Edge construction:
               - SourceHash: compute from enclosing function/method QN
                 `types.ComputeNodeHash(repoURL, qnPrefix, types.EmptyHash, enclosingQN, kind)`
               - TargetHash: compute from callee's qualified name
               - EdgeType: edgetype.Calls
               - Confidence: typresolve.ResolverConfidence (0.9)
               - Provenance: typresolve.ProvenanceResolverResolved
               - CallSiteLine, CallSiteCol, CallSiteFile from node position

            3. If node is `method` (nested method definition):
               Push new scope, bind parameters, recurse into body, pop scope

            4. If node is `class` or `module` (nested):
               Push nesting, recurse, pop nesting

            5. If node is `do_block` or `block`:
               Push new scope
               If block has `block_parameters`, bind parameter names to Unknown
               Recurse into block body
               Pop scope

            6. If node is `if`, `unless`, `while`, `until`, `case`, `begin`:
               Push scope for the body, recurse, pop scope

            7. For `case` with `when` clauses:
               Each `when` body gets its own scope

            8. Recurse into children for all other node types

            Use these imports:
            - `github.com/blackwell-systems/knowing/internal/types`
            - `github.com/blackwell-systems/knowing/internal/edgetype`
            - `github.com/blackwell-systems/knowing/internal/typresolve`
            - `sitter "github.com/smacker/go-tree-sitter"`
            - `"github.com/smacker/go-tree-sitter/ruby"`

