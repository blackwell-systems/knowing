      agents:
        - id: D
          task: |
            ## Agent D: Resolver Integration, Registry Builder, and Call Resolution

            Integrate all wave 1 components into the GoResolver that implements
            typresolve.Resolver, build the registry builder, and implement call
            resolution with edge emission.

            ### What to implement

            **File 1: `internal/typresolve/go/resolver.go`**
            Package: `goresolve`

            The main GoResolver struct implementing `typresolve.Resolver`:

            ```go
            type GoResolver struct {
                registry *typresolve.Registry
            }

            func NewGoResolver() *GoResolver {
                return &GoResolver{}
            }

            func (r *GoResolver) Language() string { return "go" }
            ```

            `InitWorkspace(ctx context.Context, defs []typresolve.ResolverDef) error`:
            - Group defs by FilePath
            - For defs that have Content and ParsedTree (from FileResult), extract
              richer type information. For now, call BuildRegistry with the defs.
            - Store the resulting registry in r.registry

            NOTE: The current ResolverDef struct has QualifiedName, Kind, Signature,
            FilePath, PackagePath fields. The ResolverEnricher in resolver.go calls
            collectDefs which populates these from edges. For the Go resolver, we need
            richer information (struct fields, embedded types, method receivers). The
            approach:
            1. InitWorkspace receives defs from collectDefs (basic metadata)
            2. But we also need the parsed trees and file contents to extract type
               details. Since ResolverDef doesn't carry these, we need to either:
               a. Accept that InitWorkspace gets limited info and do more work in ResolveFile
               b. Extend the interface (not allowed, shared infra is frozen)

            Strategy: In InitWorkspace, build a registry from the ResolverDef entries
            (function names, types by kind). The registry will have qualified names but
            limited type information (no fields, no embeddings). This gives us Tier 1
            resolution: import-based call resolution and scope-tracked variable types.

            For Tier 2 (cross-file method dispatch with embeddings), we would need to
            re-parse files during InitWorkspace. For now, focus on Tier 1 which already
            matches the value of the current AST-inferred edges but with higher confidence.

            `ResolveFile(ctx context.Context, opts typresolve.ResolveFileOpts) ([]types.Edge, error)`:
            1. Get the tree-sitter root node from opts.ParsedTree:
               ```go
               root, ok := opts.ParsedTree.(*sitter.Node)
               if !ok {
                   // Try SharedTree from gotsextractor
                   if st, ok2 := opts.ParsedTree.(*gotsextractor.SharedTree); ok2 {
                       root = st.Root
                   }
               }
               ```
               NOTE: importing gotsextractor creates a dependency. Instead, use type
               assertion on an interface:
               ```go
               type rootProvider interface {
                   GetRoot() *sitter.Node
               }
               ```
               Or just try `*sitter.Node` first, then check for a struct with a Root field.
               Simplest approach: opts.ParsedTree is `any`. Try `*sitter.Node` assertion.
               If that fails, use reflection or a type switch. The SharedTree struct has
               a `Root *sitter.Node` field. Use:
               ```go
               switch v := opts.ParsedTree.(type) {
               case *sitter.Node:
                   root = v
               default:
                   // Try to get Root field via reflection or re-parse
                   // For safety, re-parse the content
                   parser := sitter.NewParser()
                   parser.SetLanguage(golang.GetLanguage())
                   tree, err := parser.ParseCtx(ctx, nil, opts.Content)
                   if err != nil {
                       return nil, fmt.Errorf("parse: %w", err)
                   }
                   defer tree.Close()
                   root = tree.RootNode()
               }
               ```

            2. Build per-file import map: `imports := BuildImportMap(root, opts.Content)`

            3. Determine package QN from the file path. Use the first edge's
               QualifiedName prefix, or compute from the file path:
               ```go
               pkgQN := inferPackageQN(opts.FilePath, opts.Edges)
               ```

            4. Create ResolveContext with the registry, a new root scope, imports,
               pkgQN, and content.

            5. Call `ResolveCallsInFile(rctx, root, opts.FileHash, repoURL, opts.FilePath)`

            6. Return the edges with provenance `typresolve.ProvenanceResolverResolved`
               and confidence `typresolve.ResolverConfidence` (0.9).

            Helper function:
            ```go
            func inferPackageQN(filePath string, edges []types.Edge) string
            ```
            Extract from the first edge's source QualifiedName if available (format:
            "repoURL://pkgPath.symbolName"), or fall back to directory path.

            **File 2: `internal/typresolve/go/registry_builder.go`**
            Package: `goresolve`

            Implement `BuildRegistry(defs []typresolve.ResolverDef) *typresolve.Registry`:
            1. Create a new registry via `typresolve.NewRegistry()`
            2. For each def:
               - If Kind is "function": register as RegisteredFunc with
                 QualifiedName=def.QualifiedName, ShortName=last segment after "."
               - If Kind is "method": register as RegisteredFunc with
                 ReceiverType extracted from QualifiedName (format:
                 "repoURL://pkg.ReceiverType.MethodName")
               - If Kind is "type" or "interface": register as RegisteredType with
                 QualifiedName, IsInterface=(Kind=="interface")
            3. Return the registry

            This gives Tier 1 resolution: the registry knows which functions and types
            exist and their qualified names. It does NOT have full type signatures,
            struct fields, or embeddings (that requires Tier 2 re-parsing in a future
            enhancement).

            **File 3: `internal/typresolve/go/resolve.go`**
            Package: `goresolve`

            Port the call resolution logic from the C reference (lines 1111-1631).

            Implement `ResolveCallsInFile(ctx *ResolveContext, root *sitter.Node, fileHash types.Hash, repoURL string, filePath string) []types.Edge`:

            This function walks the file's AST and resolves call expressions to edges.

            Structure (following go_lsp_process_file, lines 1597-1630):
            1. Walk top-level children of root
            2. Pass 1: Process package-level var/const declarations into root scope
            3. Pass 2: For each function_declaration or method_declaration:
               a. Set ctx.EnclosingFuncQN
               b. Push function scope
               c. Bind parameters into scope (including variadic: ...T becomes []T)
               d. Bind named return values into scope
               e. Bind method receiver into scope
               f. Call resolveCallsInNode recursively on the function body
               g. Pop function scope

            Internal function `resolveCallsInNode(ctx *ResolveContext, node *sitter.Node, edges *[]types.Edge, fileHash types.Hash, repoURL string, filePath string)`:
            (Port of resolve_calls_in_node, lines 1111-1472)

            1. Call `ProcessStatement(ctx, node)` to bind variables
            2. If node is `call_expression`:
               - Get function child
               - If selector_expression:
                 a. Check if operand is import alias: look up pkg.Symbol in registry
                 b. Else: evaluate operand type, auto-deref pointer, look up method
               - If identifier (not builtin): look up in registry as package-local function
               - Emit edge with:
                 - SourceHash: compute from (repoURL, pkgPath, enclosingFuncQN, kind)
                 - TargetHash: compute from callee's qualified name
                 - EdgeType: edgetype.Calls
                 - Confidence: typresolve.ResolverConfidence (0.9)
                 - Provenance: typresolve.ProvenanceResolverResolved
                 - CallSiteLine, CallSiteCol, CallSiteFile from node position
            3. Push scope for blocks, if, for, switch statements
            4. Process initializer for if/for/switch
            5. Process range_clause for for statements
            6. Handle type_switch_statement: per-case scope narrowing
               (Port lines 1312-1384: bind switch variable to case type in each case)
            7. Recurse into children
            8. Pop scope if pushed

            For edge hash computation, use `types.ComputeEdgeHash(sourceHash, targetHash, edgeType, provenance)`.
            For node hash computation, use `types.ComputeNodeHash(repoURL, pkgPath, types.EmptyHash, name, kind)`.

            Import these:
            - `github.com/blackwell-systems/knowing/internal/types`
            - `github.com/blackwell-systems/knowing/internal/edgetype`
            - `github.com/blackwell-systems/knowing/internal/typresolve`

            Helper to extract callee info from a resolved call:
            ```go
            type resolvedCall struct {
                calleeQN string
                strategy string  // "resolver_direct", "resolver_type_dispatch", etc.
            }
            ```

            **File 4: `internal/typresolve/go/resolver_test.go`**
            Package: `goresolve`

            Integration tests for the full resolver pipeline.

            Test 1: `TestGoResolverLanguage`
            - NewGoResolver().Language() == "go"

            Test 2: `TestGoResolverInitWorkspace`
            - Create defs with function and type entries
            - Call InitWorkspace
            - Verify registry contains the registered entries

            Test 3: `TestGoResolverResolveFile_SimpleCalls`
            - Source:
              ```go
              package main

              import "fmt"

              func hello() {
                  fmt.Println("hello")
              }
              ```
            - InitWorkspace with a def for fmt.Println
            - ResolveFile should produce a "calls" edge from hello to fmt.Println
            - Verify edge has provenance "resolver_resolved" and confidence 0.9

            Test 4: `TestGoResolverResolveFile_LocalCalls`
            - Source with local function calls (no imports)
            - Verify edges are produced

            Test 5: `TestGoResolverResolveFile_MethodCalls`
            - Source with method calls on typed variables
            - Register type and method in workspace
            - Verify method dispatch edge is produced

            Test 6: `TestResolveCallsInFile_ScopeTracking`
            - Source with short_var_declaration followed by method call on the variable
            - Verify the scope correctly tracks the variable type and the method
              call is resolved

            Test 7: `TestResolveCallsInFile_RangeLoop`
            - Source with `for k, v := range mySlice { v.Method() }`
            - Register slice element type's method
            - Verify method call on range variable is resolved

            ### Interfaces consumed
            - All wave 1 functions: ParseTypeNode, BuildImportMap, ResolveImport,
              IsBuiltinFunc, EvalBuiltinCall, ResolveBuiltinType, LookupFieldOrMethod,
              LookupField, EvalExprType, ProcessStatement, ResolveContext
            - `typresolve.Resolver`, `typresolve.ResolverDef`, `typresolve.ResolveFileOpts`
            - `typresolve.Registry`, `typresolve.Scope`, `typresolve.NewScope`
            - `types.Edge`, `types.Hash`, `types.ComputeEdgeHash`, `types.ComputeNodeHash`
            - `edgetype.Calls`
            - `sitter.Node`, `sitter.NewParser`, `golang.GetLanguage`

            ### Constraints
            - Package name MUST be `goresolve`
