title: Go In-Process Type Resolver
feature_slug: go-resolver
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: All new files in internal/typresolve/go/ (10+ files). No
       existing files modified. Agents have fully disjoint file ownership.
    2. Investigation-first: No unknowns. The C reference implementation (go_lsp.c,
       2989 lines) documents the complete resolution algorithm. The shared
       infrastructure (typresolve package) was just completed and defines the
       exact interface contracts.
    3. Interface discoverability: All interfaces are defined. The typresolve.Resolver
       interface, Registry, Scope, and Type are already implemented and tested.
       Cross-agent contracts are limited to Go function signatures within the new
       go/ subpackage.
    4. Pre-implementation: The shared infrastructure (in-process-resolver-infra) was
       completed in the prior IMPL. No overlap with existing code.
    5. Parallelization value: High. Build/test cycle is ~30s. 3 agents in wave 1
       with 2-4 files each. Wave 2 integrates and tests. Independent type system
       components (type parsing, builtins, scope binding) can be built in parallel.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (5 agents, 2 waves, ~5 min avg per agent)
    - Merge and verification: ~5 min
    Total Polywave time: ~30 min

    Sequential baseline: ~50 min (5 agents x 10 min avg)
    Time savings: ~20 min (40% faster)

    Recommendation: Clear speedup. Wave 1 agents are fully independent (type parsing,
    builtins, scope binding). Wave 2 integrates them into the resolver.
