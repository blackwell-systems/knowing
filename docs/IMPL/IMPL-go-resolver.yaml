pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Wave 1 agents call cross-file functions that don't exist yet in their
            isolated worktrees (Agent C calls ParseTypeNode from Agent A's types.go).
          likelihood: high
          impact: low
          mitigation: |
            All wave 1 agents are in the same Go package (goresolve). Their files
            compile together only after merge. The build gate runs post-merge.
            Individual agent worktrees will not compile in isolation, which is
            expected and acceptable. Agent verification gates should test only
            their own logic via test helpers that don't require the missing files.
            NOTE: Since go build runs on the full package after merge, individual
            agents should focus on go vet (which works per-file) and defer full
            compilation to the post-merge gate.
        - scenario: |
            Agent A and Agent B both define isBuiltinType with different type sets,
            causing a duplicate function error at merge.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A is instructed to define a local isBuiltinType helper. Agent B
            defines the canonical ResolveBuiltinType function. The names are different
            (isBuiltinType vs ResolveBuiltinType). If Agent A's local helper conflicts,
            Agent D removes the duplicate in wave 2 integration.
        - scenario: |
            tree-sitter Node field name mismatches between the C reference and the Go
            tree-sitter bindings cause nil pointer panics at runtime.
          likelihood: medium
          impact: medium
          mitigation: |
            The Go tree-sitter bindings use the same field names as the C API
            (ChildByFieldName is the Go equivalent of ts_node_child_by_field_name).
            Agents should guard against nil returns from ChildByFieldName with nil
            checks. The existing gotsextractor code demonstrates the correct patterns.
        - scenario: |
            ResolveContext is defined by Agent C but Agent D needs to extend it
            with additional fields (e.g., repoURL for edge emission).
          likelihood: medium
          impact: low
          mitigation: |
            Agent D can add fields to ResolveContext since both files are in the
            same package. The struct is not exported. Agent D's task explicitly
            includes the freedom to extend it.
        - scenario: |
            Package-level var/const binding in resolve.go (Agent D) conflicts with
            scope_bind.go (Agent C) if both define ProcessStatement behavior.
          likelihood: low
          impact: medium
          mitigation: |
            Agent C owns ProcessStatement exclusively. Agent D calls it but does
            not redefine it. Agent D handles the file-level walk structure
            (function binding, parameter binding, receiver binding) separately
            in resolve.go. No overlap.
        - scenario: |
            Wave 1 agents cannot run go build or go test individually because the
            package has missing function references across files.
          likelihood: high
          impact: low
          mitigation: |
            Expected behavior. Wave 1 agents verify their code compiles by running
            go vet on individual files (which checks syntax without full type
            checking) and write standalone test helpers. The full go build and
            go test run post-merge after all wave 1 files are combined. Agent
            verification gates are adjusted to tolerate this.
