interface_contracts:
    - name: ParseTypeNode
      description: |
        Converts a tree-sitter Go type AST node to a typresolve.Type.
        Handles: type_identifier, qualified_type, pointer_type, slice_type,
        array_type, map_type, channel_type, function_type, interface_type,
        struct_type, parenthesized_type, generic_type, parameter_list (multi-return).
      definition: |
        func ParseTypeNode(node *sitter.Node, content []byte, pkgQN string, imports map[string]string) *typresolve.Type
      location: internal/typresolve/go/types.go
    - name: BuildImportMap
      description: |
        Builds per-file import alias to package path mapping from the AST root.
        Returns map[alias]packagePath. For imports without explicit alias, uses
        the last path segment as the alias.
      definition: |
        func BuildImportMap(root *sitter.Node, content []byte) map[string]string
      location: internal/typresolve/go/imports.go
    - name: ResolveImport
      description: |
        Resolves an import alias to its full package path.
      definition: |
        func ResolveImport(imports map[string]string, alias string) (string, bool)
      location: internal/typresolve/go/imports.go
    - name: IsBuiltinFunc
      description: |
        Returns true if the given name is a Go builtin function
        (make, new, append, len, cap, delete, close, copy, panic, recover, etc.).
      definition: |
        func IsBuiltinFunc(name string) bool
      location: internal/typresolve/go/builtins.go
    - name: EvalBuiltinCall
      description: |
        Evaluates the return type of a Go builtin function call.
        Handles make (returns type arg), new (returns *type arg), append (returns
        slice arg type), len/cap (returns int), etc.
      definition: |
        func EvalBuiltinCall(name string, args *sitter.Node, content []byte, pkgQN string, imports map[string]string, evalExpr ExprEvaluator) *typresolve.Type
      location: internal/typresolve/go/builtins.go
    - name: ResolveBuiltinType
      description: |
        Returns a typresolve.Builtin type if the name is a Go builtin type
        (int, string, bool, error, etc.), nil otherwise.
      definition: |
        func ResolveBuiltinType(name string) *typresolve.Type
      location: internal/typresolve/go/builtins.go
    - name: LookupFieldOrMethod
      description: |
        Looks up a method or field on a named type, following embedded type
        promotion up to 5 levels deep. Returns the registered function if found.
      definition: |
        func LookupFieldOrMethod(reg *typresolve.Registry, typeQN string, memberName string) *typresolve.RegisteredFunc
      location: internal/typresolve/go/methods.go
    - name: LookupField
      description: |
        Looks up a struct field on a named type, following embedded type
        promotion. Returns the field's type if found.
      definition: |
        func LookupField(reg *typresolve.Registry, typeQN string, fieldName string) *typresolve.Type
      location: internal/typresolve/go/methods.go
    - name: ExprEvaluator
      description: |
        Function type used as a callback for recursive expression evaluation.
        Allows builtins.go and scope_bind.go to call into eval.go without
        circular imports (all in same package, but enables testability).
      definition: |
        type ExprEvaluator func(node *sitter.Node) *typresolve.Type
      location: internal/typresolve/go/eval.go
    - name: EvalExprType
      description: |
        Recursive expression type evaluator. Evaluates the type of a Go
        expression AST node using scope lookup, registry lookup, import
        resolution, and method dispatch.
      definition: |
        func EvalExprType(ctx *ResolveContext, node *sitter.Node) *typresolve.Type
      location: internal/typresolve/go/eval.go
    - name: ProcessStatement
      description: |
        Processes a statement node to bind variables into the current scope.
        Handles short_var_declaration, var_spec, const_spec, range_clause.
      definition: |
        func ProcessStatement(ctx *ResolveContext, node *sitter.Node)
      location: internal/typresolve/go/scope_bind.go
    - name: ResolveContext
      description: |
        Per-file resolution context holding the registry, scope, imports,
        package QN, content bytes, and enclosing function QN.
      definition: |
        type ResolveContext struct {
            Registry       *typresolve.Registry
            Scope          *typresolve.Scope
            Imports        map[string]string
            PkgQN          string
            Content        []byte
            EnclosingFuncQN string
        }
      location: internal/typresolve/go/eval.go
    - name: GoResolver
      description: |
        Implements typresolve.Resolver for Go. Language() returns "go".
        InitWorkspace builds a Registry from Go definitions.
        ResolveFile walks the Go AST and resolves calls and references.
      definition: |
        type GoResolver struct {
            registry *typresolve.Registry
        }
        func NewGoResolver() *GoResolver
        func (r *GoResolver) Language() string
        func (r *GoResolver) InitWorkspace(ctx context.Context, defs []typresolve.ResolverDef) error
        func (r *GoResolver) ResolveFile(ctx context.Context, opts typresolve.ResolveFileOpts) ([]types.Edge, error)
      location: internal/typresolve/go/resolver.go
    - name: BuildRegistry
      description: |
        Builds a typresolve.Registry from ResolverDef entries and parsed trees.
        Extracts function signatures, method receivers, type fields, embedded types,
        and interface methods from the AST of each file's definitions.
      definition: |
        func BuildRegistry(defs []typresolve.ResolverDef, fileContents map[string][]byte, fileTrees map[string]*sitter.Node) *typresolve.Registry
      location: internal/typresolve/go/registry_builder.go
    - name: ResolveCallsInFile
      description: |
        Walks a Go file's AST resolving call expressions and emitting edges.
        Uses the shared registry, per-file scope chain, and import map.
      definition: |
        func ResolveCallsInFile(ctx *ResolveContext, root *sitter.Node, fileHash types.Hash, repoURL string, filePath string) []types.Edge
      location: internal/typresolve/go/resolve.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A: Go Type Parsing and Import Resolution

            Build the foundational type parsing and import resolution for the Go resolver.

            ### What to implement

            **File 1: `internal/typresolve/go/doc.go`**
            Package doc comment for the `go` subpackage:
            ```go
            // Package goresolve implements the Go language in-process type resolver.
            // It implements the typresolve.Resolver interface, resolving Go call
            // expressions and type references using tree-sitter AST walking and a
            // shared type registry built from extracted definitions.
            package goresolve
            ```

            **File 2: `internal/typresolve/go/types.go`**
            Port the `go_parse_type_node` function from the C reference at
            `~/code/codebase-memory/internal/cbm/lsp/go_lsp.c` (lines 106-253).
            This function converts tree-sitter Go type AST nodes to `*typresolve.Type`.

            Implement `ParseTypeNode(node *sitter.Node, content []byte, pkgQN string, imports map[string]string) *typresolve.Type`

            Handle these tree-sitter node types:
            - `type_identifier`: resolve builtins via `ResolveBuiltinType` (from builtins.go,
              wave 1 Agent B). For non-builtins, return `typresolve.Named(pkgQN + "." + name)`.
              NOTE: Since builtins.go is built by Agent B in the same wave, define a local
              `isBuiltinType` helper that checks the same set of Go builtin type names
              (int, int8, ..., string, bool, byte, rune, error, any, uintptr). Agent D
              will wire the final integration in wave 2.
            - `qualified_type`: resolve `pkg.Type` using imports map to get package QN,
              return `typresolve.Named(pkgQN + "." + typeName)`
            - `pointer_type`: wrap inner type with `typresolve.Pointer(inner)`
            - `slice_type`: wrap element with `typresolve.Slice(elem)`
            - `array_type`: treat same as slice for resolution purposes
            - `map_type`: `typresolve.Map(key, value)` from "key" and "value" field children
            - `channel_type`: `typresolve.Channel(elem, dir)` with direction from text
            - `function_type`: return simplified `typresolve.Func(nil, nil)`
            - `interface_type`: return `&typresolve.Type{Kind: typresolve.KindInterface}`
            - `struct_type`: return `&typresolve.Type{Kind: typresolve.KindStruct}`
            - `parenthesized_type`: unwrap to inner type
            - `type_elem`: unwrap to inner type
            - `generic_type`: resolve the "type" field child (strip type args)
            - `parameter_list` (multi-return): collect parameter_declaration types into
              `typresolve.Tuple(elems)`. If exactly 1 element, return it directly.

            Use `node.ChildByFieldName("field_name")` for tree-sitter field access.
            Use `node.Content(content)` to get text.
            Use `node.Type()` to get the node type string.
            Use `node.ChildCount()` / `node.Child(i)` for iteration.
            Use `node.NamedChildCount()` / `node.NamedChild(i)` for named children only.

            **File 3: `internal/typresolve/go/imports.go`**
            Port import resolution from the C reference (lines 34-68).

            Implement:
            - `BuildImportMap(root *sitter.Node, content []byte) map[string]string`
              Walk import_declaration children, extract import_spec entries.
              For each: get "path" field (trim quotes), get "name" field (explicit alias).
              If no explicit alias, use last path segment. Skip "." and "_" aliases.
              This mirrors the existing `buildImportMap` in `internal/indexer/gotsextractor/extractor.go`
              (lines 317-341). Reuse the same logic.

            - `ResolveImport(imports map[string]string, alias string) (string, bool)`
              Simple map lookup returning (packageQN, found).

            **File 4: `internal/typresolve/go/types_test.go`**
            Test ParseTypeNode with Go source snippets parsed by tree-sitter.
            Test cases:
            - Simple type_identifier: `var x MyType` -> Named("pkg.MyType")
            - Builtin type: `var x int` -> Builtin("int")
            - Pointer type: `var x *MyType` -> Pointer(Named("pkg.MyType"))
            - Slice type: `var x []string` -> Slice(Builtin("string"))
            - Map type: `var x map[string]int` -> Map(Builtin("string"), Builtin("int"))
            - Qualified type: `var x http.Request` with imports map -> Named("net/http.Request")
            - Multi-return parameter_list: `(int, error)` -> Tuple([Builtin("int"), Builtin("error")])
            Test BuildImportMap and ResolveImport with sample import declarations.

            ### Interfaces consumed
            - `typresolve.Type`, `typresolve.Named()`, `typresolve.Pointer()`, etc. from
              `github.com/blackwell-systems/knowing/internal/typresolve`
            - `sitter.Node` from `github.com/smacker/go-tree-sitter`
            - `golang.GetLanguage()` from `github.com/smacker/go-tree-sitter/golang`

            ### Constraints
            - Package name MUST be `goresolve` (not `go`, which is a reserved keyword)
            - Do NOT import or depend on builtins.go or methods.go from Agent B.
              Define a local `isBuiltinType(name string) bool` helper for the builtin
              type check needed in type_identifier handling.
            - Do NOT modify any files outside your ownership list.
            - Do NOT import from `internal/indexer/gotsextractor` (would create circular
              dependency risk). Reimplement the import map logic locally.

            ### Verification
            ```bash
            GOWORK=off go build ./internal/typresolve/go/...
            GOWORK=off go vet ./internal/typresolve/go/...
            GOWORK=off go test ./internal/typresolve/go/... -run TestParseTypeNode -v
            GOWORK=off go test ./internal/typresolve/go/... -run TestBuildImportMap -v
            ```

            Postconditions:
            ```bash
            # ParseTypeNode function exists
            grep -c "func ParseTypeNode" internal/typresolve/go/types.go  # expect: 1
            # BuildImportMap function exists
            grep -c "func BuildImportMap" internal/typresolve/go/imports.go  # expect: 1
            # Package declaration is goresolve
            grep -c "package goresolve" internal/typresolve/go/doc.go  # expect: 1
            ```
          files:
            - internal/typresolve/go/doc.go
            - internal/typresolve/go/types.go
            - internal/typresolve/go/imports.go
            - internal/typresolve/go/types_test.go
        - id: B
          task: |
            ## Agent B: Builtins and Method/Field Lookup

            Build the builtin function/type handling and method/field lookup with
            embedded field promotion for the Go resolver.

            ### What to implement

            **File 1: `internal/typresolve/go/builtins.go`**
            Package: `goresolve`

            Port builtin handling from the C reference at
            `~/code/codebase-memory/internal/cbm/lsp/go_lsp.c`.

            Implement:

            - `IsBuiltinFunc(name string) bool`
              Return true for: make, new, append, len, cap, delete, close, copy,
              panic, recover, print, println, complex, real, imag, min, max, clear.
              (Reference: lines 72-83 of go_lsp.c)

            - `ResolveBuiltinType(name string) *typresolve.Type`
              Return `typresolve.Builtin(name)` for: int, int8, int16, int32, int64,
              uint, uint8, uint16, uint32, uint64, float32, float64, complex64,
              complex128, string, bool, byte, rune, error, uintptr, any.
              Return nil if not a builtin type.
              (Reference: lines 87-102 of go_lsp.c)

            - `ExprEvaluator` type definition:
              ```go
              // ExprEvaluator is a callback for recursive expression evaluation.
              type ExprEvaluator func(node *sitter.Node) *typresolve.Type
              ```

            - `EvalBuiltinCall(name string, args *sitter.Node, content []byte, pkgQN string, imports map[string]string, evalExpr ExprEvaluator) *typresolve.Type`
              Port from go_eval_builtin_call (lines 809-847 of go_lsp.c):
              - `make(Type, ...)`: parse first arg as type node via ParseTypeNode, return that type.
                NOTE: ParseTypeNode is in types.go (Agent A, same wave). Since both are
                in package goresolve, you can call it directly. However, to avoid compile
                issues if Agent A's file isn't present in your worktree, use a package-level
                var that Agent D will wire in wave 2:
                ```go
                // parseTypeNodeFunc is set during resolver initialization.
                // Avoids compile-time dependency on types.go file presence.
                var parseTypeNodeFunc func(node *sitter.Node, content []byte, pkgQN string, imports map[string]string) *typresolve.Type
                ```
                Actually, since both files are in the same package and will be merged
                before compilation, just call `ParseTypeNode` directly. The build gate
                runs after merge.
              - `new(Type)`: parse first arg as type, return `typresolve.Pointer(type)`
              - `append(slice, ...)`: evaluate first arg type via evalExpr callback, return it
              - `len`, `cap`: return `typresolve.Builtin("int")`
              - `delete`, `close`, `copy`: return `typresolve.Unknown()`
              - `complex`: return `typresolve.Builtin("complex128")`
              - `real`, `imag`: return `typresolve.Builtin("float64")`
              - `min`, `max`: evaluate first arg type via evalExpr, return it
              - Default: return `typresolve.Unknown()`

              For `make` and `new`, get the first named child of args:
              ```go
              if args != nil && args.NamedChildCount() > 0 {
                  firstArg := args.NamedChild(0)
                  // parse as type node
              }
              ```

            **File 2: `internal/typresolve/go/methods.go`**
            Package: `goresolve`

            Port method/field lookup with embedded field promotion from the C reference
            (lines 851-915 of go_lsp.c).

            Implement:

            - `LookupFieldOrMethod(reg *typresolve.Registry, typeQN string, memberName string) *typresolve.RegisteredFunc`
              Internal helper with depth limit (max 5):
              1. Direct method lookup: `reg.LookupMethod(typeQN, memberName)` -- if found, return
              2. Get type: `reg.LookupType(typeQN)` -- if nil, return nil
              3. Follow alias: if `type.AliasOf != ""`, recurse with alias target
              4. Check embedded types: for each `type.EmbeddedTypes[i]`, recurse
              5. Return nil if not found

            - `LookupField(reg *typresolve.Registry, typeQN string, fieldName string) *typresolve.Type`
              Internal helper with depth limit (max 5):
              1. Get type: `reg.LookupType(typeQN)` -- if nil, return nil
              2. Follow alias: if `type.AliasOf != ""`, recurse with alias target
              3. Direct field lookup: scan `type.Fields` for matching name, return field type
              4. Check embedded types: for each `type.EmbeddedTypes[i]`, recurse
              5. Return nil if not found

            **File 3: `internal/typresolve/go/builtins_test.go`**
            Package: `goresolve`

            Test cases:
            - IsBuiltinFunc: true for "make", "len", "append"; false for "fmt", "MyFunc"
            - ResolveBuiltinType: returns Builtin for "int", "string", "error"; nil for "MyType"
            - EvalBuiltinCall "make" with a slice_type arg: returns Slice type
            - EvalBuiltinCall "new" with a type_identifier arg: returns Pointer type
            - EvalBuiltinCall "len": returns Builtin("int")
            - EvalBuiltinCall "append" with slice arg: returns same slice type
            - LookupFieldOrMethod: direct method found
            - LookupFieldOrMethod: method found via embedding (1 level)
            - LookupFieldOrMethod: method found via embedding (2 levels)
            - LookupField: direct field found
            - LookupField: field found via embedding

            For testing EvalBuiltinCall, parse Go source with tree-sitter to get
            AST nodes. For testing LookupFieldOrMethod, build a Registry with
            registered types and methods.

            ### Interfaces consumed
            - `typresolve.Registry`, `typresolve.RegisteredFunc`, `typresolve.RegisteredType`
            - `typresolve.Type`, `typresolve.Builtin()`, `typresolve.Pointer()`, etc.
            - `sitter.Node` from `github.com/smacker/go-tree-sitter`

            ### Constraints
            - Package name MUST be `goresolve`
            - Do NOT modify any files outside your ownership list.
            - `EvalBuiltinCall` calls `ParseTypeNode` from types.go (Agent A). Since both
              are in the same package, this compiles after merge. Do NOT stub ParseTypeNode.
            - For tests that need tree-sitter parsing, create a helper:
              ```go
              func parseGoExpr(t *testing.T, src string) *sitter.Node {
                  parser := sitter.NewParser()
                  parser.SetLanguage(golang.GetLanguage())
                  tree, err := parser.ParseCtx(context.Background(), nil, []byte(src))
                  require.NoError(t, err)
                  t.Cleanup(func() { tree.Close() })
                  return tree.RootNode()
              }
              ```

            ### Verification
            ```bash
            GOWORK=off go build ./internal/typresolve/go/...
            GOWORK=off go vet ./internal/typresolve/go/...
            GOWORK=off go test ./internal/typresolve/go/... -run TestIsBuiltinFunc -v
            GOWORK=off go test ./internal/typresolve/go/... -run TestLookupFieldOrMethod -v
            ```

            Postconditions:
            ```bash
            grep -c "func IsBuiltinFunc" internal/typresolve/go/builtins.go  # expect: 1
            grep -c "func LookupFieldOrMethod" internal/typresolve/go/methods.go  # expect: 1
            grep -c "func LookupField" internal/typresolve/go/methods.go  # expect: 1
            ```
          files:
            - internal/typresolve/go/builtins.go
            - internal/typresolve/go/methods.go
            - internal/typresolve/go/builtins_test.go
        - id: C
          task: |
            ## Agent C: Expression Evaluator and Scope Binding

            Build the expression type evaluator and statement-level scope binding
            for the Go resolver.

            ### What to implement

            **File 1: `internal/typresolve/go/eval.go`**
            Package: `goresolve`

            Port the `go_eval_expr_type` function from the C reference at
            `~/code/codebase-memory/internal/cbm/lsp/go_lsp.c` (lines 312-805).

            Define the resolution context:
            ```go
            // ResolveContext holds per-file state for type resolution.
            type ResolveContext struct {
                Registry        *typresolve.Registry
                Scope           *typresolve.Scope
                Imports         map[string]string  // alias -> package path
                PkgQN           string             // current package qualified name
                Content         []byte             // source file content
                EnclosingFuncQN string             // QN of the current function being resolved
            }
            ```

            Implement `EvalExprType(ctx *ResolveContext, node *sitter.Node) *typresolve.Type`

            Handle these expression node types (in order from the C reference):

            1. `identifier` (lines 318-340):
               - Scope lookup: `ctx.Scope.Lookup(name)`
               - If unknown, package-level function: `ctx.Registry.LookupSymbol(ctx.PkgQN, name)`
               - If found and has signature, return signature
               - Check builtin type: call `ResolveBuiltinType(name)` (from builtins.go, same package)
               - Check registered type: `ctx.Registry.LookupType(ctx.PkgQN + "." + name)`
               - If found, return `typresolve.Named(typeQN)`
               - Default: return `typresolve.Unknown()`

            2. `selector_expression` (lines 343-392):
               - Get operand and field children by field name
               - If operand is `identifier`, check if it's an import alias via `ResolveImport`
                 (from imports.go, same package). If import found:
                 - Look up `pkg.Symbol` as function: `ctx.Registry.LookupSymbol(pkgQN, fieldName)`
                 - Look up as type: `ctx.Registry.LookupType(pkgQN + "." + fieldName)`
               - Otherwise, evaluate operand type recursively
               - Auto-deref pointers: if base is Pointer, deref it
               - If base is Named, look up method via `LookupFieldOrMethod(ctx.Registry, typeQN, fieldName)`
                 (from methods.go, same package)
               - If method found and has signature, return signature
               - Look up field via `LookupField(ctx.Registry, typeQN, fieldName)` (from methods.go)
               - Default: return Unknown

            3. `call_expression` (lines 395-608):
               - Get function and arguments children
               - If function is identifier and is builtin: call `EvalBuiltinCall`
                 (from builtins.go, same package), passing a closure that calls
                 EvalExprType as the evalExpr callback
               - Evaluate function type recursively
               - If function type is KindFunc with returns: return first return type
                 (or Tuple for multi-return)
               - If function type is KindNamed: type conversion, return the named type
               - If function node is a type node (slice_type, map_type, etc.): type
                 conversion, call ParseTypeNode (from types.go, same package)
               - NOTE: Skip generic type unification for now (Tier 1 focus).
                 Agent D may add it in wave 2 if needed.

            4. `composite_literal` (lines 612-618):
               - Get "type" field child, parse via ParseTypeNode

            5. `unary_expression` (lines 621-651):
               - `&x`: return Pointer(operand type)
               - `*x`: return Deref(operand type)
               - `<-ch`: if channel, return element type
               - `!x`: return Builtin("bool")

            6. `index_expression` (lines 654-662):
               - If operand is Map, return value type
               - If operand is Slice, return element type

            7. `type_assertion_expression` (lines 665-671):
               - Parse "type" field child via ParseTypeNode

            8. `parenthesized_expression` (lines 674-676): unwrap

            9. `binary_expression` (lines 679-698):
               - Comparison/logical operators: return Builtin("bool")
               - Arithmetic: return left operand type

            10. `slice_expression` (lines 700-705): return operand type

            11. Literals (lines 708-723):
                - string literals: Builtin("string")
                - int_literal: Builtin("int")
                - float_literal: Builtin("float64")
                - true/false: Builtin("bool")
                - nil: Unknown

            12. `func_literal` (lines 726-802):
                - Push child scope
                - Bind closure parameters into scope
                - Walk closure body to resolve calls (recursive)
                - Build Func type from parameter/return types
                - Pop scope

            **File 2: `internal/typresolve/go/scope_bind.go`**
            Package: `goresolve`

            Port `go_process_statement` from the C reference (lines 919-1080).

            Implement `ProcessStatement(ctx *ResolveContext, node *sitter.Node)`

            Handle these statement types:

            1. `short_var_declaration` (lines 924-968):
               - Get "left" and "right" field children
               - If right is expression_list with 1 element, evaluate the single expression
               - Otherwise evaluate right directly
               - Bind left-hand identifiers:
                 - If RHS is Tuple, bind each LHS var to corresponding tuple element
                 - If RHS is single value, bind first var to it
               - Skip `_` identifiers

            2. `var_spec` (lines 971-999):
               - If has "type" field: parse type via ParseTypeNode
               - Else if has "value" field: evaluate value expression
               - Bind all identifier children to the type

            3. `const_spec` (lines 1002-1028):
               - If has "type" field: parse type
               - Else if has "value" field: evaluate value
               - Bind name identifier

            4. `range_clause` (lines 1031-1076):
               - Evaluate "right" (container) expression
               - Determine key/value types based on container type:
                 - Slice: key=int, value=element type
                 - Map: key=key type, value=value type
                 - Channel: value=element type
                 - string: key=int, value=rune
               - Bind left-hand identifiers (first=key, second=value)

            **File 3: `internal/typresolve/go/eval_test.go`**
            Package: `goresolve`

            Test EvalExprType and ProcessStatement with parsed Go source snippets.

            Test helper to parse Go and get specific expression nodes:
            ```go
            func parseAndFindExpr(t *testing.T, src string, exprType string) (*sitter.Node, []byte) {
                content := []byte(src)
                parser := sitter.NewParser()
                parser.SetLanguage(golang.GetLanguage())
                tree, err := parser.ParseCtx(context.Background(), nil, content)
                require.NoError(t, err)
                t.Cleanup(func() { tree.Close() })
                // Walk tree to find first node of exprType
                var found *sitter.Node
                var walk func(n *sitter.Node)
                walk = func(n *sitter.Node) {
                    if found != nil { return }
                    if n.Type() == exprType { found = n; return }
                    for i := 0; i < int(n.ChildCount()); i++ { walk(n.Child(i)) }
                }
                walk(tree.RootNode())
                require.NotNil(t, found, "no %s found in source", exprType)
                return found, content
            }
            ```

