    - name: testutil.MockGraphStore
      description: Shared mock implementing types.GraphStore with embeddable no-op defaults
      definition: |
        // Package testutil, file: internal/testutil/mockstore.go
        package testutil

        import (
            "context"
            "github.com/blackwell-systems/knowing/internal/types"
        )

        // MockGraphStore provides a default no-op implementation of types.GraphStore.
        // Test packages embed this struct and override only the methods they need.
        type MockGraphStore struct {
            Nodes     map[types.Hash]*types.Node
            Edges     map[types.Hash]*types.Edge
            Snapshots map[types.Hash]*types.Snapshot
            Repos     map[types.Hash]*types.Repo
            Files     map[types.Hash]*types.File
        }

        func NewMockGraphStore() *MockGraphStore
        func (m *MockGraphStore) PutNode(ctx context.Context, n types.Node) error
        func (m *MockGraphStore) PutEdge(ctx context.Context, e types.Edge) error
        func (m *MockGraphStore) PutFile(ctx context.Context, f types.File) error
        func (m *MockGraphStore) PutRepo(ctx context.Context, r types.Repo) error
        func (m *MockGraphStore) RecordEdgeEvent(ctx context.Context, ev types.EdgeEvent) error
        func (m *MockGraphStore) CreateSnapshot(ctx context.Context, s types.Snapshot) error
        func (m *MockGraphStore) GetNode(ctx context.Context, hash types.Hash) (*types.Node, error)
        func (m *MockGraphStore) GetEdge(ctx context.Context, hash types.Hash) (*types.Edge, error)
        func (m *MockGraphStore) GetSnapshot(ctx context.Context, hash types.Hash) (*types.Snapshot, error)
        func (m *MockGraphStore) GetRepo(ctx context.Context, hash types.Hash) (*types.Repo, error)
        // ... all other GraphStore methods with no-op defaults
        func (m *MockGraphStore) Close() error
      location: internal/testutil/mockstore.go
    - name: resolve.InferExternalRepoURL
      description: Shared utility to determine if an import path is external/stdlib
      definition: |
        // Package resolve, file: internal/resolve/external.go
        package resolve

        // LangConfig provides language-specific configuration for external URL inference.
        type LangConfig struct {
            // StdlibCheck returns true if the top-level segment indicates stdlib.
            StdlibCheck func(topLevel string) bool
            // IsRelative returns true if the path is a relative/local import.
            IsRelative func(path string) bool
            // IsLocal returns true if the path is local to the project.
            // May be nil if not applicable. Used by Java for same-package detection.
            IsLocal func(path, localContext string) bool
            // ExtractPkgName extracts the package identifier from the full import path.
            // Returns the portion to use after "external://".
            ExtractPkgName func(path string) string
            // Separator is the path component separator ("/" for TS, "." for Java/C#, "::" for Rust).
            Separator string
        }

        // InferExternalRepoURL returns "external://{pkgName}" for external packages,
        // "stdlib" for standard library imports, or "" for relative/local imports.
        // The localContext parameter is optional (used by Java for same-package detection).
        func InferExternalRepoURL(path string, localContext string, cfg LangConfig) string

        // Pre-built configs for each language.
        var (
            TypeScriptConfig LangConfig
            PythonConfig     LangConfig
            RustConfig       LangConfig
            JavaConfig       LangConfig
            CSharpConfig     LangConfig
        )
      location: internal/resolve/external.go
    - name: store.ChunkedExec
      description: Generic chunked batch execution helper for SQLite variable limit
      definition: |
        // Package store, file: internal/store/batch.go
        package store

        import (
            "context"
            "database/sql"
            "fmt"
        )

        // ChunkedExec executes a batch SQL operation in chunks to stay within
        // SQLite's 999-variable limit. Each chunk is executed within the provided
        // transaction. The caller is responsible for Begin/Commit/Rollback.
        //
        // paramsPerItem: number of SQL placeholders per item (e.g., 10 for nodes)
        // buildSQL: given a chunk, returns the SQL statement and flattened args
        func ChunkedExec[T any](
            ctx context.Context,
            tx *sql.Tx,
            items []T,
            paramsPerItem int,
            buildSQL func(chunk []T) (string, []interface{}),
        ) error

        // MaxChunkSize returns the maximum chunk size for the given params-per-item
        // to stay within SQLite's 999-variable limit.
        func MaxChunkSize(paramsPerItem int) int
      location: internal/store/batch.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Task: Add node kind constants and migrate all extractors to use edgetype + kind constants

            Create `internal/types/kinds.go` with node kind string constants, then migrate ALL
            extractors in `internal/indexer/` to use:
            1. `types.Kind*` constants instead of raw string literals for node kinds
            2. `edgetype.*` constants (from `internal/edgetype/constants.go`) instead of raw
               string literals for edge types

            ### What to implement

            **Step 1: Create `internal/types/kinds.go`**
            ```go
            package types

            const (
                KindFunction  = "function"
                KindMethod    = "method"
                KindType      = "type"
                KindInterface = "interface"
                KindConst     = "const"
                KindVar       = "var"
                KindService   = "service"
                KindRoute     = "route_handler"
                KindExternal  = "external"
                KindFile      = "file"
                KindPackage   = "package"
            )
            ```

            **Step 2: Migrate all extractors to use `types.Kind*` constants**

            In every extractor file (goextractor, gotsextractor, tsextractor, treesitter,
            rustextractor, javaextractor, csharpextractor, rubyextractor, graphqlextractor,
            cssextractor, protoextractor, terraformextractor, eventextractor, envextractor,
            helmextractor, k8sextractor, makefileextractor, packagejsonextractor,
            schemaextractor, dockerfileextractor, gitlabciextractor, sqlextractor,
            cloudextractor, scipingest):

            Replace all raw string literals for node kinds:
            - `"function"` -> `types.KindFunction`
            - `"method"` -> `types.KindMethod`
            - `"type"` -> `types.KindType`
            - `"interface"` -> `types.KindInterface`
            - `"const"` -> `types.KindConst`
            - `"var"` -> `types.KindVar`
            - `"service"` -> `types.KindService`
            - `"route_handler"` -> `types.KindRoute`
            - `"file"` -> `types.KindFile`
            - `"package"` -> `types.KindPackage`

            Only replace kind literals used as the `kind` parameter in `types.ComputeNodeHash()`
            calls or assigned to `Node.Kind` fields. Do NOT replace string literals used in
            other contexts (e.g., tree-sitter node type names like `"function_declaration"`).

            **Step 3: Migrate all extractors to use `edgetype.*` constants**

            Add `"github.com/blackwell-systems/knowing/internal/edgetype"` import to each
            extractor file and replace:
            - `"calls"` -> `edgetype.Calls`
            - `"imports"` -> `edgetype.Imports`
            - `"implements"` -> `edgetype.Implements`
            - `"references"` -> `edgetype.References`
            - `"handles_route"` -> `edgetype.HandlesRoute`
            - `"depends_on"` -> `edgetype.DependsOn`
            - `"extends"` -> `edgetype.Extends`
            - `"overrides"` -> `edgetype.Overrides`
            - `"decorates"` -> `edgetype.Decorates`
            - `"throws"` -> `edgetype.Throws`
            - `"tests"` -> `edgetype.Tests`
            - `"documents"` -> `edgetype.Documents`
            - `"consumes_endpoint"` -> `edgetype.ConsumesEndpoint`
            - `"implements_rpc"` -> `edgetype.ImplementsRPC`
            - `"consumes_rpc"` -> `edgetype.ConsumesRPC`
            - `"gated_by_flag"` -> `edgetype.GatedByFlag`
            - `"deployed_by"` -> `edgetype.DeployedBy`
            - `"tested_by"` -> `edgetype.TestedBy`
            - `"publishes"` -> `edgetype.Publishes`
            - `"subscribes"` -> `edgetype.Subscribes`
            - `"deploys"` -> `edgetype.Deploys`
            - `"configures"` -> `edgetype.Configures`
            - `"connects_to"` -> `edgetype.ConnectsTo`
            - `"exposes"` -> `edgetype.Exposes`
            - `"runtime_calls"` -> `edgetype.RuntimeCalls`

            Only replace edge type string literals used in `EdgeType` field assignments or
            `ComputeEdgeHash()` calls. Do NOT replace string literals in test assertions
            (those are in _test.go files not owned by this agent).

            ### Constraints
            - Do NOT modify test files (_test.go). Test files still use raw strings (they
              will continue to work since constants equal the same strings).
            - Do NOT modify `internal/types/interfaces.go` or `internal/types/results.go`
              (owned by Agent B).
            - Do NOT touch `internal/testutil/` (owned by Agent C).
            - Do NOT replace tree-sitter grammar node type strings (e.g., "function_declaration",
              "class_declaration"). Only replace strings used as knowing graph node kinds or
              edge types.

            ### Verification
