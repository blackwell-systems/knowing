            ## Task: Extract chunked batch helper to internal/store/batch.go

            Create a generic helper that encapsulates the chunked batch pattern used by
            BatchPutNodes, BatchPutEdges, and BatchPutFiles, then refactor those methods
            to use it.

            ### What to implement

            **Step 1: Create `internal/store/batch.go`**

            ```go
            package store

            import (
                "context"
                "database/sql"
                "fmt"
            )

            // MaxChunkSize returns the maximum number of items per SQL batch
            // to stay within SQLite's 999-variable limit.
            func MaxChunkSize(paramsPerItem int) int {
                return 999 / paramsPerItem
            }

            // ChunkedExec executes a batch SQL operation in chunks within the provided
            // transaction. Each chunk is passed to buildSQL which returns the SQL string
            // and the flattened argument slice.
            //
            // Example usage:
            //   err := ChunkedExec(ctx, tx, nodes, 10, func(chunk []types.Node) (string, []interface{}) {
            //       // build multi-row INSERT
            //   })
            func ChunkedExec[T any](
                ctx context.Context,
                tx *sql.Tx,
                items []T,
                paramsPerItem int,
                buildSQL func(chunk []T) (string, []interface{}),
            ) error {
                if len(items) == 0 {
                    return nil
                }
                chunkSize := MaxChunkSize(paramsPerItem)
                for i := 0; i < len(items); i += chunkSize {
                    end := i + chunkSize
                    if end > len(items) {
                        end = len(items)
                    }
                    query, args := buildSQL(items[i:end])
                    if _, err := tx.ExecContext(ctx, query, args...); err != nil {
                        return fmt.Errorf("batch chunk %d: %w", i/chunkSize, err)
                    }
                }
                return nil
            }
            ```

            **Step 2: Refactor `BatchPutNodes` in `internal/store/sqlite.go`**

            Replace the manual chunk loop with a call to `ChunkedExec`. The current code at
            approximately lines 214-251 has this pattern:
            ```go
            func (s *SQLiteStore) BatchPutNodes(ctx context.Context, nodes []types.Node) error {
                if len(nodes) == 0 {
                    return nil
                }
                tx, err := s.db.BeginTx(ctx, nil)
                ...
                const chunkSize = 99
                for i := 0; i < len(nodes); i += chunkSize {
                    ...
                }
                return tx.Commit()
            }
            ```

            Refactor to:
            ```go
            func (s *SQLiteStore) BatchPutNodes(ctx context.Context, nodes []types.Node) error {
                if len(nodes) == 0 {
                    return nil
                }
                tx, err := s.db.BeginTx(ctx, nil)
                if err != nil {
                    return fmt.Errorf("begin tx: %w", err)
                }
                defer tx.Rollback() //nolint:errcheck

                err = ChunkedExec(ctx, tx, nodes, 10, func(chunk []types.Node) (string, []interface{}) {
                    var b strings.Builder
                    b.WriteString(`INSERT OR REPLACE INTO nodes (node_hash, file_hash, qualified_name, kind, line, signature, doc, last_author, last_commit_at, coverage_pct) VALUES `)
                    args := make([]interface{}, 0, len(chunk)*10)
                    for j, n := range chunk {
                        if j > 0 {
                            b.WriteByte(',')
                        }
                        b.WriteString("(?,?,?,?,?,?,?,?,?,?)")
                        args = append(args, n.NodeHash[:], n.FileHash[:], n.QualifiedName, n.Kind, n.Line, n.Signature, n.Doc, n.LastAuthor, n.LastCommitAt, n.CoveragePct)
                    }
                    return b.String(), args
                })
                if err != nil {
                    return fmt.Errorf("batch insert nodes: %w", err)
                }
                return tx.Commit()
            }
            ```

