          task: |
            ## Task: Add provenance/confidence constants and remove dead types

            Two sub-tasks:
            1. Create `internal/types/provenance.go` with provenance tier and confidence constants
            2. Remove 3 dead types from `internal/types/`: ComputationCache, DerivedResult, TraversalOptions

            ### What to implement

            **Step 1: Create `internal/types/provenance.go`**
            ```go
            package types

            // Provenance tier constants identify how an edge was discovered.
            const (
                ProvenanceASTInferred     = "ast_inferred"
                ProvenanceASTResolved     = "ast_resolved"
                ProvenanceLSPResolved     = "lsp_resolved"
                ProvenanceSCIPResolved    = "scip_resolved"
                ProvenanceRuntimeObserved = "runtime_observed"
            )

            // Confidence constants represent the reliability of each provenance tier.
            const (
                ConfidenceASTInferred  = 0.7
                ConfidenceASTResolved  = 0.85
                ConfidenceLSPResolved  = 0.9
                ConfidenceSCIPResolved = 1.0
            )
            ```

            **Step 2: Remove dead types from `internal/types/interfaces.go`**

            Delete the `ComputationCache` interface. Find this exact text and remove it entirely:
            ```go
            // ComputationCache manages content-addressed derived computation results
            // (e.g., cached blast radius queries). Results are keyed by a combination
            // of query type, parameters, and snapshot root, and are automatically
            // invalidated when the snapshot changes.
            //
            // Interface defined now; implementation is deferred.
            type ComputationCache interface {
            	// Get retrieves a cached result by its content-addressed hash.
            	Get(ctx context.Context, resultHash Hash) (*DerivedResult, error)
            	// GetByQuery retrieves a cached result by query type, parameter hash, and snapshot root.
            	GetByQuery(ctx context.Context, queryType string, params Hash, snapshot Hash) (*DerivedResult, error)
            	// Put stores a computed result.
            	Put(ctx context.Context, result DerivedResult) error
            	// Invalidate evicts cached results that depend on edges changed between
            	// oldSnapshot and newSnapshot. Returns the number of evicted entries.
            	Invalidate(ctx context.Context, oldSnapshot, newSnapshot Hash, diff DiffResult) (evicted int, err error)
            }
            ```

            **Step 3: Remove dead types from `internal/types/results.go`**

            Delete `DerivedResult` struct. Find this exact text and remove it:
            ```go
            // DerivedResult is a content-addressed cached computation result.
            // Used by ComputationCache to store and retrieve expensive query results
            // (e.g., blast radius, transitive callers) keyed by query parameters
            // and snapshot root.
            type DerivedResult struct {
            	ResultHash   Hash   // content-addressed hash of this result
            	QueryType    string // type of query (e.g., "blast_radius", "transitive_callers")
            	QueryParams  Hash   // hash of the query parameters
            	SnapshotRoot Hash   // snapshot root at the time of computation
            	Data         []byte // serialized result data
            	ComputedAt   int64  // unix timestamp when computed
            	ComputedBy   string // identifier of the computing agent/indexer
            }
            ```

            Delete `TraversalOptions` struct. Find this exact text and remove it:
            ```go
            // TraversalOptions controls bounded graph traversal with early termination.
            // Used to prevent unbounded recursion in transitive caller/callee queries.
            type TraversalOptions struct {
            	MaxDepth      int     // maximum hop count from the starting node
            	MaxResults    int     // maximum number of results to return
            	MinConfidence float64 // minimum edge confidence to follow (0.0 to 1.0)
            }
            ```

            ### Constraints
            - Do NOT modify `internal/types/kinds.go` (owned by Agent A).
            - Do NOT remove `EdgeProvenance` struct or `CallerWithProvenance.Provenance` field
              (that is a separate backlog item requiring design decisions).
            - Do NOT modify any extractor files.
            - Verify no other file references `ComputationCache`, `DerivedResult`, or
              `TraversalOptions` before deleting (they should be unreferenced).

            ### Verification
            ```bash
            GOWORK=off go build ./...
            GOWORK=off go vet ./...
            GOWORK=off go test -short ./internal/types/... -timeout 1m
            ```

            Postconditions:
            - `grep -c 'ProvenanceASTInferred' internal/types/provenance.go` should output 1
            - `grep -c 'ComputationCache' internal/types/interfaces.go` should output 0
            - `grep -c 'DerivedResult' internal/types/results.go` should output 0
            - `grep -c 'TraversalOptions' internal/types/results.go` should output 0
          files:
            - internal/types/provenance.go
            - internal/types/interfaces.go
            - internal/types/results.go
        - id: C
          task: |
            ## Task: Extract shared mock store to internal/testutil/mockstore.go

            Create a shared `MockGraphStore` in `internal/testutil/mockstore.go` that implements
            `types.GraphStore` with sensible no-op defaults. Then refactor the 6 test files
            that define their own mock stores to embed and use the shared one.

            ### What to implement

            **Step 1: Create `internal/testutil/mockstore.go`**

            The shared mock must:
