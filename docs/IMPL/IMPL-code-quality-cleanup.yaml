title: Code Quality Cleanup (Audit Findings)
feature_slug: code-quality-cleanup
verdict: SUITABLE
suitability_assessment: |
    All five suitability questions resolve cleanly:

    1. File decomposition: The 7 audit items decompose into 5+ agents with disjoint file ownership.
       New constant packages (kinds, provenance) are independent files. Dead code removal touches
       types/interfaces.go and types/results.go (one agent). Mock store extraction creates a new
       testutil package. Edge type migration touches extractors (partitionable across agents).
       Batch helper is a new file in internal/store/.

    2. Investigation-first items: None. All items are well-defined refactoring tasks with clear
       scope identified in the audit.

    3. Interface discoverability: All cross-agent interfaces are fully definable now. The new
       constant packages export simple string/float64 constants. The mock store implements the
       existing types.GraphStore interface. The inferExternalRepoURL shared utility has 5
       concrete implementations to reference.

    4. Pre-implementation status: All 7 items are TODO (confirmed by code audit). No prior
       partial implementations exist.

    5. Parallelization value: High. Build+test cycle is >30s (go test ./... with SQLite, 5m
       timeout in CI). 5 agents in wave 1 with 3-8 files each. Tasks involve non-trivial logic
       (interface extraction, cross-package migration). Clear speedup over sequential.

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~12 min (5 agents x 8 min avg, single wave parallelism)
    - Merge and verification: ~4 min
    Total Polywave time: ~24 min

    Sequential baseline: ~40 min (5 agents x 8 min sequential)
    Time savings: ~16 min (40% faster)

    Recommendation: Clear speedup. Proceed.
test_command: GOWORK=off go test -short ./... -timeout 5m
lint_command: GOWORK=off go vet ./...
