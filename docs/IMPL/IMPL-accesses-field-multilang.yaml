interface_contracts:
    - name: extractFieldAccessEdges (per-language)
      description: |
        Each language implements its own extractFieldAccessEdges function following
        the same pattern as the Go reference implementation. The function walks
        method bodies for self/this field access patterns and emits accesses_field
        edges from the method node hash to field node hashes.
      definition: |
        func extractFieldAccessEdges(methodNode *sitter.Node, opts types.ExtractOptions, basePath string, methodHash types.Hash) []types.Edge
      location: internal/indexer/<pkg>/field_access_edges.go
    - name: extractStructFields / extractClassFields (per-language)
      description: |
        Each language implements field node extraction for struct/class field
        declarations. Creates nodes with kind="field" and QN pattern
        "repo://basePath.TypeName.fieldName". Uses ComputeNodeHash with
        scopedName = "TypeName.fieldName" and kind = types.KindField.
      definition: |
        func extractStructFields(node *sitter.Node, opts types.ExtractOptions, basePath string, typeName string) []types.Node
      location: internal/indexer/<pkg>/field_access_edges.go
    - name: isCommonFieldName
      description: |
        Shared filter function (duplicated per package since packages are independent).
        Returns true for field names too generic to be useful retrieval signals.
      definition: |
        func isCommonFieldName(name string) bool
        // Common fields: mu, mutex, lock, wg, once, ctx, err, logger, log
      location: internal/indexer/<pkg>/field_access_edges.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Rust: Add accesses_field edge extraction

            ### What to implement

            Port the Go `accesses_field` edge extraction to the Rust extractor package.
            Create `internal/indexer/rustextractor/field_access_edges.go` with:

            1. `extractFieldAccessEdges(methodNode, opts, basePath, implType, methodHash) []types.Edge`
               - For methods inside `impl` blocks, the receiver is `self`/`&self`/`&mut self`
               - Walk the method body for `field_expression` nodes where the object is `self`
               - Tree-sitter Rust grammar: `field_expression` has children `value` (the object)
                 and `field` (the field name accessed). The `value` for self-access is an
                 `identifier` node with content "self"
               - Exclude cases where the field_expression is the function child of a
                 call_expression (those are method calls like `self.start()`)
               - Emit accesses_field edge from methodHash to field node hash

            2. `extractStructFieldNodes(structNode, opts, basePath, typeName) []types.Node`
               - Walk `field_declaration_list` children of `struct_item` nodes
               - Each `field_declaration` has a `name` field (field_identifier) and a type
               - Create nodes with kind=types.KindField
               - QN: `fmt.Sprintf("%s://%s/%s.%s.%s", opts.RepoURL, opts.ModuleRoot, basePath, typeName, fieldName)`
               - Hash: `types.ComputeNodeHash(opts.RepoURL, basePath, types.EmptyHash, typeName+"."+fieldName, types.KindField)`

            3. `isCommonFieldName(name string) bool`
               - Filter: mu, mutex, lock, wg, once, ctx, err, logger, log (case-insensitive)

            ### Wiring into extractor.go

            In `extractImplItemWithImports` (and `extractImplItem`), after extracting the
            method via `extractFunctionItemWithImports`, call `extractFieldAccessEdges` on
            each method's function_item node. The `implType` variable already holds the
            type name for the impl block.

            In `extractStructItem`, after creating the struct node, call
            `extractStructFieldNodes` and append the field nodes.

            Wire the field access call in `extractFunctionItemWithImports` where `implType != ""`:

            Insert after this exact text in extractor.go:
            ```go
            	body := node.ChildByFieldName("body")
            	var edges []types.Edge
            	edges = append(edges, routeEdges...)
            	callEdges := extractCallEdgesFromBodyWithImports(body, opts, basePath, nodeHash, rustImports)
            	edges = append(edges, callEdges...)
            ```
            Add:
            ```go
            	if implType != "" {
            		fieldEdges := extractFieldAccessEdges(node, opts, basePath, implType, nodeHash)
            		edges = append(edges, fieldEdges...)
            	}
            ```

            For struct field nodes, in `extractStructItem`, after:
            ```go
            func extractStructItem(node *sitter.Node, opts types.ExtractOptions, basePath string) *types.Node {
            ```
            Change this function to also return field nodes, OR add the field extraction
            call at the call site in `extractTopLevelWithImports` after the struct node
            is created. The cleanest approach: in `extractTopLevelWithImports`, after
            ```go
            	case "struct_item":
            		n := extractStructItem(node, opts, basePath)
            		if n != nil {
            			nodes = append(nodes, *n)
            			deriveEdges := extractDeriveAttributes(node, opts, basePath, n.NodeHash)
            			edges = append(edges, deriveEdges...)
            		}
            ```
            Add:
            ```go
            		// Extract struct field declarations as field nodes.
            		fieldNodes := extractStructFieldNodes(node, opts, basePath)
            		nodes = append(nodes, fieldNodes...)
            ```

            ### Tree-sitter node types (Rust grammar)

            - `field_expression`: `self.field_name` access. Children: value (identifier "self"), field (field_identifier)
            - `call_expression`: parent of field_expression when it's a method call `self.method()`
            - `struct_item` -> `field_declaration_list` -> `field_declaration` (name: field_identifier)

            ### Tests (field_access_edges_test.go)

            Write tests using the existing `makeOpts` helper in extractor_test.go:

            1. `TestExtractFieldAccessEdges_RustSelf` - basic `self.field` in impl method
            2. `TestExtractFieldAccessEdges_RustSkipsMethodCalls` - `self.method()` excluded
            3. `TestExtractFieldAccessEdges_RustSkipsCommonFields` - filters mu, ctx, etc.
            4. `TestExtractStructFieldNodes_Rust` - struct field declarations produce field nodes

            ### Verification gate
