            - Do NOT add any new edge type constants (edgetype.AccessesField already exists)
            - Do NOT add any new kind constants (types.KindField already exists)
            - Use provenance "ast_inferred" and confidence 0.8 (matching Go implementation)
            - The `extractFieldAccessEdges` function should be a package-level function,
