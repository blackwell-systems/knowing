            ### Tree-sitter node types (Java grammar)

            - `field_access`: `this.fieldName`. Has `object` (this) and `field` (identifier) children.
            - `method_invocation`: parent check. If `field_access` is the `object` child of
              a `method_invocation`, it's actually `this.obj.method()` pattern.
              More precisely: if the `field_access` node itself appears as the direct `function`
              child... Actually in Java tree-sitter, method calls on `this` appear as:
              `method_invocation` with `object`=`this` and `name`=method_name.
              So `this.method()` is a `method_invocation`, NOT a `field_access`.
              `this.field` alone is a `field_access`. They are distinct node types.
              Therefore: just collect all `field_access` nodes where object="this".
            - `class_body` -> `field_declaration` -> `variable_declarator` (name: identifier)

