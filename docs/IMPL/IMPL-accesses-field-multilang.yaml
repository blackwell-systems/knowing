title: Add accesses_field edge extraction to Rust, Python, Java, C#, and TypeScript extractors
feature_slug: accesses-field-multilang
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: 5 languages, each in its own package with disjoint file ownership.
       Each agent creates field_access_edges.go + field_access_edges_test.go in its package
       and wires into the main Extract function. Zero overlap.
    2. Investigation-first: None. The Go implementation is the complete reference; each
       language port is mechanical adaptation of the same algorithm to different tree-sitter
       grammar node types.
    3. Interface discoverability: The contract is already established by the Go implementation:
       same function signature pattern, same edge type constant, same node hash computation.
    4. Pre-implementation status: All 5 packages currently have zero accesses_field support.
       The edgetype.AccessesField constant and types.KindField kind are already defined.
    5. Parallelization value: High. 5 fully independent agents (single wave), each touching
       3 files in a separate package. Build+test cycle ~30s per package. No cross-agent
       dependencies whatsoever.

    Estimated times:
    - Scout phase: ~8 min (reading 5 extractors, mapping patterns)
    - Agent execution: ~5 min (5 agents in parallel, ~5 min each but overlapping)
    - Merge and verification: ~3 min
    Total Polywave time: ~16 min

    Sequential baseline: ~25 min (5 agents x 5 min sequential)
    Time savings: ~9 min (36% faster)

    Recommendation: Clear speedup. 5 fully independent packages with no wave dependencies.
