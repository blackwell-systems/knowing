            ## C#: Add accesses_field edge extraction

            ### What to implement

            Port the Go `accesses_field` edge extraction to the C# extractor package.
            Create `internal/indexer/csharpextractor/field_access_edges.go` with:

            1. `extractFieldAccessEdges(methodNode, opts, parentContext string, methodHash) []types.Edge`
               - C# methods access fields via `this.FieldName` (explicit) or bare `FieldName`
                 (implicit). Only extract EXPLICIT `this.` access for now (high confidence).
               - Walk the method body for `member_access_expression` nodes where the
                 expression (object) is `this`
               - Tree-sitter C# grammar: `member_access_expression` has `expression` and
                 `name` children. When `expression` is `this_expression` or identifier "this",
                 it's a `this.Field` access.
               - Exclude cases where the `member_access_expression` is the function child
                 of an `invocation_expression` (those are method calls like `this.Start()`)
               - Emit accesses_field edge from methodHash to field node hash
               - Scoped name: use parentContext (class name) + "." + fieldName

            2. `extractClassFieldNodes(classNode, opts, parentContext string) []types.Node`
               - Walk declaration_list children of class_declaration for `field_declaration` nodes
               - Tree-sitter C#: `class_declaration` -> `declaration_list` -> `field_declaration`
                 Each field_declaration has `variable_declaration` -> `variable_declarator` (name: identifier)
               - Also check for `property_declaration` nodes (C# properties are field-like)
               - Create nodes with kind=types.KindField
               - QN: `e.qualifiedName(opts, parentContext, fieldName)` pattern
               - Hash: `types.ComputeNodeHash(opts.RepoURL, opts.FilePath, types.EmptyHash, parentContext+"."+fieldName, types.KindField)`

            3. `isCommonFieldName(name string) bool`
               - Filter: mu, mutex, lock, wg, once, ctx, err, logger, log (case-insensitive)
               - Also filter C#-specific: `_logger`, `_context`, `_disposed`

            ### Wiring into extractor.go

            In the `walkNode` method, in the `method_declaration` case, after calling
            `walkForCallsWithImports` on the body, add field access extraction.
            Insert after this exact text:
            ```go
            	case "method_declaration":
            		n, routeNodes, routeEdges := e.extractMethodDecl(node, opts, parentContext)
            		if n != nil {
            			*nodes = append(*nodes, *n)
            			*nodes = append(*nodes, routeNodes...)
            			*edges = append(*edges, routeEdges...)
            		}
            		// Walk body for call edges with import resolution.
            		body := node.ChildByFieldName("body")
            		if body != nil && n != nil {
            			e.walkForCallsWithImports(body, opts, parentContext, n.NodeHash, csharpImports, edges)
            		}
            ```
            Add:
            ```go
            		// Extract field access edges (this.Field patterns).
            		if body != nil && n != nil {
            			fieldEdges := extractFieldAccessEdges(body, opts, parentContext, n.NodeHash)
            			*edges = append(*edges, fieldEdges...)
            		}
            ```

            For class field nodes, in `extractClassDecl`, after creating the class node
            and extracting base list/attributes, before walking the body. Insert after:
            ```go
            	// Check for class-level route attributes (e.g., [Route("api/[controller]")]).
            	var routeNodes []types.Node
            	classRoute := e.extractClassRouteAttribute(node, opts, parentContext, name)
            	if classRoute != nil {
            		routeNodes = append(routeNodes, *classRoute)
            	}
            ```
            Add:
            ```go
            	// Extract class field declarations as field nodes.
            	fieldNodes := extractClassFieldNodes(node, opts, name)
            	*nodes = append(*nodes, fieldNodes...)
            ```

            ### Tree-sitter node types (C# grammar)

            - `member_access_expression`: `this.FieldName`. Has `expression` and `name` children.
              `expression` is `this_expression` (the literal `this` keyword in C# grammar).
