            ## Python: Add accesses_field edge extraction

            ### What to implement

            Port the Go `accesses_field` edge extraction to the Python extractor package.
            Create `internal/indexer/treesitter/field_access_edges.go` with:

            1. `extractFieldAccessEdges(methodNode, opts, classContext string, methodHash) []types.Edge`
               - Python methods use `self` as their first parameter
               - Walk the method body for `attribute` nodes where the object is `self`
               - Tree-sitter Python grammar: `attribute` node has children `object` and
                 `attribute` (the field name). The `object` for self-access is an `identifier`
                 node with content "self"
               - Exclude cases where the attribute node is the function child of a `call` node
                 (those are method calls like `self.start()`)
               - The classContext provides the type name for the scoped hash
               - Emit accesses_field edge from methodHash to field node hash

            2. `extractClassFieldNodes(classNode, opts, className) []types.Node`
               - Walk class body for assignment statements in `__init__` that assign to
                 `self.field_name` (these are Python's field declarations)
               - Also look for class-level type annotations: `field_name: type` at class body level
               - Tree-sitter patterns:
                 - `expression_statement` containing `assignment` where left is `attribute`
                   with object=`self` (in `__init__` method body)
                 - `type` annotated assignments at class body level
               - Create nodes with kind=types.KindField
               - QN: `fmt.Sprintf("%s://%s/%s.%s.%s", opts.RepoURL, opts.ModuleRoot, opts.FilePath, className, fieldName)`
               - Hash: `types.ComputeNodeHash(opts.RepoURL, opts.ModuleRoot, types.EmptyHash, className+"."+fieldName, types.KindField)`

            3. `isCommonFieldName(name string) bool`
               - Filter: mu, mutex, lock, wg, once, ctx, err, logger, log (case-insensitive)
               - Also filter Python-specific: `_lock`, `_logger`

            ### Wiring into extractor.go

            In `extractFunction`, after creating the function node, if `classContext != ""`
            (meaning it's a method), call `extractFieldAccessEdges` and append edges.

            The current code in extractFunction walks the body for calls. Add field access
            extraction BEFORE the body walk. Insert after this exact text:
            ```go
            	// Extract Python docstring from function body.
            	body := node.ChildByFieldName("body")
            	n.Doc = extractPythonDocstring(body, opts.Content)

            	result.Nodes = append(result.Nodes, n)
            ```
            Add:
            ```go
            	// Extract field access edges for methods (classContext != "").
            	if classContext != "" {
            		fieldEdges := extractFieldAccessEdges(node, opts, classContext, n.NodeHash)
            		result.Edges = append(result.Edges, fieldEdges...)
            	}
            ```

            For class field nodes, in `extractClassWithImports`, after creating the class
            node and before walking the body for methods. Insert after:
            ```go
            	result.Nodes = append(result.Nodes, n)

            	// Emit extends edges with import-resolved target hashes.
            	e.extractPythonBaseClasses(node, opts, n.NodeHash, pyImports, result)
            ```
            Add:
            ```go
            	// Extract class field declarations as field nodes.
            	fieldNodes := extractClassFieldNodes(node, opts, className)
            	result.Nodes = append(result.Nodes, fieldNodes...)
            ```

            ### Tree-sitter node types (Python grammar)

            - `attribute`: `self.field_name` access. Has `object` and `attribute` children.
              object is `identifier` "self", attribute is the field name string.
            - `call`: parent of `attribute` when it's a method call `self.method()`
              The `function` child of `call` is the `attribute` node.
            - `class_definition` -> body -> `function_definition` (for `__init__`)
              -> body -> `expression_statement` -> `assignment` (left=`attribute` with self)

            ### Tests (field_access_edges_test.go)

            Write tests using the existing `makeOpts` helper:

            1. `TestExtractFieldAccessEdges_PythonSelf` - basic `self.field` in method
            2. `TestExtractFieldAccessEdges_PythonSkipsMethodCalls` - `self.method()` excluded
            3. `TestExtractFieldAccessEdges_PythonSkipsCommonFields` - filters logger, etc.
            4. `TestExtractClassFieldNodes_Python` - __init__ assignments produce field nodes

            ### Verification gate
            ```bash
            GOWORK=off go build ./internal/indexer/treesitter/ && \
            GOWORK=off go vet ./internal/indexer/treesitter/ && \
            GOWORK=off go test ./internal/indexer/treesitter/ -timeout 60s -v -run "FieldAccess|ClassField"
