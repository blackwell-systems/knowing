waves:
    - number: 1
      agents:
        - id: D
          task: |
            ## Shared Infrastructure: Edge Types, Node Kinds, Walk Weights, Wire Format, Isolation Score

            ### What to implement

            1. **internal/edgetype/constants.go** - Add two new edge type constants and their RWR weights.

               Add to the const block (after `AccessesField`):
               ```go
               	AccessesField    = "accesses_field"  // method -> field node it reads/writes via receiver
               	ReadsEnv         = "reads_env"        // function -> env var it reads
               	ExecutesProcess  = "executes_process"  // function -> process it spawns
               ```

               Add cases to `RWRWeight` switch (before the default case):
               ```go
               case ReadsEnv:
               	return 0.4
               case ExecutesProcess:
               	return 0.5
               ```

            2. **internal/types/kinds.go** - Add two new node kind constants.

               Add to the const block (after `KindField`):
               ```go
               	KindEnvVar  = "env_var"
               	KindProcess = "process"
               ```

            3. **internal/context/walk.go** - Add entries to edgeWeights and adjEdgeTypeToID.

               Add to `edgeWeights` map (after `"accesses_field": 0.6,`):
               ```go
               	"reads_env":         0.4,
               	"executes_process":  0.5,
               ```

               Add to `adjEdgeTypeToID` map (after `"accesses_field": 34,`):
               ```go
               	"reads_env":         35,
               	"executes_process":  36,
               ```

            4. **internal/wire/binary.go** - Add wire format entries.

               Add to `edgeTypeToID` map (after `"accesses_field": 36,`):
               ```go
               	"reads_env":         37,
               	"executes_process":  38,
               ```

               Add to `idToEdgeType` map (add line after the existing last entry):
               ```go
               	37: "reads_env", 38: "executes_process",
               ```

               Add to `kindToID` map (after `"service": 16,`):
               ```go
               	"env_var":  17,
               	"process":  18,
               ```

               Add to `idToKind` map (after `16: "service",`):
               ```go
               	17: "env_var", 18: "process",
               ```

            5. **internal/diff/isolation.go** - New file implementing isolation score computation.

               ```go
               package diff

               import (
               	"context"
               	"math"

               	"github.com/blackwell-systems/knowing/internal/edgetype"
               	"github.com/blackwell-systems/knowing/internal/types"
               )

               type IsolationResult struct {
               	File         string   `json:"file"`
               	Score        float64  `json:"score"`
               	InboundEdges int      `json:"inbound_edges"`
               	OutboundEdges int     `json:"outbound_edges"`
               	HookExecuted bool     `json:"hook_executed"`
               	ReadsEnv     []string `json:"reads_env,omitempty"`
               	ExecutesProc []string `json:"executes_process,omitempty"`
               }

               func ComputeIsolation(ctx context.Context, store types.GraphStore, changedFiles []types.Hash) ([]IsolationResult, error)
               ```

               The isolation score formula:
               - Count inbound edges: edges from nodes NOT in changedFiles pointing to nodes in changedFiles
               - Count outbound dangerous edges: reads_env and executes_process edges from nodes in changedFiles
               - Check hook_executed: look for lifecycle hook references (prepare, postinstall script edges)
               - Score = (1.0 - min(inbound, 5) / 5.0) * outbound_factor * hook_factor
                 - outbound_factor = min(outbound_dangerous, 10) / 10.0
                 - hook_factor = 1.5 if hook_executed else 1.0
                 - Clamped to [0.0, 1.0]

               Use `store.NodesByFileHash(ctx, fileHash)` to get nodes for each file,
               then `store.EdgesTo(ctx, nodeHash, "")` for inbound and
               `store.EdgesFrom(ctx, nodeHash, "")` for outbound.

            6. **internal/diff/isolation_test.go** - Tests for the isolation score computation.

               Test cases:
               - Well-connected file (many inbound edges) -> low score (~0.0)
               - Isolated file with env reads -> high score (~0.7+)
               - Isolated file with process execution -> high score
               - Hook-executed isolated file -> score approaches 1.0
               - Clamping: score never exceeds 1.0

            ### Interfaces consumed
            - `types.GraphStore` (existing interface)
            - `types.Hash`, `types.Node`, `types.Edge` (existing types)

            ### Verification gate
            ```bash
            GOWORK=off go build ./internal/edgetype/... ./internal/types/... ./internal/context/... ./internal/wire/... ./internal/diff/...
            GOWORK=off go test ./internal/diff/... -run TestIsolation -v
            GOWORK=off go vet ./internal/edgetype/... ./internal/types/... ./internal/context/... ./internal/wire/... ./internal/diff/...
            ```

            Postconditions:
