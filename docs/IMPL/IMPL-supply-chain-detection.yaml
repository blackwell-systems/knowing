title: Supply Chain Attack Detection Infrastructure
feature_slug: supply-chain-detection
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: Work decomposes cleanly into 5 agents with disjoint file ownership.
       Each language extractor lives in its own package (gotsextractor, treesitter, tsextractor),
       shared infrastructure is in separate files (edgetype/constants.go, wire/binary.go,
       context/walk.go, types/kinds.go, diff/isolation.go), and the CLI command is its own file.
       The only shared files (edgetype, walk, wire, kinds) are owned by a single infrastructure
       agent; extractors only import from them.

    2. Investigation-first: None. The feature requirements are fully specified with exact
       tree-sitter node types, formulas, and target schemas.

    3. Interface discoverability: Yes. The edge type constants, node kinds, and isolation
       score API can be fully defined before implementation. Extractors follow an established
       pattern (see accesses_field implementation).

    4. Pre-implementation status: All TODO. No existing reads_env or executes_process
       extraction exists. No isolation score computation exists. No audit-supply-chain command.

    5. Parallelization value: High. 5 agents, build/test cycle >30s (GOWORK=off go test),
       3+ files per agent, all Wave 1 agents are fully independent after scaffolds.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (5 agents x 8 min avg, single wave)
    - Merge and verification: ~4 min
    Total Polywave time: ~24 min

    Sequential baseline: ~40 min (5 agents x 8 min avg)
    Time savings: ~16 min (40% faster)

    Recommendation: Clear speedup. Proceed.
