            # Wire IDs registered
            grep -q '"reads_env"' internal/wire/binary.go
            # Isolation file exists
            test -f internal/diff/isolation.go
            ```

            ### Constraints
            - Do NOT modify any extractor files (gotsextractor, treesitter, tsextractor). Those are owned by Agents A, B, C.
            - Do NOT create the CLI command file. That is owned by Agent E in Wave 2.
            - Do NOT modify cmd/knowing/main.go. That is owned by Agent E.
