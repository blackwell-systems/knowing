        - id: A
          task: |
            ## Go Extraction: reads_env and executes_process edges

            ### What to implement

            1. **internal/indexer/gotsextractor/env_edges.go** - Extract `reads_env` edges from Go functions.

               Pattern: Walk function/method bodies for call expressions matching:
               - `os.Getenv("VAR_NAME")` - call_expression where function is selector `os.Getenv`
               - `os.LookupEnv("VAR_NAME")` - call_expression where function is selector `os.LookupEnv`

               For each match, create:
               - Target node: kind=KindEnvVar ("env_var"), QN="env://VAR_NAME"
               - Edge: type=ReadsEnv ("reads_env"), confidence=0.9, provenance="ast_inferred"

               Follow the pattern in `field_access_edges.go`:
               - Unexported function called from the main extractor
               - Walks tree-sitter AST recursively
               - Uses `opts.Content` to read string literal values
               - Returns `([]types.Node, []types.Edge)`

               Function signature:
               ```go
               func extractEnvReadEdges(funcNode *sitter.Node, opts types.ExtractOptions, pkgPath string, sourceHash types.Hash) ([]types.Node, []types.Edge)
               ```

               Tree-sitter node matching for Go:
               - `call_expression` with `function` child being a `selector_expression`
               - selector_expression: operand="os", field="Getenv" or "LookupEnv"
               - First argument is a `interpreted_string_literal` (strip quotes to get var name)

            2. **internal/indexer/gotsextractor/process_edges.go** - Extract `executes_process` edges.

               Pattern: Walk function/method bodies for:
               - `exec.Command("cmd", args...)` - selector_expression operand="exec", field="Command"
               - `exec.CommandContext(ctx, "cmd", args...)` - same but skip first ctx arg

               For each match, create:
               - Target node: kind=KindProcess ("process"), QN="process://cmd-literal"
               - Edge: type=ExecutesProcess ("executes_process"), confidence=0.9, provenance="ast_inferred"

               If the command argument is not a string literal, use QN="process://dynamic".

               Function signature:
               ```go
               func extractProcessExecEdges(funcNode *sitter.Node, opts types.ExtractOptions, pkgPath string, sourceHash types.Hash) ([]types.Node, []types.Edge)
               ```

            3. **Test files** with table-driven tests covering:
               - os.Getenv with string literal
               - os.LookupEnv with string literal
               - Variable argument (should still extract with generic QN or skip)
               - exec.Command with string literal
               - exec.CommandContext with ctx + string literal
               - Dynamic command argument -> "process://dynamic"
               - No matches in a function body -> empty results

               Use the pattern from `internal/indexer/gotsextractor/field_access_edges_test.go`:
               parse Go source with tree-sitter, call the extraction function, assert nodes/edges.

            ### Integration point
            After creating the extraction functions, they need to be called from the main
            Go extractor's function/method processing loop. However, DO NOT modify the main
            extractor file (`gotsextractor.go`) in this wave. The integration will happen in
            Wave 2 or post-merge. For now, just create the extraction functions and their tests.

            NOTE: If the extractor already has a hook point where field_access_edges are called,
            you MAY add your calls at that same location IF it's in a file you own. Check
            `gotsextractor.go` for the pattern - if field_access_edges is called there, that
            file is NOT in your ownership. Leave a comment in your test file noting the
            integration point.

