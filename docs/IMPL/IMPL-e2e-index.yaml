interface_contracts:
    - name: ComputeNodeHash
      description: |
        Fix: node hash must NOT include file content hash. Currently nodes use
        opts.FileHash but call edge targets use EmptyHash, causing permanent
        hash mismatches. The fix is to ignore contentHash in the hash computation.
      definition: |
        func ComputeNodeHash(repoURL, packagePath string, _ Hash, symbolName, symbolKind string) Hash
      location: internal/types/types.go
    - name: BatchPutNodes
      description: |
        New methods on SQLiteStore for batch inserting within a single transaction.
      definition: |
        func (s *SQLiteStore) BatchPutNodes(ctx context.Context, nodes []types.Node) error
        func (s *SQLiteStore) BatchPutEdges(ctx context.Context, edges []types.Edge) error
        func (s *SQLiteStore) BatchPutFiles(ctx context.Context, files []types.File) error
      location: internal/store/sqlite.go
    - name: SetIndexFunc
      description: |
        Package-level function to wire real indexing into MCP handlers.
      definition: |
        func SetIndexFunc(fn func(ctx context.Context, repoURL, repoPath, commitHash string) error)
      location: internal/mcp/handlers.go
    - name: GitHeadCommit
      description: |
        Exported helper that reads HEAD commit hash from a git repository.
      definition: |
        func GitHeadCommit(repoPath string) (string, error)
      location: internal/daemon/daemon.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Fix the node hash mismatch bug and add batch insert support to the SQLite store.

            ### 1. Fix ComputeNodeHash (internal/types/types.go)

            The core bug: ComputeNodeHash includes contentHash in the hash computation.
            Node declarations pass opts.FileHash, but call edge targets pass EmptyHash.
            These never match. Fix by removing contentHash from the computation.

            Find this exact code in internal/types/types.go:
            ```go
            func ComputeNodeHash(repoURL, packagePath string, contentHash Hash, symbolName, symbolKind string) Hash {
            	data := fmt.Sprintf("%s\x00%s\x00%s\x00%s\x00%s", repoURL, packagePath, contentHash, symbolName, symbolKind)
            	return NewHash([]byte(data))
            }
            ```

            Replace with:
            ```go
            // ComputeNodeHash computes the content-addressed hash for a node.
            // The contentHash parameter is accepted for API compatibility but is
            // not included in the hash computation. Node identity depends on
            // (repo, package, name, kind) only.
            func ComputeNodeHash(repoURL, packagePath string, _ Hash, symbolName, symbolKind string) Hash {
            	data := fmt.Sprintf("%s\x00%s\x00%s\x00%s", repoURL, packagePath, symbolName, symbolKind)
            	return NewHash([]byte(data))
            }
            ```

            ### 2. Add batch insert methods (internal/store/sqlite.go)

            Add three methods after RecordEdgeEvent, before CreateSnapshot.
            Find this anchor:
            ```go
            func (s *SQLiteStore) RecordEdgeEvent(ctx context.Context, ev types.EdgeEvent) error {
            	_, err := s.db.ExecContext(ctx,
            		`INSERT INTO edge_events (edge_hash, event_type, snapshot_hash, source_commit, indexer_ver, timestamp)
            		 VALUES (?, ?, ?, ?, ?, ?)`,
            		ev.EdgeHash[:], ev.EventType, ev.SnapshotHash[:], ev.SourceCommit, ev.IndexerVer, ev.Timestamp,
            	)
            	return err
            }
            ```

            Add BatchPutNodes, BatchPutEdges, BatchPutFiles. Each: begin tx,
            prepare statement, loop exec, commit. On error, rollback.

            ### 3. Add tests (internal/store/sqlite_test.go)

            Add TestBatchPutNodes, TestBatchPutEdges, TestBatchPutFiles.
            Insert 100+ items via batch, verify readable. Test rollback behavior.

            ### Constraints
            - Do NOT modify files outside ownership list
            - Do NOT change ComputeNodeHash signature, only body
            - Do NOT change ComputeEdgeHash
            - Batch methods must use transactions

            ### Verification
            ```bash
            GOWORK=off go build ./internal/store/... ./internal/types/...
            GOWORK=off go vet ./internal/store/... ./internal/types/...
            GOWORK=off go test ./internal/store/... ./internal/types/... -count=1
            ```
          files:
            - internal/types/types.go
            - internal/store/sqlite.go
            - internal/store/sqlite_test.go
        - id: B
