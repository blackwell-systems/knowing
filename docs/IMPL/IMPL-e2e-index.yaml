            ```

            Add extractFile method (extracts without storing).

            Refactor IndexRepo to:
            1. Accumulate all results
            2. Fix FileHash computation: sha256(repoHash || path || contentHash)
            3. Fix ContentHash: use raw content hash, not FileHash
