pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Agent A changes ComputeNodeHash but existing tests in other packages
            depend on the old hash values, causing test failures on merge.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A's change makes contentHash ignored. Any value passed produces
            the same hash. Existing tests pass any contentHash and will still work.
        - scenario: |
            Agent C's package-level indexFunc is not thread-safe.
          likelihood: low
          impact: low
          mitigation: |
            SetIndexFunc is called once at startup before concurrent access.
        - scenario: |
            Agent B's batchStore type assertion fails on mock stores in tests.
          likelihood: medium
          impact: low
          mitigation: |
            Fallback to individual Put calls preserves correctness.
        - scenario: |
            Agent D's GitHeadCommit fails on packed refs.
          likelihood: medium
          impact: medium
          mitigation: |
            Task explicitly requires packed-refs fallback implementation.
        - scenario: |
            Wave 2 e2e test needs network for go/packages.Load.
          likelihood: medium
          impact: high
          mitigation: |
            Test module uses only stdlib imports. No network needed.
        - scenario: |
            Cross-package call edges still mismatch after wave 1.
          likelihood: low
          impact: high
          mitigation: |
            Agent B's wave 1 tests verify hash matching explicitly.
