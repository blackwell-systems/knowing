title: 'End-to-End: Make knowing index work on a real Go repository'
feature_slug: e2e-index
verdict: SUITABLE
suitability_assessment: |
    Suitability gate passed on all five criteria:

    1. File decomposition: 8+ files across 6 packages will change. Work decomposes
       into at least 4 agents with disjoint file ownership.

    2. Investigation-first: No unknown crashes or race conditions. All gaps are
       identified through code review: hash mismatches, missing batch inserts,
       stub handlers, no git integration, no integration test.

    3. Interface discoverability: The GraphStore interface is already defined and
       stable. Cross-agent contracts are the existing interface methods plus new
       BatchPut methods. All signatures are known.

    4. Pre-implementation status: The bootstrap skeleton is complete (all packages
       exist, all interfaces defined, unit tests pass). Every file needs deepening,
       not creation from scratch. The core bug is that ComputeNodeHash uses
       contentHash for node declarations but EmptyHash for call edge targets,
       making intra-repo cross-package edges produce dangling references.

    5. Parallelization value: Build+test cycle is ~5s. 4 agents with 2-4 files
       each, touching real logic (AST traversal, SQL batch operations, git
       integration, integration testing). Clear speedup over sequential.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~8 min (4 agents x ~4 min avg, single wave)
    - Merge and verification: ~3 min
    Total Polywave time: ~19 min
    Sequential baseline: ~25 min (4 agents x ~6 min avg)
    Time savings: ~6 min (24% faster)
    Recommendation: Clear speedup. Proceed.
