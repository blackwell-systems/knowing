            ## What to implement

            Fix GoExtractor node hash calls and indexer batch inserts.

            ### 1. Fix GoExtractor (internal/indexer/goextractor/extractor.go)

            Change all ComputeNodeHash calls to use types.EmptyHash instead of
            opts.FileHash. This ensures consistency with Agent A's fix.

            Locations to change (find each exact line):

