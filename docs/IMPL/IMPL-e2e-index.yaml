            ```
            Change opts.FileHash to types.EmptyHash.

            In genDeclNodes for ValueSpec:
            ```go
            				nodeHash := types.ComputeNodeHash(opts.RepoURL, pkgPath, opts.FileHash, name, kind)
            ```
            Change opts.FileHash to types.EmptyHash.

