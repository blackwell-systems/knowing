            ```

            Test cases:
            - TestRankSymbols_Empty: empty input returns empty/nil output
            - TestRankSymbols_SingleSymbol: single symbol gets correct score breakdown
            - TestRankSymbols_BlastRadiusWeight: symbol with CallerCount=50 scores higher on BlastRadius component (0.40) than one with CallerCount=1 (0.008)
            - TestRankSymbols_ConfidenceWeight: Confidence=1.0 gives component 0.25; Confidence=0.7 gives 0.175
            - TestRankSymbols_RecencyWeight: recently observed (time.Now().Unix()) gives component 0.20; never-observed (0) gives 0.0
            - TestRankSymbols_DistanceWeight: distance 0 gives component 0.15; distance 3 gives 0.0375
            - TestRankSymbols_Ordering: verify results are sorted by Score descending
            - TestRankSymbols_ComponentBreakdown: known inputs produce exact expected ScoreComponents values
            - TestRankSymbols_MaxBlastRadius: CallerCount=100 (>50) caps blast radius component at 0.40

            **File: `internal/context/tokens_test.go`**

            Tests for token estimation:

