            ## Context: Graph-Aware Context Packing - Core Engine + Ranking + Tokens

            Implement the core context engine in `internal/context/`. This is a new package
            that queries the knowing knowledge graph to produce task-specific, token-budgeted
            context blocks ranked by graph relationships and runtime traffic.

            ### What to implement

            **File: `internal/context/context.go`**

            Package declaration and core types:
            ```go
            package context
            ```

            Types to define:
            - `ContextEngine` struct holding a `types.GraphStore` field (unexported field `store`)
            - `TaskOptions` struct with fields: TaskDescription string, TokenBudget int, Format string, DBPath string
            - `FileOptions` struct with fields: Files []string, RepoURL string, TokenBudget int, Format string
            - `ContextBlock` struct with fields: Symbols []RankedSymbol, Format string, TokensUsed int, TokenBudget int
            - `RankedSymbol` struct with fields: Node types.Node, Score float64, Components ScoreComponents, Provenance string, Distance int
            - `ScoreComponents` struct with fields: BlastRadius float64, Confidence float64, Recency float64, Distance float64

            Functions:
            - `NewContextEngine(store types.GraphStore) *ContextEngine` - constructor
            - `(e *ContextEngine) ForTask(ctx context.Context, opts TaskOptions) (*ContextBlock, error)` - main entry point for task-based context
            - `(e *ContextEngine) ForFiles(ctx context.Context, opts FileOptions) (*ContextBlock, error)` - main entry point for file-based context

            ForTask logic:
            1. If TokenBudget is 0, default to 50000
            2. Extract keywords from TaskDescription (split on spaces, filter stop words like "the", "a", "in", "to", "for", "is", "of", "and", "or")
            3. Deduplicate keywords, convert to lowercase
            4. Use store.NodesByName with each keyword as prefix to find candidate symbols
            5. Deduplicate candidates by NodeHash
            6. For each candidate (up to 100 to limit work), query blast radius:
               - Call store.EdgesTo(ctx, node.NodeHash, "calls") to count callers
               - Call store.EdgesFrom(ctx, node.NodeHash, "calls") to find callees
               - Use the first edge's Confidence and LastObserved as representative values
            7. Build ScoringInput for each symbol:
               - CallerCount = len(callers)
               - Confidence = max confidence from incoming edges (or 0.5 if no edges)
               - LastObserved = max LastObserved from any connected edge
               - DistanceFromTarget = 0 for direct keyword matches
            8. Also add callers (Distance=1) and callees (Distance=1) as additional candidates
            9. Call RankSymbols to score and sort all candidates
            10. Pack into ContextBlock respecting TokenBudget:
                - Iterate ranked symbols, accumulate token cost via EstimateNodeTokens
                - Stop adding when budget would be exceeded
                - Set TokensUsed to actual accumulated tokens

            ForFiles logic:
            1. If TokenBudget is 0, default to 50000
            2. Compute repoHash from RepoURL: types.NewHash([]byte(opts.RepoURL))
            3. For each file path, call store.FileByPath(ctx, repoHash, path)
            4. For each found file, call store.NodesByName(ctx, "") and filter results where Node.FileHash matches file.FileHash
               (Note: this is a simplification; ideally we'd have a NodesByFile query, but the existing API works via prefix search filtered client-side)
            5. For each node found in the files:
               - Query callers via store.EdgesTo(ctx, node.NodeHash, "calls")
               - Get runtime observation data from edges (ObservationCount, LastObserved)
               - Build ScoringInput with Distance=0
            6. For each caller of file nodes, also build ScoringInput with Distance=1
            7. Call RankSymbols, then pack into ContextBlock respecting budget

            **File: `internal/context/ranking.go`**

            The ranking algorithm implementation:

            ```go
            package context
            ```

            Types:
            - `ScoringInput` struct with fields: Node types.Node, CallerCount int, Confidence float64, LastObserved int64, DistanceFromTarget int

            Functions:
            - `RankSymbols(symbols []ScoringInput) []RankedSymbol` - scores, sorts descending by Score, returns results

            Scoring formula (each symbol gets a Score from 0.0 to 1.0):
            - blast_radius_score = min(1.0, float64(CallerCount) / 50.0) * 0.40
            - confidence_score = Confidence * 0.25
            - recency_score = recencyFromTimestamp(LastObserved) * 0.20
            - distance_score = (1.0 / (1.0 + float64(DistanceFromTarget))) * 0.15
            - Total Score = blast_radius_score + confidence_score + recency_score + distance_score

            Helper function (unexported):
            ```go
            func recencyFromTimestamp(ts int64) float64
            ```
            - If ts == 0: return 0.0 (static-only edge, no runtime observation)
            - If within 1 day of now: return 1.0
            - If within 7 days: return 0.8
            - If within 30 days: return 0.5
            - If older: return 0.2

            Sort by Score descending using sort.Slice. Populate each RankedSymbol with:
            - Node from ScoringInput.Node
            - Score = total computed score
            - Components = ScoreComponents{BlastRadius: blast_radius_score, Confidence: confidence_score, Recency: recency_score, Distance: distance_score}
            - Provenance = Node's provenance if available (empty string if not applicable at this level)
            - Distance = ScoringInput.DistanceFromTarget

            **File: `internal/context/tokens.go`**

            Token estimation:

            ```go
            package context
            ```

            Functions:
            - `EstimateTokens(text string) int` - returns len(text) / 4 (integer division)
            - `EstimateNodeTokens(n types.Node) int` - estimates tokens for a node's full representation:
              Returns EstimateTokens(n.QualifiedName + " " + n.Kind + " " + n.Signature)

