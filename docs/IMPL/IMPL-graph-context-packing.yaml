            - TestForTask_DefaultBudget: call with TokenBudget=0, verify defaults to 50000
            - TestForFiles_ValidFiles: seed store with files and nodes, verify symbols found
            - TestForFiles_NoMatchingFiles: empty file list returns empty block

            **File: `internal/context/ranking_test.go`**

            Comprehensive tests for the ranking algorithm:

            ```go
