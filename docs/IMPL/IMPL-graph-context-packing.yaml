            - TestEstimateTokens_Short: "hello" (5 chars) returns 1
            - TestEstimateTokens_Long: 400-char string returns 100
            - TestEstimateTokens_CodeSnippet: a realistic Go function signature
            - TestEstimateNodeTokens_Basic: verify includes QualifiedName + Kind + Signature

            ### Interfaces

            Import from `github.com/blackwell-systems/knowing/internal/types`:
