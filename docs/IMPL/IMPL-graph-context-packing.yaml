interface_contracts:
    - name: NewContextEngine
      description: Constructor for the context engine, accepts a GraphStore
      definition: |
        func NewContextEngine(store types.GraphStore) *ContextEngine
      location: internal/context/context.go
    - name: ContextEngine.ForTask
      description: Produces ranked context for a task description by finding relevant symbols
      definition: |
        func (e *ContextEngine) ForTask(ctx context.Context, opts TaskOptions) (*ContextBlock, error)

        type TaskOptions struct {
          TaskDescription string
          TokenBudget     int    // default 50000
          Format          string // "xml", "markdown", "json"
          DBPath          string // path to knowing.db (for CLI usage)
        }
      location: internal/context/context.go
    - name: ContextEngine.ForFiles
      description: Produces blast-radius context weighted by runtime observations for changed files
      definition: |
        func (e *ContextEngine) ForFiles(ctx context.Context, opts FileOptions) (*ContextBlock, error)

        type FileOptions struct {
          Files       []string // relative file paths
          RepoURL     string   // repo URL for resolving file hashes
          TokenBudget int      // default 50000
          Format      string   // "xml", "markdown", "json"
        }
      location: internal/context/context.go
    - name: RankSymbols
      description: 'Core ranking algorithm: scores symbols by blast_radius (40%), confidence (25%), recency (20%), distance (15%)'
      definition: |
        func RankSymbols(symbols []ScoringInput) []RankedSymbol

        type ScoringInput struct {
          Node            types.Node
          CallerCount     int     // number of transitive callers (blast radius)
          Confidence      float64 // provenance tier confidence (0.0-1.0)
          LastObserved    int64   // unix timestamp of last runtime observation (0 = static only)
          DistanceFromTarget int  // hops from the task target symbol
        }
      location: internal/context/ranking.go
    - name: EstimateTokens
      description: 'Token estimation heuristic: 4 chars per token for code'
      definition: |
        func EstimateTokens(text string) int
      location: internal/context/tokens.go
    - name: FormatContextBlock
      description: Renders a ContextBlock into the requested format (xml/markdown/json)
      definition: |
        func FormatContextBlock(block *ContextBlock, format string) (string, error)
      location: internal/context/format.go
    - name: handleContextForTask
      description: MCP tool handler for context_for_task
      definition: |
        func (s *Server) handleContextForTask(ctx context.Context, req mcp.CallToolRequest) (*mcp.CallToolResult, error)
      location: internal/mcp/context_handlers.go
    - name: handleContextForFiles
      description: MCP tool handler for context_for_files
      definition: |
        func (s *Server) handleContextForFiles(ctx context.Context, req mcp.CallToolRequest) (*mcp.CallToolResult, error)
      location: internal/mcp/context_handlers.go
