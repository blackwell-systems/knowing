pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Agent C's resolver.Store interface drifts from Agent A's GraphStore additions,
            causing compilation failure at merge.
          likelihood: low
          impact: high
          mitigation: |
            Interface contracts specify exact signatures. Agent C uses a local Store
            interface with the same method signatures. Post-merge, SQLiteStore satisfies both.
        - scenario: |
            The go/packages Module field is nil for vendored or replaced dependencies,
            causing resolveTargetRepoURL to fall back to heuristic for all cross-repo calls.
          likelihood: medium
          impact: low
          mitigation: |
            The inferRepoURL heuristic handles github.com/org/repo patterns correctly,
            which covers the vast majority of Go dependencies. The resolver also handles
            any remaining dangling edges as a post-processing step.
        - scenario: |
            The resolver's reverse lookup map building is too slow for large graphs
            with many nodes (>100K).
          likelihood: low
          impact: medium
          mitigation: |
            For the 4,712 dangling edges mentioned in the feature description, even with
            100K nodes the map building is a single pass. The lookup is O(1) per edge.
        - scenario: |
            DanglingEdges returns edges to stdlib functions that were never indexed,
            creating noise in resolution stats.
          likelihood: medium
          impact: low
          mitigation: |
            The resolver skips edges whose inferred target looks like stdlib (no dots
            in the first path segment). Stats track skipped vs retargeted.
        - scenario: |
            Deterministic reindexing (architecture decision 8) breaks because the resolver
            modifies edges after snapshot computation.
          likelihood: medium
          impact: high
          mitigation: |
            The resolver runs AFTER snapshot computation. Resolved edges are not included
            in the snapshot hash. The snapshot reflects raw indexer output. Resolution
            is best-effort post-processing. This must be documented in code comments.
            Future work may recompute snapshot after resolution if needed.
