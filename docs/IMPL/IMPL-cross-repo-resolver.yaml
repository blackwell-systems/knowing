title: Cross-Repo Edge Resolver
feature_slug: cross-repo-resolver
verdict: SUITABLE
suitability_assessment: |
    Suitability gate:

    1. File decomposition: The work decomposes into 4+ files across 3 packages
       (types, store, resolver, extractor). No single file bottleneck. The resolver
       is entirely new code; store/types changes are additive (new methods/queries);
       extractor changes are localized to hash computation call sites.

    2. Investigation-first items: None. The root cause is fully understood:
       ComputeNodeHash(repoURL, targetPkg, ...) uses the calling repo's URL
       for cross-repo targets, but nodes are stored with the defining repo's URL.
       The fix path is clear.

    3. Interface discoverability: Yes. The GraphStore interface is well-defined.
       New methods (DanglingEdges, AllRepos) have clear signatures. The resolver
       is a new package with a clean interface consuming GraphStore.

    4. Pre-implementation status: No existing resolver code exists. The extractor
       has the bug. All work is TODO.

    5. Parallelization value: High. Build/test cycle is ~30s (go test requires
       packages.Load). 3 agents in wave 1 working on independent packages
       (types, store, resolver) benefit from parallel execution. Wave 2 fixes
       the extractor and wires the resolver into the indexer.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (4 agents, 2 waves, ~5 min per agent with parallelism)
    - Merge and verification: ~4 min
    Total Polywave time: ~24 min

    Sequential baseline: ~40 min (4 agents x 10 min avg)
    Time savings: ~16 min (40% faster)

    Recommendation: Clear speedup. Proceed.
