        - id: C
          task: |
            ## Task: Implement the cross-repo edge resolver

            Create the new package `internal/resolver/` with the resolver logic.

            ### 1. internal/resolver/resolver.go

            The resolver finds dangling edges and retargets them to the correct node
            by matching across repos using hash recomputation.

            **Core algorithm:**

            The root cause: when repo A calls repo B's function, the extractor computes
            the target hash as `ComputeNodeHash(repoA_URL, targetPkgPath, EmptyHash,
            symbolName, symbolKind)`. But repo B's node was stored with hash
            `ComputeNodeHash(repoB_URL, targetPkgPath, EmptyHash, symbolName, symbolKind)`.
            The hashes differ only in the repo URL component.

            Resolution approach:
            1. Call `store.DanglingEdges(ctx)` to get all edges with no matching target.
            2. Load all nodes from the store via `store.NodesByName(ctx, "")` (the LIKE
               prefix query with empty string returns all nodes).
            3. Identify all unique source repo URLs by looking up each dangling edge's
               source node and extracting the repo URL from its QualifiedName (the part
               before `://`).
            4. Build a reverse lookup map. For each source repo URL found in step 3,
               for each node loaded in step 2:
               - Parse the node's QualifiedName to extract: nodeRepoURL (before `://`),
                 remainder (after `://`), then split remainder on last `.` to get
                 pkgPath and symbolName.
               - Use the node's Kind field directly.
               - Compute: wrongHash = ComputeNodeHash(sourceRepoURL, pkgPath, EmptyHash,
                 symbolName, kind)
               - Store in map: wrongHash -> *Node
            5. For each dangling edge, look up edge.TargetHash in the map.
               If found, retarget: delete old edge, create new edge with correct
               target node hash.
            6. For unmatched edges, skip gracefully with a reason string.

            **Parsing QualifiedName:**
            Format: `{repoURL}://{pkgPath}.{SymbolName}`
            - Split on `://` to get repoURL and remainder
            - For the remainder, find the last `.` to split pkgPath from symbolName
            - For methods: `pkgPath.TypeName.MethodName`; the last `.`-separated
              segment is the symbol name, everything before it (including the type)
              is the package path as seen by ComputeNodeHash

            Actually, examining ComputeNodeHash more carefully:
            ```go
            data := fmt.Sprintf("%s\x00%s\x00%s\x00%s", repoURL, packagePath, symbolName, symbolKind)
            ```
            And examining how the extractor calls it:
            - For functions: `ComputeNodeHash(repoURL, pkgPath, EmptyHash, funcName, "function")`
            - For methods: `ComputeNodeHash(repoURL, pkgPath, EmptyHash, methodName, "method")`
              where pkgPath is the Go package import path (e.g., "github.com/org/repo/pkg")

            So for a node with QualifiedName "repoURL://pkgPath.TypeName.MethodName":
            - repoURL = "repoURL"
            - packagePath = "pkgPath" (the Go import path, NOT including TypeName)
            - symbolName = "MethodName" (just the method name)
            - symbolKind = node.Kind

            But wait: the extractor uses `name` not the full qualified portion.
            For functions: name = funcName
            For methods: name = methodName (just the method, not Type.Method)

            So we need to extract the LAST dot-separated segment of the remainder
            as the symbolName, and everything before the last dot as the pkgPath.

            **However**, the pkgPath passed to ComputeNodeHash is the Go IMPORT path
            (e.g., "github.com/org/repo/internal/pkg"), not the qualified name remainder.
            The qualified name format is `repoURL://importPath.SymbolName`.

            For `testmod://testmod/pkg.Hello`:
            - repoURL = "testmod"
            - The `://` split gives remainder = "testmod/pkg.Hello"
            - Last `.` split gives pkgPath = "testmod/pkg", symbolName = "Hello"

            For methods like `testmod://testmod/pkg.EnglishGreeter.Greet`:
            - remainder = "testmod/pkg.EnglishGreeter.Greet"
            - We need pkgPath = "testmod/pkg" and symbolName = "Greet"
            - But the extractor calls ComputeNodeHash with symbolName = "Greet"
              and pkgPath = "testmod/pkg"

            Problem: splitting on last `.` gives pkgPath = "testmod/pkg.EnglishGreeter"
            and symbolName = "Greet". But the actual pkgPath is "testmod/pkg".

            Solution: split the remainder into path segments (separated by `/`) and
            dot segments. The pkgPath is the portion that looks like an import path
            (contains `/`). Specifically:
            - Find the first `.` that is NOT preceded by a `/` segment containing a `.`
            - Or simpler: split on `/`, the last segment contains dot-separated
              identifiers. The import path is everything up to and including the last
              `/`-containing prefix.

            Even simpler: since we know the Go import path format, the pkgPath is
            everything up to but not including the first uppercase-starting segment
            after the last `/`. Actually this is getting complicated.

            **Pragmatic approach:** Instead of parsing qualified names, iterate through
            all nodes and for each node, try ALL possible (pkgPath, symbolName)
            decompositions. But that is wasteful.

            **Best approach:** For each node, recompute its hash using its ACTUAL
            parameters (which produced the correct hash), then also compute what the
            hash WOULD be with each source repo URL. We know the actual hash matches
            `ComputeNodeHash(nodeRepoURL, actualPkgPath, EmptyHash, actualName, actualKind)`.
            We need actualPkgPath and actualName.

            Since we cannot extract those from the qualified name reliably for methods,
            take a different approach: for each node, for each candidate source repo URL,
            compute `ComputeNodeHash(candidateRepoURL, pkgPath, EmptyHash, name, kind)`
            where pkgPath and name are the SAME values originally used to compute the
            node's hash. We can recover these by noting:

            The extractor creates qualified names as:
            - Functions: `fmt.Sprintf("%s://%s.%s", opts.RepoURL, pkgPath, name)`
            - Methods: `fmt.Sprintf("%s://%s.%s.%s", opts.RepoURL, pkgPath, recvType, name)`
            - Types: `fmt.Sprintf("%s://%s.%s", opts.RepoURL, pkgPath, name)`

            And ComputeNodeHash is called with:
            - Functions: `ComputeNodeHash(repoURL, pkgPath, _, name, "function")`
            - Methods: `ComputeNodeHash(repoURL, pkgPath, _, name, "method")`
              NOTE: for methods, symbolName is just the method name, NOT Type.Method
            - Types: `ComputeNodeHash(repoURL, pkgPath, _, name, kind)`

            So the relationship between QualifiedName and hash inputs:
            - QualifiedName = repoURL + "://" + pkgPath + "." + name (functions/types)
            - QualifiedName = repoURL + "://" + pkgPath + "." + typeName + "." + name (methods)
            - Hash inputs: (repoURL, pkgPath, name, kind)

            For functions/types: name is the last dot-segment of the qualified remainder.
            For methods: name is the last dot-segment, and pkgPath is everything in
            the remainder before the SECOND-to-last dot.

            But we don't know if it's a method or function from just the qualified name!
            We DO know from node.Kind.

            Algorithm for extracting hash inputs from a node:
            ```go
            func extractHashInputs(node types.Node) (repoURL, pkgPath, symbolName string) {
                parts := strings.SplitN(node.QualifiedName, "://", 2)
                if len(parts) != 2 {
                    return "", "", ""
                }
                repoURL = parts[0]
                remainder := parts[1]  // e.g., "testmod/pkg.Hello" or "testmod/pkg.Type.Method"

                lastDot := strings.LastIndex(remainder, ".")
                if lastDot < 0 {
                    return repoURL, remainder, ""
                }
                symbolName = remainder[lastDot+1:]
                prefix := remainder[:lastDot]  // e.g., "testmod/pkg" or "testmod/pkg.Type"

                if node.Kind == "method" {
                    // For methods, prefix contains "pkgPath.TypeName"
                    // We need just pkgPath. Find the last dot in prefix.
                    secondLastDot := strings.LastIndex(prefix, ".")
                    if secondLastDot >= 0 {
                        pkgPath = prefix[:secondLastDot]
                    } else {
                        pkgPath = prefix
                    }
                } else {
                    pkgPath = prefix
                }
                return repoURL, pkgPath, symbolName
            }
            ```

            Then verify: `ComputeNodeHash(repoURL, pkgPath, EmptyHash, symbolName, node.Kind)`
            should equal `node.NodeHash`. If it doesn't, the parsing is wrong; skip.

            **Define a local Store interface** to compile independently:
            ```go
            type Store interface {
                DanglingEdges(ctx context.Context) ([]types.Edge, error)
                AllRepos(ctx context.Context) ([]types.Repo, error)
                GetNode(ctx context.Context, hash types.Hash) (*types.Node, error)
                NodesByName(ctx context.Context, qualifiedPrefix string) ([]types.Node, error)
                DeleteEdge(ctx context.Context, hash types.Hash) error
                PutEdge(ctx context.Context, e types.Edge) error
            }
            ```

            **Types:**
            ```go
            type ResolveResult struct {
                OriginalEdge types.Edge
                ResolvedNode *types.Node
                Action       string  // "retargeted", "skipped"
                Reason       string
            }

            type ResolveStats struct {
                TotalDangling int
                Retargeted    int
                Skipped       int
                Errors        int
            }

            type Resolver struct {
                store Store
            }

            func NewResolver(store Store) *Resolver
            func (r *Resolver) Resolve(ctx context.Context) (*ResolveStats, error)
            func (r *Resolver) ResolveWithDetails(ctx context.Context) ([]ResolveResult, *ResolveStats, error)
            ```

            **Edge retargeting logic:**
            ```go
            newEdgeHash := types.ComputeEdgeHash(edge.SourceHash, resolvedNode.NodeHash, edge.EdgeType, edge.Provenance)
            newEdge := types.Edge{
                EdgeHash:   newEdgeHash,
                SourceHash: edge.SourceHash,
                TargetHash: resolvedNode.NodeHash,
                EdgeType:   edge.EdgeType,
                Confidence: edge.Confidence,
                Provenance: edge.Provenance,
            }
            store.DeleteEdge(ctx, edge.EdgeHash)
            store.PutEdge(ctx, newEdge)
            ```

            ### 2. internal/resolver/resolver_test.go

            Test with a real SQLiteStore (import internal/store).
            Create a helper that sets up the database and inserts test data.

            **TestResolve_CrossRepo:**
