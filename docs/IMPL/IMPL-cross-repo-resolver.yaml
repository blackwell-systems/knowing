interface_contracts:
    - name: DanglingEdges
      description: |
        Returns all edges whose target_hash does not match any node in the nodes table.
        This is the primary query for the resolver: find edges pointing to nonexistent targets.
      definition: |
        DanglingEdges(ctx context.Context) ([]Edge, error)
      location: internal/types/interfaces.go
    - name: AllRepos
      description: |
        Returns all repos in the store. Used by the resolver to iterate across repos
        when searching for nodes by qualified name.
      definition: |
        AllRepos(ctx context.Context) ([]Repo, error)
      location: internal/types/interfaces.go
    - name: NodesByQualifiedName
      description: |
        Returns all nodes with an exact qualified name match (not prefix).
        More precise than NodesByName for resolver lookups where the full
        qualified name is known but the repo prefix differs.
      definition: |
        NodesByQualifiedName(ctx context.Context, qualifiedName string) ([]Node, error)
      location: internal/types/interfaces.go
    - name: DeleteEdge
      description: |
        Deletes an edge by hash. Used by the resolver to remove the old
        dangling edge before inserting the corrected one.
      definition: |
        DeleteEdge(ctx context.Context, hash Hash) error
      location: internal/types/interfaces.go
    - name: ResolveResult
      description: |
        Result type for a single edge resolution attempt. Contains the original
        edge, the resolved target node (if found), and the action taken.
      definition: |
        type ResolveResult struct {
            OriginalEdge types.Edge
            ResolvedNode *types.Node
            Action       string  // "retargeted", "skipped"
            Reason       string
        }
      location: internal/resolver/resolver.go
    - name: ResolveStats
      description: |
        Aggregate statistics from a resolution pass.
      definition: |
        type ResolveStats struct {
            TotalDangling int
            Retargeted    int
            Skipped       int
            Errors        int
        }
      location: internal/resolver/resolver.go
    - name: Resolve
      description: |
        Main entry point for the cross-repo edge resolver. Finds all dangling edges,
        attempts to resolve each by searching for the target qualified name across all
        repos, and either retargets the edge or skips gracefully.
      definition: |
        func (r *Resolver) Resolve(ctx context.Context) (*ResolveStats, error)
      location: internal/resolver/resolver.go
    - name: resolveTargetRepoURL
      description: |
        Helper in the extractor that determines the correct repo URL for a cross-repo
        call target. Uses go/packages Module info when available, falls back to heuristic
        for inferring repo URL from import path.
      definition: |
        func resolveTargetRepoURL(opts types.ExtractOptions, targetPkg string, pkg *packages.Package) string
      location: internal/indexer/goextractor/extractor.go
