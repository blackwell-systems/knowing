interface_contracts:
    - name: ExtractDocumentsEdges
      description: |
        Extract 'documents' edges from Go source files. For each symbol declaration
        (function, method, type) that has a preceding doc comment (already detected by
        extractDocComment), create a 'documents' edge from a synthetic comment node to
        the declared symbol node.
      definition: |
        // ExtractDocumentsEdges creates 'documents' edges for declarations that have
        // doc comments. For each declaration node with a non-empty Doc field, creates
        // a synthetic "doc_comment" node and a 'documents' edge from it to the declaration.
        // Parameters:
        //   root: tree-sitter root node of the file
        //   opts: standard ExtractOptions
        //   pkgPath: resolved Go package path
        //   declNodes: nodes already extracted by Extract (with Doc field populated)
        // Returns: (commentNodes []types.Node, edges []types.Edge)
        func ExtractDocumentsEdges(root *sitter.Node, opts types.ExtractOptions, pkgPath string, declNodes []types.Node) ([]types.Node, []types.Edge)
      location: internal/indexer/gotsextractor/documents_edges.go
    - name: ExtractFeatureFlagEdges
      description: |
        Detect feature flag SDK calls and create 'gated_by_flag' edges from the
        enclosing function to a synthetic flag node. Supports patterns like
        client.BoolVariation("flag-name"), unleash.IsEnabled("flag-name"),
        and custom IsFeatureEnabled("flag-name") calls.
      definition: |
        // ExtractFeatureFlagEdges walks function bodies looking for feature flag SDK
        // call patterns and creates 'gated_by_flag' edges from the enclosing function
        // to a synthetic flag node.
        // Parameters:
        //   body: tree-sitter node of the function body
        //   opts: standard ExtractOptions
        //   pkgPath: resolved Go package path
        //   funcNodeHash: hash of the enclosing function node
        //   imports: import alias map
        // Returns: (flagNodes []types.Node, edges []types.Edge)
        func ExtractFeatureFlagEdges(body *sitter.Node, opts types.ExtractOptions, pkgPath string, funcNodeHash types.Hash, imports map[string]string) ([]types.Node, []types.Edge)
      location: internal/indexer/gotsextractor/featureflag_edges.go
    - name: ExtractEndpointEdgesTS
      description: |
        Detect HTTP client calls with literal URL paths in TypeScript/JavaScript
        (fetch, axios.get, etc.) and create 'consumes_endpoint' edges from the calling
        function to a synthetic route node.
      definition: |
        // ExtractEndpointEdges walks a function body for HTTP client call patterns
        // (fetch("/api/..."), axios.get("/api/..."), etc.) and creates 'consumes_endpoint'
        // edges from the enclosing function to a synthetic endpoint node.
        // Parameters:
        //   body: tree-sitter node of the function body
        //   opts: standard ExtractOptions
        //   qnamePrefix: qualified name prefix for this file
        //   sourceHash: hash of the enclosing function node
        // Returns: (endpointNodes []types.Node, edges []types.Edge)
        func ExtractEndpointEdges(body *sitter.Node, opts types.ExtractOptions, qnamePrefix string, sourceHash types.Hash) ([]types.Node, []types.Edge)
      location: internal/indexer/tsextractor/endpoint_edges.go
    - name: ExtractEndpointEdgesGo
      description: |
        Detect HTTP client calls with literal URL paths in Go (http.Get, http.Post,
        client.Get, etc.) and create 'consumes_endpoint' edges from the calling
        function to a synthetic route node.
      definition: |
        // ExtractGoEndpointEdges walks a function body for HTTP client call patterns
        // (http.Get("..."), http.Post("..."), client.Get("...")) and creates
        // 'consumes_endpoint' edges from the enclosing function to a synthetic endpoint node.
        // Parameters:
        //   body: tree-sitter node of the function body
        //   opts: standard ExtractOptions
        //   pkgPath: resolved Go package path
        //   funcNodeHash: hash of the enclosing function node
        //   imports: import alias map
        // Returns: (endpointNodes []types.Node, edges []types.Edge)
        func ExtractGoEndpointEdges(body *sitter.Node, opts types.ExtractOptions, pkgPath string, funcNodeHash types.Hash, imports map[string]string) ([]types.Node, []types.Edge)
      location: internal/indexer/gotsextractor/endpoint_edges.go
    - name: ExtractRPCImplementsEdges
      description: |
        Detect Go structs that embed pb.Unimplemented*Server and create
        'implements_rpc' edges from the concrete server struct to the proto
        service definition node. Also detect client call sites (pb.NewFooClient)
        and create 'consumes_rpc' edges.
      definition: |
        // ExtractRPCEdges scans Go source for gRPC implementation and client patterns.
        // For structs embedding pb.Unimplemented*Server: creates 'implements_rpc' edge
        // from the struct to the proto service node.
        // For pb.New*Client() calls: creates 'consumes_rpc' edge from the calling function
        // to the proto service node.
        // Parameters:
        //   root: tree-sitter root node of the Go file
        //   opts: standard ExtractOptions
        //   pkgPath: resolved Go package path
        //   imports: import alias map
        // Returns: (serviceNodes []types.Node, edges []types.Edge)
        func ExtractRPCEdges(root *sitter.Node, opts types.ExtractOptions, pkgPath string, imports map[string]string) ([]types.Node, []types.Edge)
      location: internal/indexer/protoextractor/rpc_edges.go
    - name: ExtractDeployedByEdges
      description: |
        Parse GitHub Actions workflow YAML to create 'deployed_by' edges from
        service/binary targets to the workflow that deploys them. Detects
        deployment steps (docker push, kubectl apply, deploy actions) and links
        them to the workflow node.
      definition: |
        // ExtractDeployedByEdges parses GitHub Actions workflow YAML and creates
        // 'deployed_by' edges from detected deployment targets to the workflow.
        // Also creates 'tested_by' edges from packages referenced in test steps
        // (go test ./pkg/..., npm test, pytest) to the workflow test job.
        // Parameters:
        //   opts: standard ExtractOptions (Content is the YAML)
        //   workflowHash: hash of the parent workflow node
        //   jobDefs: map of jobID -> parsed job definition
        // These are helper functions called from the actionsExtractor.
        func extractDeployedByEdges(opts types.ExtractOptions, workflowHash types.Hash, jobDefs map[string]jobDef) ([]types.Node, []types.Edge)
        func extractTestedByEdges(opts types.ExtractOptions, jobDefs map[string]jobDef) ([]types.Node, []types.Edge)
        type jobDef struct { Name string; Steps []stepDef; Uses string }
        type stepDef struct { Run string; Uses string; Name string }
      location: internal/indexer/cloudextractor/actions_deploy.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Task: Implement 'documents' and 'gated_by_flag' edges in Go tree-sitter extractor

            ### What to implement

            Two new edge types, each in its own file within `internal/indexer/gotsextractor/`.

            #### File 1: documents_edges.go

            Create `ExtractDocumentsEdges` that creates 'documents' edges from comment nodes
            to the symbols they document. The gotsextractor already calls `extractDocComment()`
            and populates `node.Doc`. This function takes the already-extracted nodes and creates
            edges for those with non-empty Doc fields.

            **Function signature:**
            ```go
            package gotsextractor

            import (
                sitter "github.com/smacker/go-tree-sitter"
                "github.com/blackwell-systems/knowing/internal/types"
            )

            // ExtractDocumentsEdges creates 'documents' edges for declarations that have
            // doc comments. For each declaration node with a non-empty Doc field, creates
            // a synthetic "doc_comment" node and a 'documents' edge from it to the declaration.
            func ExtractDocumentsEdges(root *sitter.Node, opts types.ExtractOptions, pkgPath string, declNodes []types.Node) ([]types.Node, []types.Edge)
            ```

            **Logic:**
            1. For each node in `declNodes` where `node.Doc != ""`:
               a. Create a synthetic doc_comment node:
                  ```go
                  commentName := "doc:" + node.QualifiedName  // e.g., "doc:repo://pkg.FuncName"
                  commentHash := types.ComputeNodeHash(opts.RepoURL, pkgPath, types.EmptyHash, commentName, "doc_comment")
                  commentNode := types.Node{
                      NodeHash:      commentHash,
                      FileHash:      opts.FileHash,
                      QualifiedName: fmt.Sprintf("%s://%s.%s", opts.RepoURL, pkgPath, commentName),
                      Kind:          "doc_comment",
                      Line:          node.Line - 1, // comment precedes the declaration
                      Doc:           node.Doc,       // store the comment text
                  }
                  ```
               b. Create a 'documents' edge:
                  ```go
                  provenance := "ast_inferred"
                  edgeHash := types.ComputeEdgeHash(commentHash, node.NodeHash, "documents", provenance)
                  edge := types.Edge{
                      EdgeHash:   edgeHash,
                      SourceHash: commentHash,
                      TargetHash: node.NodeHash,
                      EdgeType:   "documents",
                      Confidence: 0.9,
                      Provenance: provenance,
                  }
                  ```
            2. Return accumulated comment nodes and edges.

            **Note:** Confidence is 0.9 (doc comments are unambiguous). The edge goes FROM
            the comment node TO the symbol (comment documents symbol).

            #### File 2: featureflag_edges.go

            Create `ExtractFeatureFlagEdges` that detects feature flag SDK calls and creates
            'gated_by_flag' edges from the enclosing function to a synthetic flag node.

            **Function signature:**
            ```go
            package gotsextractor

            import (
                sitter "github.com/smacker/go-tree-sitter"
                "github.com/blackwell-systems/knowing/internal/types"
            )

            // ExtractFeatureFlagEdges walks function bodies looking for feature flag SDK
            // call patterns and creates 'gated_by_flag' edges.
            func ExtractFeatureFlagEdges(body *sitter.Node, opts types.ExtractOptions, pkgPath string, funcNodeHash types.Hash, imports map[string]string) ([]types.Node, []types.Edge)
            ```

            **Detection patterns (all are selector_expression call patterns):**
            1. `*.BoolVariation("flag-name", ...)` - LaunchDarkly
            2. `*.StringVariation("flag-name", ...)` - LaunchDarkly
            3. `*.IntVariation("flag-name", ...)` - LaunchDarkly
            4. `*.Float64Variation("flag-name", ...)` - LaunchDarkly
            5. `*.JSONVariation("flag-name", ...)` - LaunchDarkly
            6. `*.IsEnabled("flag-name")` - Unleash
            7. `*.isEnabled("flag-name")` - generic
            8. `IsFeatureEnabled("flag-name")` - custom (plain identifier call)
            9. `isFeatureEnabled("flag-name")` - custom (plain identifier call)
            10. `*.GetFlag("flag-name")` - generic
            11. `*.Enabled("flag-name")` - generic

            **Logic:**
            1. Walk the function body recursively for call_expression nodes
            2. For each call matching a pattern above:
               a. Extract the flag name from the first string argument
               b. Create a synthetic flag node:
                  ```go
                  flagHash := types.ComputeNodeHash(opts.RepoURL, "flags", types.EmptyHash, flagName, "feature_flag")
                  flagNode := types.Node{
                      NodeHash:      flagHash,
                      FileHash:      types.EmptyHash, // synthetic, not tied to a file
                      QualifiedName: fmt.Sprintf("%s://flags.%s", opts.RepoURL, flagName),
                      Kind:          "feature_flag",
                      Signature:     "flag " + flagName,
                  }
                  ```
               c. Create a 'gated_by_flag' edge:
                  ```go
                  provenance := "ast_inferred"
                  edgeHash := types.ComputeEdgeHash(funcNodeHash, flagHash, "gated_by_flag", provenance)
                  edge := types.Edge{
                      EdgeHash:   edgeHash,
                      SourceHash: funcNodeHash,
                      TargetHash: flagHash,
                      EdgeType:   "gated_by_flag",
                      Confidence: 0.8,
                      Provenance: provenance,
                  }
                  ```
            3. Deduplicate edges and flag nodes by hash.
            4. Return accumulated flag nodes and edges.

            **String argument extraction:** Reuse the existing `extractFirstStringArg` function
            pattern from extractor.go (looks for `interpreted_string_literal` or
            `raw_string_literal` in the arguments node).

            **Method name matching:** Create a package-level map for fast lookup:
            ```go
            var featureFlagMethods = map[string]bool{
                "BoolVariation":    true,
                "StringVariation":  true,
                "IntVariation":     true,
                "Float64Variation": true,
                "JSONVariation":    true,
                "IsEnabled":        true,
                "isEnabled":        true,
                "GetFlag":          true,
                "Enabled":          true,
            }

            var featureFlagFunctions = map[string]bool{
                "IsFeatureEnabled":  true,
                "isFeatureEnabled":  true,
            }
            ```

