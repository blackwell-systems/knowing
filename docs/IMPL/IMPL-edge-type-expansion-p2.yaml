          task: |
            ## Task: Implement 'implements_rpc' and 'consumes_rpc' edges

            ### What to implement

            Create `internal/indexer/protoextractor/rpc_edges.go` with logic to detect gRPC
            implementation patterns in Go source and create cross-referencing edges to proto
            service definitions.

            **Important context:** The protoextractor already creates nodes for gRPC services
            (kind="service") and RPC methods (kind="function") from .proto files. This new file
            adds a Go source code scanner that detects concrete implementations and client usage,
            creating edges that link Go code back to proto definitions.

            **This file is in the protoextractor package** but it parses Go source code (not .proto
            files). It uses the Go tree-sitter parser to detect patterns in Go files. The existing
            protoextractor only handles .proto files; this extends it to handle the Go side of gRPC.

            **Function signature:**
            ```go
            package protoextractor

            import (
                "context"
                "path/filepath"
                "strings"

                sitter "github.com/smacker/go-tree-sitter"
                "github.com/smacker/go-tree-sitter/golang"

                "github.com/blackwell-systems/knowing/internal/types"
            )

            // ExtractRPCEdges scans Go source for gRPC implementation and client patterns.
            // It creates 'implements_rpc' edges from server structs to proto service nodes,
            // and 'consumes_rpc' edges from client call sites to proto service nodes.
            func ExtractRPCEdges(root *sitter.Node, opts types.ExtractOptions, pkgPath string, imports map[string]string) ([]types.Node, []types.Edge)
            ```

            **Detection pattern 1: implements_rpc (server side)**

            In Go, gRPC server implementations embed `pb.Unimplemented*Server`:
            ```go
            type UserServer struct {
                pb.UnimplementedUserServiceServer
            }
            ```

            Detection logic:
            1. Walk top-level `type_declaration` nodes
            2. For each `type_spec` with a `struct_type` body:
               a. Walk the struct's field list
               b. Look for fields whose type is a selector_expression matching
                  `*.Unimplemented*Server` pattern
               c. Extract the service name: strip "Unimplemented" prefix and "Server" suffix
                  (e.g., "UnimplementedUserServiceServer" -> "UserService")
               d. Resolve the proto package from imports map (the `pb` or similar alias)
               e. Create implements_rpc edge:
                  ```go
                  // The struct node
                  structHash := types.ComputeNodeHash(opts.RepoURL, pkgPath, types.EmptyHash, structName, "type")
                  // The proto service node (in the proto package's namespace)
                  protoServiceHash := types.NewHash([]byte(protoPkgPath + "://" + serviceName + "/service"))
                  provenance := "ast_inferred"
                  edgeHash := types.ComputeEdgeHash(structHash, protoServiceHash, "implements_rpc", provenance)
                  ```
                  Confidence: 0.9 (embedding Unimplemented*Server is deterministic).

            **Detection pattern 2: consumes_rpc (client side)**

            Client creation: `pb.NewUserServiceClient(conn)`

            Detection logic:
            1. Walk function bodies for call_expression nodes
            2. Look for selector_expression calls matching `*.New*Client(...)` pattern
            3. Extract service name: strip "New" prefix and "Client" suffix
               (e.g., "NewUserServiceClient" -> "UserService")
            4. Create consumes_rpc edge:
               ```go
               protoServiceHash := types.NewHash([]byte(protoPkgPath + "://" + serviceName + "/service"))
               provenance := "ast_inferred"
               edgeHash := types.ComputeEdgeHash(funcNodeHash, protoServiceHash, "consumes_rpc", provenance)
               ```
               Confidence: 0.8 (New*Client pattern is highly reliable).

            **Proto package path resolution:**
            Use the imports map. If `pb` maps to `"github.com/example/api/proto/user"`, that is
            the proto package path. The service hash must match what the protoextractor produces:
            ```go
            // protoextractor creates service hashes as:
            serviceHash := types.NewHash([]byte(opts.RepoURL + "://" + pkgName + "." + serviceName + "/service"))
            ```
            Use the same pattern, substituting the resolved import path for the proto package.

            **Note on package placement:** This file is in `protoextractor` because it creates
            edges that reference proto service nodes (conceptual ownership). However, it needs
            its own tree-sitter Go parser since the protoextractor normally only parses .proto
            files. Create a package-level `goParser` variable (lazy-initialized) for this purpose.

            **Alternative approach:** If putting a Go parser in protoextractor feels wrong, you may
            instead create this as a standalone package `internal/indexer/rpcextractor/`. But for
            simplicity, keep it in protoextractor since it references proto service hash computation.

            ### Tests to write

            #### rpc_edges_test.go
            1. TestExtractRPCEdges_ImplementsServer: struct embedding pb.UnimplementedFooServer
            2. TestExtractRPCEdges_ClientCreation: pb.NewFooClient(conn) detected
            3. TestExtractRPCEdges_NoGRPC: Go file without gRPC patterns returns empty
            4. TestExtractRPCEdges_MultipleServices: multiple server impls and client calls
            5. TestExtractRPCEdges_CustomAlias: import alias `userpb` instead of `pb`
            6. TestExtractRPCEdges_NonProtoFile: non-Go patterns are not detected

            ### Verification gate
