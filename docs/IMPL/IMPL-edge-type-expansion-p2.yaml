          task: |
            ## Task: Implement 'consumes_endpoint' edges in TypeScript and Go extractors

            ### What to implement

            Two new files: one in the tsextractor for TypeScript/JS patterns, and one in
            the gotsextractor for Go patterns.

            #### File 1: internal/indexer/tsextractor/endpoint_edges.go

            Create `ExtractEndpointEdges` that detects HTTP client calls with literal URL
            paths and creates 'consumes_endpoint' edges.

            **Function signature:**
            ```go
            package tsextractor

            import (
                sitter "github.com/smacker/go-tree-sitter"
                "github.com/blackwell-systems/knowing/internal/types"
            )

            // ExtractEndpointEdges walks a function body for HTTP client call patterns
            // and creates 'consumes_endpoint' edges from the function to synthetic endpoint nodes.
            func ExtractEndpointEdges(body *sitter.Node, opts types.ExtractOptions, qnamePrefix string, sourceHash types.Hash) ([]types.Node, []types.Edge)
            ```

            **Detection patterns (TypeScript/JavaScript):**
            1. `fetch("/api/users")` - plain function call with string arg starting with "/" or "http"
            2. `fetch(\`/api/users\`)` - template literal (only extract if no interpolation)
            3. `axios.get("/api/users")` - member expression call
            4. `axios.post("/api/users", ...)` - member expression call
            5. `axios.put("/api/users")` - member expression call
            6. `axios.delete("/api/users")` - member expression call
            7. `axios.patch("/api/users")` - member expression call
            8. `http.get("/api/users")` - Angular HttpClient pattern
            9. `http.post("/api/users")` - Angular HttpClient pattern
            10. `client.get("/api/users")` - generic HTTP client pattern
            11. `api.get("/api/users")` - generic API client pattern

            **Method name matching:**
            ```go
            var httpClientMethods = map[string]bool{
                "get": true, "post": true, "put": true,
                "delete": true, "patch": true, "head": true,
                "request": true,
            }

            var httpClientObjects = map[string]bool{
                "axios": true, "http": true, "client": true,
                "api": true, "httpClient": true,
            }
            ```

            **Logic:**
            1. Walk the body recursively for call_expression nodes
            2. For each call matching a pattern:
               a. Extract the URL path from the first string argument
               b. Derive the HTTP method from the call (fetch = "ANY", axios.get = "GET", etc.)
               c. Extract just the path portion (strip "http://...", keep "/api/users")
               d. Create a synthetic endpoint node:
                  ```go
                  endpointSig := httpMethod + " " + urlPath
                  endpointHash := types.ComputeNodeHash(opts.RepoURL, "endpoints", types.EmptyHash, endpointSig, "endpoint")
                  endpointNode := types.Node{
                      NodeHash:      endpointHash,
                      FileHash:      types.EmptyHash,
                      QualifiedName: fmt.Sprintf("%s://endpoints.%s", opts.RepoURL, endpointSig),
                      Kind:          "endpoint",
                      Signature:     endpointSig,
                  }
                  ```
               e. Create a 'consumes_endpoint' edge:
                  ```go
                  provenance := "ast_inferred"
                  edgeHash := types.ComputeEdgeHash(sourceHash, endpointHash, "consumes_endpoint", provenance)
                  edge := types.Edge{
                      EdgeHash:   edgeHash,
                      SourceHash: sourceHash,
                      TargetHash: endpointHash,
                      EdgeType:   "consumes_endpoint",
                      Confidence: 0.6,
                      Provenance: provenance,
                  }
                  ```
            3. Deduplicate by edge hash. Return nodes and edges.

            **URL extraction helper:**
            ```go
            // extractURLPath extracts the path portion from a URL string.
            // "/api/users" -> "/api/users"
            // "http://service/api/users" -> "/api/users"
            // "https://api.example.com/v1/users" -> "/v1/users"
            func extractURLPath(rawURL string) string
            ```

            #### File 2: internal/indexer/gotsextractor/endpoint_edges.go

            Create `ExtractGoEndpointEdges` for Go HTTP client patterns.

            **Function signature:**
            ```go
            package gotsextractor

            import (
                sitter "github.com/smacker/go-tree-sitter"
                "github.com/blackwell-systems/knowing/internal/types"
            )

            // ExtractGoEndpointEdges walks a function body for Go HTTP client call patterns
            // and creates 'consumes_endpoint' edges.
            func ExtractGoEndpointEdges(body *sitter.Node, opts types.ExtractOptions, pkgPath string, funcNodeHash types.Hash, imports map[string]string) ([]types.Node, []types.Edge)
            ```

            **Detection patterns (Go):**
            1. `http.Get("http://service/api/users")` - net/http package
            2. `http.Post("http://service/api/users", ...)` - net/http package
            3. `http.NewRequest("GET", "http://service/api/users", ...)` - net/http package
            4. `client.Get("http://service/api/users")` - generic client
            5. `client.Post("http://service/api/users", ...)` - generic client
            6. `req, _ := http.NewRequest("POST", "/api/users", ...)` - request construction

            **Method name matching:**
            ```go
            var goHTTPClientMethods = map[string]bool{
                "Get": true, "Post": true, "Head": true,
                "Do": false, // Skip Do() - no URL argument
            }

            var goHTTPClientNewRequest = "NewRequest" // special case: method is first arg, URL is second
            ```

            **Logic:** Same pattern as TypeScript version but using Go tree-sitter node types
            (selector_expression, interpreted_string_literal). Check `imports` map to confirm
            the receiver is from "net/http" or a known HTTP client package.

            For `NewRequest` pattern: extract HTTP method from first string arg, URL from second
            string arg.

            ### Tests to write

            #### tsextractor/endpoint_edges_test.go
            1. TestExtractEndpointEdges_Fetch: `fetch("/api/users")` creates edge
            2. TestExtractEndpointEdges_Axios: `axios.get("/api/users")` creates edge with GET method
            3. TestExtractEndpointEdges_AxiosPost: `axios.post("/api/users")` creates edge with POST
            4. TestExtractEndpointEdges_FullURL: `fetch("http://service/api/users")` extracts path
            5. TestExtractEndpointEdges_NoHTTPCalls: function without HTTP calls returns empty
            6. TestExtractEndpointEdges_DynamicURL: template literal with interpolation is skipped
            7. TestExtractEndpointEdges_MultipleEndpoints: multiple calls create multiple edges

            #### gotsextractor/endpoint_edges_test.go
            1. TestExtractGoEndpointEdges_HttpGet: `http.Get("http://x/api/users")` creates edge
            2. TestExtractGoEndpointEdges_HttpPost: `http.Post("http://x/api/users", ...)` creates edge
            3. TestExtractGoEndpointEdges_NewRequest: `http.NewRequest("GET", "/api/users", nil)` creates edge
            4. TestExtractGoEndpointEdges_NoHTTPCalls: no HTTP client calls returns empty
            5. TestExtractGoEndpointEdges_NonHTTPPackage: method called "Get" on non-http package is skipped

