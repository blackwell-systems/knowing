            ## Task: Implement 'deployed_by' and 'tested_by' edges in GitHub Actions extractor

            ### What to implement

            Create `internal/indexer/cloudextractor/actions_deploy.go` with helper functions
            that the existing `actionsExtractor.extract()` can call to produce 'deployed_by'
            and 'tested_by' edges.

            **Context:** The existing `actions.go` already parses GitHub Actions workflow YAML
            and creates workflow, job, and action nodes. It processes `jobs[*].steps[*].uses`.
            The new file adds detection of deployment steps and test steps.

            #### deployed_by edges

            **Detection logic:**
            Parse each job's steps looking for deployment indicators:
            1. Steps with `uses:` matching deployment actions:
               - `aws-actions/amazon-ecs-deploy-task-definition@*`
               - `azure/webapps-deploy@*`
               - `google-github-actions/deploy-cloudrun@*`
               - `docker/build-push-action@*`
               - Contains "deploy" in the action name (heuristic)
            2. Steps with `run:` commands containing deployment patterns:
               - `docker push`
               - `kubectl apply`
               - `kubectl rollout`
               - `helm upgrade`
               - `terraform apply`
               - `serverless deploy`
               - `flyctl deploy`
               - `gcloud.*deploy`

            **For each detected deployment step:**
            1. Identify the deployment target:
               - From `docker push <image>`: target is the image name
               - From `kubectl apply -f <file>`: target is the file/resource name
               - From action inputs (e.g., `with.service`, `with.app-name`): target from inputs
               - Fallback: use the job name as the target identifier
            2. Create a synthetic deployment target node:
               ```go
               targetHash := types.ComputeNodeHash(opts.RepoURL, opts.FilePath, types.EmptyHash, targetName, "deployment_target")
               ```
            3. Create a 'deployed_by' edge from the target to the workflow:
               ```go
               provenance := "ast_inferred"
               edgeHash := types.ComputeEdgeHash(targetHash, workflowHash, "deployed_by", provenance)
               edge := types.Edge{
                   EdgeHash:   edgeHash,
                   SourceHash: targetHash,
                   TargetHash: workflowHash,
                   EdgeType:   "deployed_by",
                   Confidence: 0.9,
                   Provenance: provenance,
               }
               ```

            #### tested_by edges

            **Detection logic:**
            Parse each job's steps looking for test commands:
            1. Steps with `run:` containing test patterns:
               - `go test ./pkg/...` or `go test ./...` - extract package path
               - `npm test` or `npx jest` - target is "npm:test"
               - `pytest` or `python -m pytest` - target is "pytest"
               - `cargo test` - target is "cargo:test"
               - `make test` - target is "make:test"

            **For Go test commands:** Extract the package argument:
            - `go test ./internal/store/...` -> package = "internal/store"
            - `go test ./...` -> package = "." (entire repo)
            - `go test ./pkg/auth/ ./pkg/user/` -> multiple packages

            **For each detected test step:**
            1. Create a synthetic test target node (the package being tested):
               ```go
               testTargetHash := types.ComputeNodeHash(opts.RepoURL, opts.FilePath, types.EmptyHash, pkgName, "test_target")
               ```
            2. Create a 'tested_by' edge from the test target to the job:
               ```go
               provenance := "ast_inferred"
               edgeHash := types.ComputeEdgeHash(testTargetHash, jobHash, "tested_by", provenance)
               edge := types.Edge{
                   EdgeHash:   edgeHash,
                   SourceHash: testTargetHash,
                   TargetHash: jobHash,
                   EdgeType:   "tested_by",
                   Confidence: 0.8,
                   Provenance: provenance,
               }
               ```

            **Helper functions (exported for integration):**
            ```go
            package cloudextractor

            // extractDeployedByEdges parses job definitions for deployment patterns.
            func extractDeployedByEdges(opts types.ExtractOptions, workflowHash types.Hash, jobDefs map[string]jobDef) ([]types.Node, []types.Edge)

            // extractTestedByEdges parses job definitions for test command patterns.
            func extractTestedByEdges(opts types.ExtractOptions, jobDefs map[string]jobDef) ([]types.Node, []types.Edge)

            // jobDef is a convenience type for parsed job YAML.
            type jobDef struct {
                ID    string
                Hash  types.Hash
                Steps []map[string]interface{}
            }
            ```

            **Important:** These helper functions receive pre-parsed job data (already extracted
            in actions.go). The integration in Wave 2 will call these from within the existing
            actionsExtractor.extract() method.

            ### Tests to write

            #### actions_deploy_test.go
            1. TestExtractDeployedByEdges_DockerPush: `docker push myimage:latest` creates edge
            2. TestExtractDeployedByEdges_KubectlApply: `kubectl apply -f deploy.yaml` creates edge
            3. TestExtractDeployedByEdges_DeployAction: uses deploy action creates edge
            4. TestExtractDeployedByEdges_NoDeployment: job without deploy steps returns empty
            5. TestExtractDeployedByEdges_HelmUpgrade: `helm upgrade release chart` creates edge
            6. TestExtractTestedByEdges_GoTest: `go test ./internal/store/...` creates edge
            7. TestExtractTestedByEdges_NpmTest: `npm test` creates edge
            8. TestExtractTestedByEdges_MultiplePackages: multiple go test args create multiple edges
            9. TestExtractTestedByEdges_NoTests: job without test commands returns empty
            10. TestExtractTestedByEdges_Pytest: `pytest tests/` creates edge

            ### Verification gate
            ```bash
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go build ./internal/indexer/cloudextractor/... && GOWORK=off go test ./internal/indexer/cloudextractor/ -run "TestExtractDeployedBy|TestExtractTestedBy" -count=1 -timeout 30s
            ```

