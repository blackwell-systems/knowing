title: 'P2/P3 Edge Type Expansion: documents, consumes_endpoint, implements_rpc, consumes_rpc, gated_by_flag, deployed_by, tested_by'
feature_slug: edge-type-expansion-p2
verdict: SUITABLE
suitability_assessment: |
    File decomposition: The work cleanly decomposes into 5+ agents across disjoint files.
    Each new edge type maps to one or two existing extractor packages. The gotsextractor
    handles documents + gated_by_flag (Go source patterns). The tsextractor handles
    consumes_endpoint (fetch/axios patterns). The protoextractor handles implements_rpc
    and consumes_rpc. The cloudextractor (GitHub Actions) handles deployed_by and
    tested_by. All share only constants.go and edge-types.md (which go to a dedicated
    constants agent). No file is the sole bottleneck.

    Investigation-first items: None. All six edge types have clear detection patterns
    from the feature spec. The existing extractors provide established code patterns
    (tree-sitter walking, call detection, YAML parsing) to follow.

    Interface discoverability: All cross-agent interfaces are definable now. The only
    shared artifacts are the edge type string constants (already centralized in
    internal/edgetype/constants.go) and the RWR weights in internal/context/walk.go.
    Extractors are self-contained: they receive ExtractOptions, return ExtractResult.

    Pre-implementation status:
    - documents: TODO. The gotsextractor already calls extractDocComment() and stores
      the result in node.Doc, but no 'documents' edge exists.
    - consumes_endpoint: TODO. No implementation exists.
    - implements_rpc / consumes_rpc: TODO. The protoextractor creates nodes for services
      and RPCs but does not link concrete Go implementations back to proto definitions.
    - gated_by_flag: TODO. No implementation exists.
    - deployed_by: TODO. The cloudextractor/actions.go creates workflow/job/action nodes
      but does not create deployed_by edges to binary targets.
    - tested_by: TODO. The cloudextractor/actions.go does not parse test step commands.

    Parallelization value: High. 5 independent agents in wave 1 (each touching 2-3
    files in distinct packages). Build/test cycle is ~30-60s. Tasks involve non-trivial
    AST analysis and YAML parsing logic.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (5 agents x 10 min avg, wave 1 parallel + wave 2 integration)
    - Merge and verification: ~5 min
    Total Polywave time: ~30 min

    Sequential baseline: ~55 min (6 tasks x 10 min avg)
    Time savings: ~25 min (45% faster)

    Recommendation: Clear speedup. Proceed.
