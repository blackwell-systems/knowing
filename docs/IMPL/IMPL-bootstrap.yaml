title: 'knowing Bootstrap: Content-Addressed Knowledge Graph Daemon'
feature_slug: bootstrap
verdict: SUITABLE
suitability_assessment: |
    Suitability gate (5 questions):

    1. File decomposition: 6 concerns (types, store, snapshot, indexer, mcp, daemon)
       map to 6+ packages with fully disjoint file ownership. The architecture doc
       specifies clear package boundaries. No file is shared across agents.

    2. Investigation-first items: None. All 15 architecture decisions are made and
       binding. Interfaces are drafted. Schema is specified. No unknowns requiring
       root-cause analysis.

    3. Interface discoverability: GraphStore, Extractor, ComputationCache interfaces
       are fully drafted in architecture.md with exact method signatures. Symbol
       identity scheme, hash computation formulas, and domain types are specified.

    4. Pre-implementation status: Greenfield project. No existing code. All items
       are TODO.

    5. Parallelization value: High. Go build/test cycles are substantial (go/packages
       resolution, SQLite compilation, tree-sitter bindings). 6 agents in wave 1 with
       2-5 files each. All agents are independent (single wave for implementation),
       maximizing parallelization benefit.

    Estimated times:
    - Scout phase: ~10 min (architecture already designed; contracts need transcription)
    - Agent execution: ~15 min (6 wave-1 agents x 10 min avg, parallel)
    - Wave 2 wiring: ~5 min (1 agent)
    - Merge and verification: ~5 min
    Total Polywave time: ~35 min

    Sequential baseline: ~70 min (7 agents x 10 min avg)
    Time savings: ~35 min (50% faster)

    Recommendation: Clear speedup. 6-way parallelism in wave 1 with substantial
    per-agent work (SQLite backend, Go extractor with go/packages, tree-sitter
    bindings, MCP server, daemon with file watching).
