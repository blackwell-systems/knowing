    - file_path: internal/types/types.go
      contents: |
        package types

        import (
            "crypto/sha256"
            "encoding/hex"
            "fmt"
        )

        // Hash is a content-addressed identifier (SHA-256).
        type Hash [32]byte

        // EmptyHash is the zero-value hash.
        var EmptyHash Hash

        // NewHash computes a SHA-256 hash from the given data.
        func NewHash(data []byte) Hash {
            return sha256.Sum256(data)
        }

        // String returns the hex-encoded hash.
        func (h Hash) String() string {
            return hex.EncodeToString(h[:])
        }

        // IsZero returns true if the hash is the zero value.
        func (h Hash) IsZero() bool {
            return h == EmptyHash
        }

        // Node represents a symbol in the knowledge graph.
        type Node struct {
            NodeHash      Hash   // sha256(repo || package_path || content_hash || symbol_name || symbol_kind)
            FileHash      Hash   // reference to containing file
            QualifiedName string // {repo}://{module_path}/{package_path}.{TypeName}.{MemberName}
            Kind          string // function, type, method, interface, const, var
            Line          int    // source line number
            Signature     string // type signature for display
        }

        // Edge represents a relationship between two nodes.
        type Edge struct {
            EdgeHash   Hash    // sha256(source_node_hash || target_node_hash || edge_type || provenance_json)
            SourceHash Hash    // source node hash
            TargetHash Hash    // target node hash
            EdgeType   string  // calls, imports, implements, references, etc.
            Confidence float64 // 0.0 to 1.0
            Provenance string  // provenance source (ast_resolved, scip_imported, etc.)
        }

        // File represents a tracked source file.
        type File struct {
            FileHash    Hash   // sha256(repo_hash || path || content_hash)
            RepoHash    Hash   // reference to containing repo
            Path        string // relative path within repo
            ContentHash Hash   // sha256(file_contents)
        }

        // Repo represents a tracked repository.
        type Repo struct {
            RepoHash    Hash   // sha256(repo_url)
            RepoURL     string
            LastCommit  string
            LastIndexed int64  // unix timestamp
        }

        // Snapshot represents a point-in-time graph state (Merkle root).
        type Snapshot struct {
            SnapshotHash Hash   // merkle_root(sorted(all_edge_hashes))
            ParentHash   Hash   // previous snapshot in chain
            RepoHash     Hash   // which repo this snapshot is for
            CommitHash   string // git commit hash
            Timestamp    int64  // unix timestamp
            NodeCount    int
            EdgeCount    int
        }

        // EdgeEvent represents an append-only edge event (event sourcing).
        type EdgeEvent struct {
            EventID      int64
            EdgeHash     Hash
            EventType    string // "added" or "removed"
            SnapshotHash Hash
            SourceCommit string
            IndexerVer   string
            Timestamp    int64
        }

        // EdgeProvenance captures how an edge was derived.
        type EdgeProvenance struct {
            Source         string  // ast_resolved, scip_imported, runtime_trace, etc.
            Confidence     float64
            IndexerVersion string
            SourceCommit   string
            SourceFileHash Hash
            Timestamp      int64
        }

        // ComputeNodeHash computes the content-addressed hash for a node.
        func ComputeNodeHash(repoURL, packagePath string, contentHash Hash, symbolName, symbolKind string) Hash {
            data := fmt.Sprintf("%s\x00%s\x00%s\x00%s\x00%s", repoURL, packagePath, contentHash, symbolName, symbolKind)
            return NewHash([]byte(data))
        }

        // ComputeEdgeHash computes the content-addressed hash for an edge.
        func ComputeEdgeHash(sourceHash, targetHash Hash, edgeType, provenanceJSON string) Hash {
            data := fmt.Sprintf("%s\x00%s\x00%s\x00%s", sourceHash, targetHash, edgeType, provenanceJSON)
            return NewHash([]byte(data))
        }
      import_path: github.com/blackwell-systems/knowing/internal/types
      status: committed (92a3d44)
    - file_path: internal/types/interfaces.go
      contents: |
        package types

        import "context"

        // GraphStore defines the operations the graph engine requires from its
        // backing store. SQLite implements this today; an adjacency-list or
        // external graph backend can implement it tomorrow without changing callers.
        type GraphStore interface {
            PutNode(ctx context.Context, n Node) error
            PutEdge(ctx context.Context, e Edge) error
            PutFile(ctx context.Context, f File) error
            PutRepo(ctx context.Context, r Repo) error
            RecordEdgeEvent(ctx context.Context, ev EdgeEvent) error
            CreateSnapshot(ctx context.Context, s Snapshot) error
            GetNode(ctx context.Context, hash Hash) (*Node, error)
            GetEdge(ctx context.Context, hash Hash) (*Edge, error)
            GetSnapshot(ctx context.Context, hash Hash) (*Snapshot, error)
            GetRepo(ctx context.Context, hash Hash) (*Repo, error)
            NodesByName(ctx context.Context, qualifiedPrefix string) ([]Node, error)
            EdgesFrom(ctx context.Context, sourceHash Hash, edgeType string) ([]Edge, error)
            EdgesTo(ctx context.Context, targetHash Hash, edgeType string) ([]Edge, error)
            TransitiveCallers(ctx context.Context, target Hash, maxDepth int, snapshot Hash) ([]CallerResult, error)
            TransitiveCallees(ctx context.Context, source Hash, maxDepth int, snapshot Hash) ([]CalleeResult, error)
            BlastRadius(ctx context.Context, target Hash, snapshot Hash) (*BlastRadiusResult, error)
            SnapshotDiff(ctx context.Context, oldRoot, newRoot Hash) (*DiffResult, error)
            StaleEdges(ctx context.Context, snapshot Hash) ([]Edge, error)
            LatestSnapshot(ctx context.Context, repoHash Hash) (*Snapshot, error)
            FilesByRepo(ctx context.Context, repoHash Hash) ([]File, error)
            FileByPath(ctx context.Context, repoHash Hash, path string) (*File, error)
            Close() error
        }

        // Extractor produces nodes and edges from source files.
        type Extractor interface {
            Name() string
            CanHandle(path string) bool
            Extract(ctx context.Context, opts ExtractOptions) (*ExtractResult, error)
        }

        // ExtractOptions contains the inputs for an extraction run.
        type ExtractOptions struct {
            RepoURL    string
            RepoHash   Hash
            CommitHash string
            FilePath   string
            FileHash   Hash
            Content    []byte
            ModuleRoot string
        }

        // ExtractResult contains the nodes and edges produced by an extractor.
        type ExtractResult struct {
            Nodes []Node
            Edges []Edge
        }

        // ComputationCache manages content-addressed derived results.
        // Interface defined now; implementation deferred per requirements.
        type ComputationCache interface {
            Get(ctx context.Context, resultHash Hash) (*DerivedResult, error)
            GetByQuery(ctx context.Context, queryType string, params Hash, snapshot Hash) (*DerivedResult, error)
            Put(ctx context.Context, result DerivedResult) error
            Invalidate(ctx context.Context, oldSnapshot, newSnapshot Hash, diff DiffResult) (evicted int, err error)
        }
      import_path: github.com/blackwell-systems/knowing/internal/types
      status: committed (92a3d44)
    - file_path: internal/types/results.go
      contents: |
        package types

        // CallerResult is a node with its distance from the query target.
        type CallerResult struct {
            Node  Node
            Depth int
        }

        // CalleeResult is a node with its distance from the query source.
        type CalleeResult struct {
            Node  Node
            Depth int
        }

        // BlastRadiusResult groups transitive callers by repository.
        type BlastRadiusResult struct {
            Target     Node
            ByRepo     map[string][]CallerWithProvenance
            TotalCount int
            Truncated  bool
        }

        // CallerWithProvenance pairs a caller node with the edge provenance chain.
        type CallerWithProvenance struct {
            Caller     Node
            Depth      int
            Confidence float64
            Provenance []EdgeProvenance
        }

        // DiffResult contains the structural diff between two snapshots.
        type DiffResult struct {
            OldSnapshot  Hash
            NewSnapshot  Hash
            EdgesAdded   []Edge
            EdgesRemoved []Edge
            NodesAdded   []Node
            NodesRemoved []Node
        }

        // DerivedResult is a content-addressed computation result.
        type DerivedResult struct {
            ResultHash   Hash
            QueryType    string
            QueryParams  Hash
            SnapshotRoot Hash
            Data         []byte
            ComputedAt   int64
            ComputedBy   string
        }

        // TraversalOptions controls bounded traversal with early termination.
        type TraversalOptions struct {
            MaxDepth      int
            MaxResults    int
            MinConfidence float64
        }
      import_path: github.com/blackwell-systems/knowing/internal/types
      status: committed (92a3d44)
