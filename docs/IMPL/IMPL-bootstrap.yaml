            Postconditions:
            - `grep -q "func (g \*GoExtractor) Extract" internal/indexer/goextractor/extractor.go`
            - `grep -q "ExtractorRegistry" internal/indexer/extractor.go`
            - `grep -q "func (idx \*Indexer) IndexRepo" internal/indexer/indexer.go`

            ## Constraints
            - Do NOT modify files outside `internal/indexer/` and subdirs.
            - Do NOT create files in `internal/indexer/treesitter/` (owned by Agent D).
            - Use `golang.org/x/tools/go/packages`, not `go/ast` alone.
            - Define local SnapshotComputer interface; do not import internal/snapshot.
            - Sort all output deterministically.
          files:
