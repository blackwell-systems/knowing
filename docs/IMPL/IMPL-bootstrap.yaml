waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            SQLite-backed GraphStore implementation in `internal/store/`. This is the
            authoritative persistent store for the content-addressed knowledge graph.
            Uses WAL mode for concurrent read/write. All SQL is contained within this
            package; no other package touches SQL directly.

            ### Files to Create

            1. `internal/store/sqlite.go` - SQLiteStore struct implementing types.GraphStore
            2. `internal/store/sqlite_test.go` - Comprehensive tests
            3. `internal/store/migrate.go` - Migration runner using go:embed
            4. `internal/store/migrations/001_initial_schema.sql` - Initial schema

            ### Implementation Details

            **SQLiteStore** must implement every method of `types.GraphStore` from
            `internal/types/interfaces.go`. Use `modernc.org/sqlite` (CGo-free SQLite).

            **Database initialization:**
            - Open with `database/sql` using driver `"sqlite"` from `modernc.org/sqlite`
            - Enable WAL mode: `PRAGMA journal_mode=WAL`
            - Run migrations on open via `Migrate()` function
            - Use prepared statements for all queries

            **Schema** (from architecture.md decision #9) - put this in
            `internal/store/migrations/001_initial_schema.sql`:

            ```sql
            CREATE TABLE repos (
                repo_hash   BLOB PRIMARY KEY,
                repo_url    TEXT NOT NULL,
                last_commit TEXT,
                last_indexed INTEGER
            );
            CREATE TABLE files (
                file_hash    BLOB PRIMARY KEY,
                repo_hash    BLOB NOT NULL REFERENCES repos(repo_hash),
                path         TEXT NOT NULL,
                content_hash BLOB NOT NULL
            );
            CREATE TABLE nodes (
                node_hash      BLOB PRIMARY KEY,
                file_hash      BLOB NOT NULL REFERENCES files(file_hash),
                qualified_name TEXT NOT NULL,
                kind           TEXT NOT NULL,
                line           INTEGER,
                signature      TEXT
            );
            CREATE TABLE edges (
                edge_hash    BLOB PRIMARY KEY,
                source_hash  BLOB NOT NULL REFERENCES nodes(node_hash),
                target_hash  BLOB NOT NULL REFERENCES nodes(node_hash),
                edge_type    TEXT NOT NULL,
                confidence   REAL NOT NULL DEFAULT 1.0,
                provenance   TEXT NOT NULL DEFAULT 'ast_resolved'
            );
            CREATE TABLE edge_events (
                event_id      INTEGER PRIMARY KEY AUTOINCREMENT,
                edge_hash     BLOB NOT NULL,
                event_type    TEXT NOT NULL,
                snapshot_hash BLOB NOT NULL,
                source_commit TEXT NOT NULL,
                indexer_ver   TEXT NOT NULL,
                timestamp     INTEGER NOT NULL
            );
            CREATE TABLE snapshots (
                snapshot_hash BLOB PRIMARY KEY,
                parent_hash   BLOB REFERENCES snapshots(snapshot_hash),
                repo_hash     BLOB NOT NULL REFERENCES repos(repo_hash),
                commit_hash   TEXT NOT NULL,
                timestamp     INTEGER NOT NULL,
                node_count    INTEGER NOT NULL,
                edge_count    INTEGER NOT NULL
            );
            CREATE TABLE schema_version (version INTEGER PRIMARY KEY);
            CREATE INDEX idx_nodes_qualified ON nodes(qualified_name);
            CREATE INDEX idx_nodes_file ON nodes(file_hash);
            CREATE INDEX idx_edges_source ON edges(source_hash);
            CREATE INDEX idx_edges_target ON edges(target_hash);
            CREATE INDEX idx_edges_type ON edges(edge_type);
            CREATE INDEX idx_edge_events_snapshot ON edge_events(snapshot_hash);
            CREATE INDEX idx_files_repo ON files(repo_hash);
            ```

            **Migration runner** (`migrate.go`):
            - Use `//go:embed migrations/*.sql` to embed SQL files
            - Read current version from `schema_version` table (handle table not existing)
            - Apply all migrations > current version in order
            - Update `schema_version` after each migration
            - Wrap each migration in a transaction

            **TransitiveCallers / TransitiveCallees**: Use recursive CTEs. Respect maxDepth.
            **BlastRadius**: Call TransitiveCallers with max depth 5, group by repo URL.
            **SnapshotDiff**: Compare edges via edge_events table between two snapshots.
            **StaleEdges**: Find edges whose source node's file content_hash differs from current.

            ## Interfaces to Implement
            - `types.GraphStore` (all methods)

            ## Interfaces to Call
            - All types from `internal/types/`

            ## Tests to Write
            1. TestNewSQLiteStore_CreatesDatabase
            2. TestPutNode_GetNode_RoundTrip
            3. TestPutEdge_GetEdge_RoundTrip
            4. TestEdgesFrom_FiltersByType
            5. TestEdgesTo_FiltersByType
            6. TestTransitiveCallers_DepthLimit
            7. TestBlastRadius_GroupsByRepo
            8. TestCreateSnapshot_ChainLinks
            9. TestSnapshotDiff_DetectsChanges
            10. TestMigrate_AppliesInOrder
            11. TestStaleEdges_FindsMismatches
            12. TestNodesByName_PrefixMatch

            ## Verification Gate
            ```bash
            cd internal/store && go build ./... && go test ./... && go vet ./...
            ```

            Postconditions:
            - `grep -c "func (s \*SQLiteStore)" internal/store/sqlite.go` >= 20
            - `grep -c "func Test" internal/store/sqlite_test.go` >= 10
            - `grep -q "go:embed" internal/store/migrate.go` succeeds

            ## Constraints
            - Do NOT modify files outside `internal/store/`.
            - Do NOT use CGo. Use `modernc.org/sqlite` (pure Go).
            - All Hash values stored as BLOB (raw bytes), not hex strings.
            - Use upsert (INSERT OR REPLACE) for Put methods.
          files:
            - internal/store/sqlite.go
            - internal/store/sqlite_test.go
            - internal/store/migrate.go
            - internal/store/migrations/001_initial_schema.sql
        - id: B
          task: |
            ## What to Implement

            Snapshot manager in `internal/snapshot/`. Merkle root computation,
            snapshot chain management, diff, and garbage collection.

            ### Files to Create
            1. `internal/snapshot/manager.go` - SnapshotManager struct
            2. `internal/snapshot/merkle.go` - Merkle tree construction and diff
            3. `internal/snapshot/manager_test.go` - Tests

            ### Implementation Details

            **SnapshotManager** takes `types.GraphStore` to read edges for Merkle computation.

            **Merkle root** (decision #1): `snapshot_hash = merkle_root(sorted(all_edge_hashes))`
            - Collect all edge hashes for a repo, sort lexicographically
            - Build binary Merkle tree, root hash = snapshot hash

            **MerkleTree struct**: Build from sorted Hash slice. Support diff between trees.

            **ComputeSnapshot**: Get edges from GraphStore, sort, compute Merkle root,
            get latest snapshot for parent, count nodes/edges, store via CreateSnapshot.

            **GarbageCollect**: Remove old snapshots keeping N most recent, preserving chain.

            ## Interfaces to Call
            - `types.GraphStore` (EdgesFrom, EdgesTo, CreateSnapshot, LatestSnapshot, etc.)

            ## Tests to Write
            1. TestMerkleRoot_Deterministic
            2. TestMerkleRoot_EmptyEdges
            3. TestMerkleDiff_IdentifiesChanges
            4. TestComputeSnapshot_CreatesChain
            5. TestComputeSnapshot_Deterministic
            6. TestGarbageCollect_KeepsRecent
            7. TestGarbageCollect_PreservesChainIntegrity

            ## Verification Gate
            ```bash
            cd internal/snapshot && go build ./... && go test ./... && go vet ./...
            ```

            Postconditions:
            - `grep -c "func (sm \*SnapshotManager)" internal/snapshot/manager.go` >= 3
            - `grep -q "MerkleTree" internal/snapshot/merkle.go` succeeds
            - `grep -c "func Test" internal/snapshot/manager_test.go` >= 5

            ## Constraints
            - Do NOT modify files outside `internal/snapshot/`.
            - Do NOT access SQL directly. Use only `types.GraphStore`.
            - Sorting: use `bytes.Compare`, never map iteration order.
            - No timestamps in hash inputs. No randomness.
          files:
            - internal/snapshot/manager.go
            - internal/snapshot/merkle.go
            - internal/snapshot/manager_test.go
        - id: C
          task: |
            ## What to Implement

            Indexer framework and Go extractor in `internal/indexer/`.

            ### Files to Create
            1. `internal/indexer/indexer.go` - Indexer struct
            2. `internal/indexer/extractor.go` - ExtractorRegistry
            3. `internal/indexer/indexer_test.go` - Framework tests
            4. `internal/indexer/goextractor/extractor.go` - Go extractor
            5. `internal/indexer/goextractor/extractor_test.go` - Go extractor tests

            ### Implementation Details

            **ExtractorRegistry**: Maintains registered `types.Extractor` list.
            `Register()` adds, `FindExtractor(path)` returns first match.

            **Indexer**: Holds `types.GraphStore` and local `SnapshotComputer` interface:
            ```go
            type SnapshotComputer interface {
                ComputeSnapshot(ctx context.Context, repoHash types.Hash, commitHash string) (*types.Snapshot, error)
            }
            ```

            **IndexRepo**: Compute repo hash, store repo, walk directory, hash files,
            compare with stored hashes, extract changed files, store results, record events.

            **GoExtractor** (`goextractor/`): Uses `golang.org/x/tools/go/packages`.
            - `Name()` returns `"go"`, `CanHandle()` matches `.go` (not `_test.go`, not vendor)
            - Creates Node for each function/type/method/interface/const/var
            - Creates Edge for calls/imports/implements/references
            - Qualified name: `{repo}://{module_path}/{package_path}.{TypeName}.{MemberName}`
            - Provenance: `"ast_resolved"`, confidence: `1.0`

            **Determinism** (decision #8): Sort all output. No map iteration. No timestamps in hashes.

            ## Tests to Write
            1. TestExtractorRegistry_Register_FindsExtractor
            2. TestExtractorRegistry_NoMatch_ReturnsNil
            3. TestGoExtractor_CanHandle_GoFiles
            4. TestGoExtractor_Extract_ProducesNodes
            5. TestGoExtractor_Extract_ProducesCallEdges
            6. TestGoExtractor_Extract_QualifiedName
            7. TestGoExtractor_Extract_Deterministic
            8. TestIndexer_IndexFile_StoresResults
            9. TestIndexer_IndexRepo_SkipsUnchanged

            ## Verification Gate
            ```bash
