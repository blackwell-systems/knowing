            MUST prefix all helper functions with `compose`. Use these exact names:
            - `composeGetString(m map[string]interface{}, key string) string`
            - `composeToStringMap(m map[string]interface{}) map[string]string`
            - `composeMakeEdge(sourceHash, targetHash types.Hash, edgeType string) types.Edge`
            - `composeBuildQN(repoURL, filePath, kind, name string) string`

            **File: compose.go**

            Implement the `composeExtractor` struct:

            ```go
            type composeExtractor struct{}

            func (e *composeExtractor) name() string { return "docker-compose" }
            func (e *composeExtractor) canHandle(path string, content []byte) bool
            func (e *composeExtractor) extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)
            ```

            **Detection logic (canHandle):**
            - Filename (filepath.Base) is "docker-compose.yml" or "docker-compose.yaml", OR
            - File has .yaml/.yml extension AND content has top-level "services" key AND
              either a top-level "version" key or "name" key
            - Parse only top-level keys via yaml.Unmarshal into map[string]interface{}

            **Extraction logic (extract):**

            1. Parse YAML content into map[string]interface{}
            2. Find the "services" top-level key (map of service names to definitions)
            3. For each service:
               - Create a node with kind="service", symbol name = service name
               - QualifiedName: `{repoURL}://{filePath}.service.{serviceName}`
               - NodeHash: types.ComputeNodeHash(repoURL, filePath, types.EmptyHash, serviceName, "service")
            4. For edges, scan each service definition for:
               - **depends_on:** Can be a list of strings or a map with keys being service names.
                 Create "depends_on" edges to each referenced service.
               - **ports:** Each port mapping (e.g., "8080:80") creates an "exposes" edge.
                 Create a synthetic "port" node for each unique host port.
                 Port node kind="port", name=hostPort.
                 QualifiedName: `{repoURL}://{filePath}.port.{hostPort}`
               - **links:** List of strings (service names or "service:alias").
                 Parse service name (before colon if alias present).
                 Create "connects_to" edges to referenced services.
               - **networks:** Map or list of network names. For each network, create a
                 synthetic "network" node (deduplicate) and a "connects_to" edge.
                 Network node kind="network", name=networkName.
                 QualifiedName: `{repoURL}://{filePath}.network.{networkName}`

            **Constants:**
            ```go
            const (
                composeProvenance = "ast_inferred"
                composeConfidence = 0.7
            )
            ```

            **Imports required:**
            - "context"
            - "fmt"
            - "path/filepath"
            - "strings"
            - "github.com/blackwell-systems/knowing/internal/types"
            - "gopkg.in/yaml.v3"

            ### Test file: compose_test.go

            Create comprehensive tests covering:
            1. `TestComposeExtractor_CanHandle` - positive: docker-compose.yml, docker-compose.yaml,
               compose.yaml with services+version, compose.yml with services+name. Negative: plain
               YAML, services key without version/name, non-YAML files.
            2. `TestComposeExtractor_ExtractServices` - compose file with 3 services, verify nodes
            3. `TestComposeExtractor_ExtractDependsOn` - services with depends_on (both list and
               map forms), verify depends_on edges
            4. `TestComposeExtractor_ExtractPorts` - services with port mappings, verify port nodes
               and exposes edges
            5. `TestComposeExtractor_ExtractNetworks` - services sharing networks, verify network
               nodes and connects_to edges
            6. `TestComposeExtractor_ExtractLinks` - services with links, verify connects_to edges
            7. `TestComposeExtractor_EmptyServices` - compose file with empty services section

            Each test creates the extractor directly (`e := &composeExtractor{}`) and calls
            `e.extract()` with types.ExtractOptions.

            ### Verification gate
