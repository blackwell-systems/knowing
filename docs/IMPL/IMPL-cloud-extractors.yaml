interface_contracts:
    - name: CloudExtractor
      description: |
        Top-level extractor that implements types.Extractor and delegates to
        format-specific sub-extractors based on file content detection.
      definition: |
        type CloudExtractor struct {
            subs []subExtractor
        }

        func NewCloudExtractor() *CloudExtractor
        func (e *CloudExtractor) Name() string           // returns "cloud-yaml"
        func (e *CloudExtractor) CanHandle(path string) bool
        func (e *CloudExtractor) Extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)
      location: internal/indexer/cloudextractor/extractor.go
    - name: subExtractor
      description: |
        Internal interface for format-specific parsers. Each format file
        (cloudformation.go, compose.go, actions.go, serverless.go) implements this.
      definition: |
        type subExtractor interface {
            name() string
            canHandle(path string, content []byte) bool
            extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)
        }
      location: internal/indexer/cloudextractor/extractor.go
    - name: Registration in main.go
      description: |
        Register the CloudExtractor in registerAllExtractors function.
      definition: |
        import "github.com/blackwell-systems/knowing/internal/indexer/cloudextractor"
        // In registerAllExtractors:
        idx.Register(cloudextractor.NewCloudExtractor())
      location: cmd/knowing/main.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A: AWS CloudFormation/SAM Extractor

            ### What to implement

            Create `internal/indexer/cloudextractor/cloudformation.go` and its test file.
            The directory `internal/indexer/cloudextractor/` does not exist yet; create it.

            **Package declaration:** `package cloudextractor`

            **CRITICAL: Helper function naming.** All four Wave 1 agents create files in the
            same Go package. To avoid duplicate function name collisions at merge time, you
            MUST prefix all helper functions with `cfn`. Use these exact names:
            - `cfnGetString(m map[string]interface{}, key string) string`
            - `cfnToStringMap(m map[string]interface{}) map[string]string`
            - `cfnMakeEdge(sourceHash, targetHash types.Hash, edgeType string) types.Edge`
            - `cfnBuildQN(repoURL, filePath, kind, name string) string`

            **File: cloudformation.go**

            Implement the `cfnExtractor` struct. In Wave 2, Agent E will define a
            `subExtractor` interface that this struct satisfies. For now, implement these
            methods (they match the interface shape exactly):

            ```go
            type cfnExtractor struct{}

            func (e *cfnExtractor) name() string { return "cloudformation" }
            func (e *cfnExtractor) canHandle(path string, content []byte) bool
            func (e *cfnExtractor) extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)
            ```

            **Detection logic (canHandle):**
            - File must have .yaml or .yml extension
            - Content must contain a top-level "AWSTemplateFormatVersion" field OR
              a top-level "Transform" field whose value starts with "AWS::Serverless"
            - Parse only the top-level keys (unmarshal into map[string]interface{})
              to check; do not require specific directory paths

            **Extraction logic (extract):**

            1. Parse the YAML content into map[string]interface{}
            2. Find the "Resources" top-level key (map of resource logical IDs to definitions)
            3. For each resource:
               - Read "Type" field (e.g., "AWS::Lambda::Function", "AWS::DynamoDB::Table")
               - Create a node with kind="resource", using the logical ID as the symbol name
               - QualifiedName format: `{repoURL}://{filePath}.resource.{logicalID}`
               - NodeHash: types.ComputeNodeHash(repoURL, filePath, types.EmptyHash, logicalID, "resource")
            4. For edges, scan each resource's "Properties" for:
               - **Fn::Ref / Ref:** If a property value is a map with key "Ref",
                 extract the referenced logical ID. Create a "references" edge from the
                 current resource to the referenced resource (if it exists in nodeMap).
               - **Fn::GetAtt:** If a property value is a map with key "Fn::GetAtt"
                 (value is a list [logicalID, attribute]), create a "references" edge
                 from current resource to the target logical ID.
               - **DependsOn:** If the resource has a "DependsOn" field (string or list
                 of strings), create "depends_on" edges to each referenced logical ID.
            5. For AWS::Serverless::Function resources, check for "Events" under Properties:
               - Each event key maps to a value with a "Type" and "Properties" field
               - For Api/HttpApi events: extract Path and Method from Properties. Create a
                 "route" node (kind="route", name="{METHOD} {path}") and a "handles_route"
                 edge from the function to the route node.
               - For S3, SQS, SNS, Schedule events: create a "subscribes" edge from the
                 function node to a synthetic event_source node (kind="event_source").

            **Constants:**
            ```go
            const (
                cfnProvenance = "ast_inferred"
                cfnConfidence = 0.7
            )
            ```

            **Imports required:**
            - "context"
            - "fmt"
            - "path/filepath"
            - "strings"
            - "github.com/blackwell-systems/knowing/internal/types"
            - "gopkg.in/yaml.v3"

            ### Test file: cloudformation_test.go

            Create comprehensive tests covering:
            1. `TestCfnExtractor_CanHandle` - positive cases (file with AWSTemplateFormatVersion,
               file with Transform: AWS::Serverless-2016-10-31) and negative cases (plain YAML,
               non-YAML files, YAML without CFN markers)
            2. `TestCfnExtractor_ExtractResources` - template with 2-3 AWS resources, verify
               correct number of nodes, kinds, qualified names
            3. `TestCfnExtractor_ExtractRefEdges` - template with Ref references between resources,
               verify "references" edges are created
            4. `TestCfnExtractor_ExtractGetAttEdges` - template with Fn::GetAtt references
            5. `TestCfnExtractor_ExtractDependsOn` - template with DependsOn, verify "depends_on" edges
            6. `TestCfnExtractor_ExtractSAMEvents` - SAM template with Lambda function having
               Api, SQS, and Schedule events; verify route nodes, handles_route edges,
               subscribes edges
            7. `TestCfnExtractor_EmptyResources` - template with no Resources section returns
               empty result without error

            Each test creates the extractor directly (`e := &cfnExtractor{}`) and calls
            `e.extract()` with types.ExtractOptions containing realistic YAML content.

            ### Verification gate
            ```
            go build ./internal/indexer/cloudextractor/...
            go test ./internal/indexer/cloudextractor/ -run TestCfn -v
            go vet ./internal/indexer/cloudextractor/
            ```

