pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Wave 1 agents define prefixed helper functions with slightly different
            signatures than what Agent E expects, causing compilation errors after
            consolidation.
          likelihood: medium
          impact: low
          mitigation: |
            Agent task prompts specify exact function signatures matching the
            k8sextractor pattern. Agent E is instructed to normalize any minor
            differences when consolidating. The signatures are trivial (getString,
            toStringMap, makeEdge) with well-defined types.
        - scenario: |
            CloudExtractor.CanHandle claims all YAML files, causing the indexer to
            call both k8sextractor and CloudExtractor for K8s manifests, producing
            duplicate nodes.
          likelihood: medium
          impact: low
          mitigation: |
            The indexer deduplicates nodes by NodeHash. Even if both extractors
            process the same file, CloudExtractor's sub-extractors will not match
            K8s content (no AWSTemplateFormatVersion, no services+version, etc.)
            and return an empty result. No duplicate nodes are produced.
        - scenario: |
            Wave 1 agents forget to prefix helper functions, causing compilation
            failure at Wave 2 merge time.
          likelihood: low
          impact: high
          mitigation: |
            Each agent's task prompt has a CRITICAL section in bold about prefixing.
            The constraint section repeats the requirement. Agent E's task includes
            instructions for handling this case (rename remaining duplicates).
        - scenario: |
            Agent E's file ownership includes modifying Wave 1 format files (for
            helper consolidation) but these are listed as Agent A-D owned files.
          likelihood: medium
          impact: medium
          mitigation: |
            Wave 1 and Wave 2 are sequential, so there is no I1 violation across
            waves. Agent E modifies Wave 1 files only after they are merged. The
            file_ownership table correctly shows Wave 1 files owned by A-D and
            Wave 2 files owned by E. Agent E's modifications to Wave 1 files are
            part of the consolidation task and happen on the merged branch.
        - scenario: |
            Content-based detection in canHandle requires YAML parsing which could
            panic or return errors on malformed input.
          likelihood: low
          impact: low
          mitigation: |
            All agents use yaml.Unmarshal with error checking. Malformed YAML causes
            canHandle to return false and extract to return an empty result.
