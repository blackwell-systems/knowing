            # Shared getString defined only in extractor.go (no prefixed duplicates remain)
            grep -rn "func cfnGetString\|func composeGetString\|func actionsGetString\|func slsGetString" internal/indexer/cloudextractor/
            # Expected: 0 matches (all prefixed helpers removed)

