            **File: serverless.go**

            Implement the `serverlessExtractor` struct:

            ```go
            type serverlessExtractor struct{}

            func (e *serverlessExtractor) name() string { return "serverless" }
            func (e *serverlessExtractor) canHandle(path string, content []byte) bool
            func (e *serverlessExtractor) extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)
            ```

            **Detection logic (canHandle):**
            - Filename (filepath.Base) must be "serverless.yml" or "serverless.yaml", AND
            - Content must have both top-level "service" AND "provider" keys
            - Parse top-level keys via yaml.Unmarshal into map[string]interface{}

            **Extraction logic (extract):**

            1. Parse YAML content into map[string]interface{}
            2. Find the "functions" top-level key (map of function names to definitions)
            3. For each function:
               - Create a node with kind="function", symbol name = function name
               - QualifiedName: `{repoURL}://{filePath}.function.{functionName}`
               - NodeHash: types.ComputeNodeHash(repoURL, filePath, types.EmptyHash, functionName, "function")
            4. For each function, check the "events" list ([]interface{}):
               - Each event is a map with a single key indicating the type
               - **http / httpApi events:** The value is a map with "path" and "method" keys.
                 Create a "route" node: kind="route", name="{METHOD} {path}" (uppercase method).
                 QualifiedName: `{repoURL}://{filePath}.route.{METHOD} {path}`
                 Create a "handles_route" edge from the function to the route node.
               - **sqs events:** The value is a map with "arn" key (or a string ARN directly).
                 Create a "subscribes" edge from the function to a synthetic event_source node.
                 Event source node kind="event_source", name derived from ARN or value.
               - **sns events:** Similar to sqs. Create "subscribes" edge to event_source node.
               - **schedule events:** Value is a string rate/cron expression (e.g., "rate(1 hour)").
                 Create "subscribes" edge to event_source node with name="schedule:{expression}".
               - **s3 events:** Value is a map with "bucket" key. Create "subscribes" edge
                 to event_source node with name="s3:{bucket}".

            **Constants:**
            ```go
            const (
                slsProvenance = "ast_inferred"
                slsConfidence = 0.7
            )
            ```

