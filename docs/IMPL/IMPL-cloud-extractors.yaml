title: Cloud Infrastructure and CI/CD YAML Extractors
feature_slug: cloud-extractors
verdict: SUITABLE
suitability_assessment: |
    Suitability gate analysis:

    1. File decomposition: The work decomposes into 7 new files across a new package
       (internal/indexer/cloudextractor/) plus one modification to cmd/knowing/main.go
       for registration. Each extractor (CloudFormation, Docker Compose, GitHub Actions,
       Serverless Framework) is fully independent with its own file and test file.
       The shared extractor.go delegates to format-specific parsers. All files are
       disjoint across agents.

    2. Investigation-first items: None. The pattern is well-established by the existing
       k8sextractor package. All four formats have well-documented YAML structures.

    3. Interface discoverability: Yes. The types.Extractor interface is already defined
       (Name, CanHandle, Extract). Each sub-parser follows the same internal pattern
       as k8sextractor (parse YAML, emit nodes and edges). The shared CloudExtractor
       delegates via content detection, which is straightforward to define upfront.

    4. Pre-implementation status: The cloudextractor/ directory does not exist yet.
       No prior implementation exists. All work is greenfield TODO.

    5. Parallelization value: High. Four independent format parsers with comprehensive
       tests (each agent owns 1 implementation file + 1 test file). The Go build/test
       cycle is non-trivial. Three format agents can run fully in parallel in Wave 1,
       with the shared delegator + registration in Wave 2.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (4 agents in wave 1 x 8 min avg, parallel; 1 agent in wave 2 x 5 min)
    - Merge and verification: ~3 min
    Total Polywave time: ~23 min

    Sequential baseline: ~45 min (5 agents x 9 min avg sequential)
    Time savings: ~22 min (49% faster)

    Recommendation: Clear speedup. Proceed.
