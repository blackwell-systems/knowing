            **File: actions.go**

            Implement the `actionsExtractor` struct:

            ```go
            type actionsExtractor struct{}

            func (e *actionsExtractor) name() string { return "github-actions" }
            func (e *actionsExtractor) canHandle(path string, content []byte) bool
            func (e *actionsExtractor) extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)
            ```

            **Detection logic (canHandle):**
            - File must have .yml or .yaml extension
            - File path must contain ".github/workflows/" (use filepath.ToSlash and
              strings.Contains for cross-platform compatibility)
            - No content inspection needed; path alone is sufficient

            **Extraction logic (extract):**

            1. Parse YAML content into map[string]interface{}
            2. Extract workflow-level info:
               - Create a workflow node with kind="workflow"
               - Name from top-level "name" field, or derive from filepath.Base if absent
               - QualifiedName: `{repoURL}://{filePath}.workflow.{workflowName}`
            3. Find the "jobs" top-level key (map of job IDs to definitions)
            4. For each job:
               - Create a node with kind="job", symbol name = job ID
               - QualifiedName: `{repoURL}://{filePath}.job.{jobID}`
            5. For edges from jobs:
               - **needs:** Can be a single string or list of strings. Create "depends_on"
                 edges to each referenced job node.
               - **steps:** For each step that has a "uses" field (e.g., "actions/checkout@v4"):
                 - Create a synthetic "action" node (kind="action", name=uses value)
                 - QualifiedName: `{repoURL}://{filePath}.action.{usesValue}`
                 - Create a "references" edge from the job to the action node
                 - Deduplicate: if the same uses value appears in multiple jobs,
                   create only one action node (use a nodeMap keyed by uses value)

