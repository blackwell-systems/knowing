            # Expected: 1

            # At least 5 test functions
            grep -c "func TestCfn" internal/indexer/cloudextractor/cloudformation_test.go
            # Expected: >= 5
            ```

            ### Constraints
            - Do NOT create extractor.go or doc.go; those are owned by Agent E in Wave 2.
            - Do NOT modify any files outside the cloudextractor package.
            - All helper functions MUST be prefixed with `cfn` (e.g., cfnGetString, cfnMakeEdge).
              Other agents define helpers with their own prefixes in the same package.
            - All constants MUST be prefixed with `cfn` (e.g., cfnProvenance, cfnConfidence).
