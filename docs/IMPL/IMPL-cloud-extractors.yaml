          task: |
            ## Agent E: Shared Delegator, Helper Consolidation, and Registration

            ### What to implement

            Create `internal/indexer/cloudextractor/extractor.go` (the shared delegator),
            `internal/indexer/cloudextractor/doc.go`, consolidate helper functions from
            Wave 1 format files, and modify `cmd/knowing/main.go` to register the extractor.

            ### File 1: extractor.go

            This file defines the `subExtractor` interface, the `CloudExtractor` struct
            that implements `types.Extractor`, and shared helper functions.

            ```go
            package cloudextractor

            import (
                "context"
                "fmt"
                "path/filepath"
                "strings"

                "github.com/blackwell-systems/knowing/internal/types"
            )

            const (
                provenance = "ast_inferred"
                confidence = 0.7
            )

            // subExtractor is the internal interface each format parser implements.
            type subExtractor interface {
                name() string
                canHandle(path string, content []byte) bool
                extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)
            }

            // CloudExtractor delegates to format-specific sub-extractors.
            type CloudExtractor struct {
                subs []subExtractor
            }

            // NewCloudExtractor creates a CloudExtractor with all registered sub-extractors.
            func NewCloudExtractor() *CloudExtractor {
                return &CloudExtractor{
                    subs: []subExtractor{
                        &cfnExtractor{},
                        &composeExtractor{},
                        &actionsExtractor{},
                        &serverlessExtractor{},
                    },
                }
            }

            func (e *CloudExtractor) Name() string { return "cloud-yaml" }

            func (e *CloudExtractor) CanHandle(path string) bool {
                ext := strings.ToLower(filepath.Ext(path))
                return ext == ".yaml" || ext == ".yml"
            }

            func (e *CloudExtractor) Extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error) {
                for _, sub := range e.subs {
                    if sub.canHandle(opts.FilePath, opts.Content) {
                        return sub.extract(ctx, opts)
                    }
                }
                return &types.ExtractResult{}, nil
            }
            ```

            **CanHandle strategy:** Accept all .yaml/.yml files. The k8sextractor also
            matches some YAML files, but the indexer calls all matching extractors.
            CloudExtractor's Extract method does content-based filtering via sub-extractors;
            if no sub-extractor matches, it returns an empty result (which is safe and
            ignored by the indexer).

            **Shared helper functions to add to extractor.go:**
            ```go
            func getString(m map[string]interface{}, key string) string
            func toStringMap(m map[string]interface{}) map[string]string
            func makeEdge(sourceHash, targetHash types.Hash, edgeType string) types.Edge
            func buildQN(repoURL, filePath, kind, name string) string
            ```

            These match the k8sextractor pattern exactly. The `buildQN` function format:
            `fmt.Sprintf("%s://%s.%s.%s", repoURL, filePath, kind, name)`

            **Helper consolidation:** After creating extractor.go with shared helpers,
            update each Wave 1 format file to use the shared helpers instead of their
            prefixed versions:
            - In cloudformation.go: replace `cfnGetString` with `getString`, `cfnMakeEdge`
              with `makeEdge`, `cfnBuildQN` with `buildQN`, `cfnToStringMap` with `toStringMap`.
              Remove the prefixed function definitions. Replace `cfnProvenance`/`cfnConfidence`
              with `provenance`/`confidence` and remove the prefixed constant declarations.
            - In compose.go: same pattern, replace `compose`-prefixed helpers and constants.
            - In actions.go: same pattern, replace `actions`-prefixed helpers and constants.
            - In serverless.go: same pattern, replace `sls`-prefixed helpers and constants.

            Use find-and-replace across each file. The function signatures are identical
            (minus the prefix), so this is a mechanical transformation.

            ### File 2: doc.go

            ```go
