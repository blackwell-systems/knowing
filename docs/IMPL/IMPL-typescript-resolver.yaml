interface_contracts:
    - name: ParseTypeText
      description: |
        Parses a TypeScript type annotation text string into a typresolve.Type.
        This is the TS equivalent of Go's ParseTypeNode and Python's ParseAnnotation.
        Works on textual annotations because TS type annotations are extracted as
        text from type_annotation AST nodes. Handles: builtin primitives (string,
        number, boolean, void, any, unknown, never, null, undefined, object, symbol,
        bigint), generic instantiation (Array<T>, Promise<T>, Map<K,V>), array
        shorthand (T[]), union (A | B), intersection (A & B), tuple ([A, B]),
        function types ((a: T) => R), optional (?), quoted forward references,
        and qualified names (module.Type).
      definition: |
        func ParseTypeText(text string, moduleQN string) *typresolve.Type
      location: internal/typresolve/typescript/types.go
    - name: ParseTypeNode
      description: |
        Parses a tree-sitter TypeScript type AST node into a typresolve.Type.
        Handles type_annotation nodes by extracting text and delegating to
        ParseTypeText, plus direct AST node types: type_identifier, generic_type,
        union_type, intersection_type, array_type, tuple_type, parenthesized_type,
        function_type, predefined_type. Falls back to ParseTypeText for complex
        cases where text extraction is more reliable than AST traversal.
      definition: |
        func ParseTypeNode(node *sitter.Node, content []byte, moduleQN string, imports map[string]ImportInfo) *typresolve.Type
      location: internal/typresolve/typescript/types.go
    - name: ImportInfo
      description: |
        Describes a single TypeScript import binding. Captures the source module
        path and the style of import (named, default, namespace, or require).
      definition: |
        type ImportInfo struct {
            ModulePath   string // source module path (e.g. "./utils", "express")
            OriginalName string // original name before aliasing (e.g. "Flask" in "import { Flask as F }")
            IsNamespace  bool   // true for "import * as X from ..."
            IsDefault    bool   // true for "import X from ..."
        }
      location: internal/typresolve/typescript/imports.go
    - name: BuildImportMap
      description: |
        Builds per-file import map from the TypeScript AST root. Returns a map
        from local binding name to ImportInfo. Handles ES6 imports (named, default,
        namespace), CommonJS require(), re-exports, and dynamic imports.
        Mirrors the existing buildTSImportMap in internal/indexer/tsextractor/extractor.go
        but returns richer ImportInfo instead of bare module path strings.
      definition: |
        func BuildImportMap(root *sitter.Node, content []byte) map[string]ImportInfo
      location: internal/typresolve/typescript/imports.go
    - name: ResolveImport
      description: |
        Resolves an import local name to its ImportInfo. Simple map lookup.
      definition: |
        func ResolveImport(imports map[string]ImportInfo, name string) (ImportInfo, bool)
      location: internal/typresolve/typescript/imports.go
    - name: ResolveModulePath
      description: |
        Resolves a TypeScript import source path to a qualified name prefix.
        Handles relative imports (./foo, ../utils), bare module specifiers
        (express, typescript), and index file resolution.
      definition: |
        func ResolveModulePath(importSource string, currentFile string) string
      location: internal/typresolve/typescript/imports.go
    - name: IsBuiltinType
      description: |
        Returns true if the given name is a TypeScript/JavaScript builtin type
        (string, number, boolean, void, any, unknown, never, null, undefined,
        object, symbol, bigint, String, Number, Boolean, Object, Array, Promise,
        Map, Set, etc.).
      definition: |
        func IsBuiltinType(name string) bool
      location: internal/typresolve/typescript/builtins.go
    - name: ResolveBuiltinType
      description: |
        Returns a typresolve.Builtin type if the name is a TS builtin primitive
        type (string, number, boolean, void, any, unknown, never, null, undefined,
        object, symbol, bigint), nil otherwise.
      definition: |
        func ResolveBuiltinType(name string) *typresolve.Type
      location: internal/typresolve/typescript/builtins.go
    - name: BuiltinWrapperClass
      description: |
        Maps builtin primitive type names to their wrapper class for method dispatch.
        "string" -> "String", "number" -> "Number", "boolean" -> "Boolean",
        "bigint" -> "BigInt", "symbol" -> "Symbol". Returns empty string if not
        a primitive with a wrapper.
      definition: |
        func BuiltinWrapperClass(builtinName string) string
      location: internal/typresolve/typescript/builtins.go
    - name: LiteralType
      description: |
        Maps TypeScript tree-sitter literal node types to builtin types.
        "string" / "template_string" -> Builtin("string"),
        "number" -> Builtin("number"),
        "true" / "false" -> Builtin("boolean"),
        "null" -> Builtin("null"),
        "undefined" -> Builtin("undefined"),
        "regex" -> Named("RegExp").
        Returns nil if not a literal type.
      definition: |
        func LiteralType(nodeType string) *typresolve.Type
      location: internal/typresolve/typescript/builtins.go
    - name: UnwrapPromise
      description: |
        If the type is Named("Promise") or a generic Promise<T> (represented as
        a Named type with name "Promise" and type params), returns the inner type T.
        Otherwise returns the type unchanged. Used for async/await unwrapping.
      definition: |
        func UnwrapPromise(t *typresolve.Type) *typresolve.Type
      location: internal/typresolve/typescript/builtins.go
    - name: LookupMember
      description: |
        Looks up a method or property on a named type, following the prototype
        chain (stored as EmbeddedTypes) up to 5 levels deep. For builtin primitive
        types (string, number), delegates to the wrapper class (String, Number).
        Returns the registered function if found as a method, nil otherwise.
      definition: |
        func LookupMember(reg *typresolve.Registry, typeQN string, memberName string) *typresolve.RegisteredFunc
      location: internal/typresolve/typescript/methods.go
    - name: LookupField
      description: |
        Looks up a field/property on a named type, following the prototype chain.
        Returns the field's type if found.
      definition: |
        func LookupField(reg *typresolve.Registry, typeQN string, fieldName string) *typresolve.Type
      location: internal/typresolve/typescript/methods.go
    - name: ResolveContext
      description: |
        Per-file resolution context for TypeScript. Holds the registry, scope,
        imports, module QN, content bytes, enclosing function/class QN, and
        dialect info.
      definition: |
        type ResolveContext struct {
            Registry         *typresolve.Registry
            Scope            *typresolve.Scope
            Imports          map[string]ImportInfo
            ModuleQN         string
            Content          []byte
            EnclosingFuncQN  string
            EnclosingClassQN string
        }
      location: internal/typresolve/typescript/eval.go
    - name: EvalExprType
      description: |
        Recursive expression type evaluator for TypeScript. Evaluates the type of
        a TS expression AST node using scope lookup, registry lookup, import
        resolution, member dispatch, and async unwrapping.
      definition: |
        func EvalExprType(ctx *ResolveContext, node *sitter.Node) *typresolve.Type
      location: internal/typresolve/typescript/eval.go
    - name: ProcessStatement
      description: |
        Processes a TypeScript statement node to bind variables into the current
        scope. Handles variable_declarator (const/let/var with type annotations
        or initializer inference), for_in_statement, for_of_statement,
        destructuring patterns (object and array), and catch_clause bindings.
      definition: |
        func ProcessStatement(ctx *ResolveContext, node *sitter.Node)
      location: internal/typresolve/typescript/scope_bind.go
    - name: TypeScriptResolver
      description: |
        Implements typresolve.Resolver for TypeScript/JavaScript.
        Language() returns "typescript".
        InitWorkspace builds a Registry from TS definitions.
        ResolveFile walks the TypeScript AST and resolves calls and references.
      definition: |
        type TypeScriptResolver struct {
            registry *typresolve.Registry
        }
        func NewTypeScriptResolver() *TypeScriptResolver
        func (r *TypeScriptResolver) Language() string
        func (r *TypeScriptResolver) InitWorkspace(ctx context.Context, defs []typresolve.ResolverDef) error
        func (r *TypeScriptResolver) ResolveFile(ctx context.Context, opts typresolve.ResolveFileOpts) ([]types.Edge, error)
      location: internal/typresolve/typescript/resolver.go
    - name: BuildRegistry
      description: |
        Builds a typresolve.Registry from ResolverDef entries. Registers functions,
        methods (with receiver type extracted from QN), classes, interfaces, and
        type aliases. TS methods have QN format: "repoURL://module/path.ClassName.MethodName".
      definition: |
        func BuildRegistry(defs []typresolve.ResolverDef) *typresolve.Registry
      location: internal/typresolve/typescript/registry_builder.go
    - name: ResolveCallsInFile
      description: |
        Walks a TypeScript file's AST resolving call expressions, new expressions,
        and JSX elements, emitting edges. Uses the shared registry, per-file scope
        chain, and import map.
      definition: |
        func ResolveCallsInFile(ctx *ResolveContext, root *sitter.Node, fileHash types.Hash, repoURL string, filePath string) []types.Edge
      location: internal/typresolve/typescript/resolve.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A: TypeScript Type Annotation Parsing and Import Resolution

            Build the foundational type annotation parsing and import resolution for
            the TypeScript resolver. This mirrors Agent A from the Go resolver
            (types.go + imports.go) and Python resolver (annotations.go + imports.go),
            adapted for TypeScript's type annotation syntax and ES module system.

            ### What to implement

            **File 1: `internal/typresolve/typescript/doc.go`**
            Package doc comment for the `typescript` subpackage:
            ```go
            // Package tsresolve implements the TypeScript/JavaScript in-process type
            // resolver. It implements the typresolve.Resolver interface, resolving
            // TypeScript and JavaScript call expressions, property access, JSX elements,
            // and type references using tree-sitter AST walking and a shared type
            // registry built from extracted definitions.
            //
            // Supported dialects: .ts, .tsx, .js, .jsx
            package tsresolve
            ```

            **File 2: `internal/typresolve/typescript/types.go`**
            Port the `parse_ts_type_text` function from the C reference at
            `~/code/codebase-memory/internal/cbm/lsp/ts_lsp.c` (lines 133-472).
            This function converts TypeScript type annotation text into `*typresolve.Type`.

            Implement `ParseTypeText(text string, moduleQN string) *typresolve.Type`

            Handle these annotation forms (in order from the C reference):

            1. **Trim whitespace and leading ":"**: strip leading/trailing whitespace,
               leading ":" (from type_annotation nodes), trailing ";", ","

            2. **Function type** `(params) => returnType`:
               - Find balanced `(...)` then ` => ` arrow
               - Parse params: split by top-level commas, each `name: type` or bare `type`
               - Parse return type recursively
               - Return `typresolve.Func(params, [returnType])`

            3. **Object literal type** `{...}`: return `typresolve.Unknown()` (Tier 2)

            4. **Tuple** `[T, U]`: when text starts with `[` and ends with `]`:
               - Split inner by top-level commas
               - Parse each element recursively
               - Return `typresolve.Tuple(elements)`

            5. **Union** `A | B` (top-level `|` at depth 0):
               - Split by top-level `|` (outside `<>`, `[]`)
               - If exactly 2 members and one is "null" or "undefined", return
                 `typresolve.Optional(otherMember)` (TypeScript's nullable pattern)
               - Otherwise return the first non-null/undefined member (best-effort,
                 typresolve has no Union kind)

            6. **Intersection** `A & B`: split by top-level `&`, return first member
               (best-effort, typresolve has no Intersection kind)

            7. **Builtin primitives**: string, number, boolean, bigint, any, unknown,
               void, never, null, undefined, object, symbol
               -> `typresolve.Builtin(name)`

            8. **Array shorthand** `T[]`: strip trailing `[]`, parse inner, return
               `typresolve.Slice(elem)` (Slice represents Array<T>)

            9. **Generic instantiation** `Foo<A, B>`:
               - Find balanced `<...>` at the end
               - Extract base name and type arguments
               - Special cases:
                 - `Array<T>` -> `typresolve.Slice(T)`
                 - `Promise<T>` -> `typresolve.Named("Promise")` with TypeParams
                   (keep as Named for method dispatch; await unwraps it)
                 - `Map<K, V>` -> `typresolve.Map(K, V)`
                 - `Set<T>` -> `typresolve.Named("Set")` (no Set kind)
                 - `Record<K, V>` -> `typresolve.Map(K, V)` (structural equivalent)
                 - `Partial<T>`, `Required<T>`, `Readonly<T>`, `NonNullable<T>` -> unwrap to T
                   (for method dispatch, these pass through to T's surface)
                 - `ReturnType<F>` -> return Unknown (Tier 2)
               - For project-local types (not stdlib names), qualify: moduleQN.BaseName
               - Return `typresolve.Named(qualifiedBase)` (type args stored in TypeParams)

            10. **Qualified name** `a.b.c`: return `typresolve.Named(text)` as-is

            11. **Bare identifier**: if uppercase and moduleQN is provided, qualify as
                `moduleQN.name`. Stdlib names (Array, Promise, Map, Set, Object, String,
                Number, Boolean, Error, Date, RegExp, Element, HTMLElement, etc.) stay bare.
                Return `typresolve.Named(qualifiedName)`.

            Internal helper: `splitAtDepthZero(text string, sep byte) []string`
            Split a string at the given separator at depth 0 (ignoring separators inside
            `<>`, `[]`, `()`). Trims whitespace from each part.

            Also implement `ParseTypeNode(node *sitter.Node, content []byte, moduleQN string, imports map[string]ImportInfo) *typresolve.Type`:
            - For `type_annotation` nodes: extract child text, call ParseTypeText
            - For `type_identifier` / `predefined_type`: extract text, call ParseTypeText
            - For `generic_type`: extract base type identifier + type_arguments, build accordingly
            - For `union_type`: collect children separated by `|`, handle as union
            - For `intersection_type`: similar to union
            - For `array_type`: wrap element with Slice
            - For `tuple_type`: collect elements into Tuple
            - For `parenthesized_type`: unwrap
            - For `function_type`: extract parameters and return_type children
            - Default: extract full text, call ParseTypeText as fallback

            TS stdlib names that should NOT be module-qualified (keep these bare for
            registry matching):
            ```go
            var tsStdlibNames = map[string]bool{
                "Array": true, "Promise": true, "Map": true, "Set": true,
                "WeakMap": true, "WeakSet": true, "Object": true, "String": true,
                "Number": true, "Boolean": true, "BigInt": true, "Symbol": true,
                "Function": true, "Date": true, "RegExp": true, "Error": true,
                "Math": true, "JSON": true, "console": true,
                "Element": true, "HTMLElement": true, "Document": true,
                "Window": true, "Node": true, "EventTarget": true, "Event": true,
                "Response": true, "Request": true, "Headers": true, "URL": true,
                "URLSearchParams": true, "FormData": true, "Blob": true, "File": true,
                "NodeList": true, "HTMLCollection": true,
                "Iterable": true, "Iterator": true, "Generator": true,
                "AsyncIterable": true, "AsyncIterator": true, "AsyncGenerator": true,
                "ReadonlyArray": true, "Partial": true, "Required": true,
                "Readonly": true, "Pick": true, "Omit": true, "Record": true,
                "Exclude": true, "Extract": true, "NonNullable": true,
                "Parameters": true, "ReturnType": true, "Awaited": true,
                "InstanceType": true, "ConstructorParameters": true,
                "Uppercase": true, "Lowercase": true, "Capitalize": true,
                "Uncapitalize": true, "ThisType": true,
            }
            ```

            **File 3: `internal/typresolve/typescript/imports.go`**
            Port import resolution, using the existing `buildTSImportMap` in
            `internal/indexer/tsextractor/extractor.go` (lines 919-990) as a
            reference for tree-sitter field names and node types. Do NOT import
            that package; reimplement locally with richer ImportInfo.

            Define:
            ```go
            type ImportInfo struct {
                ModulePath   string // source module path (e.g. "./utils", "express")
                OriginalName string // original name before aliasing
                IsNamespace  bool   // true for "import * as X from ..."
                IsDefault    bool   // true for "import X from ..."
            }
            ```

            Implement:
            - `BuildImportMap(root *sitter.Node, content []byte) map[string]ImportInfo`
              Walk the AST for `import_statement` nodes.

              For each import_statement:
              - Get "source" field child -> module path (strip quotes)
              - Walk children for `import_clause`
              - Within import_clause, handle:
                - `identifier` child: default import -> bind name with IsDefault=true
                - `named_imports` child: walk for `import_specifier` children
                  - Each has "name" and optional "alias" field children
                  - Bind alias (or name if no alias) -> ImportInfo with OriginalName=name
                - `namespace_import` child: `import * as X` -> bind X with IsNamespace=true

              Also handle CommonJS require():
              Walk `lexical_declaration` / `variable_declaration` for `variable_declarator`
              where value is a `call_expression` with function `require`.

              Reference the existing tsextractor code for the exact tree-sitter field names:
              ```
              import_statement -> source (string)
              import_clause -> identifier | named_imports | namespace_import
              import_specifier -> name, alias
              ```

            - `ResolveImport(imports map[string]ImportInfo, name string) (ImportInfo, bool)`
              Simple map lookup.

            - `ResolveModulePath(importSource string, currentFile string) string`
              Resolve relative import paths. Mirror the `resolveTSModulePath` function in
              the existing tsextractor (lines 893-913):
              - Only resolve relative imports (starting with "." or "..")
              - Join with current file's directory
              - Normalize to forward slashes
              - Strip .ts/.tsx/.js/.jsx extensions
              - Return "" for bare module specifiers (non-relative)

            **File 4: `internal/typresolve/typescript/types_test.go`**
            Test ParseTypeText with TypeScript type annotation strings.
            Test cases:
            - Builtin: `"string"` -> Builtin("string")
            - Builtin: `"number"` -> Builtin("number")
            - Builtin: `"boolean"` -> Builtin("boolean")
            - Builtin: `"void"` -> Builtin("void")
            - Builtin: `"any"` -> Builtin("any")
            - Builtin: `"never"` -> Builtin("never")
            - Leading colon: `": string"` -> Builtin("string") (stripped)
            - Array shorthand: `"string[]"` -> Slice(Builtin("string"))
            - Generic Array: `"Array<number>"` -> Slice(Builtin("number"))
            - Generic Map: `"Map<string, number>"` -> Map(Builtin("string"), Builtin("number"))
            - Promise: `"Promise<string>"` -> Named("Promise") (with TypeParams)
            - Union: `"string | number"` -> returns first member Builtin("string")
            - Nullable union: `"string | null"` -> Optional(Builtin("string"))
            - Nullable union: `"null | string"` -> Optional(Builtin("string"))
            - Tuple: `"[string, number]"` -> Tuple([Builtin("string"), Builtin("number")])
            - Function type: `"(x: string) => number"` -> Func with params and returns
            - Bare name qualified: `"MyClass"` with moduleQN="src/app" -> Named("src/app.MyClass")
            - Stdlib name bare: `"Promise"` with moduleQN="src/app" -> Named("Promise") (not qualified)
            - Qualified name: `"express.Request"` -> Named("express.Request")
            - Nested generic: `"Array<Map<string, number>>"` -> Slice(Map(Builtin("string"), Builtin("number")))
            - Record utility: `"Record<string, number>"` -> Map(Builtin("string"), Builtin("number"))
            - Partial unwrap: `"Partial<MyType>"` -> Named("src/app.MyType") with moduleQN

            Test ParseTypeNode with parsed TypeScript AST.
            Test BuildImportMap and ResolveImport with parsed TypeScript source.
            Test cases:
            - `import { readFile } from 'fs'` -> {"readFile": ImportInfo{ModulePath: "fs", OriginalName: "readFile"}}
            - `import * as path from 'path'` -> {"path": ImportInfo{ModulePath: "path", IsNamespace: true}}
            - `import express from 'express'` -> {"express": ImportInfo{ModulePath: "express", IsDefault: true}}
            - `import { Component as Comp } from 'react'` -> {"Comp": ImportInfo{ModulePath: "react", OriginalName: "Component"}}

            ### Interfaces consumed
            - `typresolve.Type`, `typresolve.Named()`, `typresolve.Builtin()`,
              `typresolve.Slice()`, `typresolve.Map()`, `typresolve.Tuple()`,
              `typresolve.Optional()`, `typresolve.Func()`, `typresolve.Param` from
              `github.com/blackwell-systems/knowing/internal/typresolve`
            - `sitter.Node` from `github.com/smacker/go-tree-sitter`
            - `typescript.GetLanguage()` from `github.com/smacker/go-tree-sitter/typescript/typescript`

            ### Constraints
            - Package name MUST be `tsresolve`
            - Do NOT import or depend on builtins.go or methods.go from Agent B.
            - Do NOT modify any files outside your ownership list.
            - Do NOT import from `internal/indexer/tsextractor` (circular dependency risk).
              Reimplement import map logic locally.
            - Since typresolve has no Union or Intersection kind, use this mapping:
              - `T | null` or `T | undefined` -> typresolve.Optional(T)
              - `A | B` (no null) -> return first member as best-effort
              - `A & B` -> return first member as best-effort
              This is a deliberate simplification matching the Python resolver pattern.

            ### Verification
            ```bash
            GOWORK=off go build ./internal/typresolve/typescript/...
            GOWORK=off go vet ./internal/typresolve/typescript/...
            GOWORK=off go test ./internal/typresolve/typescript/... -run TestParseTypeText -v
            GOWORK=off go test ./internal/typresolve/typescript/... -run TestBuildImportMap -v
            ```

            Postconditions:
            ```bash
            # ParseTypeText function exists
            grep -c "func ParseTypeText" internal/typresolve/typescript/types.go  # expect: 1
            # ParseTypeNode function exists
            grep -c "func ParseTypeNode" internal/typresolve/typescript/types.go  # expect: 1
            # BuildImportMap function exists
            grep -c "func BuildImportMap" internal/typresolve/typescript/imports.go  # expect: 1
            # Package declaration is tsresolve
            grep -c "package tsresolve" internal/typresolve/typescript/doc.go  # expect: 1
            ```
          files:
            - internal/typresolve/typescript/doc.go
            - internal/typresolve/typescript/types.go
            - internal/typresolve/typescript/imports.go
            - internal/typresolve/typescript/types_test.go
        - id: B
          task: |
            ## Agent B: Builtins, Member Lookup, and Async Unwrapping

            Build the builtin type/function handling, member/property lookup with
            prototype chain traversal, and async/await unwrapping for the TypeScript
            resolver.

            ### What to implement

            **File 1: `internal/typresolve/typescript/builtins.go`**
            Package: `tsresolve`

            Port builtin handling from the C reference at
            `~/code/codebase-memory/internal/cbm/lsp/ts_lsp.c`.

            Implement:

            - `IsBuiltinType(name string) bool`
              Return true for TypeScript primitive types and their wrapper classes:
              string, number, boolean, bigint, any, unknown, void, never, null,
              undefined, object, symbol, String, Number, Boolean, BigInt, Symbol,
              Object, Array, Promise, Map, Set, WeakMap, WeakSet, Date, RegExp,
              Error, Function, Math, JSON, console.

            - `ResolveBuiltinType(name string) *typresolve.Type`
              Return `typresolve.Builtin(name)` for primitive types:
              string, number, boolean, bigint, any, unknown, void, never, null,
              undefined, object, symbol.
              Return nil for non-primitive builtins (they are Named types with methods).

            - `BuiltinWrapperClass(builtinName string) string`
              Port from `builtin_wrapper_class` (lines 1075-1083):
              - "string" -> "String"
              - "number" -> "Number"
              - "boolean" -> "Boolean"
              - "bigint" -> "BigInt"
              - "symbol" -> "Symbol"
              - anything else -> "" (no wrapper)

            - `LiteralType(nodeType string) *typresolve.Type`
              Map tree-sitter literal node types to builtin types:
              - "string" / "template_string" -> Builtin("string")
              - "number" -> Builtin("number")
              - "true" / "false" -> Builtin("boolean")
              - "null" -> Builtin("null")
              - "undefined" -> Builtin("undefined")
              - "regex" -> Named("RegExp")
              Return nil if not a literal type.

            - `UnwrapPromise(t *typresolve.Type) *typresolve.Type`
              If t is Named with name "Promise" and has TypeParams with at least one
              entry, return the first type param (the inner type T in Promise<T>).
              If t is Named("Promise") without type params, return Unknown.
              Otherwise return t unchanged.
              Used for `await expr` unwrapping: `await promise` yields T.

              Implementation detail: since we represent Promise<T> as a Named type with
              TypeParams, check:
              ```go
              if t.Kind == typresolve.KindNamed && t.Name == "Promise" && len(t.TypeParams) > 0 {
                  // TypeParams[0].Constraint holds the type argument in our representation
                  // OR we store Promise<T> as Named("Promise") with Elem = T
              }
              ```
              Actually, since typresolve.Type uses TypeParams for generic type params (with
              Name and Constraint), and we need to store type arguments, the simplest approach
              is to store Promise<T> as:
              - `&typresolve.Type{Kind: KindNamed, Name: "Promise", Elem: T}`
              Using the Elem field (which is for Pointer/Slice/etc.) to also carry the
              primary type argument for generic types. This is a pragmatic shortcut that
              works because we only need the first type arg for method dispatch and await
              unwrapping. Agent A's ParseTypeText should use this same convention for
              Promise, Array (which maps to Slice), Map, Set.

              So UnwrapPromise becomes:
              ```go
              func UnwrapPromise(t *typresolve.Type) *typresolve.Type {
                  if t != nil && t.Kind == typresolve.KindNamed && t.Name == "Promise" {
                      if t.Elem != nil {
                          return t.Elem
                      }
                      return typresolve.Unknown()
                  }
                  return t
              }
              ```

            - `IsPassthroughUtility(name string) bool`
              Return true for TS utility types that pass through to the inner type for
              method dispatch: Partial, Required, Readonly, NonNullable, Pick, Omit, Awaited.
              (Reference: unwrap_passthrough_template, lines 1210-1239)

            **File 2: `internal/typresolve/typescript/methods.go`**
            Package: `tsresolve`

            Port member/property lookup with prototype chain traversal from the C reference
            (lines 1086-1205 of ts_lsp.c).

            Implement:

            - `LookupMember(reg *typresolve.Registry, typeQN string, memberName string) *typresolve.RegisteredFunc`
              Internal helper with depth limit (max 5):
              1. Direct method lookup: `reg.LookupMethod(typeQN, memberName)` -- if found, return
              2. Get type: `reg.LookupType(typeQN)` -- if nil, return nil
              3. Follow alias: if `type.AliasOf != ""`, recurse with alias target
              4. Check prototype chain (stored as EmbeddedTypes): for each parent, recurse
              5. For builtin types, look up via wrapper class:
                 if typeQN is a builtin primitive, get wrapper class name and recurse
              6. Return nil if not found

            - `LookupField(reg *typresolve.Registry, typeQN string, fieldName string) *typresolve.Type`
              Internal helper with depth limit (max 5):
              1. Get type: `reg.LookupType(typeQN)` -- if nil, return nil
              2. Follow alias: if `type.AliasOf != ""`, recurse with alias target
              3. Direct field lookup: scan `type.Fields` for matching name, return field type
              4. Check prototype chain: for each `type.EmbeddedTypes[i]`, recurse
              5. Return nil if not found

            - `LookupMemberType(reg *typresolve.Registry, typeQN string, memberName string) *typresolve.Type`
              Combines field and method lookup: first check fields (returns type directly),
              then check methods (returns method signature type). This is the Go equivalent
              of `lookup_member_type` in the C reference.

            **File 3: `internal/typresolve/typescript/builtins_test.go`**
            Package: `tsresolve`

            Test cases:
            - IsBuiltinType: true for "string", "number", "boolean", "any", "Promise", "Array"
            - IsBuiltinType: false for "MyClass", "express"
            - ResolveBuiltinType: returns Builtin for "string", "number"; nil for "Array" (not primitive)
            - BuiltinWrapperClass: "string" -> "String", "number" -> "Number", "foo" -> ""
            - LiteralType: "string" -> Builtin("string"), "number" -> Builtin("number"),
              "true" -> Builtin("boolean"), "null" -> Builtin("null"), "foo" -> nil
            - UnwrapPromise: Named("Promise") with Elem=Builtin("string") -> Builtin("string")
            - UnwrapPromise: Named("MyType") -> Named("MyType") (unchanged)
            - UnwrapPromise: Named("Promise") without Elem -> Unknown
            - IsPassthroughUtility: true for "Partial", "Required"; false for "Promise", "Array"
            - LookupMember: direct method found
            - LookupMember: method found via prototype chain (1 level)
            - LookupMember: method found via prototype chain (2 levels)
            - LookupField: direct field found
            - LookupField: field found via prototype chain
            - LookupMemberType: returns field type, then method signature

            ### Interfaces consumed
            - `typresolve.Registry`, `typresolve.RegisteredFunc`, `typresolve.RegisteredType`
            - `typresolve.Type`, `typresolve.Builtin()`, `typresolve.Named()`, etc.

            ### Constraints
