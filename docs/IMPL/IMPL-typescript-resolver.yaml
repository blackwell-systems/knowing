title: TypeScript In-Process Type Resolver
feature_slug: typescript-resolver
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: All new files in internal/typresolve/typescript/ (14 files).
       No existing files modified. Agents have fully disjoint file ownership.
       Follows the exact same pattern as the Go resolver (IMPL-go-resolver.yaml)
       and Python resolver (IMPL-python-resolver.yaml).

    2. Investigation-first: No unknowns. The C reference implementation (ts_lsp.c,
       4,733 lines) documents the complete TypeScript resolution algorithm. The shared
       infrastructure (typresolve package) is completed and defines the exact interface
       contracts. The Go and Python resolvers establish the structural pattern.

    3. Interface discoverability: All interfaces are defined. The typresolve.Resolver
       interface, Registry, Scope, and Type are implemented and tested. Cross-agent
       contracts are limited to Go function signatures within the new typescript/
       subpackage.

    4. Pre-implementation: The shared infrastructure (in-process-resolver-infra) was
       completed previously. The Go and Python resolver IMPLs show the exact structural
       pattern. No overlap with existing code.

    5. Parallelization value: High. Build/test cycle is ~30s with GOWORK=off.
       4 agents in wave 1 with 2-4 files each. Wave 2 integrates. TypeScript's
       module resolution, type annotation parsing, builtins, and expression evaluation
       are independent components that parallelize well.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~20 min (5 agents, 2 waves, ~6 min avg per agent)
    - Merge and verification: ~5 min
    Total Polywave time: ~40 min

    Sequential baseline: ~60 min (5 agents x 12 min avg)
    Time savings: ~20 min (33% faster)

    Recommendation: Clear speedup. Wave 1 agents are fully independent (type annotation
    parsing + imports, builtins + member lookup, expression evaluator + scope binding,
    module resolution + dialect handling). Wave 2 integrates them into the resolver.

    TypeScript is the most complex of the three resolvers due to its type system
    (union, intersection, generics, conditional types). The Tier 1 resolver focuses
    on the practical subset: import resolution, call dispatch, property access,
    async/await unwrapping, and JSX element resolution. Advanced type-level features
    (conditional types, mapped types, infer, keyof) are deferred to Tier 2.
test_command: GOWORK=off go test -short ./... -timeout 5m
lint_command: GOWORK=off go vet ./...
