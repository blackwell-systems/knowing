pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Wave 1 agents call cross-file functions that don't exist yet in their
            isolated worktrees (Agent C calls ParseTypeText from Agent A's types.go,
            LiteralType from Agent B's builtins.go).
          likelihood: high
          impact: low
          mitigation: |
            All wave 1 agents are in the same Go package (tsresolve). Their files
            compile together only after merge. The build gate runs post-merge.
            Individual agent worktrees will not compile in isolation, which is
            expected and acceptable. This is identical to the Go and Python resolver
            patterns.
        - scenario: |
            Promise<T> type representation convention differs between Agent A (types.go)
            and Agent B (builtins.go). Agent A stores Promise<T> one way, Agent B's
            UnwrapPromise expects it a different way.
          likelihood: medium
          impact: high
          mitigation: |
            The interface contract specifies the exact convention: Promise<T> is
            represented as &Type{Kind: KindNamed, Name: "Promise", Elem: T}. Both
            agents implement against this specification. The Elem field is the designated
            carrier for the primary type argument. Post-merge tests in wave 2 validate
            the convention end-to-end (TestResolveCallsInFile_AwaitUnwrap).
        - scenario: |
            TypeScript tree-sitter node type names differ from what the C reference uses.
            The C reference uses ts_node_type() which returns C grammar names, while the
            Go bindings may use slightly different names.
          likelihood: medium
          impact: medium
          mitigation: |
            The existing TypeScript extractor at internal/indexer/tsextractor/extractor.go
            already uses the Go tree-sitter TypeScript bindings and demonstrates the correct
            node type names (call_expression, member_expression, import_statement, identifier,
            variable_declarator, etc.). Agents should cross-reference that file for node
            type names. Guard all ChildByFieldName calls with nil checks.
        - scenario: |
            JSX element resolution requires the TSX grammar, not the TypeScript grammar.
            The existing tsextractor uses typescript.GetLanguage() which may not parse
            JSX/TSX syntax correctly.
          likelihood: medium
          impact: low
          mitigation: |
            The existing tsextractor uses typescript.GetLanguage() for all TS/JS/TSX/JSX
            files and appears to work. If JSX nodes are not parsed, Agent D should skip
            JSX test cases with t.Skip and document that TSX grammar support is a Tier 2
            enhancement. The core value is call/property resolution, not JSX.
        - scenario: |
            The module QN inference from file paths produces incorrect qualified names
            that don't match the registry entries from the existing tsextractor.
          likelihood: medium
          impact: high
          mitigation: |
            Agent D must use the same QN convention as the existing tsextractor:
            computeQNamePrefix (extractor.go lines 183-195) uses directory/basename
            without extension. Agent D should extract module QN from existing edges
            in opts.Edges when available, falling back to the path-based computation.
        - scenario: |
            Wave 1 agents cannot run go build or go test individually because the
            package has missing function references across files.
          likelihood: high
          impact: low
          mitigation: |
            Expected behavior, identical to Go and Python resolvers. Wave 1 agents
            verify their code via go vet (syntax-level) and defer full compilation
            to the post-merge gate.
        - scenario: |
            TypeScript's complex type system features (conditional types, mapped types,
            infer, keyof) are referenced in the C implementation but not implemented in
            Tier 1, causing test failures on codebases that use advanced types.
          likelihood: low
          impact: low
          mitigation: |
            Tier 1 deliberately omits advanced type-level features. ParseTypeText returns
            Unknown for unrecognized type constructs. This is safe because the resolver
            still resolves calls where the receiver type is known through simpler means
            (direct assignment, import resolution, type annotations with simple types).
            Advanced type support is Tier 2 work.
