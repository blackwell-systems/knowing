            ## Agent D: Resolver Integration, Registry Builder, and Call Resolution

            Integrate all wave 1 components into the TypeScriptResolver that implements
            typresolve.Resolver, build the registry builder, and implement call
            resolution with edge emission. Also handle JSX element resolution and
            class/function body walking.

            ### What to implement

            **File 1: `internal/typresolve/typescript/resolver.go`**
            Package: `tsresolve`

            The main TypeScriptResolver struct implementing `typresolve.Resolver`:

            ```go
            type TypeScriptResolver struct {
                registry *typresolve.Registry
            }

            func NewTypeScriptResolver() *TypeScriptResolver {
                return &TypeScriptResolver{}
            }

            func (r *TypeScriptResolver) Language() string { return "typescript" }
            ```

            `InitWorkspace(ctx context.Context, defs []typresolve.ResolverDef) error`:
            - Call BuildRegistry with the defs
            - Store the resulting registry in r.registry

            `ResolveFile(ctx context.Context, opts typresolve.ResolveFileOpts) ([]types.Edge, error)`:
            1. Get the tree-sitter root node from opts.ParsedTree:
               ```go
               var root *sitter.Node
               switch v := opts.ParsedTree.(type) {
               case *sitter.Node:
                   root = v
               default:
                   // Re-parse the content as fallback
                   parser := sitter.NewParser()
                   parser.SetLanguage(typescript.GetLanguage())
                   tree, err := parser.ParseCtx(ctx, nil, opts.Content)
                   if err != nil {
                       return nil, fmt.Errorf("parse: %w", err)
                   }
                   defer tree.Close()
                   root = tree.RootNode()
               }
               ```

            2. Build per-file import map: `imports := BuildImportMap(root, opts.Content)`

            3. Determine module QN from the file path. TypeScript convention:
               Convert file path to forward-slash module path, strip extension:
               `src/compiler/checker.ts` -> `src/compiler/checker`
               Use the first edge's QualifiedName prefix if available.
               ```go
               func inferModuleQN(filePath string, edges []types.Edge) string
               ```
               Implementation: mirror `computeQNamePrefix` from the existing tsextractor
               (extractor.go lines 183-195).

            4. Create ResolveContext with the registry, a new root scope, imports,
               moduleQN, content, and empty EnclosingFuncQN/EnclosingClassQN.

            5. Bind imports into scope: for each import entry:
               - Named import (not namespace, not default): bind name to the resolved type
                 from the registry (look up modulePath.OriginalName or modulePath.name)
               - Default import: bind name to Named(modulePath) (module type)
               - Namespace import: bind name to Named(modulePath) (module type for property access)

            6. Call `ResolveCallsInFile(rctx, root, opts.FileHash, repoURL, opts.FilePath)`

            7. Return the edges.

            **File 2: `internal/typresolve/typescript/registry_builder.go`**
            Package: `tsresolve`

            Implement `BuildRegistry(defs []typresolve.ResolverDef) *typresolve.Registry`:
            1. Create a new registry via `typresolve.NewRegistry()`
            2. For each def:
               - If Kind is "function": register as RegisteredFunc with
                 QualifiedName=def.QualifiedName, ShortName=last segment after "."
               - If Kind is "method": register as RegisteredFunc with
                 ReceiverType extracted from QualifiedName. TS methods have QN
                 format: "repoURL://modulePath.ClassName.MethodName"
                 -> ReceiverType = everything up to last "." before method name
               - If Kind is "type" or "class": register as RegisteredType
               - If Kind is "interface": register as RegisteredType with IsInterface=true
            3. Return the registry

            **File 3: `internal/typresolve/typescript/resolve.go`**
            Package: `tsresolve`

            Port the call resolution logic from the C reference (lines 1930-2670,
            resolve_call_at + process_node + process_function_body).

            Implement `ResolveCallsInFile(ctx *ResolveContext, root *sitter.Node, fileHash types.Hash, repoURL string, filePath string) []types.Edge`:

            This walks the file's AST and resolves call expressions, new expressions,
            and JSX elements to edges.

            Structure (following ts_lsp_process_file, lines 2737-2793):
            1. Walk top-level children of root (program node)
            2. Pass 1: Process top-level variable declarations into root scope
            3. Pass 2: For each function_declaration, class_declaration, or
               lexical_declaration (with arrow functions):
               a. For function_declaration:
                  - Set ctx.EnclosingFuncQN
                  - Push function scope
                  - Bind parameters into scope (with type annotations if present):
                    Walk "parameters" field children for required_parameter,
                    optional_parameter, rest_parameter. For each:
                    - If has "type" field child (type_annotation): parse type
                    - Bind parameter name to type
                  - Walk function body with resolveCallsInNode
                  - Pop function scope

               b. For class_declaration:
                  - Set ctx.EnclosingClassQN
                  - Push class scope
                  - Bind `this` to Named(classQN) in scope
                  - Walk class_body for method_definition nodes:
                    - Set EnclosingFuncQN to className.methodName
                    - Push method scope
                    - Bind `this` to Named(classQN)
                    - Bind parameters (skip first if it's explicitly `this: Type`)
                    - Walk method body
                    - Pop method scope
                  - Pop class scope, restore EnclosingClassQN

               c. For export_statement: unwrap to inner declaration, process recursively

            Internal function `resolveCallsInNode(ctx *ResolveContext, node *sitter.Node, edges *[]types.Edge, fileHash types.Hash, repoURL string, filePath string)`:
            (Port of process_node, lines 2362-2670)

            1. Call `ProcessStatement(ctx, node)` to bind variables
            2. If node is `call_expression`:
               - Get "function" field child
               - If `member_expression`:
                 a. Get object and property
                 b. Check if object is namespace import: look up module.method in registry
                 c. Else: evaluate object type, look up method on receiver type
               - If `identifier` (not builtin):
                 a. Check scope for Named type (constructor call): emit edge
                 b. Module-local function: look up in registry, emit edge
               - Emit edge with:
                 - SourceHash: compute from enclosing function
                 - TargetHash: compute from callee's qualified name
                 - EdgeType: edgetype.Calls
                 - Confidence: typresolve.ResolverConfidence (0.9)
                 - Provenance: typresolve.ProvenanceResolverResolved

            3. If node is `new_expression`:
               - Get "constructor" field child
               - Resolve constructor to class qualified name
               - Emit edge with EdgeType: edgetype.Calls (constructor call)

            4. If node is `jsx_element` or `jsx_self_closing_element`:
               (Port of resolve_jsx_element, lines 2322-2361)
               - Get opening element's name
               - If name starts with uppercase: component reference
               - Look up component in registry (imports or module-local)
               - Emit edge with EdgeType: edgetype.Calls

            5. Push scope for blocks (statement_block, if_statement, for_statement,
               while_statement, switch_case, etc.)
            6. Skip recursion into nested function_declaration, class_declaration,
               arrow_function (these are processed by top-level pass or as expression
               contexts)
            7. Recurse into children
            8. Pop scope if pushed

            Edge hash computation (matching the existing tsextractor conventions):
            - Source: `types.ComputeNodeHash(repoURL, moduleQN, types.EmptyHash, funcName, types.KindFunction)`
            - Target: `types.ComputeNodeHash(targetRepoURL, targetModulePath, types.EmptyHash, targetName, types.KindFunction)`

            For cross-module targets (resolved via imports):
            - Use `ResolveModulePath(importSource, filePath)` to compute target module path
            - Use the import's module path as the target qualified name prefix

            Import these:
            - `github.com/blackwell-systems/knowing/internal/types`
            - `github.com/blackwell-systems/knowing/internal/edgetype`
            - `github.com/blackwell-systems/knowing/internal/typresolve`

            **File 4: `internal/typresolve/typescript/resolver_test.go`**
            Package: `tsresolve`

            Integration tests for the full resolver pipeline.

            Test 1: `TestTypeScriptResolverLanguage`
            - NewTypeScriptResolver().Language() == "typescript"

            Test 2: `TestTypeScriptResolverInitWorkspace`
            - Create defs with function and type entries
            - Call InitWorkspace
            - Verify registry contains the registered entries

            Test 3: `TestTypeScriptResolverResolveFile_ImportCall`
            - Source:
              ```typescript
              import { readFileSync } from 'fs';

              function loadConfig() {
                  const data = readFileSync('config.json');
              }
              ```
            - InitWorkspace with a def for fs.readFileSync
            - ResolveFile should produce a "calls" edge from loadConfig to fs.readFileSync
            - Verify edge has provenance "resolver_resolved" and confidence 0.9

            Test 4: `TestTypeScriptResolverResolveFile_LocalCalls`
            - Source with local function calls:
              ```typescript
              function helper() {}
              function main() { helper(); }
              ```
            - Register helper in workspace
            - Verify edges are produced

            Test 5: `TestTypeScriptResolverResolveFile_MethodCalls`
            - Source with method calls on typed variables:
              ```typescript
              class MyService {
                  getData(): string { return ""; }
              }
              function use(svc: MyService) {
                  svc.getData();
              }
              ```
            - Register type and method in workspace
            - Verify method dispatch edge is produced

            Test 6: `TestTypeScriptResolverResolveFile_NewExpression`
            - Source with `new MyClass()` constructor calls
            - Verify constructor edge is produced

            Test 7: `TestTypeScriptResolverResolveFile_JSXElement`
            - Source with JSX:
              ```tsx
              import React from 'react';
              function App() { return <Header />; }
              ```
            - Register Header component
            - Verify JSX element edge is produced
            - NOTE: JSX parsing requires the TSX grammar. If the tree-sitter
              TypeScript grammar doesn't parse JSX, use the TSX variant
              (`github.com/smacker/go-tree-sitter/typescript/tsx`). Check if
              the vendored grammar handles both. If not, skip this test case
              with `t.Skip("TSX grammar not available")`.

            Test 8: `TestResolveCallsInFile_AwaitUnwrap`
            - Source:
              ```typescript
              async function fetch() {
                  const resp = await getResponse();
                  resp.json();
              }
              ```
            - Register getResponse returning Promise<Response> and Response.json
            - Verify method call on unwrapped type is resolved

            ### Interfaces consumed
            - All wave 1 functions: ParseTypeText, ParseTypeNode, BuildImportMap,
              ResolveImport, ResolveModulePath, ImportInfo, IsBuiltinType,
              ResolveBuiltinType, BuiltinWrapperClass, LiteralType, UnwrapPromise,
              LookupMember, LookupField, LookupMemberType, EvalExprType,
              ProcessStatement, ResolveContext
            - `typresolve.Resolver`, `typresolve.ResolverDef`, `typresolve.ResolveFileOpts`
            - `typresolve.Registry`, `typresolve.Scope`, `typresolve.NewScope`
            - `types.Edge`, `types.Hash`, `types.ComputeEdgeHash`, `types.ComputeNodeHash`
            - `types.KindFunction`, `types.KindMethod`, `types.KindType`
            - `edgetype.Calls`
            - `sitter.Node`, `sitter.NewParser`
            - `typescript.GetLanguage()` from `github.com/smacker/go-tree-sitter/typescript/typescript`

            ### Constraints
            - Package name MUST be `tsresolve`
            - Do NOT modify any files outside your ownership list.
            - Do NOT modify the typresolve package (shared infrastructure is frozen).
            - Do NOT import `internal/indexer/tsextractor` directly. If you need to
              handle the tree from the extractor, re-parse the content as a fallback.
            - Edge provenance MUST be `typresolve.ProvenanceResolverResolved`
              ("resolver_resolved"), NOT "lsp_resolved" or "ast_inferred".
            - Edge confidence MUST be `typresolve.ResolverConfidence` (0.9).
            - Module QN uses forward slashes (not dots like Python): "src/compiler/checker"
            - For JSX element resolution, only resolve uppercase component names
              (lowercase tags like `<div>` are HTML intrinsics, not component references).
            - The existing tsextractor uses `typescript.GetLanguage()` for both .ts and .tsx
              files. Check if JSX nodes are parsed correctly; if not, the TSX variant may
              be needed for test 7.

            ### Verification
            ```bash
            GOWORK=off go build ./internal/typresolve/typescript/...
            GOWORK=off go vet ./internal/typresolve/typescript/...
            GOWORK=off go test ./internal/typresolve/typescript/... -v
            GOWORK=off go build ./...
            GOWORK=off go test -short ./... -timeout 5m
            ```

            Postconditions:
            ```bash
            grep -c "func NewTypeScriptResolver" internal/typresolve/typescript/resolver.go  # expect: 1
            grep -c "func BuildRegistry" internal/typresolve/typescript/registry_builder.go  # expect: 1
            grep -c "func ResolveCallsInFile" internal/typresolve/typescript/resolve.go  # expect: 1
            # Verify it implements the Resolver interface
            grep -c "typresolve.Resolver" internal/typresolve/typescript/resolver.go  # expect: >= 1
            ```
          files:
            - internal/typresolve/typescript/resolver.go
            - internal/typresolve/typescript/registry_builder.go
            - internal/typresolve/typescript/resolve.go
            - internal/typresolve/typescript/resolver_test.go
          dependencies:
