          task: |
            ## Agent C: Expression Evaluator and Scope Binding

            Build the expression type evaluator and statement-level scope binding
            for the TypeScript resolver. This mirrors Agent C from the Go and Python
            resolvers, adapted for TypeScript's property access patterns, async/await,
            optional chaining, JSX, and destructuring.

            ### What to implement

            **File 1: `internal/typresolve/typescript/eval.go`**
            Package: `tsresolve`

            Port `ts_eval_expr_type` from the C reference at
            `~/code/codebase-memory/internal/cbm/lsp/ts_lsp.c` (lines 1359-1619).

            Define the resolution context:
            ```go
            // ResolveContext holds per-file state for TypeScript type resolution.
            type ResolveContext struct {
                Registry         *typresolve.Registry
                Scope            *typresolve.Scope
                Imports          map[string]ImportInfo // from imports.go (Agent A)
                ModuleQN         string                // current module qualified name
                Content          []byte                // source file content
                EnclosingFuncQN  string                // QN of enclosing function
                EnclosingClassQN string                // QN of enclosing class (for this/super)
            }
            ```

            NOTE: ImportInfo is defined in imports.go (Agent A). Since both files are
            in the same `tsresolve` package, the type is visible after merge.

            Implement `EvalExprType(ctx *ResolveContext, node *sitter.Node) *typresolve.Type`

            Add a depth counter to prevent infinite recursion (max 64, matching C reference).
            Use an internal recursive helper:
            ```go
            func evalExprTypeInner(ctx *ResolveContext, node *sitter.Node, depth int) *typresolve.Type
            ```

            Handle these expression node types (from the C reference):

            1. **`identifier`** (C lines 1370-1425):
               - Scope lookup: `ctx.Scope.Lookup(name)`
               - If not found, check special values: "true"/"false" -> Builtin("boolean"),
                 "null" -> Builtin("null"), "undefined" -> Builtin("undefined"),
                 "NaN"/"Infinity" -> Builtin("number")
               - Imports: check `ResolveImport(ctx.Imports, name)` (from imports.go, same
                 package). If found:
                 - Look up full symbol QN in registry: `ctx.Registry.LookupFunc(modulePath + "." + name)`
                   or LookupFunc using OriginalName if different
                 - If registered func with signature, return signature
                 - If registered type, return Named(fullQN)
                 - For namespace imports (IsNamespace=true), return Named(modulePath)
               - Module-local: `ctx.Registry.LookupSymbol(ctx.ModuleQN, name)` and
                 `ctx.Registry.LookupType(ctx.ModuleQN + "." + name)`
               - Global/stdlib bare name: `ctx.Registry.LookupType(name)` and
                 `ctx.Registry.LookupFunc(name)`
               - Default: Unknown

            2. **`member_expression`** (C lines 1428-1476, maps to `selector_expression` in Go):
               - Get "object" and "property" field children
               - If object is `identifier` and matches an import with IsNamespace=true:
                 Treat as module property access: look up `modulePath.propertyName` in registry
               - Otherwise evaluate object type recursively
               - If object type is Named: look up member via
                 `LookupMemberType(ctx.Registry, typeQN, propertyName)` (from methods.go,
                 Agent B, same package)
               - If object type is Builtin: get wrapper class via
                 `BuiltinWrapperClass(builtinName)` (from builtins.go, Agent B),
                 look up method on wrapper
               - Optional chaining (`?.`): tree-sitter uses "optional_chain" or the
                 property access still works through member_expression. Treat identically
                 to regular member access for type resolution.
               - Default: Unknown

            3. **`call_expression`** (C lines 1479-1550):
               - Get "function" and "arguments" field children
               - Evaluate function type recursively
               - If function type is KindFunc with Returns: return first return type
               - If function is identifier:
                 - Builtin type constructor: `Number("42")` -> Builtin("number"),
                   `String(x)` -> Builtin("string"), `Boolean(x)` -> Builtin("boolean")
                 - Check if it's a class name (Named type): constructor call, return Named type
               - If function type is KindNamed: type conversion/constructor, return that type

            4. **`new_expression`** (C lines 1553-1570):
               - Get "constructor" field child
               - Evaluate constructor type
               - If constructor type is Named or text is an identifier:
                 Return Named(classQN) (new creates an instance)

            5. **`await_expression`** (C lines 1573-1580):
               - Evaluate operand type recursively
               - Call `UnwrapPromise(operandType)` (from builtins.go, Agent B, same package)
               - Return unwrapped type

            6. **`member_expression` with optional chain** (`obj?.prop`):
               - Same as regular member_expression

            7. **`as_expression`** / **`satisfies_expression`** (TS type assertions):
               - Parse the type from the "type" field child via ParseTypeNode
                 (from types.go, Agent A, same package)
               - Return the asserted type

            8. **`non_null_expression`** (`x!`):
               - Evaluate operand, return it (strips null/undefined conceptually)

            9. **`parenthesized_expression`**: unwrap

            10. **`template_string`** / **`template_substitution`**:
                - Return Builtin("string")

            11. **Literals** (using LiteralType from builtins.go, Agent B):
                - "string", "template_string" -> Builtin("string")
                - "number" -> Builtin("number")
                - "true", "false" -> Builtin("boolean")
                - "null" -> Builtin("null")
                - "undefined" -> Builtin("undefined")
                - "regex" -> Named("RegExp")

            12. **`array`** (array literal `[1, 2, 3]`):
                - If has children, evaluate first element, return Slice(elemType)
                - If empty, return Builtin("Array") / Slice(Unknown)

            13. **`object`** (object literal `{a: 1, b: "x"}`):
                - Return Unknown (Tier 2 for object literal typing)

            14. **`binary_expression`**:
                - Comparison operators (`==`, `!=`, `<`, `>`, `<=`, `>=`, `===`, `!==`,
                  `instanceof`, `in`): return Builtin("boolean")
                - `+`: if either operand is string, return Builtin("string"),
                  otherwise return left operand type
                - Other arithmetic: return left operand type

            15. **`unary_expression`**:
                - `typeof`: return Builtin("string")
                - `!`: return Builtin("boolean")
                - `-`, `+`, `~`: return Builtin("number")
                - `void`: return Builtin("undefined")

            16. **`ternary_expression`** / **`conditional_expression`** (`a ? b : c`):
                - Evaluate consequence (b), return it

            17. **`arrow_function`**:
                - If has return type annotation, parse it
                - Otherwise evaluate body expression
                - Build Func type from parameters and return type
                - Push scope, bind params (do NOT walk body here; resolve.go handles it)

            18. **`subscript_expression`** (`arr[0]`, `map["key"]`):
                - Evaluate object type
                - If Slice: return element type
                - If Map: return value type
                - If Tuple with numeric index: return corresponding element
                - Default: Unknown

            19. **`type_assertion`** (`<Type>expr` syntax, legacy TS):
                - Parse the type child, return it

            20. **`this`**:
                - If EnclosingClassQN is set, return Named(EnclosingClassQN)
                - Default: Unknown

            21. **`super`**:
                - If EnclosingClassQN is set, look up EmbeddedTypes[0] (parent class)
                - Return Named(parentClassQN) if found
                - Default: Unknown

            Helper: `nodeText(node *sitter.Node, content []byte) string`
            Extract the text of a node from the source content.

            **File 2: `internal/typresolve/typescript/scope_bind.go`**
            Package: `tsresolve`

            Port `ts_process_statement` from the C reference (lines 1694-1927).

            Implement `ProcessStatement(ctx *ResolveContext, node *sitter.Node)`

            Handle these statement/declaration types:

            1. **`variable_declarator`** (within `lexical_declaration` or `variable_declaration`)
               (C reference `bind_variable_declarator`, lines 1697-1759):
               - Get "name", "value", and "type" (type_annotation) field children
               - If has type annotation: parse it with `ParseTypeNode(typeNode, ctx.Content, ctx.ModuleQN, ctx.Imports)`
                 (from types.go, Agent A, same package); annotation wins over RHS type
               - Else if has value: evaluate RHS with EvalExprType
               - If name is simple identifier: bind name to type in scope
               - If name is `object_pattern` (destructuring `const {a, b} = obj`):
                 For each shorthand_property_identifier / pair_pattern in the pattern,
                 bind the variable name. If RHS type is known with fields, bind to field type.
                 Otherwise bind to Unknown.
               - If name is `array_pattern` (destructuring `const [a, b] = arr`):
                 If RHS is Tuple, bind each var to corresponding element.
                 If RHS is Slice, bind each var to element type.
                 Otherwise bind to Unknown.

            2. **`for_in_statement`** / **`for_of_statement`**:
               - Get "left" and "right" field children
               - For `for...in`: bind left var to Builtin("string") (keys are strings)
               - For `for...of`: evaluate right (iterable), extract element type:
                 - If Slice/Array: element type
                 - If Map: Tuple of [key, value] (simplified: bind to Unknown)
                 - Default: Unknown
               - Bind left target identifier

            3. **`catch_clause`** (within `try_statement`):
               - Get "parameter" field child (catch variable)
               - Bind parameter to Named("Error") or Unknown (TS catch parameter is `unknown` by default)

            4. **`lexical_declaration`** / **`variable_declaration`**:
               - Walk children for `variable_declarator` nodes
               - Process each declarator per rule 1 above

            5. **`assignment_expression`** (for existing variables):
               - Get "left" and "right"
               - Evaluate RHS, bind LHS if it's an identifier already in scope

            **File 3: `internal/typresolve/typescript/eval_test.go`**
