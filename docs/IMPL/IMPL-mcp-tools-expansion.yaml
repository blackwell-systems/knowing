          task: |
            ## Feedback Tool and Store Layer

            Implement the feedback MCP tool that lets agents report which symbols were
            useful/not-useful, persists feedback in SQLite, and adds a feedback-aware
            score boost to the context engine ranking.

            ### Files to create/modify

            1. **internal/store/migrations/005_add_feedback_table.sql** (new)
               Create the feedback table:
               ```sql
               CREATE TABLE feedback (
                   id           INTEGER PRIMARY KEY AUTOINCREMENT,
                   symbol_hash  BLOB NOT NULL,
                   session_id   TEXT NOT NULL,
                   useful       INTEGER NOT NULL,
                   timestamp    INTEGER NOT NULL
               );
               CREATE INDEX idx_feedback_symbol ON feedback(symbol_hash);
               CREATE INDEX idx_feedback_session ON feedback(session_id);
               ```

            2. **internal/store/feedback.go** (new)
               Add methods to SQLiteStore:
               - `RecordFeedback(ctx, symbolHash types.Hash, sessionID string, useful bool) error`
                 Inserts a row with current unix timestamp.
               - `QueryFeedback(ctx, symbolHash types.Hash) (*FeedbackStats, error)`
                 Returns counts and score (useful / total). Returns zero stats if no rows.
               - `FeedbackBoosts(ctx, hashes []types.Hash) (map[types.Hash]float64, error)`
                 Batch query: for each hash, compute score. Returns map of hash->boost (0.0-1.0).
                 Only includes hashes with at least 1 feedback entry.

               Define `FeedbackStats` struct in this file:
               ```go
               type FeedbackStats struct {
                   UsefulCount    int     `json:"useful_count"`
                   NotUsefulCount int     `json:"not_useful_count"`
                   Score          float64 `json:"score"`
               }
               ```

            3. **internal/store/feedback_test.go** (new)
               Test RecordFeedback, QueryFeedback, FeedbackBoosts using a temp SQLite DB.
               Verify: empty stats for unknown hash, correct counts after multiple records,
               score calculation, batch query with mixed known/unknown hashes.

            4. **internal/mcp/feedback.go** (new)
               - `feedbackTool() mcp.Tool` - defines the "feedback" tool with:
                 - action: required string, enum-like ("record" or "query")
                 - symbol_hash: required string (64-char hex)
                 - session_id: string (required for record, ignored for query)
                 - useful: boolean (required for record, ignored for query)
               - `handleFeedback(ctx, req) (*mcp.CallToolResult, error)`:
                 - Requires s.sqlStore (return error if nil like runtime handlers do)
                 - For action=record: parse symbol_hash, validate, call RecordFeedback
                 - For action=query: parse symbol_hash, call QueryFeedback, return JSON stats

            5. **internal/mcp/feedback_test.go** (new)
               Test handleFeedback using a real SQLiteStore (temp DB). Test both actions,
               missing args, invalid hash, nil sqlStore error.

            6. **internal/context/ranking.go** (modify)
               Add an optional `FeedbackBoosts` field to the `RankSymbols` function signature
               via a new variadic parameter (to avoid breaking existing callers):
               ```go
               func RankSymbols(symbols []ScoringInput, hitsScores ...map[types.Hash]HITSScores) []RankedSymbol
               ```
               Change to:
               ```go
               type RankOptions struct {
                   HITSScores     map[types.Hash]HITSScores
                   FeedbackBoosts map[types.Hash]float64
               }
               func RankSymbols(symbols []ScoringInput, opts ...RankOptions) []RankedSymbol
               ```
               Wait: this would break existing callers. Instead, add feedback as a field on
               ScoringInput:
               ```go
               type ScoringInput struct {
                   // ... existing fields ...
                   FeedbackBoost float64 // 0.0 = no feedback, >0 = positive signal (0.0-1.0)
               }
               ```
               In the scoring logic, add a feedback component with weight 0.1:
               - If FeedbackBoost > 0: total += 0.1 * FeedbackBoost
               - Update ScoreComponents to include a Feedback field

               Add `Feedback float64` to ScoreComponents struct.

               Existing callers pass FeedbackBoost=0 (zero value), so no behavioral change.

            ### Constraints
            - Do NOT modify internal/mcp/server.go (registration happens in Wave 2)
            - Do NOT change the RankSymbols function signature (use zero-value field approach)
            - The feedback table uses INTEGER for `useful` (0=false, 1=true) per SQLite convention

