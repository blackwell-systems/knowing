               - `handlePlanTurn(ctx, req) (*mcp.CallToolResult, error)`:
                 - Extract keywords from task (simple: lowercase, split on spaces/punctuation,
                   remove stop words similar to context engine approach)
                 - Match keywords against a static rule table:
                   - "test", "affected", "scope" -> suggest test_scope
                   - "changed", "files", "diff", "modified" -> suggest context_for_files
                   - "blast", "radius", "impact", "callers" -> suggest blast_radius
                   - "flow", "path", "between", "reach" -> suggest flow_between
                   - "community", "cluster", "module", "group" -> suggest communities
                   - "feedback", "useful", "report" -> suggest feedback
                   - "index", "reindex" -> suggest index_repo
                   - "stale", "dead", "unused" -> suggest stale_edges or dead_routes
                   - "diff", "snapshot", "compare" -> suggest semantic_diff
                   - "context", "task", "relevant" -> suggest context_for_task
                   - "dataflow", "callees", "downstream" -> suggest trace_dataflow
                   - "pr", "pull request", "review" -> suggest context_for_pr
                 - Score each tool by number of matching keywords
                 - Return top 3-4 suggestions with pre-filled args where possible:
                   ```json
                   {
                     "suggestions": [
                       {
                         "tool": "test_scope",
                         "reason": "task mentions 'test' and 'changed files'",
                         "args": {"files": "<fill: comma-separated changed file paths>", "output": "run"}
                       },
                       ...
                     ]
                   }
                   ```
                 - If no keywords match, return generic suggestion for context_for_task

               Define rule table as package-level var for testability:
               ```go
               type toolRule struct {
                   Keywords []string
                   Tool     string
                   Reason   string
                   Args     map[string]string // pre-filled or placeholder args
               }
               var toolRules = []toolRule{...}
