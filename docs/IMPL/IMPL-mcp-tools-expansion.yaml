        - id: C
          task: |
            ## Flow Between MCP Tool

            Implement a BFS-based path finder between two symbols in the knowledge graph.
            Given source and target qualified names, find all paths up to max_depth using
            edges in the graph.

            ### Files to create

            1. **internal/mcp/dataflow.go** (new)
               - `flowBetweenTool() mcp.Tool` - defines "flow_between" tool:
                 - source_symbol: required string (qualified name, e.g. "github.com/org/repo://pkg.FuncA")
                 - target_symbol: required string (qualified name)
                 - max_depth: optional integer (default 5)
               - `handleFlowBetween(ctx, req) (*mcp.CallToolResult, error)`:
                 - Resolve source_symbol to node(s) via s.store.NodesByQualifiedName
                 - Resolve target_symbol to node(s) via s.store.NodesByQualifiedName
                 - If either not found, return tool error "symbol not found: <name>"
                 - BFS from source node(s), following ALL edge types (calls, imports, implements, references)
                   via s.store.EdgesFrom(ctx, hash, "")
                 - Track paths: each BFS state is (currentHash, pathSoFar)
                 - When target is reached, record the path
                 - Stop at max_depth
                 - Cap results at 10 paths to avoid explosion
                 - Return JSON:
                   ```json
                   {
                     "source": "qualified.name.A",
                     "target": "qualified.name.B",
                     "paths": [
                       [{"symbol": "pkg.FuncA", "edge_type": "calls"}, {"symbol": "pkg.FuncB", "edge_type": "calls"}, ...]
                     ],
                     "path_count": 2,
                     "truncated": false
                   }
                   ```

               Helper types:
               ```go
               type flowPath struct {
                   Steps []flowStep `json:"steps"`
               }
               type flowStep struct {
                   Symbol   string `json:"symbol"`
                   EdgeType string `json:"edge_type"`
               }
               type flowResult struct {
                   Source    string     `json:"source"`
                   Target   string     `json:"target"`
                   Paths    []flowPath `json:"paths"`
                   PathCount int       `json:"path_count"`
                   Truncated bool      `json:"truncated"`
               }
               ```

