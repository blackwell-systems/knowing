title: 'MCP Tools Expansion: feedback, test_scope, flow_between, plan_turn, communities'
feature_slug: mcp-tools-expansion
verdict: SUITABLE
suitability_assessment: |
    Suitability gate analysis:

    1. File decomposition: 5 new tools map to 5 distinct new files plus modifications to
       server.go (registration) and a new migration file. Each tool is self-contained with
       its own handler file and test file. server.go registration is append-only and will
       be handled by an integration wave.

    2. Investigation-first items: None. All tools have clear specifications and the
       existing codebase patterns are well-established.

    3. Interface discoverability: Yes. Each tool's inputs/outputs are fully specified.
       The feedback tool requires a new SQLite table (migration) and a score boost hook
       in the context engine ranking. These interfaces can be defined upfront.

    4. Pre-implementation status: All 5 tools are new (TODO). No partial implementations
       exist. The test_scope tool reuses existing logic from cmd/knowing/testscope.go.

    5. Parallelization value: High. 5 independent tool implementations can run in
       parallel (Wave 1). Build+test cycle is ~30s (go test ./...). Each agent owns
       2-3 files. Single integration wave wires everything together.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (5 agents in parallel, ~12 min each, but parallel)
    - Merge and verification: ~4 min
    Total Polywave time: ~24 min

    Sequential baseline: ~60 min (5 tools x 12 min avg)
    Time savings: ~36 min (60% faster)

    Recommendation: Clear speedup. Proceed.
