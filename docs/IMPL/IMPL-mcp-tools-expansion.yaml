        - id: E
          task: |
            ## Communities MCP Tool (Louvain Clustering)

            Implement Louvain modularity-based graph clustering over the knowledge graph.
            Partitions all nodes into densely-connected communities and returns community
            metadata.

            ### Files to create

            1. **internal/mcp/communities.go** (new)
               - `communitiesTool() mcp.Tool` - defines "communities" tool:
                 - action: optional string ("list" or "for_symbol", default "list")
                 - repo_url: optional string (filter nodes to a specific repo)
                 - symbol: optional string (qualified name, required when action=for_symbol)
               - `handleCommunities(ctx, req) (*mcp.CallToolResult, error)`:
                 - Requires s.store
                 - For action="list":
                   - Load all nodes (optionally filtered by repo_url using NodesByName with repo prefix)
                   - Load edges between those nodes (EdgesFrom for each node, filter to those within set)
                   - Run Louvain algorithm to partition into communities
                   - For each community, compute:
                     - size (node count)
                     - top_symbols (top 5 by degree within community)
                     - cohesion (internal edges / total edges involving community nodes)
                     - dominant_package (most common package prefix)
                   - Return JSON array of communities sorted by size desc
                   - Cap at 50 communities (merge smallest into "other")
                 - For action="for_symbol":
                   - Resolve symbol to node via NodesByQualifiedName
                   - Run same community detection
                   - Find which community the symbol belongs to
                   - Return that community plus its immediate neighbor communities
                     (communities connected via cross-community edges)

               Louvain algorithm implementation (simplified, single-pass):
               ```go
               // louvain partitions nodes into communities maximizing modularity.
               // nodes: list of node hashes
               // adj: adjacency list (node -> neighbors with edge weights)
               // Returns: map[nodeHash]communityID
               func louvain(nodes []types.Hash, adj map[types.Hash][]weightedEdge) map[types.Hash]int {
                   // Phase 1: Each node starts in its own community.
                   // Iterate: for each node, move to neighbor's community if modularity gain > 0.
                   // Repeat until no moves improve modularity.
                   // Phase 2: Contract communities into super-nodes, repeat.
                   // For simplicity, do Phase 1 only (one level). This gives reasonable
                   // clusters for codebases up to ~10K nodes.
               }

               type weightedEdge struct {
                   Target types.Hash
                   Weight float64
               }
               ```

               Community result types:
               ```go
               type community struct {
                   ID              int      `json:"id"`
                   Size            int      `json:"size"`
                   TopSymbols      []string `json:"top_symbols"`
                   Cohesion        float64  `json:"cohesion"`
                   DominantPackage string   `json:"dominant_package"`
               }
               type communityResult struct {
                   Communities []community `json:"communities"`
                   NodeCount   int         `json:"node_count"`
                   EdgeCount   int         `json:"edge_count"`
               }
               type symbolCommunityResult struct {
                   Symbol     string      `json:"symbol"`
                   Community  community   `json:"community"`
                   Neighbors  []community `json:"neighbors"`
               }
               ```

            2. **internal/mcp/communities_test.go** (new)
               Test using mockGraphStore:
               - Build a graph with two clearly separable clusters (A-B-C connected, D-E-F connected, one cross-edge)
               - Verify: produces 2 communities
               - Verify: cohesion is high for tight clusters
               - Verify: top_symbols populated
               - Verify: for_symbol returns correct community
               - Verify: repo_url filter works (nodes not matching prefix excluded)

            ### Constraints
            - Do NOT modify internal/mcp/server.go (registration happens in Wave 2)
            - Use s.store (GraphStore interface) for node/edge queries
            - Louvain Phase 1 only (single level) is acceptable for v1
            - Cap communities at 50 in response to avoid huge payloads
            - For large graphs (>5000 nodes), sample edges rather than loading all

