interface_contracts:
    - name: handleFeedback
      description: MCP tool handler for feedback (record/query actions)
      definition: |
        func (s *Server) handleFeedback(ctx context.Context, req mcp.CallToolRequest) (*mcp.CallToolResult, error)
        // Tool name: "feedback"
        // Required args: action (string: "record" or "query")
        // For action=record: symbol_hash (string, 64-char hex), session_id (string), useful (bool)
        // For action=query: symbol_hash (string, 64-char hex)
        // Returns: JSON with status or aggregate stats {useful_count, not_useful_count, score}
      location: internal/mcp/feedback.go
    - name: handleTestScope
      description: MCP tool handler exposing test-scope logic
      definition: |
        func (s *Server) handleTestScope(ctx context.Context, req mcp.CallToolRequest) (*mcp.CallToolResult, error)
        // Tool name: "test_scope"
        // Required args: files (string, comma-separated paths)
        // Optional args: output (string: "packages"|"functions"|"run", default "packages"), depth (int, default 3)
        // Returns: JSON with affected test packages/functions/run-regex
      location: internal/mcp/testscope.go
    - name: handleFlowBetween
      description: MCP tool handler for BFS path finding between two symbols
      definition: |
        func (s *Server) handleFlowBetween(ctx context.Context, req mcp.CallToolRequest) (*mcp.CallToolResult, error)
        // Tool name: "flow_between"
        // Required args: source_symbol (string, qualified name), target_symbol (string, qualified name)
        // Optional args: max_depth (int, default 5)
        // Returns: JSON with paths array, each path is [{symbol, edge_type}, ...]
      location: internal/mcp/dataflow.go
    - name: handlePlanTurn
      description: MCP tool handler for task-to-tool suggestion
      definition: |
        func (s *Server) handlePlanTurn(ctx context.Context, req mcp.CallToolRequest) (*mcp.CallToolResult, error)
        // Tool name: "plan_turn"
        // Required args: task (string, task description)
        // Returns: JSON array of suggested tool calls with pre-filled args, max 3-4 suggestions
      location: internal/mcp/planturn.go
    - name: handleCommunities
      description: MCP tool handler for Louvain community detection
      definition: |
        func (s *Server) handleCommunities(ctx context.Context, req mcp.CallToolRequest) (*mcp.CallToolResult, error)
        // Tool name: "communities"
        // Optional args: repo_url (string filter), action (string: "list" or "for_symbol", default "list")
        // For action=for_symbol: symbol (string, qualified name)
        // Returns: JSON with communities array [{id, size, top_symbols, cohesion, dominant_package}]
        // or single community with neighbors for action=for_symbol
      location: internal/mcp/communities.go
    - name: FeedbackStore methods
      description: SQLite methods for feedback persistence
      definition: |
        func (s *SQLiteStore) RecordFeedback(ctx context.Context, symbolHash types.Hash, sessionID string, useful bool) error
        func (s *SQLiteStore) QueryFeedback(ctx context.Context, symbolHash types.Hash) (*FeedbackStats, error)
        func (s *SQLiteStore) FeedbackBoosts(ctx context.Context, hashes []types.Hash) (map[types.Hash]float64, error)

