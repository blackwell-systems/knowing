            - `grep -c 'Semantic PR Diff' .github/workflows/pr-semantic-diff.yml` should output at least `1`

            ### Constraints

            - Do NOT modify any existing workflow files (.github/workflows/ci.yml, docs.yml, release.yml).
            - Do NOT modify any Go source files.
            - The workflow must reference `knowing diff` (the CLI subcommand created by Agent B
              and wired in wave 2 by Agent D). At CI runtime, the binary will have the diff
              subcommand because it is built from the merged codebase.
          files:
            - .github/workflows/pr-semantic-diff.yml
