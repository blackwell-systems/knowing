title: 'Semantic PR Diff: Relationship-Level Impact Analysis'
feature_slug: semantic-pr-diff
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: The work decomposes into 5 clear areas with disjoint file
       ownership: (a) internal/diff package (new), (b) MCP handler upgrades for
       semantic_diff and pr_impact, (c) CLI diff subcommand in cmd/knowing/main.go,
       (d) GitHub Action workflow file (new), and (e) shared types for diff results.
       At least 4 agents can work in parallel with disjoint files.

    2. Investigation-first items: None. The existing SnapshotDiff, BlastRadius, and
       edge_events infrastructure is well understood and functional.

    3. Interface discoverability: Yes. The SemanticDiff function signature, result types,
       and MCP tool schemas can all be defined up front from the existing types.

    4. Pre-implementation status: The semantic_diff and pr_impact MCP tools already
       exist as stubs (thin wrappers around SnapshotDiff). The internal/diff package
       does not exist. The CLI diff subcommand does not exist. The GitHub Action does
       not exist. Status: semantic_diff handler PARTIAL, pr_impact handler PARTIAL,
       everything else TODO.

    5. Parallelization value: High. The build+test cycle is ~30s (go test ./... with
       SQLite and tree-sitter). 4 agents in wave 1 working on independent packages
       (internal/diff, CLI, GitHub Action, types) provides clear speedup over sequential.

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~8 min (4 agents x 5 min avg, wave 1 parallel + wave 2 serial)
    - Merge and verification: ~3 min
    Total Polywave time: ~19 min

    Sequential baseline: ~30 min (5 tasks x 6 min avg sequential time)
    Time savings: ~11 min (37% faster)

    Recommendation: Clear speedup. Proceed.
