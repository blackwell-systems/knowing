pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Agent A's SemanticDiff cannot resolve file paths because GraphStore has no GetFile method. The enrichment falls back to empty file paths.
          likelihood: medium
          impact: low
          mitigation: |
            The task explicitly instructs Agent A to gracefully handle missing file paths by leaving the File field empty. The QualifiedName already encodes the package path, so the output remains useful.
        - scenario: |
            The GitHub Action fails because the sqlite3 CLI merge step loses edge_events or snapshot chain data, causing the diff command to return empty results.
          likelihood: medium
          impact: medium
          mitigation: |
            The sqlite3 merge uses INSERT OR IGNORE which preserves existing data. Edge events and snapshots use content-addressed hashes as primary keys, so duplicates are safely ignored. Manual testing of the merge step is recommended before relying on it in CI.
        - scenario: |
            Agent D's MCP handler tests fail because the mockGraphStore does not implement methods that diff.SemanticDiff calls (e.g., GetNode returns nil for test nodes).
          likelihood: medium
          impact: low
          mitigation: |
            Agent D's task explicitly instructs populating the mock's nodes map so GetNode resolves correctly. The mock already supports all GraphStore methods.
        - scenario: |
            The diff subcommand cannot find snapshots by commit hash because there is no commit-to-snapshot lookup method in GraphStore.
          likelihood: low
          impact: medium
          mitigation: |
            The initial implementation accepts snapshot hashes directly (hex strings), not commit hashes. A future enhancement could add commit hash resolution via LatestSnapshot or a new store method. This is documented as a known limitation.
known_issues:
    - title: No GetFile method on GraphStore
      description: |
        GraphStore interface lacks a GetFile(ctx, hash) method. Agents resolving file paths from FileHash must work around this limitation. The QualifiedName on nodes provides sufficient context for display purposes.
      workaround: |
        Leave File field empty in NodeChange when file path cannot be resolved. The qualified name encodes the package path.
    - title: Diff CLI accepts only snapshot hashes
      description: |
        The diff CLI subcommand only accepts snapshot hashes, not commit hashes. Users must know their snapshot hashes (from index output or export).
      workaround: |
        Use 'knowing export -db knowing.db' to find snapshot hashes, or capture them from 'knowing index' output. A future enhancement can add commit hash resolution.
