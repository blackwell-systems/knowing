            ### cmdDiff (cmd/knowing/diff.go)

            Package: `main` (same package as cmd/knowing/main.go).

            Implement `func cmdDiff(args []string) error`:

            1. Parse flags using `flag.NewFlagSet("diff", flag.ExitOnError)`:
               - `-db` (string, default "knowing.db"): path to SQLite database
               - `-format` (string, default "text"): output format, "text" or "json"
