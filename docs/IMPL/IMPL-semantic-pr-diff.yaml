interface_contracts:
    - name: SemanticDiff
      description: |
        Compute enriched semantic diff between two snapshots. Takes the raw
        DiffResult from store.SnapshotDiff and enriches it with node metadata
        (qualified names, file paths, signatures) and detects modified nodes
        (nodes whose edges changed without the node being added/removed).
      definition: |
        func SemanticDiff(ctx context.Context, store types.GraphStore, oldSnapshot, newSnapshot types.Hash) (*SemanticDiffResult, error)
      location: internal/diff/semantic.go
    - name: PRImpact
      description: |
        Compute blast radius analysis for all symbols that changed between
        two snapshots. For each added/removed/modified symbol, find its
        callers and callees to assess impact scope.
      definition: |
        func PRImpact(ctx context.Context, store types.GraphStore, oldSnapshot, newSnapshot types.Hash) (*PRImpactResult, error)
      location: internal/diff/impact.go
    - name: cmdDiff
      description: |
        CLI handler for the "diff" subcommand. Opens the database, resolves
        snapshot hashes (from explicit hashes or commit hashes via snapshot
        lookup), calls SemanticDiff, and prints human-readable output.
      definition: |
        func cmdDiff(args []string) error
      location: cmd/knowing/diff.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Create the `internal/diff` package with two core functions: `SemanticDiff`
            and `PRImpact`. The scaffold file `internal/diff/types.go` will already
            exist with all result types.

            ### SemanticDiff (internal/diff/semantic.go)

            Implement `func SemanticDiff(ctx context.Context, store types.GraphStore, oldSnapshot, newSnapshot types.Hash) (*SemanticDiffResult, error)`:

            1. Call `store.SnapshotDiff(ctx, oldSnapshot, newSnapshot)` to get the raw `*types.DiffResult`.
            2. Enrich `NodesAdded` and `NodesRemoved`: for each node in `diff.NodesAdded` / `diff.NodesRemoved`,
               convert to `NodeChange` structs with `QualifiedName`, `Kind`, `Line`,
               `Signature`, and `NodeHash` (hex string). The `File` field can be left empty
               since GraphStore has no GetFile method; the QualifiedName encodes the package path.
            3. Detect modified nodes: group `diff.EdgesAdded` and `diff.EdgesRemoved` by their source node hash.
               For source nodes that appear in edge changes but NOT in `NodesAdded` or `NodesRemoved`, create
               `NodeModification` entries. Look up each source node via `store.GetNode` to get its qualified name.
            4. Enrich edges: for each edge in `EdgesAdded`/`EdgesRemoved`, resolve source and target node
               qualified names via `store.GetNode`. Convert to `EdgeChange` structs.
            5. Build and return the `SemanticDiffResult` with populated `Summary` counts.

            ### PRImpact (internal/diff/impact.go)

            Implement `func PRImpact(ctx context.Context, store types.GraphStore, oldSnapshot, newSnapshot types.Hash) (*PRImpactResult, error)`:

            1. Call `SemanticDiff(ctx, store, oldSnapshot, newSnapshot)` to get the enriched diff.
            2. For each node in `NodesRemoved` (breaking changes): parse the NodeHash back to types.Hash,
               call `store.BlastRadius(ctx, nodeHash, oldSnapshot)` to find all callers.
               Also call `store.TransitiveCallees(ctx, nodeHash, 3, oldSnapshot)` for callees.
               Build a `SymbolImpact` with `ChangeType: "removed"`.
            3. For each node in `NodesAdded`: parse NodeHash, call
               `store.TransitiveCallees(ctx, nodeHash, 3, newSnapshot)` to find what the new symbol calls.
               Build `SymbolImpact` with `ChangeType: "added"`.
            4. For each `NodeModification` in the semantic diff: look up the node hash via
               `store.NodesByQualifiedName`, compute blast radius using the new snapshot.
               Build `SymbolImpact` with `ChangeType: "modified"`.
            5. Compute `ImpactSummary`: count unique callers/callees across all impacts.
               Set `RiskLevel` based on total callers affected: 0-5 = "low", 6-20 = "medium", >20 = "high".
            6. Collect all affected edges from the semantic diff into `AffectedEdges`.

            Create a helper: `func nodeToChange(n types.Node) NodeChange` to convert types.Node to NodeChange.

            ### Tests

            **semantic_test.go**: Test SemanticDiff using a real SQLiteStore (from `internal/store`).
            Create a test database in t.TempDir(), insert nodes, edges, files, and record edge events
            for two snapshots. Verify that:
            - Added/removed nodes are correctly enriched with qualified names
            - Modified nodes (edge changes without node changes) are detected
            - Edge changes include resolved source/target names
            - Summary counts are accurate
            - Empty diff (identical snapshots) returns zero counts

            **impact_test.go**: Test PRImpact similarly. Insert a graph where node A calls node B,
            then create a diff where node B is removed. Verify blast radius shows A as affected caller.
            Test risk level calculation for different caller counts.

            Use `store.NewSQLiteStore` with a temp directory database for tests. Import pattern:
            ```go
            import (
                "github.com/blackwell-systems/knowing/internal/store"
                "github.com/blackwell-systems/knowing/internal/types"
            )
            ```

            ### Interface contracts

            - `SemanticDiff(ctx, store, oldHash, newHash) (*SemanticDiffResult, error)`
            - `PRImpact(ctx, store, oldHash, newHash) (*PRImpactResult, error)`
            - All result types defined in `internal/diff/types.go` (scaffold)

            ### Verification gate

            ```bash
            go build ./internal/diff/... && go test ./internal/diff/... -v -count=1
            ```

            Postconditions:
            - `grep -c 'func SemanticDiff' internal/diff/semantic.go` should output `1`
            - `grep -c 'func PRImpact' internal/diff/impact.go` should output `1`
            - `grep -c 'func Test' internal/diff/semantic_test.go` should output at least `2`
            - `grep -c 'func Test' internal/diff/impact_test.go` should output at least `2`

            ### Constraints

            - Do NOT modify any files outside internal/diff/. The MCP handlers and CLI
              will be updated in wave 2.
            - Do NOT modify internal/diff/types.go (scaffold file, already created).
            - Do NOT add methods to the GraphStore interface. Use existing methods only.
          files:
            - internal/diff/semantic.go
            - internal/diff/semantic_test.go
            - internal/diff/impact.go
            - internal/diff/impact_test.go
