               Semantic Diff: <old_hash_short> -> <new_hash_short>

               Nodes Added (N):
                 + pkg/foo.NewFunc (function) [line 42]
                 + pkg/bar.NewType (type) [line 10]

               Nodes Removed (N):
                 - pkg/baz.OldFunc (function) [line 15]

               Nodes Modified (N):
                 ~ pkg/qux.ModifiedFunc (function)
                   edges added: 2, edges removed: 1

               Edges Added (N):
                 pkg/foo.Caller -> pkg/bar.Callee [calls] (confidence: 0.90)

               Edges Removed (N):
                 pkg/baz.Caller -> pkg/baz.Callee [calls] (confidence: 0.70)

