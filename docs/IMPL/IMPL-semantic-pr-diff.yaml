        - id: C
          task: |
            ## What to implement

            Create the GitHub Action workflow file `.github/workflows/pr-semantic-diff.yml`
            that runs on pull_request events, indexes the PR branch, computes semantic diff
            against main, and posts a PR comment with the relationship-level impact summary.

            ### Workflow design

            The workflow should:

            1. Trigger on `pull_request` events targeting `main` (types: opened, synchronize).
            2. Set permissions: `contents: read`, `pull-requests: write`.
            3. Use `actions/checkout@v4` with `fetch-depth: 0` for full git history.
            4. Use `actions/setup-go@v5` with `go-version-file: 'go.mod'` and cache enabled.
            5. Set env `GOWORK: "off"` to match the CI configuration.
            6. Build the knowing binary: `go build -o knowing ./cmd/knowing`
            7. Index the base branch:
               - `git checkout ${{ github.event.pull_request.base.sha }}`
               - `./knowing index -db base.db -url "${{ github.repository }}" -commit "${{ github.event.pull_request.base.sha }}" .`
               - Extract snapshot hash from export output using jq
            8. Index the head branch similarly into head.db.
            9. Merge base.db data into head.db using sqlite3 CLI so both snapshots are in one DB:
               `sqlite3 head.db "ATTACH 'base.db' AS base; INSERT OR IGNORE INTO nodes SELECT * FROM base.nodes; INSERT OR IGNORE INTO edges SELECT * FROM base.edges; INSERT OR IGNORE INTO files SELECT * FROM base.files; INSERT OR IGNORE INTO repos SELECT * FROM base.repos; INSERT OR IGNORE INTO snapshots SELECT * FROM base.snapshots; INSERT OR IGNORE INTO edge_events SELECT * FROM base.edge_events;"`
            10. Run `./knowing diff -db head.db -format json "$BASE_SNAPSHOT" "$HEAD_SNAPSHOT"`.
            11. Use `actions/github-script@v7` to parse the JSON and post/update a PR comment
                with a summary table (nodes added/removed/modified, edges added/removed) and
                lists of changed symbols (truncated at 20 nodes, 15 edges).
            12. On subsequent pushes (`synchronize`), update the existing comment instead of
                creating a new one. Find the existing comment by searching for "## Semantic PR Diff".

            ### Key design decisions

            - Two separate databases (base.db and head.db) to avoid snapshot chain confusion.
            - Merge base data into head.db so both snapshots are queryable for the diff command.
            - Use `sqlite3` CLI (available on ubuntu-latest) for the database merge.
            - Use `actions/github-script@v7` for comment posting (avoids shell escaping issues).
            - Truncate long lists to keep comments readable.

            ### Verification gate

            The workflow file is YAML; validate syntax:
            ```bash
            python3 -c "import yaml; yaml.safe_load(open('.github/workflows/pr-semantic-diff.yml'))" 2>&1 || echo "YAML validation not available, skipping"
            ```

            Postconditions:
