interface_contracts:
    - name: CommunitiesForNodes
      description: |
        Batch lookup of community_id notes for a set of node hashes. Returns a map
        from hash to community ID (integer). Hashes without a community assignment
        are omitted from the result (not an error). Already referenced as a local
        interface at context.go:415-417; this contract makes it concrete on SQLiteStore.
      definition: |
        func (s *SQLiteStore) CommunitiesForNodes(ctx context.Context, hashes []types.Hash) (map[types.Hash]int, error)
      location: internal/store/sqlite.go
    - name: CommunityFilteredRWR
      description: |
        A variant of RandomWalkWithRestart that accepts an optional community filter.
        When communityIDs is non-nil, buildAdjacencyMap BFS skips nodes whose community
        assignment is not in the allowed set. When nil, behavior is identical to the
        existing RandomWalkWithRestart (unconstrained walk). This preserves backward
        compatibility: existing callers continue to use the old function unchanged.
      definition: |
        func CommunityFilteredRWR(ctx context.Context, store types.GraphStore, seeds []types.Hash, alpha float64, maxIter int, communityIDs map[int]bool) (map[types.Hash]float64, error)
      location: internal/context/walk.go
    - name: buildAdjacencyMapFiltered
      description: |
        Internal (unexported) variant of buildAdjacencyMap that accepts a communityFilter.
        During BFS expansion, nodes whose community_id note does not match any ID in the
        filter are not added to the frontier (but edges to them are still recorded so the
        walk can "see" them as dead ends). When filter is nil, behaves identically to
        the existing buildAdjacencyMap.
      definition: |
        func buildAdjacencyMapFiltered(ctx context.Context, store types.GraphStore, seeds []types.Hash, communityFilter map[int]bool) (adjFrom, adjTo map[types.Hash][]types.Edge, err error)
      location: internal/context/walk.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Implement CommunitiesForNodes on SQLiteStore

            ### What to implement
            Add a `CommunitiesForNodes` method to `SQLiteStore` that performs a batch lookup
            of community_id notes for a set of node hashes. This method satisfies the
            `communityProvider` interface already defined in `internal/context/context.go:415-417`.

            ### Implementation details

            **File: internal/store/sqlite.go**

            Add the following method after the existing Notes methods section (after line 1550,
            near the `scanNotes` helper):

            ```go
            // CommunitiesForNodes batch-retrieves community_id notes for the given hashes.
            // Returns a map from hash to community ID. Hashes without a community_id note
            // are omitted from the result.
            func (s *SQLiteStore) CommunitiesForNodes(ctx context.Context, hashes []types.Hash) (map[types.Hash]int, error) {
            ```

            Implementation approach:
            1. If len(hashes) == 0, return nil, nil early.
            2. Build a single SQL query using `WHERE object_hash IN (?, ?, ...)` with the
               hash bytes, filtered to `key = 'community_id'`.
            3. Chunk the query if len(hashes) > 99 (SQLite variable limit is 999; with 2 params
               per placeholder this is safe up to ~499, but chunk at 99 for consistency with
               BatchPutNodes pattern).
            4. For each result row, parse the value as int (strconv.Atoi) and populate the map.
            5. Skip rows with non-integer values (corrupt data, same as LoadAssignments).

            The query pattern follows GetNotesByKey but with an IN clause:
            ```sql
            SELECT object_hash, value FROM graph_notes WHERE key = 'community_id' AND object_hash IN (?, ?, ...)
            ```

            Insert after this exact text in sqlite.go:
            ```go
            // scanNotes is a shared helper for scanning note rows.
            func scanNotes(rows *sql.Rows) ([]types.Note, error) {
            ```

            Actually, place the new method BEFORE scanNotes (after DeleteNotesByObject, before
            the scanNotes helper). Insert after:
            ```go
            func (s *SQLiteStore) DeleteNotesByObject(ctx context.Context, objectHash types.Hash) error {
            	_, err := s.db.ExecContext(ctx,
            		`DELETE FROM graph_notes WHERE object_hash = ?`,
            		objectHash[:],
            	)
            	return err
            }
            ```

            ### Tests

            **File: internal/store/notes_test.go**

            Add test functions:
            - `TestCommunitiesForNodes_Empty`: call with empty slice, expect nil map.
            - `TestCommunitiesForNodes_Found`: insert 3 community_id notes via PutNote, call
              CommunitiesForNodes with those hashes plus one unknown hash, verify the map has
              exactly 3 entries with correct values and the unknown hash is absent.
            - `TestCommunitiesForNodes_LargeBatch`: insert 150 notes, call with all 150 hashes,
              verify all are returned (exercises chunking logic).
            - `TestCommunitiesForNodes_CorruptValue`: insert a note with value "notanumber",
              verify it is skipped (map does not contain that hash, no error returned).

            ### Verification gate
            ```bash
            cd /Users/dayna.blackwell/code/knowing && go build ./internal/store/... && go test ./internal/store/ -run TestCommunitiesForNodes -count=1 -v
            ```

            Postconditions:
            - `grep -c "func (s \*SQLiteStore) CommunitiesForNodes" internal/store/sqlite.go` returns 1
            - `grep -c "func TestCommunitiesForNodes" internal/store/notes_test.go` returns at least 3

            ### Constraints
            - Do NOT modify internal/types/interfaces.go. The method is NOT added to the
              GraphStore interface; it is discovered via type assertion (communityProvider pattern).
            - Do NOT modify any files outside your ownership list.
            - Do NOT change existing Notes method implementations.
          files:
