pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent B duplicates the RWR iteration loop incorrectly, introducing subtle
            score differences between CommunityFilteredRWR and RandomWalkWithRestart.
          likelihood: low
          impact: medium
          mitigation: |
            TestCommunityFilteredRWR_NilFilter asserts score equivalence with the
            unconstrained variant. Any divergence fails the test.
        - scenario: |
            The communityProvider type assertion in buildAdjacencyMapFiltered fails
            because the store passed in tests doesn't implement it.
          likelihood: medium
          impact: low
          mitigation: |
            Agent B's task explicitly requires extending walkMockStore to implement
            communityProvider. Test will fail to compile if the interface isn't satisfied.
        - scenario: |
            Agent C's mockStore modifications conflict with existing test structure
            (adding a new field to mockStore struct).
          likelihood: low
          impact: low
          mitigation: |
            The mockStore struct is simple (3 fields). Adding a 4th field (communities)
            is backward-compatible; existing tests that don't set it get nil behavior.
        - scenario: |
            Community filter is too aggressive on small graphs where all nodes happen
            to be in one community, returning fewer results than unconstrained walk.
          likelihood: medium
          impact: low
          mitigation: |
            The filter only constrains BFS expansion, not edge loading. Nodes adjacent
            to seeds still receive probability. The 0.02 threshold in ForTask already
            gates what enters the scoring pipeline. If results are too few, the engine
            falls through to other retrieval paths (BM25, feedback).
