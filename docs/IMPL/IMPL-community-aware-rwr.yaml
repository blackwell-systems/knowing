        - id: B
          task: |
            ## Implement Community-Filtered RWR variant

            ### What to implement
            Add a `CommunityFilteredRWR` function and a `buildAdjacencyMapFiltered` helper to
            `internal/context/walk.go`. These provide community-constrained random walks without
            modifying the existing `RandomWalkWithRestart` or `buildAdjacencyMap` functions.

            ### Implementation details

            **File: internal/context/walk.go**

            1. Add `buildAdjacencyMapFiltered` (unexported) after the existing `buildAdjacencyMap`:

            ```go
            // buildAdjacencyMapFiltered is like buildAdjacencyMap but skips BFS expansion
            // into nodes whose community assignment doesn't match the allowed set.
            // Seeds are always included regardless of community. When communityFilter is nil,
            // behaves identically to buildAdjacencyMap (no filtering).
            func buildAdjacencyMapFiltered(ctx stdctx.Context, store types.GraphStore, seeds []types.Hash, communityFilter map[int]bool) (adjFrom, adjTo map[types.Hash][]types.Edge, err error) {
            ```

            Implementation:
            - If communityFilter is nil, delegate to `buildAdjacencyMap(ctx, store, seeds)`.
            - Otherwise, replicate the BFS logic from buildAdjacencyMap but before adding a
              discovered node to nextFrontier, check its community assignment. Use a type
              assertion on store to the communityProvider interface:
              ```go
              type communityProvider interface {
                  CommunitiesForNodes(ctx stdctx.Context, hashes []types.Hash) (map[types.Hash]int, error)
              }
              ```
            - At each BFS depth, collect all newly discovered hashes, batch-query their
              communities, and only add those whose community is in communityFilter to the
              next frontier. Seed nodes are always in the frontier regardless of community.
            - The maxDepth constant remains 4 (same as buildAdjacencyMap).
            - Edges TO/FROM filtered-out nodes ARE still loaded for the current frontier node
              (so the walk sees them as potential targets). The filtering prevents the BFS
              from EXPANDING beyond filtered nodes, not from traversing edges to them.

            2. Add `CommunityFilteredRWR` (exported) after the existing `RandomWalkWithRestart`:

            ```go
            // CommunityFilteredRWR is like RandomWalkWithRestart but constrains the BFS
            // adjacency pre-load to nodes in the specified communities. When communityIDs
            // is nil, the walk is unconstrained (identical to RandomWalkWithRestart).
            func CommunityFilteredRWR(ctx stdctx.Context, store types.GraphStore, seeds []types.Hash, alpha float64, maxIter int, communityIDs map[int]bool) (map[types.Hash]float64, error) {
            ```

            Implementation:
            - Same parameter validation as RandomWalkWithRestart (empty seeds -> nil, alpha/maxIter defaults).
            - Call `buildAdjacencyMapFiltered(ctx, store, seeds, communityIDs)` instead of `buildAdjacencyMap`.
            - The rest of the iteration logic is identical to RandomWalkWithRestart. Copy the
              iteration loop (lines 41-161 of walk.go: seedVec, prob, edgeWeight map, iteration,
              normalization). Do NOT call RandomWalkWithRestart internally; duplicate the loop
              so both functions remain independently testable.

            Insert `buildAdjacencyMapFiltered` after this exact text:
            ```go
            	return adjFrom, adjTo, nil
            }

            func abs(x float64) float64 {
            ```

            Actually: place `buildAdjacencyMapFiltered` between the end of `buildAdjacencyMap`
            (line 217: `return adjFrom, adjTo, nil` + closing brace) and the `abs` helper.
            Place `CommunityFilteredRWR` between the end of `RandomWalkWithRestart` (line 161)
            and `buildAdjacencyMap` (line 167).

            ### Tests

            **File: internal/context/walk_test.go**

            Add test functions:
            - `TestCommunityFilteredRWR_NilFilter`: call with nil communityIDs, verify result
              matches RandomWalkWithRestart output (same scores within 0.001 tolerance).
            - `TestCommunityFilteredRWR_FilterExcludesNodes`: build a graph where nodes A, B
              are in community 1 and nodes C, D are in community 2. Seed from A with filter
              {1: true}. Verify B has a non-trivial score and C, D have zero or negligible
              scores (< 0.01). This requires the walkMockStore to also implement the
              communityProvider interface.
            - `TestCommunityFilteredRWR_SeedsAlwaysIncluded`: seed from node X in community 3
              with filter {1: true} (X's community not in filter). Verify X still gets a
              score (seeds are never filtered out).

            To support these tests, extend `walkMockStore` with a `communities` field:
            ```go
            type walkMockStore struct {
                mockStore
                communities map[types.Hash]int // optional: if set, enables communityProvider
            }

            func (m *walkMockStore) CommunitiesForNodes(_ stdctx.Context, hashes []types.Hash) (map[types.Hash]int, error) {
                if m.communities == nil {
                    return nil, nil
                }
                result := make(map[types.Hash]int)
                for _, h := range hashes {
                    if cid, ok := m.communities[h]; ok {
                        result[h] = cid
                    }
                }
                return result, nil
            }
            ```

            ### Verification gate
            ```bash
            cd /Users/dayna.blackwell/code/knowing && go build ./internal/context/... && go test ./internal/context/ -run "TestCommunityFiltered|TestRWR" -count=1 -v
            ```

            Postconditions:
            - `grep -c "func CommunityFilteredRWR" internal/context/walk.go` returns 1
            - `grep -c "func buildAdjacencyMapFiltered" internal/context/walk.go` returns 1
            - `grep -c "func TestCommunityFilteredRWR" internal/context/walk_test.go` returns at least 3

            ### Constraints
            - Do NOT modify the existing `RandomWalkWithRestart` function signature or behavior.
            - Do NOT modify the existing `buildAdjacencyMap` function.
            - Do NOT modify context.go or context_test.go (those are Agent C's files).
            - Do NOT modify files outside your ownership list.
          files:
            - internal/context/walk.go
            - internal/context/walk_test.go
    - number: 2
      agents:
        - id: C
          task: |
            ## Wire community filter into ForTask RWR call

            ### What to implement
            In `internal/context/context.go`, wire the existing `commCounts` computation
            (lines 412-428) to the new `CommunityFilteredRWR` function. The logic:
            - If seeds cluster in 1-3 communities (len(commCounts) <= 3 AND len(commCounts) > 0),
              build a community filter set and call `CommunityFilteredRWR` instead of
              `RandomWalkWithRestart`.
            - If seeds span 4+ communities OR commCounts is empty (no community data),
              continue calling the existing unconstrained `RandomWalkWithRestart`.

            ### Implementation details

            **File: internal/context/context.go**

            Locate the RWR call site (around line 440). Currently:
            ```go
            	rwrScores, err := RandomWalkWithRestart(ctx, e.store, seedHashes, 0.2, 20)
            	if err != nil {
            		return nil, err
            	}
            ```

            Replace with:
            ```go
            	// Use community-constrained RWR when seeds cluster in few communities.
            	var rwrScores map[types.Hash]float64
            	if len(commCounts) > 0 && len(commCounts) <= 3 {
            		communityFilter := make(map[int]bool, len(commCounts))
            		for cid := range commCounts {
            			communityFilter[cid] = true
            		}
            		rwrScores, err = CommunityFilteredRWR(ctx, e.store, seedHashes, 0.2, 20, communityFilter)
            	} else {
            		rwrScores, err = RandomWalkWithRestart(ctx, e.store, seedHashes, 0.2, 20)
            	}
            	if err != nil {
            		return nil, err
            	}
            ```

            The `err` variable is already declared earlier in the function (from candidate
            resolution), so use `=` not `:=` for the RWR assignment.

            Do NOT modify the other RWR call sites (explain.go:92, context.go:850 in ForPR).
            Those are different code paths without community data; they remain unconstrained.

            ### Tests

