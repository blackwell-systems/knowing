suitability_assessment: |
    1. File decomposition: The work decomposes cleanly into 3 disjoint file sets:
       (a) SQLiteStore.CommunitiesForNodes method (internal/store/sqlite.go + test),
       (b) walk.go community-filtered BFS variant + new CommunityFilteredRWR function,
       (c) context.go wiring to pass commCounts through to the filtered walk.
       Each agent touches 2-3 files with no overlap.

    2. Investigation-first: No unknowns. The code paths are well-understood from
       existing commCounts computation at context.go:414-428. The community_id notes
       are already persisted by community/persistence.go. Only implementation work remains.

    3. Interface discoverability: Yes. The communityProvider interface already exists
       locally in context.go:415-417 (defined but not implemented on SQLiteStore).
       The buildAdjacencyMap signature extension and new exported function signature
       can be fully defined before implementation.

    4. Pre-implementation status: commCounts is computed but unused (PARTIAL).
       CommunitiesForNodes interface is defined locally but not on SQLiteStore (TODO).
       buildAdjacencyMap has no community filter (TODO). Wiring in ForTask is TODO.

    5. Parallelization value: Go build+test cycle is ~30s. Three agents with 2-3
       files each. Wave 1 has 2 independent agents (store method + walk filter),
       wave 2 wires them together. Clear speedup over sequential.

    Estimated times:
    - Scout phase: ~5 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~8 min (2 agents wave 1 parallel + 1 agent wave 2)
    - Merge and verification: ~3 min
    Total Polywave time: ~16 min

    Sequential baseline: ~20 min (3 agents x 6 min avg sequential time + overhead)
    Time savings: ~4 min (20% faster)

    Recommendation: Clear speedup. Wave 1 agents are fully independent (different
    packages, no shared types). Proceed.
