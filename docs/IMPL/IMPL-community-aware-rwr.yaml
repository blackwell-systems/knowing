            To support this test, add `CommunitiesForNodes` to the existing `mockStore`:
            ```go
            func (m *mockStore) CommunitiesForNodes(_ stdctx.Context, hashes []types.Hash) (map[types.Hash]int, error) {
                // Return community assignments based on a communities field
                ...
            }
            ```

            Add a `communities map[types.Hash]int` field to the mockStore struct (line 12-16
            of context_test.go).

