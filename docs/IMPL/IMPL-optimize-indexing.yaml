title: 'Optimize indexing performance: bulk load + worker pool'
feature_slug: optimize-indexing
verdict: SUITABLE
suitability_assessment: |
    The bottleneck is go/packages.Load called once per file in GoExtractor.Extract
    (internal/indexer/goextractor/extractor.go:69). For polywave-go with ~6,340 nodes,
    this spawns hundreds of independent go/packages.Load calls, each taking 1-3 seconds.
    Total: 16m24s cold index.

    Fix decomposes into three independent concerns with disjoint file ownership:
    1. Bulk package loader: new file that calls go/packages.Load("./...") once and
       indexes the results by file path.
    2. Extractor refactor: modify GoExtractor to accept pre-loaded *packages.Package
       data instead of calling packages.Load itself, plus a fallback for single-file mode.
    3. Indexer parallelization: add worker pool to IndexRepo to extract files concurrently
       using pre-loaded package data.

    All three concerns touch different files. The extractor refactor is the interface
    boundary: the loader produces data the extractor consumes, and the indexer orchestrates
    concurrency. Contracts are well-defined (Go types).

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~10 min (3 agents x 8 min avg, single wave)
    - Merge and verification: ~3 min
    Total Polywave time: ~21 min

    Sequential baseline: ~24 min (3 tasks x 8 min avg)
    Time savings: ~3 min (12% faster)

    Recommendation: Clear coordination value. The interface contracts between loader,
    extractor, and indexer are the primary benefit; agents implement against binding
    signatures. Speed gain is moderate but the work is cleanly parallelizable.

    Pre-implementation status: all three components are TODO (no prior work on bulk
    loading or worker pool).
