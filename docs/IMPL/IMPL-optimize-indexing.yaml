    - number: 2
      type: integration
      agents:
        - id: D
          task: |
            ## Agent D: Wire BulkLoad + ExtractWithPackage into IndexRepo

            ### What to implement

            Modify `internal/indexer/indexer.go` to use the bulk loader and parallel
            worker pool in `IndexRepo`. This is the integration step that connects
            Agent A's loader, Agent B's ExtractWithPackage, and Agent C's worker pool.

            #### Changes to IndexRepo method

            Find the file-processing loop in IndexRepo. The current code (starting at
            the comment "Accumulate all results for batch insertion"):
            ```go
            // Accumulate all results for batch insertion.
            var allNodes []types.Node
            var allEdges []types.Edge
            var allFiles []types.File

            for _, absPath := range filePaths {
            ```

            Replace the sequential loop with:

            1. **Before the loop**, call `goextractor.BulkLoad`:
               ```go
               loaded, bulkErr := goextractor.BulkLoad(ctx, repoPath)
               if bulkErr != nil {
                   // Log warning but continue with fallback (per-file loading)
                   loaded = nil
               }
               ```

            2. **Build work items** for the parallel extractor. For each file that
               passes the unchanged-content check:
               - If `loaded != nil` and the file exists in `loaded.FilePackages`,
                 create a work item that calls `goExtractor.ExtractWithPackage(ctx, opts, pkg)`.
               - Otherwise, fall back to `ext.Extract(ctx, opts)` (the old per-file path).

            3. **Run parallel extraction** using `parallelExtract(ctx, work, idx.Concurrency)`.

            4. **Collect results** from parallelExtract into allNodes, allEdges, allFiles
               (same as the current sequential accumulation).

            #### Finding the GoExtractor

            The indexer needs to identify which registered extractor is the GoExtractor
            to call ExtractWithPackage on it. Add a type assertion in the extraction
            setup:

            ```go
            // Try to find the GoExtractor for bulk loading.
            var goExt *goextractor.GoExtractor
            for _, ext := range idx.registry.extractors {
                if ge, ok := ext.(*goextractor.GoExtractor); ok {
                    goExt = ge
                    break
                }
            }
            ```

            Note: `idx.registry.extractors` is currently unexported (lowercase field).
            Add an accessor method to ExtractorRegistry in indexer.go or extractor.go
            (Agent C owns indexer.go in wave 1, but you are in wave 2 and own it now):

            ```go
            // Extractors returns all registered extractors.
            func (r *ExtractorRegistry) Extractors() []types.Extractor {
                return r.extractors
            }
            ```

            Or add it in internal/indexer/extractor.go (the ExtractorRegistry file).

            #### Import additions

            Add to indexer.go imports:
            ```go
            "runtime"
            "github.com/blackwell-systems/knowing/internal/indexer/goextractor"
            ```

            ### Tests

            Modify `internal/indexer/indexer_test.go`:

            1. `TestIndexRepo_UsesParallelExtraction`: Create a temp multi-package Go
               module (similar to TestIndexRepo_MultiFileModule), index it, verify the
               same nodes/edges are produced. This validates that bulk load + parallel
               extraction produces identical results to the sequential path.

            2. `TestIndexRepo_FallbackOnBulkLoadFailure`: Index a directory that is not
               a valid Go module (e.g., contains .go files but no go.mod). Verify
               IndexRepo still succeeds by falling back to per-file extraction.

            ### Verification gate

            ```bash
            cd /Users/dayna.blackwell/code/knowing && go build ./... && go test ./internal/indexer/... -v && go test ./internal/indexer/goextractor/... -v
            ```

            Postconditions:
