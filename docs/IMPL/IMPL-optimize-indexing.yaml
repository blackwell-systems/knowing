            # Expected: at least 1

            # parallelExtract is called in IndexRepo
            grep -c "parallelExtract" internal/indexer/indexer.go
            # Expected: at least 1
            ```

            ### Constraints
            - Do NOT modify files in internal/indexer/goextractor/ (except adding the
              Extractors accessor to internal/indexer/extractor.go if needed).
            - Do NOT change the batch store insertion logic (BatchPutNodes etc.) at the
