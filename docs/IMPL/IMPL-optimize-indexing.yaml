interface_contracts:
    - name: LoadedPackages
      description: |
        Result type from bulk loading all packages in a module. Maps absolute file
        paths to their containing *packages.Package so extractors can look up
        pre-loaded type info without calling packages.Load again.
      definition: |
        // LoadedPackages holds the result of a bulk go/packages.Load("./...") call.
        // FilePackages maps absolute file paths to their containing package.
        type LoadedPackages struct {
            Fset         *token.FileSet
            FilePackages map[string]*packages.Package // abs path -> package
        }
      location: internal/indexer/goextractor/loader.go
    - name: BulkLoad
      description: |
        Loads all packages under a module root in a single go/packages.Load call.
        Returns a LoadedPackages that the indexer distributes to per-file extraction.
      definition: |
        // BulkLoad loads all Go packages under moduleRoot using a single
        // go/packages.Load("./...") call. Returns LoadedPackages mapping each
        // .go file to its containing package, or an error if the load fails.
        func BulkLoad(ctx context.Context, moduleRoot string) (*LoadedPackages, error)
      location: internal/indexer/goextractor/loader.go
    - name: ExtractWithPackage
      description: |
        New method on GoExtractor that accepts a pre-loaded *packages.Package
        instead of calling packages.Load internally. The existing Extract method
        becomes a fallback that calls packages.Load for single-file use cases.
      definition: |
        // ExtractWithPackage extracts nodes and edges from a Go file using a
        // pre-loaded package. This avoids the per-file packages.Load overhead.
        // The pkg parameter must contain Syntax, TypesInfo, and Fset for the
        // target file.
        func (g *GoExtractor) ExtractWithPackage(
            ctx context.Context,
            opts types.ExtractOptions,
            pkg *packages.Package,
        ) (*types.ExtractResult, error)
      location: internal/indexer/goextractor/extractor.go
    - name: ExtractFileFunc
      description: |
        Function type used by the parallel indexer to extract a single file.
        Allows the indexer to pass either the old Extract path or the new
        ExtractWithPackage path depending on whether bulk loading succeeded.
      definition: |
        // ExtractFileFunc extracts nodes and edges from a single file.
        // Used as the unit of work in the parallel worker pool.
        type ExtractFileFunc func(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)
      location: internal/indexer/indexer.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A: Bulk Package Loader

            ### What to implement

            Create `internal/indexer/goextractor/loader.go` with two exports:

            1. **`LoadedPackages` struct** holding:
               - `Fset *token.FileSet`
               - `FilePackages map[string]*packages.Package` (absolute file path to package)

            2. **`BulkLoad(ctx context.Context, moduleRoot string) (*LoadedPackages, error)`** that:
               - Calls `packages.Load` with config:
                 ```go
                 cfg := &packages.Config{
                     Mode: packages.NeedName | packages.NeedFiles | packages.NeedSyntax |
                         packages.NeedTypes | packages.NeedTypesInfo | packages.NeedImports |
                         packages.NeedModule,
                     Dir:     moduleRoot,
                     Context: ctx,
                 }
                 pkgs, err := packages.Load(cfg, "./...")
                 ```
               - Iterates all returned packages and their `GoFiles` to build the
                 `FilePackages` map (key = absolute file path, value = *packages.Package).
               - Also iterates `pkg.Syntax` (AST files) and maps each via
                 `pkg.Fset.Position(f.Pos()).Filename` to verify file path association.
               - Returns the populated `LoadedPackages` or an error.
               - Logs (or returns) any `packages.Error` entries from loaded packages
                 without failing the entire load (partial success is acceptable; some
                 files may have build errors).

            The `packages.Load` mode flags MUST match exactly what the existing
            `GoExtractor.Extract` uses (line 61-63 of extractor.go):
            ```go
            Mode: packages.NeedName | packages.NeedFiles | packages.NeedSyntax |
                packages.NeedTypes | packages.NeedTypesInfo | packages.NeedImports |
                packages.NeedModule,
            ```

            ### Tests

            Create `internal/indexer/goextractor/loader_test.go` with:

            1. `TestBulkLoad_SinglePackage`: Create a temp module with one package,
               call BulkLoad, verify FilePackages contains the expected .go file paths.

            2. `TestBulkLoad_MultiPackage`: Create a temp module with two packages
               (e.g., `pkg/a/a.go` and `pkg/b/b.go`), call BulkLoad, verify both
               packages' files appear in FilePackages.

            3. `TestBulkLoad_SkipsTestFiles`: Verify that `_test.go` files are NOT
               excluded from FilePackages (the loader loads everything; filtering is
               the extractor's job).

            4. `TestBulkLoad_EmptyModule`: Create a module with no .go files, verify
               BulkLoad returns an empty FilePackages map (not an error).

            ### Verification gate

            ```bash
            cd /Users/dayna.blackwell/code/knowing && go build ./internal/indexer/goextractor/... && go test ./internal/indexer/goextractor/... -run TestBulkLoad -v
            ```

            Postconditions:
            ```bash
            # LoadedPackages struct exists
            grep -c "type LoadedPackages struct" internal/indexer/goextractor/loader.go
            # Expected: 1

            # BulkLoad function exists
            grep -c "func BulkLoad" internal/indexer/goextractor/loader.go
            # Expected: 1

            # Uses ./... pattern for bulk load
            grep -c '"./..."' internal/indexer/goextractor/loader.go
            # Expected: 1
            ```

            ### Constraints
            - Do NOT modify extractor.go; that file is owned by Agent B.
            - Do NOT modify any file in internal/indexer/ outside the goextractor subdirectory.
            - Do NOT add any fields to types.ExtractOptions or any types in internal/types/.
          files:
            - internal/indexer/goextractor/loader.go
            - internal/indexer/goextractor/loader_test.go
        - id: B
          task: |
            ## Agent B: Extractor Refactor (ExtractWithPackage)

            ### What to implement

            Modify `internal/indexer/goextractor/extractor.go` to add a new public method
            `ExtractWithPackage` that accepts a pre-loaded `*packages.Package` instead of
            calling `packages.Load` internally.

            1. **Add `ExtractWithPackage` method** with signature:
               ```go
               func (g *GoExtractor) ExtractWithPackage(
                   ctx context.Context,
                   opts types.ExtractOptions,
                   pkg *packages.Package,
               ) (*types.ExtractResult, error)
               ```

            2. **Refactor the existing `Extract` method** to extract the shared logic
               into a private method, then have both `Extract` and `ExtractWithPackage`
               call it. The shared logic is everything after `packages.Load` in the
               current `Extract` method (lines 80-177):
               - Finding the target AST file by base name
               - Walking AST declarations for nodes
               - Extracting call edges, import edges, implements edges, reference edges
               - Sorting and deduplicating

               Suggested approach:
               ```go
               // extractFromPackage contains the shared extraction logic.
               func (g *GoExtractor) extractFromPackage(
                   opts types.ExtractOptions,
                   pkg *packages.Package,
               ) (*types.ExtractResult, error) {
                   // ... all shared logic from current Extract, starting at line 80
               }
               ```

               Then `Extract` becomes:
               ```go
               func (g *GoExtractor) Extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error) {
                   // existing packages.Load code (lines 57-76)
                   pkg := pkgs[0]
                   return g.extractFromPackage(opts, pkg)
               }
               ```

               And `ExtractWithPackage` becomes:
               ```go
               func (g *GoExtractor) ExtractWithPackage(ctx context.Context, opts types.ExtractOptions, pkg *packages.Package) (*types.ExtractResult, error) {
                   return g.extractFromPackage(opts, pkg)
               }
               ```

            3. **Preserve the existing Extract behavior exactly.** The current Extract
               method calls `packages.Load` with `Dir: filepath.Dir(absPath)` and
               pattern `"."`. This must remain unchanged for single-file/fallback use.

            ### Current code context for Extract method (lines 55-76):
            ```go
            func (g *GoExtractor) Extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error) {
                // Determine the package directory from the file path.
                absPath := filepath.Join(opts.ModuleRoot, opts.FilePath)
                dir := filepath.Dir(absPath)

                cfg := &packages.Config{
                    Mode: packages.NeedName | packages.NeedFiles | packages.NeedSyntax |
                        packages.NeedTypes | packages.NeedTypesInfo | packages.NeedImports |
                        packages.NeedModule,
                    Dir:     dir,
                    Context: ctx,
                }

                pkgs, err := packages.Load(cfg, ".")
                if err != nil {
                    return nil, fmt.Errorf("load packages: %w", err)
                }

                if len(pkgs) == 0 {
                    return &types.ExtractResult{}, nil
                }

                pkg := pkgs[0]
            ```

            ### Tests

            Add to `internal/indexer/goextractor/extractor_test.go`:

            1. `TestGoExtractor_ExtractWithPackage_MatchesExtract`: For a sample Go file,
               call both `Extract` and `ExtractWithPackage` (loading the package manually
               first) and verify they produce identical nodes and edges. This is the
               critical correctness test.

            2. `TestGoExtractor_ExtractWithPackage_NilSafety`: Call ExtractWithPackage
               with a package that has nil TypesInfo; verify it returns a result (possibly
               empty) without panicking.

            Add these tests AFTER the existing tests in the file. Do not modify existing
            test functions.

            ### Verification gate

            ```bash
            cd /Users/dayna.blackwell/code/knowing && go build ./internal/indexer/goextractor/... && go test ./internal/indexer/goextractor/... -v
            ```

            Postconditions:
            ```bash
            # ExtractWithPackage method exists
            grep -c "func (g \*GoExtractor) ExtractWithPackage" internal/indexer/goextractor/extractor.go
            # Expected: 1

            # extractFromPackage helper exists
            grep -c "func (g \*GoExtractor) extractFromPackage" internal/indexer/goextractor/extractor.go
            # Expected: 1

            # Original Extract method still exists
            grep -c "func (g \*GoExtractor) Extract(" internal/indexer/goextractor/extractor.go
            # Expected: 1
            ```

            ### Constraints
            - Do NOT create loader.go; that file is owned by Agent A.
            - Do NOT modify files in internal/indexer/ (parent directory). Only modify
              files in internal/indexer/goextractor/.
            - Do NOT import the LoadedPackages type. ExtractWithPackage takes a raw
              *packages.Package parameter, keeping it decoupled from the loader.
            - Do NOT change any existing public method signatures. Extract must retain
              its current signature exactly.
            - Do NOT modify existing test functions. Only ADD new test functions.
          files:
            - internal/indexer/goextractor/extractor.go
            - internal/indexer/goextractor/extractor_test.go
        - id: C
          task: |
            ## Agent C: Worker Pool and Parallel IndexRepo Preparation

            ### What to implement

            Create `internal/indexer/worker.go` with a generic worker pool, and modify
            `internal/indexer/indexer.go` to prepare the infrastructure for parallel
            file extraction. The actual wiring to BulkLoad and ExtractWithPackage
            happens in Wave 2 (Agent D) after Agents A and B merge.

            #### 1. Create `internal/indexer/worker.go`

            Implement a worker pool that processes extraction work items concurrently:

            ```go
            package indexer

            import (
                "context"
                "sync"

                "github.com/blackwell-systems/knowing/internal/types"
            )

            // extractWork represents a single file extraction work item.
            type extractWork struct {
                opts    types.ExtractOptions
                extract func(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)
            }

            // extractResult holds the output of a single file extraction.
            type extractResult struct {
                result *types.ExtractResult
                file   *types.File
                err    error
            }

            // parallelExtract runs extraction work items across numWorkers goroutines.
            // Returns all results in submission order. If ctx is cancelled, workers
            // drain and return context errors for remaining items.
            func parallelExtract(ctx context.Context, work []extractWork, numWorkers int) []extractResult
            ```

            The implementation should:
            - Use a channel to distribute work items to workers
            - Collect results in a slice indexed by work item position (preserve order
              for deterministic output)
            - Use `sync.WaitGroup` to wait for all workers to finish
            - Respect context cancellation: if ctx is done, workers should stop
              processing new items
            - Default numWorkers: use `runtime.GOMAXPROCS(0)` if numWorkers <= 0

            #### 2. Modify `internal/indexer/indexer.go`

            Add a `Concurrency` field to the `Indexer` struct to control worker count:

            Insert after the existing `registry` field (find this text in indexer.go):
            ```go
            type Indexer struct {
                store    types.GraphStore
                snapshot SnapshotComputer
                registry *ExtractorRegistry
            }
            ```

            Change to:
            ```go
            type Indexer struct {
                store       types.GraphStore
                snapshot    SnapshotComputer
                registry    *ExtractorRegistry
                Concurrency int // 0 means use runtime.GOMAXPROCS
            }
            ```

            Do NOT change IndexRepo's sequential extraction loop yet. That wiring
            happens in Wave 2 after the bulk loader and ExtractWithPackage are merged.

            ### Tests

            Create `internal/indexer/worker_test.go`:

            1. `TestParallelExtract_Basic`: Submit 10 work items, verify all 10 results
               are returned, no errors.

            2. `TestParallelExtract_PreservesOrder`: Submit work items that return
               distinct results, verify result[i] corresponds to work[i].

            3. `TestParallelExtract_PropagatesErrors`: Submit a work item that returns
               an error, verify the error appears in the corresponding result slot.

            4. `TestParallelExtract_RespectsContext`: Cancel context mid-flight, verify
               workers stop and remaining items have context.Canceled errors.

            5. `TestParallelExtract_SingleWorker`: numWorkers=1, verify sequential
               behavior produces correct results.

            Modify `internal/indexer/indexer_test.go`:

            Add one test:
            1. `TestIndexer_ConcurrencyField`: Verify that NewIndexer returns an Indexer
               with Concurrency == 0 (default). Verify the field can be set.

            Add this test AFTER the existing tests. Do not modify existing test functions.

            ### Verification gate

            ```bash
            cd /Users/dayna.blackwell/code/knowing && go build ./internal/indexer/... && go test ./internal/indexer/... -run "TestParallelExtract|TestIndexer_Concurrency" -v
            ```

            Postconditions:
