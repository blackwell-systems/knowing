pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            BulkLoad packages.Load("./...") returns errors for some packages in a
            large repo (e.g., packages with cgo, build constraints, or missing deps).
            This could cause partial extraction loss compared to per-file loading.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A implements BulkLoad to log package errors without failing.
            Agent D implements fallback: files not found in LoadedPackages fall back
            to per-file Extract. Integration test in Agent D verifies fallback path.
        - scenario: |
            ExtractWithPackage produces different nodes/edges than Extract for the
            same file because the bulk-loaded package has a different Fset or the
            file lookup logic differs subtly.
          likelihood: medium
          impact: high
          mitigation: |
            Agent B writes TestGoExtractor_ExtractWithPackage_MatchesExtract that
            compares output of both methods on the same input. Both methods call
            the shared extractFromPackage helper, minimizing divergence.
        - scenario: |
            Worker pool goroutine leak or deadlock under context cancellation,
            causing test hangs or resource exhaustion.
          likelihood: low
          impact: high
          mitigation: |
            Agent C writes TestParallelExtract_RespectsContext with a timeout.
            Worker pool uses buffered channels and WaitGroup; no select without
            default that could block indefinitely.
        - scenario: |
            Race condition in parallel extraction: multiple goroutines writing to
            shared types.ExtractOptions fields (e.g., ModuleToRepoURL map).
          likelihood: low
          impact: high
          mitigation: |
            Each work item gets its own ExtractOptions copy (struct value, not pointer).
            ModuleToRepoURL is read-only during extraction (built once before the loop).
            Agent C's worker pool takes extractWork by value.
        - scenario: |
            Wave 2 merge conflict on indexer.go because Agent C added Concurrency
            field and Agent D modifies IndexRepo in the same file.
          likelihood: low
          impact: low
          mitigation: |
            Agent C only adds the Concurrency field and does not touch IndexRepo's
            extraction loop. Agent D (wave 2) works on the merged result of wave 1,
            so there is no concurrent edit.
