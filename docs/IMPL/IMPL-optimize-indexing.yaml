            # Expected: at least 1

            # worker.go is in package indexer
            grep -c "^package indexer" internal/indexer/worker.go
            # Expected: 1
            ```

            ### Constraints
            - Do NOT modify internal/indexer/goextractor/ files. Those are owned by
              Agents A and B.
            - Do NOT modify the IndexRepo method's extraction loop. Keep the sequential
              loop as-is. Wave 2 Agent D handles the wiring.
            - Do NOT import goextractor package. The worker pool is generic; it takes
              function values, not concrete extractor types.
            - Do NOT modify existing test functions in indexer_test.go. Only ADD new ones.
          files:
