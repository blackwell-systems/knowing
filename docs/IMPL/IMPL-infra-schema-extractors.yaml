pre_mortem:
    overall_risk: low
    rows:
        - scenario: Tree-sitter HCL grammar node types differ from expected names
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A should inspect the HCL grammar's node-types.json or test with
            small snippets to discover actual node type names (block, attribute, etc.)
            before writing the full extractor.
        - scenario: SQL grammar varies by dialect; CREATE PROCEDURE may not parse
          likelihood: medium
          impact: low
          mitigation: |
            Agent B should use standard ANSI SQL constructs in tests. The tree-sitter
            SQL grammar supports common DDL/DML. Dialect-specific features can be
            added later.
        - scenario: K8s extractor CanHandle cannot inspect file content
          likelihood: high
          impact: low
          mitigation: |
            Agent C uses path-based detection only (kubernetes/, k8s/, manifests/,
            deploy/, helm/ directories). Content-based apiVersion detection is
            deferred to a future content-aware dispatcher.
        - scenario: CSS tree-sitter grammar does not parse SCSS syntax
          likelihood: medium
          impact: low
          mitigation: |
            Agent D should test with pure CSS first. SCSS support may require
            the SCSS-specific grammar. If .scss fails, limit CanHandle to .css
            only and document the limitation.
        - scenario: go.mod needs gopkg.in/yaml.v3 promoted from indirect to direct
          likelihood: high
          impact: low
          mitigation: |
            Running `go mod tidy` after Agent C's code compiles will automatically
            promote the dependency. Agent E's build gate will catch this.
critic_report:
