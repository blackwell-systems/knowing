title: Infrastructure and schema language extractors
feature_slug: infra-schema-extractors
verdict: SUITABLE
suitability_assessment: |
    Suitability gate analysis:

    1. File decomposition: The work decomposes cleanly into 4 independent extractor
       packages (terraformextractor, sqlextractor, k8sextractor, cssextractor), each
       in its own subdirectory with disjoint file ownership. One integration agent
       handles registration in cmd/knowing/main.go and doc updates. Total: 5 agents
       across 2 waves.

    2. Investigation-first items: None. The existing extractors (rustextractor,
       javaextractor, csharpextractor, tsextractor) provide clear reference patterns.
       The smacker/go-tree-sitter library includes bindings for HCL, SQL, and CSS.
       The K8s extractor uses gopkg.in/yaml.v3 (already an indirect dependency).

    3. Interface discoverability: The types.Extractor interface is well-defined with
       Name(), CanHandle(), and Extract() methods. ExtractOptions, ExtractResult,
       Node, and Edge types are stable. All cross-agent contracts are fully specified.

    4. Pre-implementation status: All four extractors are new (TODO). No existing
       partial implementations. The existing multi-lang extractors (TS, Rust, Java,
       C#) are present but not registered in main.go; the integration agent will
       also register those while adding the new ones.

    5. Parallelization value: High. Four independent agents each creating 2 files
       (extractor.go + extractor_test.go) with non-trivial logic (AST walking,
       YAML parsing, reference detection). Build/test cycle is ~30s. All 4 agents
       run in parallel (single wave), maximizing speedup.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~15 min (4 agents x 15 min avg, fully parallel = ~15 min wave 1, ~8 min wave 2)
    - Merge & verification: ~3 min
    Total Polywave time: ~26 min

    Sequential baseline: ~75 min (5 agents x 15 min avg)
    Time savings: ~49 min (65% faster)

    Recommendation: Clear speedup. Proceed.
test_command: GOWORK=off go test ./... -timeout 5m
lint_command: GOWORK=off go vet ./...
