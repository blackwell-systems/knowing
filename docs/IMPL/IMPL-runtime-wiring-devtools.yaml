interface_contracts:
    - name: extractRouteSymbol
      description: |
        New unexported function in the Go tree-sitter extractor that detects HTTP
        router registration patterns in call expressions and returns a RouteSymbol
        entry (service, route pattern, handler node hash).
      definition: |
        // In internal/indexer/gotsextractor/extractor.go
        type routeSymbol struct {
            ServiceName  string
            RoutePattern string
            HandlerHash  types.Hash
            MappingType  string // "http_route"
        }
        func extractRouteSymbols(body *sitter.Node, opts types.ExtractOptions, pkgPath string, imports map[string]string) []routeSymbol
      location: internal/indexer/gotsextractor/extractor.go
    - name: OTLPReceiver.Export (real gRPC)
      description: |
        Replace placeholder OTLPReceiver with real gRPC implementation using
        collectortrace.TraceServiceServer. The Export method accepts the real
        protobuf ExportTraceServiceRequest and converts ResourceSpans to TraceSpan.
      definition: |
        // internal/trace/otlp.go
        // OTLPReceiver implements collectortrace.TraceServiceServer
        func (r *OTLPReceiver) Export(ctx context.Context, req *coltracepb.ExportTraceServiceRequest) (*coltracepb.ExportTraceServiceResponse, error)
        func (r *OTLPReceiver) Start(ctx context.Context) error  // creates grpc.Server, registers service, listens
        func (r *OTLPReceiver) Stop() error                      // calls grpcServer.GracefulStop()
      location: internal/trace/otlp.go
    - name: Daemon.traceIngestLoop (real wiring)
      description: |
        Replace placeholder traceIngestLoop with real implementation that creates
        SymbolResolver, Ingestor, OTLPReceiver, starts the receiver, and runs a
        periodic FlushBatch + DecayConfidence loop.
      definition: |
        // internal/daemon/daemon.go
        func (d *Daemon) traceIngestLoop(ctx context.Context)
        // Opens its own *sql.DB connection from d.cfg.Store (via DB() accessor or dbPath).
        // Creates: trace.NewSymbolResolver(db), trace.NewIngestor(db, resolver, cfg),
        //          trace.NewOTLPReceiver(cfg.OTLPEndpoint, ingestor)
        // Starts receiver, runs ticker loop for FlushBatch + periodic DecayConfidence.
      location: internal/daemon/daemon.go
    - name: Store runtime query methods
      description: |
        New query methods on SQLiteStore for MCP runtime tools. Added to
        sqlite_runtime.go alongside existing runtime methods.
      definition: |
        // internal/store/sqlite_runtime.go
        func (s *SQLiteStore) RuntimeEdgesByService(ctx context.Context, serviceName string, routePattern string, limit int) ([]types.Edge, error)
        func (s *SQLiteStore) DeadRoutes(ctx context.Context, staleDays int) ([]RouteSymbolRow, error)
        func (s *SQLiteStore) RuntimeEdgeStatsAggregate(ctx context.Context) (*RuntimeStatsRow, error)

        type RuntimeStatsRow struct {
            TotalEdges     int
