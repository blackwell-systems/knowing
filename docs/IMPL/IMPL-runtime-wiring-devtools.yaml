title: Runtime Wiring and Developer Tools Batch
feature_slug: runtime-wiring-devtools
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: The five work items decompose cleanly across 5 agents
       touching distinct files. The Go tree-sitter extractor (route extraction),
       OTLP receiver (gRPC), daemon trace wiring, MCP runtime handlers, and CLI
       export command each have disjoint file ownership. The only shared dependency
       is the store layer (sqlite_runtime.go) which needs new query methods for MCP
       handlers; this is handled by placing the MCP agent in Wave 2 after the store
       queries are available.

    2. Investigation-first items: None. All five items are clearly specified
       implementations against existing placeholder code or new additions.

    3. Interface discoverability: Yes. The existing types (TraceSpan, SymbolResolver,
       Ingestor, OTLPReceiver, GraphStore) define clear contracts. New store query
       methods for MCP runtime tools can be specified up front.

    4. Pre-implementation status check:
       - HTTP route extraction in tree-sitter extractor: TODO (no route extraction exists)
       - Real OTLP gRPC receiver: PARTIAL (placeholder OTLPReceiver exists, needs real gRPC)
       - Daemon trace wiring: PARTIAL (placeholder traceIngestLoop exists)
       - MCP runtime query tools: TODO (no runtime_traffic/dead_routes/trace_stats)
       - Export CLI command: TODO (no export subcommand exists)

    5. Parallelization value: High. Build+test cycle is ~30s. 5 agents across 2
       waves with 3 independent agents in wave 1 provides good parallelism. Each
       agent touches 2-4 files with non-trivial logic and tests.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (5 agents, ~8 min avg, 3 parallel in wave 1)
    - Merge and verification: ~4 min
    Total Polywave time: ~24 min

    Sequential baseline: ~40 min (5 agents x 8 min avg)
    Time savings: ~16 min (40% faster)

    Recommendation: Clear speedup. Proceed.
