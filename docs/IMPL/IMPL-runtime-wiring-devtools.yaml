            ### Constraints
            - Do NOT modify any file outside your ownership: otlp.go, otlp_test.go, go.mod, go.sum
            - Do NOT change the Ingestor, SymbolResolver, or any other trace package files
            - Keep `ExportSpans` for backward compatibility
            - The `NewOTLPReceiver` constructor signature must remain the same: `NewOTLPReceiver(addr string, ingestor TraceIngestor) *OTLPReceiver`
