        - id: C
          task: |
            ## Task: Store Runtime Query Methods + Export CLI Command

            Two sub-tasks: (1) add runtime query methods to SQLiteStore for the MCP
            handlers that will be added in Wave 2, and (2) add the `export` CLI subcommand.

            ### Sub-task 1: Store runtime query methods

            In `internal/store/sqlite_runtime.go`, add these methods:

            1. `RuntimeEdgesByService` - query runtime edges filtered by service name and
               optional route pattern:
               ```go
               func (s *SQLiteStore) RuntimeEdgesByService(ctx context.Context, serviceName string, routePattern string, limit int) ([]types.Edge, error)
               ```
               SQL: Join edges with route_symbols on target_hash (or source_hash matching
               service node hash). Filter by provenance LIKE 'otel_%'. If serviceName is
               provided, join with route_symbols WHERE service_name = ?. If routePattern
               is provided, add AND route_pattern LIKE ?. Limit results. Return edges with
               runtime columns (observation_count, last_observed) using `scanEdgesRuntime`.

            2. `DeadRoutes` - routes with no observations in N days:
               ```go
               func (s *SQLiteStore) DeadRoutes(ctx context.Context, staleDays int) ([]RouteSymbolRow, error)
               ```
               SQL: Select from route_symbols LEFT JOIN edges ON route_symbols.node_hash = edges.target_hash
               AND edges.provenance LIKE 'otel_%'. Filter WHERE edges.last_observed IS NULL
               OR edges.last_observed < (now - staleDays * 86400). Return RouteSymbolRow entries.

            3. `RuntimeEdgeStatsAggregate` - aggregate statistics:
               ```go
               type RuntimeStatsRow struct {
                   TotalEdges     int
                   ActiveEdges    int
                   StaleEdges     int
                   GCEligible     int
                   ByEdgeType     map[string]int
               }
