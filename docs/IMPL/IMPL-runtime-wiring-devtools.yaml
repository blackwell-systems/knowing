          task: |
            ## Task: Daemon Trace Wiring

            Replace the placeholder `traceIngestLoop` in `internal/daemon/daemon.go` with
            real wiring that creates a SymbolResolver, Ingestor, and OTLPReceiver, starts
            the receiver, and runs a periodic FlushBatch + DecayConfidence loop.

            ### What to implement

            In `internal/daemon/daemon.go`:

            1. Add import for the trace package:
               ```go
               "github.com/blackwell-systems/knowing/internal/trace"
               ```
               Also add `"database/sql"` and `"time"` if not already imported.

            2. The DaemonConfig.Store is a `types.GraphStore` interface, but the trace
               package needs a `*sql.DB`. Add a `DBPath` field to `DaemonConfig`:
               ```go
               type DaemonConfig struct {
                   // ... existing fields ...
                   DBPath string // path to SQLite database, used by trace ingestor for direct DB access
               }
               ```
               Insert this field after TraceConfig. The daemon opens its own sql.DB for
               the trace pipeline.

            3. Replace the placeholder `traceIngestLoop` with real implementation. The
               existing placeholder is:
               ```go
               func (d *Daemon) traceIngestLoop(ctx context.Context) {
                   // TODO: Wire OTLPReceiver and Ingestor here.
                   // For now, block until context is cancelled.
                   <-ctx.Done()
               }
               ```

               Replace with:
               ```go
               func (d *Daemon) traceIngestLoop(ctx context.Context) {
                   cfg := d.cfg.TraceConfig
                   if cfg == nil {
                       return
                   }

                   // Open a dedicated DB connection for the trace pipeline.
                   db, err := sql.Open("sqlite", d.cfg.DBPath)
                   if err != nil {
                       return // silently fail; trace is non-critical
                   }
                   defer db.Close()

                   resolver := trace.NewSymbolResolver(db)
                   traceCfg := trace.TraceIngestConfig{
                       Enabled:       cfg.Enabled,
                       OTLPEndpoint:  cfg.OTLPEndpoint,
                       BatchSize:     cfg.BatchSize,
                       BatchInterval: cfg.BatchInterval,
                   }
                   ingestor := trace.NewIngestor(db, resolver, traceCfg)
                   receiver := trace.NewOTLPReceiver(cfg.OTLPEndpoint, ingestor)

                   if err := receiver.Start(ctx); err != nil {
                       return
                   }
                   defer receiver.Stop()

                   // Periodic flush and decay loop.
                   batchTicker := time.NewTicker(cfg.BatchInterval)
                   defer batchTicker.Stop()

                   decayInterval := 1 * time.Hour
                   decayTicker := time.NewTicker(decayInterval)
                   defer decayTicker.Stop()

                   for {
                       select {
                       case <-ctx.Done():
                           _ = ingestor.FlushBatch(context.Background())
                           return
                       case <-batchTicker.C:
                           _ = ingestor.FlushBatch(ctx)
                       case <-decayTicker.C:
                           _, _ = ingestor.DecayConfidence(ctx)
                       }
                   }
               }
               ```

            4. In `cmd/knowing/main.go` the daemon is created with `DaemonConfig`. The
               DBPath field needs to be set. BUT `cmd/knowing/main.go` is NOT in your
               ownership. Instead, document in your test that DBPath must be wired. The
               integration will be handled post-merge.

            5. Add the `_ "modernc.org/sqlite"` import to daemon.go for the sql.Open call.

            ### Interfaces

