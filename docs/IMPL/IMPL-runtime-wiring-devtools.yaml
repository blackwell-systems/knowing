      location: cmd/knowing/main.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Task: HTTP Route Extraction in Go Tree-Sitter Extractor

            Add HTTP route pattern detection to the Go tree-sitter extractor so that
            when indexing Go source files, HTTP handler registrations are extracted as
            route_symbols entries that the trace resolver can use to map runtime spans
            to graph nodes.

            ### What to implement

            In `internal/indexer/gotsextractor/extractor.go`:

            1. Add a `routeSymbol` struct (unexported):
               ```go
               type routeSymbol struct {
                   ServiceName  string
                   RoutePattern string
                   HandlerHash  types.Hash
                   MappingType  string
               }
               ```

            2. Add function `extractRouteSymbols(body *sitter.Node, opts types.ExtractOptions, pkgPath string, imports map[string]string) []routeSymbol`
               that detects these call patterns in function bodies:
               - `http.HandleFunc("/path", handler)` -> route="/path", handler=handler node hash
               - `http.Handle("/path", handler)` -> same
               - `r.Get("/path", handler)`, `r.Post(...)`, `r.Put(...)`, `r.Delete(...)` (chi router)
               - `router.GET("/path", handler)`, `router.POST(...)` (gin)
               - `e.GET("/path", handler)`, `e.POST(...)` (echo)
               - `mux.HandleFunc("/path", handler)` (gorilla)

               Detection strategy: In `walkForCalls`, when a `call_expression` node is found
               with a `selector_expression` function whose field name matches one of
               {HandleFunc, Handle, Get, Post, Put, Delete, GET, POST, PUT, DELETE, PATCH},
               check if the operand resolves to a known HTTP router package via the imports
               map (net/http, github.com/go-chi/chi, github.com/gin-gonic/gin, etc.). If so,
               extract the first string argument as the route pattern and the second argument
               as the handler reference.

            3. Modify `Extract` to call `extractRouteSymbols` after building the import map
               and collecting nodes/edges. Return route symbols in the `ExtractResult`. Since
               `ExtractResult` currently only has Nodes and Edges, add a `RouteSymbols` field:
               ```go
               // In internal/types/interfaces.go - DO NOT modify this file.
               ```
               Instead, store the route symbols by creating PutRouteSymbol calls. But since the
               extractor doesn't have store access, return them as additional nodes with kind
               "route_handler" and edges with type "handles_route". The indexer already calls
               store.PutNode and store.PutEdge for these. The route pattern is stored as the
               QualifiedName suffix (e.g., "repoURL://pkgPath.GET /api/users").

               Actually, the simpler approach: create nodes for each detected route handler
               mapping. The node's QualifiedName encodes the HTTP method and route. Create an
               edge from the route node to the handler function node with edge_type "handles_route".

               After indexing, a separate step (or integration in the indexer) calls
               store.PutRouteSymbol to populate the route_symbols table. For now, emit the
               route information as graph nodes and edges that the trace resolver can query.

            4. Call `extractRouteSymbols` from within `walkForCalls` or as a post-processing
               step in `Extract`. When a route pattern call is detected:
               - Create a Node with kind="route_handler", QualifiedName="{repoURL}://{pkgPath}.{METHOD} {route}"
               - Create an Edge from this route node to the handler function node with edge_type="handles_route"
               - Both are appended to the result Nodes and Edges slices

            ### Interfaces

            - `routeSymbol` struct: local to gotsextractor package
            - Uses existing `types.Node`, `types.Edge`, `types.ComputeNodeHash`, `types.ComputeEdgeHash`
            - Uses existing `sitter.Node` tree-sitter API

            ### Tests

            In `internal/indexer/gotsextractor/extractor_test.go`, add tests:
            - `TestExtractRouteSymbols_HttpHandleFunc`: Go source with `http.HandleFunc("/health", healthHandler)`, verify route node and edge
            - `TestExtractRouteSymbols_ChiRouter`: Go source with `r.Get("/users", listUsers)`, verify extraction
            - `TestExtractRouteSymbols_NoRoutes`: Go source with no router calls, verify no route nodes/edges

            ### Verification

            ```bash
            GOWORK=off go build ./internal/indexer/gotsextractor/...
            GOWORK=off go vet ./internal/indexer/gotsextractor/...
            GOWORK=off go test ./internal/indexer/gotsextractor/... -run TestExtractRouteSymbols -v
            ```

            Postconditions:
            ```bash
            # route_handler kind exists in extractor
            grep -c 'route_handler' internal/indexer/gotsextractor/extractor.go
            # Expected: >= 1
            # handles_route edge type exists
            grep -c 'handles_route' internal/indexer/gotsextractor/extractor.go
            # Expected: >= 1
            ```

            ### Constraints
            - Do NOT modify files outside your ownership list (only extractor.go and extractor_test.go in gotsextractor)
            - Do NOT modify `internal/types/interfaces.go` or `internal/types/types.go`
            - Do NOT import the store package from the extractor; extractors return nodes and edges only
          files:
            - internal/indexer/gotsextractor/extractor.go
            - internal/indexer/gotsextractor/extractor_test.go
        - id: B
          task: |
            ## Task: Real OTLP gRPC Receiver

            Replace the placeholder OTLPReceiver in `internal/trace/otlp.go` with a real
            gRPC server that implements `collectortrace.TraceServiceServer`, accepts
            `ExportTraceServiceRequest`, converts `ResourceSpans` to `TraceSpan` structs,
            and passes them to the ingestor.

            ### What to implement

            1. Add gRPC and OTLP proto dependencies to `go.mod`:
               ```
               go.opentelemetry.io/proto/otlp v1.5.0
               google.golang.org/grpc v1.72.0
               ```
               Run `GOWORK=off go get go.opentelemetry.io/proto/otlp@v1.5.0 google.golang.org/grpc@latest`
               then `GOWORK=off go mod tidy`.

            2. In `internal/trace/otlp.go`, replace the existing placeholder implementation:

               a. Add imports:
                  ```go
                  coltracepb "go.opentelemetry.io/proto/otlp/collector/trace/v1"
                  tracepb "go.opentelemetry.io/proto/otlp/trace/v1"
                  "google.golang.org/grpc"
                  "net"
                  ```

               b. Add a `grpcServer *grpc.Server` field to OTLPReceiver struct.

               c. Replace `Start` method:
                  - Create `grpc.NewServer()`
                  - Register `coltracepb.RegisterTraceServiceServer(grpcServer, receiver)`
                  - `net.Listen("tcp", r.addr)`
                  - Start `grpcServer.Serve(lis)` in a goroutine
                  - Set health to HealthConnected
                  - Set stopFn to call `grpcServer.GracefulStop()`

               d. Add `Export` method implementing `coltracepb.TraceServiceServer`:
                  ```go
                  func (r *OTLPReceiver) Export(ctx context.Context, req *coltracepb.ExportTraceServiceRequest) (*coltracepb.ExportTraceServiceResponse, error)
                  ```
                  This method:
                  - Checks health state (reject if not connected)
                  - Iterates over `req.ResourceSpans` -> `ScopeSpans` -> `Spans`
                  - Extracts `service.name` from Resource attributes
                  - Maps each OTLP span to a `TraceSpan`:
                    - SpanID, TraceID from hex encoding of byte fields
                    - ParentSpanID from parent span ID bytes
                    - ServiceName from resource attributes
                    - OperationName from span Name
                    - Attributes from span Attributes (KeyValue pairs)
                    - Extract http.method, http.route, rpc.service, rpc.method from attributes
                    - PeerService from "peer.service" attribute if present
                    - StartTime from span StartTimeUnixNano
                    - Duration from EndTimeUnixNano - StartTimeUnixNano
                  - Calls `r.ingestor.(*Ingestor).AddToBatch(span)` for each span
                  - Returns `&coltracepb.ExportTraceServiceResponse{}, nil`

               e. Keep the existing `ExportSpans` method for backward compatibility (used in tests),
                  but it can delegate to the same batching logic.

               f. Keep `Stop`, `Health`, `Addr` methods, updating `Stop` to call
                  `r.grpcServer.GracefulStop()`.

            ### Interfaces

            - Implements `coltracepb.TraceServiceServer` interface (Export method)
            - Uses existing `TraceIngestor` interface and `Ingestor.AddToBatch`
            - Uses existing `TraceSpan`, `HealthState` types

            ### Tests

            In `internal/trace/otlp_test.go`, add/update tests:
            - `TestOTLPReceiver_StartStop`: Start receiver on a random port, verify health transitions
            - `TestOTLPReceiver_Export`: Create a gRPC client, send an ExportTraceServiceRequest with
              sample ResourceSpans, verify spans are added to ingestor batch
            - `TestOTLPReceiver_ExportNotConnected`: Verify Export returns error when not started

            ### Verification

            ```bash
            GOWORK=off go build ./internal/trace/...
            GOWORK=off go vet ./internal/trace/...
            GOWORK=off go test ./internal/trace/... -run TestOTLPReceiver -v
            ```

            Postconditions:
