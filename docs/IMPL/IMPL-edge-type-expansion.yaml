interface_contracts:
    - name: ExtractTestsEdges
      description: |
        Extract 'tests' edges from a Go test file. For each Test* or Benchmark* function,
        creates edges from the test function node to each non-test function it calls.
      definition: |
        // ExtractTestsEdges analyzes a test file's function bodies and produces
        // 'tests' edges from each Test*/Benchmark* function to production functions it calls.
        // Parameters:
        //   root: tree-sitter root node of the file
        //   opts: standard ExtractOptions for the test file
        //   pkgPath: resolved Go package path
        //   imports: import alias map from buildImportMap
        // Returns: slice of Edge with EdgeType="tests", Provenance="ast_inferred", Confidence=0.7
        func ExtractTestsEdges(root *sitter.Node, opts types.ExtractOptions, pkgPath string, imports map[string]string) []types.Edge
      location: internal/indexer/gotsextractor/tests_edges.go
    - name: ExtractAuthorship
      description: |
        Extract 'authored_by' edges from git blame data. For each symbol (function, type, method)
        in a file, determines the primary author (most lines) and creates an authored_by edge.
      definition: |
        // Rule represents a per-symbol authorship determination.
        type SymbolAuthorship struct {
            NodeHash types.Hash
            Author   string // primary author (most lines in the symbol's range)
        }

        // ExtractAuthorship runs git blame on a file and determines the primary author
        // for each symbol based on line ranges. Returns authored_by edges from symbol
        // nodes to synthetic author nodes.
        // Parameters:
        //   repoURL: repository URL for node hash computation
        //   repoPath: absolute path to repo root (for running git blame)
        //   file: the File record
        //   nodes: all nodes in this file (need Line field for range computation)
        // Returns: (authorNodes []types.Node, edges []types.Edge)
        func ExtractAuthorship(repoURL, repoPath string, file types.File, nodes []types.Node) ([]types.Node, []types.Edge, error)
      location: internal/indexer/authorship/authorship.go
    - name: HandleOwnershipQuery
      description: |
        Enhanced ownership MCP tool handler that queries owned_by and authored_by edges
        to answer 'who owns this code?' queries. Accepts a file path or symbol name
        and returns owners (from CODEOWNERS) and authors (from git blame).
      definition: |
        // ownershipQueryTool defines the enhanced "ownership_query" MCP tool.
        func ownershipQueryTool() mcp.Tool

        // handleOwnershipQuery implements the ownership_query tool handler.
        // Accepts: file_path (string) or symbol (string), repo_hash (string)
        // Returns: JSON with owners (from owned_by edges) and authors (from authored_by edges)
        func (s *Server) handleOwnershipQuery(ctx context.Context, req mcp.CallToolRequest) (*mcp.CallToolResult, error)
      location: internal/mcp/ownership.go
    - name: EdgeTypeConstants
      description: |
        Canonical string constants for all edge types in the knowledge graph.
        Provides a single source of truth; extractors and handlers import these
        rather than using raw string literals.
      definition: |
        package edgetype

        const (
            Calls        = "calls"
            Imports      = "imports"
            Implements   = "implements"
            References   = "references"
            HandlesRoute = "handles_route"
            DependsOn    = "depends_on"
            OwnedBy      = "owned_by"
            AuthoredBy   = "authored_by"
            Tests        = "tests"
            // ... all other edge types
        )
      location: internal/edgetype/constants.go
