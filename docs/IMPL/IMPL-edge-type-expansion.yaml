            4. TestExtractTestsEdges_BenchmarkFunction: Benchmark* also creates tests edges
            5. TestExtractTestsEdges_TestCallingTest: calls to other Test* functions are excluded
            6. TestExtractTestsEdges_CrossPackageCall: test calling function via package alias

            Use the existing `setupTestModule` pattern from `extractor_test.go` for test setup.
            Parse the source with tree-sitter, then call ExtractTestsEdges directly.

