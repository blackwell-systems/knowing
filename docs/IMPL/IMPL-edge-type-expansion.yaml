title: 'P1 Edge Type Expansion: tests, owned_by, authored_by'
feature_slug: edge-type-expansion
verdict: SUITABLE
suitability_assessment: |
    File decomposition: The work decomposes cleanly into 5+ agents across disjoint files.
    The three edge types (tests, owned_by, authored_by) touch different extraction packages,
    a new MCP tool (ownership query), and documentation updates. No single file is the
    sole bottleneck; the work fans out across extractor packages, MCP handlers, CLI enrichment,
    and documentation.

    Investigation-first items: None. All three edge types have clear semantics. The owned_by
    extractor already exists (internal/indexer/ownership/ownership.go) and just needs tests
    and an enhanced MCP tool. The authored_by logic already exists in cmd/knowing/enrich.go
    (blame enrichment) but stamps node fields rather than edges; converting to edges is a
    straightforward refactor. The tests edge type is new but the call-graph analysis pattern
    is well-established in the codebase (see testscope.go BFS).

    Interface discoverability: All interfaces are definable now. The Extractor interface is
    stable, edge types are just string constants, and the MCP tool pattern is well-established
    (26 existing tools as templates).

    Pre-implementation status:
    - owned_by: PARTIAL. The ownership extractor exists and emits owned_by edges during
      indexing. Missing: tests for the ownership package, enhanced MCP ownership tool that
      queries owned_by edges (current tool just lists files/nodes without using ownership edges).
    - authored_by: PARTIAL. git blame enrichment stamps node fields (LastAuthor, LastCommitAt)
      but does not create graph edges. Need: authored_by edge creation from blame data,
      and integration with the ownership MCP tool.
    - tests: TODO. No implementation exists. Need: extraction logic in Go extractors to
      detect Test* functions and create tests edges to called production functions.

    Parallelization value: High. 4 agents in wave 1 with independent file ownership.
    Build/test cycle is ~30-60s (go test ./... with -short). Each agent touches 2-5 files.
    Tasks involve non-trivial logic (AST analysis, git blame parsing, MCP handler implementation).

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~12 min (4 agents x 8 min avg, wave 1 parallel + wave 2 integration)
    - Merge and verification: ~4 min
    Total Polywave time: ~24 min

    Sequential baseline: ~40 min (5 tasks x 8 min avg)
    Time savings: ~16 min (40% faster)

    Recommendation: Clear speedup. Proceed.
test_command: GOWORK=off go test -short ./... -timeout 5m
lint_command: go vet ./...
