            #### 2. Enhanced ownership_query MCP tool

            Create `internal/mcp/ownership.go` with a new `ownership_query` MCP tool that
            queries owned_by and authored_by edges to answer "who owns this code?" queries.

            The existing `ownership` tool (in handlers.go) lists files and symbols but does NOT
            query owned_by edges. The new `ownership_query` tool queries the graph edges.

            Tool definition:
            ```go
            func ownershipQueryTool() mcp.Tool {
                return mcp.NewTool("ownership_query",
                    mcp.WithDescription("Query code ownership: find owners (from CODEOWNERS) and authors (from git blame) for a file or symbol."),
                    mcp.WithReadOnlyHintAnnotation(true),
                    mcp.WithString("file_path", mcp.Description("File path relative to repo root")),
                    mcp.WithString("symbol", mcp.Description("Qualified symbol name to query authorship for")),
                    mcp.WithString("repo_hash", mcp.Required(), mcp.Description("Hash of the repository")),
                )
            }
            ```

            Handler logic:
            1. If file_path is provided:
               a. Look up the File record via FileByPath
               b. Query EdgesFrom(fileHash, "owned_by") to find owners
               c. Return owners with their kind (team/user)
            2. If symbol is provided:
               a. Look up the Node via NodesByQualifiedName
               b. Query EdgesFrom(nodeHash, "authored_by") to find authors
               c. Also look up the file's owned_by edges for CODEOWNERS data
               d. Return both owners and authors
            3. Return JSON response with both ownership sources

            Response format:
            ```json
            {
              "file_path": "internal/store/sqlite.go",
              "codeowners": [{"name": "@backend-team", "kind": "team"}],
              "authors": [{"name": "alice", "kind": "author", "symbol": "SQLiteStore.PutNode"}]
            }
            ```

