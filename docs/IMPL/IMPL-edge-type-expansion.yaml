            ```go
            package edgetype

            // Edge type constants for the knowing knowledge graph.
            const (
                Calls           = "calls"
                Imports         = "imports"
                Implements      = "implements"
                References      = "references"
                HandlesRoute    = "handles_route"
                DependsOn       = "depends_on"
                Deploys         = "deploys"
                Exposes         = "exposes"
                Configures      = "configures"
                Publishes       = "publishes"
                Subscribes      = "subscribes"
                ConnectsTo      = "connects_to"
                Extends         = "extends"
                Overrides       = "overrides"
                Decorates       = "decorates"
                Throws          = "throws"
                OwnedBy         = "owned_by"
                AuthoredBy      = "authored_by"
                Tests           = "tests"
                RuntimeCalls    = "runtime_calls"
                RuntimeRPC      = "runtime_rpc"
                RuntimeProduces = "runtime_produces"
                RuntimeConsumes = "runtime_consumes"
            )

            // RWRWeight returns the Random Walk with Restart weight for the given edge type.
            // Unknown edge types return 0.3 (the default).
            func RWRWeight(edgeType string) float64 {
                switch edgeType {
                case Calls:
                    return 1.0
                case Implements:
                    return 0.8
                case Overrides:
                    return 0.8
                case HandlesRoute:
                    return 0.7
                case Extends:
                    return 0.7
                case Imports:
                    return 0.5
                case DependsOn:
                    return 0.5
                case Tests:
                    return 0.6
                case References:
                    return 0.4
                case Throws:
                    return 0.4
                case Decorates:
                    return 0.3
                case OwnedBy, AuthoredBy:
                    return 0.0
                default:
                    return 0.3
                }
            }
            ```

            #### 2. Tests

            Create `internal/edgetype/constants_test.go` with:
            1. TestRWRWeight_KnownTypes: verify all known edge types return expected weights
            2. TestRWRWeight_UnknownType: verify unknown type returns 0.3
            3. TestRWRWeight_OwnershipZero: verify owned_by and authored_by return 0.0
            4. TestRWRWeight_TestsEdge: verify tests returns 0.6
            5. TestConstants_NoEmpty: verify no constant is empty string

            #### 3. Update docs/architecture/edge-types.md

            Add entries for the two new edge types (`tests` and `authored_by`) to the
            Summary Table and add full description sections. The `owned_by` entry already exists.

            Add to the Summary Table after the `owned_by` row:

            ```
            | `tests` | Test function tests production function | ast_inferred | 0.7 | Go tree-sitter extractor | No | 0.6 |
            | `authored_by` | Symbol primarily authored by person | git_blame | 1.0 | Authorship extractor (git blame) | No | 0.0 |
            ```

            Add full sections:

            ### `tests`

            A test function exercises (calls into) a production function.

            - **Direction:** source test function tests target production function.
              `TestHandleLogin -tests-> HandleLogin` means TestHandleLogin calls HandleLogin.
            - **Producers:** Go tree-sitter extractor, from _test.go files.
            - **Provenance:** `ast_inferred` (confidence 0.7).
            - **Blast radius:** Not traversed. Tests edges make test coverage graph-queryable
              but do not affect blast radius computation (which follows calls edges only).
            - **RWR weight:** 0.6. Moderate weight: a test function covering a production
              function is structurally relevant but weaker than a direct call or implementation.

            ### `authored_by`

            A symbol is primarily authored by a person (determined via git blame).

            - **Direction:** source symbol authored by target person.
              `SQLiteStore.PutNode -authored_by-> alice` means alice wrote most lines of PutNode.
            - **Producers:** Authorship extractor (runs git blame, determines primary author per symbol).
            - **Provenance:** `git_blame` (confidence 1.0, deterministic from git history).
            - **Blast radius:** Not traversed. Authorship is organizational, not functional.
            - **RWR weight:** 0.0. Like owned_by, authorship edges do not participate in the
              random walk. They serve ownership queries and team routing.

