            ## Task: Implement 'tests' edge extraction in Go tree-sitter extractor

            ### What to implement

            Create `internal/indexer/gotsextractor/tests_edges.go` containing an
            `ExtractTestsEdges` function that analyzes Go test files and produces
            'tests' edges from test functions to the production functions they call.

            The function signature:
            ```go
            func ExtractTestsEdges(root *sitter.Node, opts types.ExtractOptions, pkgPath string, imports map[string]string) []types.Edge
            ```

            Logic:
            1. Walk top-level declarations in the file
            2. For each `function_declaration` whose name starts with "Test" or "Benchmark":
               a. Get the function's node hash (same computation as extractFuncDecl)
               b. Walk the function body for call expressions (same pattern as extractCallEdges)
               c. For each call target that is NOT a test function:
                  - Compute target hash
                  - Create edge with EdgeType="tests", Provenance="ast_inferred", Confidence=0.7
            3. Deduplicate edges by EdgeHash
            4. Return the edges

            ### Integration point

            The existing `Extract` method in `extractor.go` already processes test files
            (CanHandle returns true for `_test.go`). The integration agent (Wave 2) will
            call `ExtractTestsEdges` from within the Extract method for files matching
            `_test.go`. For now, implement the standalone function with its own test file.

            ### How to detect test files

            Check `opts.FilePath` for `_test.go` suffix using `strings.HasSuffix`.

            ### How to detect test functions

            Function name starts with "Test" or "Benchmark" (tree-sitter `function_declaration`
            node, get name via `child.ChildByFieldName("name").Content(opts.Content)`).

            ### Call target filtering

            Exclude calls to other test helper functions. A call target is "production" if:
            - It does not start with "Test" or "Benchmark"
            - Or it is in a different package (cross-package call)

            ### Edge construction

            ```go
            provenance := "ast_inferred"
            edgeHash := types.ComputeEdgeHash(testNodeHash, targetHash, "tests", provenance)
            edge := types.Edge{
                EdgeHash:   edgeHash,
                SourceHash: testNodeHash,
                TargetHash: targetHash,
                EdgeType:   "tests",
                Confidence: 0.7,
                Provenance: provenance,
            }
            ```

            ### Tests to write

            Create `internal/indexer/gotsextractor/tests_edges_test.go` with:
            1. TestExtractTestsEdges_BasicTest: a test file with TestFoo calling prod func Bar
            2. TestExtractTestsEdges_MultipleCalls: test calling multiple prod functions
