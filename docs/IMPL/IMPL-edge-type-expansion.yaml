            ## Task: Implement 'authored_by' edge extraction from git blame

            ### What to implement

            Create package `internal/indexer/authorship/` with `authorship.go` containing
            the `ExtractAuthorship` function that runs git blame and produces authored_by
            edges from symbol nodes to synthetic author nodes.

            ### Function signature

            ```go
            package authorship

            // SymbolAuthorship holds the primary author for a symbol.
            type SymbolAuthorship struct {
                NodeHash types.Hash
                Author   string
            }

            // ExtractAuthorship runs git blame on a file and creates authored_by edges
            // from each symbol to its primary author (most lines attributed).
            func ExtractAuthorship(repoURL, repoPath string, file types.File, nodes []types.Node) ([]types.Node, []types.Edge, error)
            ```

            ### Logic

            1. Run `git blame --porcelain <file.Path>` in `repoPath`
            2. Parse porcelain output to get per-line author data (reuse the parsing
               pattern from `cmd/knowing/enrich.go:parseBlamePorcelain`)
            3. For each node in `nodes`:
               a. Determine the line range: from `node.Line` to the next node's line (or EOF)
               b. Count lines per author in that range
               c. The author with the most lines is the "primary author"
            4. Create synthetic author nodes (kind="author"):
               ```go
               authorHash := types.ComputeNodeHash(repoURL, "authors", types.EmptyHash, authorName, "author")
               ```
            5. Create authored_by edges:
               ```go
               provenance := "git_blame"
               edgeHash := types.ComputeEdgeHash(node.NodeHash, authorHash, "authored_by", provenance)
               ```
               Confidence: 1.0 (deterministic from git blame)

            ### Deduplication

            Track seen author nodes by name to avoid duplicates (same pattern as
            ownership.go's `seenOwners` map).

            ### Tests to write

            Create `internal/indexer/authorship/authorship_test.go` with:
            1. TestExtractAuthorship_SingleAuthor: one function, one author
            2. TestExtractAuthorship_MultipleAuthors: function where primary author differs from secondary
            3. TestExtractAuthorship_NoNodes: empty nodes slice returns nil, nil, nil
            4. TestExtractAuthorship_GitBlameError: non-existent file returns error gracefully
            5. TestParseBlamePorcelain: unit test for blame parsing (copy pattern from enrich.go)
            6. TestExtractAuthorship_MultipleSymbols: two functions, same author

            For tests that need git blame, create a temp git repo with commits by
            different authors (use `git -c user.name=X commit`).

