pre_mortem:
    overall_risk: low
    rows:
        - scenario: Wave 1 agents in same package cannot compile independently
          likelihood: medium
          impact: medium
          mitigation: |
            All wave 1 agents create files in internal/typresolve/. They share a
            package and must compile together. Each agent's file is self-contained
            in its declarations (no cross-references within wave 1 except Type,
            which A defines). If A fails, B/C/D cannot compile. This is inherent
            to Go packages. Mitigation: A's task is the simplest (pure data types),
            lowest risk of failure.
        - scenario: Agent A and B both define Type struct causing compilation conflict
          likelihood: low
          impact: high
          mitigation: |
            Agent A owns types.go exclusively. Agent B uses Type from same package
            without redefining it. Agent B's task explicitly states not to define
            Type. Package-level visibility ensures no collision.
        - scenario: Agent D imports types package but types.go not yet compiled (wave 1 parallel)
          likelihood: low
          impact: medium
          mitigation: |
            Agent D imports internal/types (the existing types package for Hash,
            Edge, etc.), not internal/typresolve/types.go. The Type struct from
            typresolve is in the same package as resolver.go, so no cross-package
            dependency within wave 1. However, agent D's resolver_test.go may fail
            to compile if types.go has syntax errors. This is mitigated by the
            build gate running after all agents merge.
        - scenario: Existing internal/resolver package name conflicts with new package
          likelihood: low
          impact: low
          mitigation: |
            The new package is named typresolve (not resolver) specifically to
            avoid this conflict. The existing internal/resolver/ package handles
            cross-repo edge resolution, a completely different concern.
        - scenario: Mock store in resolver_test.go panics on unimplemented GraphStore methods
          likelihood: medium
          impact: low
          mitigation: |
            Agent D's mock store embeds types.GraphStore interface and only
            implements PutEdge. If Run calls any other store method, the test
            panics. The task explicitly limits Run to PutEdge for edge writing.
            If additional methods are needed, the panic surfaces immediately
            in testing.
