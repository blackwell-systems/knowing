title: In-Process Resolver Shared Infrastructure
feature_slug: in-process-resolver-infra
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: Yes. Work decomposes into 10 new files in a new package
       (internal/typresolve/). Files are naturally disjoint: type system, registry,
       scope chain, resolver interface, and routing are independent components.

    2. Investigation-first items: None. The architecture is fully specified in
       docs/research/in-process-resolver-analysis.md with a reference C implementation
       available at ~/code/codebase-memory/internal/cbm/lsp/.

    3. Interface discoverability: Yes. The Resolver interface, ResolveFileOpts, ResolverDef,
       and TypeRegistry APIs are all defined in the analysis doc section 7. Type representation
       kinds are enumerated in the C reference (type_rep.h, 31 kinds, ~15 needed for Go).

    4. Pre-implementation status: internal/resolver/ exists but is the cross-repo edge
       resolver (different concern). internal/resolve/ is the external URL resolver.
       No existing in-process type resolution infrastructure exists. All work is new.

    5. Parallelization value: High. 5 agents across 2 waves. Build/test cycle ~30s
       (GOWORK=off go test). Each agent owns 2-3 files with non-trivial logic.
       Wave 1 agents are fully independent (4 parallel agents creating new files).
       Wave 2 agent depends on wave 1 for the Resolver interface.

    Note: Modifications to internal/indexer/indexer.go (AST lifetime extension) and
    internal/enrichment/enricher.go (routing hook) are deferred to a follow-up IMPL.
    This IMPL creates all shared infrastructure in a new package. The integration
    points can be wired in after this infrastructure is proven stable. Resolvers that
    need ASTs can re-parse until the lifetime extension is implemented.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (5 agents, ~8 min avg, 2 waves)
    - Merge and verification: ~5 min
    Total Polywave time: ~30 min

    Sequential baseline: ~40 min (5 agents x 8 min avg)
    Time savings: ~10 min (25% faster)

    Recommendation: Clear speedup. Wave 1 has 4 independent agents.
