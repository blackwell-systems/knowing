pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Wave 1 agents call cross-file functions that don't exist yet in their
            isolated worktrees (Agent C calls ParseAnnotation from Agent A's annotations.go).
          likelihood: high
          impact: low
          mitigation: |
            All wave 1 agents are in the same Go package (pyresolve). Their files
            compile together only after merge. The build gate runs post-merge.
            Individual agent worktrees will not compile in isolation, which is
            expected and acceptable. This is identical to the Go resolver pattern.
        - scenario: |
            Python tree-sitter node type names differ from what the C reference uses,
            causing nil returns and incorrect resolution.
          likelihood: medium
          impact: medium
          mitigation: |
            The existing Python extractor at internal/indexer/treesitter/extractor.go
            already uses the Go tree-sitter Python bindings and demonstrates the correct
            node type names (function_definition, class_definition, import_statement,
            import_from_statement, call, attribute, identifier, etc.). Agents should
            cross-reference that file for node type names. Guard all ChildByFieldName
            calls with nil checks.
        - scenario: |
            ImportInfo type defined by Agent A conflicts with a different import
            handling approach chosen by Agent C or Agent D.
          likelihood: low
          impact: medium
          mitigation: |
            The ImportInfo struct and its fields are defined in the interface contracts.
            All agents must use the exact definition. Agent A owns the type definition;
            Agents C and D consume it.
        - scenario: |
            typresolve has no Union kind, causing loss of type information for
            Optional[T] and Union[A, B] patterns that are extremely common in Python.
          likelihood: high
          impact: medium
          mitigation: |
            Use typresolve.Optional for Optional[T] and T | None patterns. For
            Union[A, B] with no None, return the first member as best-effort. This
            is a deliberate simplification that covers the most common case
            (Optional narrowing). Full Union support would require extending the
            shared infrastructure, which is frozen for this IMPL.
        - scenario: |
            The module QN inference from file paths produces incorrect qualified names
            that don't match the registry entries from the existing extractor.
          likelihood: medium
          impact: high
          mitigation: |
            Agent D must extract the module QN from existing edges in opts.Edges
            (which come from the tree-sitter extractor). The existing extractor
            uses the convention "repoURL://modulePath.SymbolName". Parse the QN
            prefix from existing edges rather than computing from file path alone.
            The file path is a fallback only when no edges exist.
        - scenario: |
            Wave 1 agents cannot run go build or go test individually because the
            package has missing function references across files.
          likelihood: high
          impact: low
          mitigation: |
            Expected behavior, identical to Go resolver. Wave 1 agents verify
            their code via go vet (syntax-level) and defer full compilation to
            the post-merge gate. Agent verification gates are adjusted to
            tolerate this.
