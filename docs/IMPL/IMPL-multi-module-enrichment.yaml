title: Enterprise Multi-Module LSP Enrichment
feature_slug: multi-module-enrichment
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: YES. The work splits cleanly into 4+ files across
       multiple concerns: go.work parsing, per-module server management,
       progress persistence, and per-symbol timeout handling. No single-file
       bottleneck.

    2. Investigation-first items: NONE. The problem is well-understood: gopls
       crashes on repos with go.work (30+ modules). The fix strategy (one gopls
       per module) is documented in the roadmap.

    3. Interface discoverability: YES. The interfaces are clear: go.work parser
       returns module paths, progress tracker has load/save/mark API, the enricher
       orchestrates per-module with graceful degradation.

    4. Pre-implementation status: The GOWORK=off workaround exists (line 185 of
       enricher.go) but it's a band-aid that skips cross-module resolution. No
       multi-module enrichment code exists today.

    5. Parallelization value: HIGH. 4 agents across 2 waves, each touching 2-4
       files. Build+test cycle is ~30s. Agents are mostly independent (wave 1
       builds primitives, wave 2 wires them together).

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~12 min (3 wave-1 agents x 4 min avg parallel)
    - Wave 2 execution: ~5 min (1 integration agent)
    - Merge & verification: ~3 min
    Total Polywave time: ~28 min

    Sequential baseline: ~40 min (4 agents x 10 min avg)
    Time savings: ~12 min (30% faster)

    Recommendation: Clear speedup. Proceed.
test_command: GOWORK=off go test -short ./... -timeout 5m
lint_command: GOWORK=off go vet ./...
