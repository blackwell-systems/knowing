title: Two-tier extraction for fast cold indexing
feature_slug: two-tier-extraction
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: The work decomposes cleanly into 5+ disjoint files across
       3 logical areas: (a) Go tree-sitter extractor (new package), (b) LSP enrichment
       pass (new package), (c) CLI/daemon wiring. No conflicting modifications needed.

    2. Investigation-first items: None. The current go/packages extractor is well understood.
       Tree-sitter Go bindings exist in the smacker/go-tree-sitter library already used
       for Python. The agent-lsp pkg/lsp API is documented and stable.

    3. Interface discoverability: Yes. The Extractor interface is already defined
       (types.Extractor). The enrichment pass consumes the graph store (types.GraphStore)
       and agent-lsp's LSPClient. All interfaces are known.

    4. Pre-implementation status: No prior implementation of Go tree-sitter extraction
       or LSP enrichment exists. The Python tree-sitter extractor provides a template.
       The provenance/confidence model already supports tiered edges ("ast_inferred",
       "ast_resolved", etc. with float64 confidence).

    5. Parallelization value: High. Build/test cycle is ~15s (GOWORK=off go test ./...).
       4 agents with 2-5 files each across 2 waves. Clear speedup over sequential.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (4 agents, ~6 min avg, 2 waves)
    - Merge and verification: ~4 min
    Total Polywave time: ~24 min

    Sequential baseline: ~30 min (4 agents x ~7.5 min avg)
    Time savings: ~6 min (20% faster)

    Recommendation: Clear speedup. The agents are independent within waves and the
    test cycle is meaningful enough to justify parallelization.
test_command: GOWORK=off go test ./...
lint_command: GOWORK=off go vet ./...
