pre_mortem:
    overall_risk: medium
    rows:
        - scenario: go-tree-sitter/golang grammar binding not available or incompatible
          likelihood: low
          impact: high
          mitigation: |
            The smacker/go-tree-sitter library ships with Go grammar support.
            Agent A should verify `go get github.com/smacker/go-tree-sitter/golang`
            works before proceeding. If it fails, fall back to using the Go grammar
            from the tree-sitter-go project.
        - scenario: Node hash mismatch between GoTreeSitterExtractor and GoExtractor
          likelihood: medium
          impact: high
          mitigation: |
            Both extractors must use identical arguments to types.ComputeNodeHash.
            The key inputs are (repoURL, pkgPath, symbolName, kind). Agent A must
            derive pkgPath the same way: reading go.mod module path + relative directory.
            Tests should verify hash compatibility with a known Go source.
        - scenario: agent-lsp dependency adds too many transitive dependencies
          likelihood: medium
          impact: medium
          mitigation: |
            Agent B should run `go mod tidy` after adding the dependency and check
            the delta. If it pulls in hundreds of packages, consider defining a
            minimal interface locally and using agent-lsp only in the main wiring.
        - scenario: Enrichment fails to start gopls in daemon context
          likelihood: medium
          impact: low
          mitigation: |
            The enricher is best-effort. Failure to start gopls logs a warning
            but does not block indexing. The graph remains queryable with
