            ## Java Tree-Sitter Extractor

            ### What to implement
            Create a tree-sitter based extractor for Java files in
            `internal/indexer/javaextractor/`. Follow the patterns established by the existing
            Go tree-sitter extractor (`internal/indexer/gotsextractor/extractor.go`) and
            Python extractor (`internal/indexer/treesitter/extractor.go`).

            **Files to create:**
            - `internal/indexer/javaextractor/extractor.go`
            - `internal/indexer/javaextractor/extractor_test.go`

            ### Implementation details

            **Package and imports:**
            ```go
            package javaextractor

            import (
                sitter "github.com/smacker/go-tree-sitter"
                "github.com/smacker/go-tree-sitter/java"
                "github.com/blackwell-systems/knowing/internal/types"
            )
            ```

            Use `java.GetLanguage()` to get the language grammar.

            **Struct and constructor:**
            ```go
            type JavaExtractor struct {
                parser *sitter.Parser
            }

            func NewJavaExtractor() *JavaExtractor {
                parser := sitter.NewParser()
                parser.SetLanguage(java.GetLanguage())
                return &JavaExtractor{parser: parser}
            }
            ```

            **Name:** Return `"treesitter-java"`

            **CanHandle:** Return true for `.java` files. Exclude files in `build/` and
            `target/` directories (Maven/Gradle output).

            **Extract method - node types to handle (Java tree-sitter grammar):**

            1. **Method declarations** (`method_declaration`): Extract `name` field.
               Inside a class context, kind is `"method"`. Top-level static methods are `"function"`.

            2. **Class declarations** (`class_declaration`): Extract `name` field.
               Create a node with kind `"type"`. Walk the `body` to extract methods with
               class context.

            3. **Interface declarations** (`interface_declaration`): Extract `name` field.
               Create a node with kind `"interface"`. Walk body for method signatures.

            4. **Enum declarations** (`enum_declaration`): Extract `name` field.
               Create a node with kind `"type"`.

            5. **Constructor declarations** (`constructor_declaration`): Extract `name` field.
               Create a node with kind `"method"` and name `<init>` or the class name.

            6. **Import declarations** (`import_declaration`): Extract the scoped identifier.
               Create an import edge from the file-level context to the imported package/class.

            7. **Method invocations** (`method_invocation`): Extract `name` and `object` fields.
               Create call edges with call-site positions. Handle both `object.method()` and
               simple `method()` calls.

            8. **Object creation** (`object_creation_expression`): Extract the `type` field.
               Create a call edge to the constructor.

            9. **Spring route detection**: Detect `@RequestMapping`, `@GetMapping`,
               `@PostMapping`, `@PutMapping`, `@DeleteMapping`, `@PatchMapping` annotations
               on methods. Look for `annotation` nodes (or `marker_annotation`/`annotation`
               in the tree-sitter Java grammar) whose name matches these patterns. Extract
               the route path from the annotation argument (the `value` or first string argument).
               Create `route_handler` nodes and `handles_route` edges.

            **Qualified name format:** `{repoURL}://{moduleRoot}/{filePath}.{ClassName}.{SymbolName}`

            **Provenance and confidence:** `provenance: "ast_inferred"`, `confidence: 0.7`.

            **Sorting and deduplication:** Same pattern as gotsextractor.

            ### Interface contracts
            Implement `types.Extractor` interface:
            - `Name() string` - returns `"treesitter-java"`
            - `CanHandle(path string) bool` - matches `.java`
            - `Extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)`

            ### Tests
            Required test cases:

            1. `TestJavaExtractor_Name` - verify name
            2. `TestJavaExtractor_CanHandle` - .java true, other exts false, build/ and target/ excluded
            3. `TestJavaExtractor_ExtractClasses` - class declarations
            4. `TestJavaExtractor_ExtractMethods` - methods inside classes
            5. `TestJavaExtractor_ExtractInterfaces` - interface declarations
            6. `TestJavaExtractor_ExtractEnums` - enum declarations
            7. `TestJavaExtractor_ExtractConstructors` - constructor declarations
            8. `TestJavaExtractor_ExtractImports` - import statements as edges
            9. `TestJavaExtractor_ExtractMethodInvocations` - call edges with positions
            10. `TestJavaExtractor_SpringRoutes` - Spring annotation route detection
            11. `TestJavaExtractor_NoRoutes` - file without Spring annotations
            12. `TestJavaExtractor_EdgeProvenanceAndConfidence` - verify ast_inferred/0.7
            13. `TestJavaExtractor_EmptyFile` - empty class returns minimal nodes

            Use real Java source code snippets. Example:
            ```java
            import org.springframework.web.bind.annotation.*;
            import java.util.List;

            @RestController
            @RequestMapping("/api/users")
            public class UserController {
                private final UserService userService;

                public UserController(UserService userService) {
                    this.userService = userService;
                }

                @GetMapping("/{id}")
                public User getUser(@PathVariable Long id) {
                    return userService.findById(id);
                }

                @PostMapping
                public User createUser(@RequestBody User user) {
                    return userService.save(user);
                }
            }
            ```

