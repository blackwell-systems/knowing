            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go vet ./internal/indexer/rustextractor/...
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go test ./internal/indexer/rustextractor/... -v -timeout 2m
            grep -q "func NewRustExtractor" /Users/dayna.blackwell/code/knowing/internal/indexer/rustextractor/extractor.go
            grep -q "route_handler" /Users/dayna.blackwell/code/knowing/internal/indexer/rustextractor/extractor.go
