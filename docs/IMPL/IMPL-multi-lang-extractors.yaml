            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go vet ./internal/indexer/tsextractor/...
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go test ./internal/indexer/tsextractor/... -v -timeout 2m
