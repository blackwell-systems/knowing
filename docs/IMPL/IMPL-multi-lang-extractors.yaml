            - Do NOT modify any files outside your ownership list (internal/indexer/tsextractor/).
            - Do NOT modify cmd/knowing/main.go; registration is handled by Agent E in Wave 2.
            - Do NOT add any new types to internal/types/; use only existing types.
            - Use `"ast_inferred"` provenance and `0.7` confidence for all edges (not "ast_resolved" / 1.0).
