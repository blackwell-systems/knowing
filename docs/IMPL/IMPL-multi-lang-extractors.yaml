            ## TypeScript/JavaScript Tree-Sitter Extractor

            ### What to implement
            Create a tree-sitter based extractor for TypeScript and JavaScript files in
            `internal/indexer/tsextractor/`. Follow the patterns established by the existing
            Go tree-sitter extractor (`internal/indexer/gotsextractor/extractor.go`) and
            Python extractor (`internal/indexer/treesitter/extractor.go`).

            **Files to create:**
            - `internal/indexer/tsextractor/extractor.go`
            - `internal/indexer/tsextractor/extractor_test.go`

            ### Implementation details

            **Package and imports:**
            ```go
            package tsextractor

            import (
                sitter "github.com/smacker/go-tree-sitter"
                "github.com/smacker/go-tree-sitter/typescript/typescript"
                "github.com/blackwell-systems/knowing/internal/types"
            )
            ```

            Note: The TypeScript grammar is at `github.com/smacker/go-tree-sitter/typescript/typescript`
            (nested path). Use `typescript.GetLanguage()` to get the language grammar.

            **Struct and constructor:**
            ```go
            type TypeScriptExtractor struct {
                parser *sitter.Parser
            }

            func NewTypeScriptExtractor() *TypeScriptExtractor {
                parser := sitter.NewParser()
                parser.SetLanguage(typescript.GetLanguage())
                return &TypeScriptExtractor{parser: parser}
            }
            ```

            **Name:** Return `"treesitter-typescript"`

            **CanHandle:** Return true for files with extensions `.ts`, `.tsx`, `.js`, `.jsx`.
            Exclude files in `node_modules/` directories (check path segments like
            gotsextractor checks for `vendor/`).

            **Extract method - node types to handle (TypeScript tree-sitter grammar):**

            1. **Function declarations** (`function_declaration`): Extract the `name` field.
               Create a node with kind `"function"`. Line is `nameNode.StartPoint().Row + 1`.

            2. **Method definitions** (`method_definition`): Inside class bodies. Extract `name` field.
               Create a node with kind `"method"`. Track the enclosing class name for qualified names.

            3. **Class declarations** (`class_declaration`): Extract `name` field.
               Create a node with kind `"type"`. Walk the class `body` with class context
               to extract methods.

            4. **Interface declarations** (`interface_declaration`): Extract `name` field.
               Create a node with kind `"interface"`.

            5. **Import statements** (`import_statement`): Extract the `source` field (the
               string literal for the module path). Create an import edge from the file-level
               context to the imported module. Also handle `require()` calls for CommonJS:
               look for `call_expression` where the function is `identifier` named "require"
               with a string argument.

            6. **Call expressions** (`call_expression`): Extract the `function` field.
               Handle both simple identifiers and member expressions (`object.method`).
               Create call edges with call-site positions (line, column, file).
               Set `CallSiteLine`, `CallSiteCol`, `CallSiteFile` on edges.

            7. **Arrow functions assigned to variables** (`lexical_declaration` or
               `variable_declaration` containing `variable_declarator` with `arrow_function`
               value): Extract the variable name as a function node.

            8. **Express.js route detection**: Detect calls like `app.get("/path", handler)`,
               `app.post(...)`, `router.get(...)`, etc. The pattern is a `call_expression`
               with a `member_expression` function where the property is one of:
               `get`, `post`, `put`, `delete`, `patch`, `all`, `use`.
               The first argument is the route pattern string, second is the handler.
               Create `route_handler` nodes and `handles_route` edges.
               Only detect routes when the file imports `express` (check import statements).

            **Qualified name format:** `{repoURL}://{moduleRoot}/{filePath}.{ClassName}.{SymbolName}`
            Follow the same convention as the Python extractor.

            **Provenance and confidence:** All edges must use `provenance: "ast_inferred"`
            and `confidence: 0.7` (matching the Go tree-sitter extractor pattern, since
            without type resolution cross-module calls are heuristic).

            **Sorting and deduplication:** Sort nodes by QualifiedName then Kind. Sort edges
            by SourceHash, TargetHash, EdgeType. Deduplicate edges by EdgeHash.
            Follow the exact same sorting pattern as gotsextractor.

            ### Interface contracts
            Implement `types.Extractor` interface:
            - `Name() string` - returns `"treesitter-typescript"`
            - `CanHandle(path string) bool` - matches `.ts`, `.tsx`, `.js`, `.jsx`
            - `Extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)`

            Use `types.ComputeNodeHash()`, `types.ComputeEdgeHash()`, `types.Node`, `types.Edge`,
            `types.ExtractOptions`, `types.ExtractResult`, `types.EmptyHash` from `internal/types`.

            ### Tests
            Write comprehensive tests in `extractor_test.go`. Follow the pattern from
            `gotsextractor/extractor_test.go`. Required test cases:

            1. `TestTypeScriptExtractor_Name` - verify name is "treesitter-typescript"
            2. `TestTypeScriptExtractor_CanHandle` - test .ts, .tsx, .js, .jsx (true),
               .go, .py, .rs (false), node_modules paths (false)
            3. `TestTypeScriptExtractor_ExtractFunctions` - function declarations
            4. `TestTypeScriptExtractor_ExtractClasses` - class with methods
            5. `TestTypeScriptExtractor_ExtractInterfaces` - interface declarations
            6. `TestTypeScriptExtractor_ExtractImports` - ES6 import statements
            7. `TestTypeScriptExtractor_ExtractRequire` - CommonJS require() calls
            8. `TestTypeScriptExtractor_ExtractCallEdges` - function calls with call-site positions
            9. `TestTypeScriptExtractor_ExtractArrowFunctions` - arrow function assignments
            10. `TestTypeScriptExtractor_ExpressRoutes` - Express.js route detection
            11. `TestTypeScriptExtractor_NoRoutes` - file without Express routes
            12. `TestTypeScriptExtractor_EdgeProvenanceAndConfidence` - verify ast_inferred/0.7
            13. `TestTypeScriptExtractor_EmptyFile` - empty source returns empty result

            Test helper: Create a `makeOpts` helper similar to the Python extractor's test helper.
            No go.mod file needed for TS extraction; set ModuleRoot to a temp dir.

            Use real TypeScript/JavaScript source code snippets parsed by tree-sitter
            (not mocked). Example test source:
            ```typescript
            import { Router } from 'express';
            const router = Router();

            class UserController {
              getUser(id: string) { return db.findUser(id); }
            }

            function handleRequest(req: Request) {
              const ctrl = new UserController();
              return ctrl.getUser(req.params.id);
            }

            router.get('/users/:id', handleRequest);
            ```

