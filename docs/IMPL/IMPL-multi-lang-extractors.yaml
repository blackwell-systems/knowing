          task: |
            ## Rust Tree-Sitter Extractor

            ### What to implement
            Create a tree-sitter based extractor for Rust files in
            `internal/indexer/rustextractor/`. Follow the patterns established by the existing
            Go tree-sitter extractor (`internal/indexer/gotsextractor/extractor.go`) and
            Python extractor (`internal/indexer/treesitter/extractor.go`).

            **Files to create:**
            - `internal/indexer/rustextractor/extractor.go`
            - `internal/indexer/rustextractor/extractor_test.go`

            ### Implementation details

            **Package and imports:**
            ```go
            package rustextractor

            import (
                sitter "github.com/smacker/go-tree-sitter"
                "github.com/smacker/go-tree-sitter/rust"
                "github.com/blackwell-systems/knowing/internal/types"
            )
            ```

            Use `rust.GetLanguage()` to get the language grammar.

            **Struct and constructor:**
            ```go
            type RustExtractor struct {
                parser *sitter.Parser
            }

            func NewRustExtractor() *RustExtractor {
                parser := sitter.NewParser()
                parser.SetLanguage(rust.GetLanguage())
                return &RustExtractor{parser: parser}
            }
            ```

            **Name:** Return `"treesitter-rust"`

            **CanHandle:** Return true for `.rs` files. Exclude files in `target/` directories.

            **Extract method - node types to handle (Rust tree-sitter grammar):**

            1. **Function items** (`function_item`): Extract `name` field.
               Create a node with kind `"function"`. Line is `nameNode.StartPoint().Row + 1`.

            2. **Impl blocks** (`impl_item`): Extract the `type` field for the impl target type.
               Walk the `body` to find `function_item` children, creating method nodes with
               the impl type as context (kind `"method"`).

            3. **Struct definitions** (`struct_item`): Extract `name` field.
               Create a node with kind `"type"`.

            4. **Enum definitions** (`enum_item`): Extract `name` field.
               Create a node with kind `"type"`.

            5. **Trait definitions** (`trait_item`): Extract `name` field.
               Create a node with kind `"interface"` (traits map to interfaces in knowing's model).

            6. **Use declarations** (`use_declaration`): Extract the `argument` field
               (the use path). Create an import edge. Parse the path to get the crate/module name.

            7. **Call expressions** (`call_expression`): Extract the `function` field.
               Handle both simple identifiers and scoped identifiers (path expressions like
               `module::function()`). Create call edges with call-site positions.

            8. **Macro invocations** (`macro_invocation`): Extract the macro name.
               Create a call edge (macros are function-like in the graph).

            9. **Actix/Axum/Rocket route detection**:
               - **Actix**: Detect `.route()`, `.get()`, `.post()` etc. method calls on
                 `web::resource` or `App` patterns, and `#[get("/path")]`, `#[post("/path")]`
                 attribute macros on functions.
               - **Axum**: Detect `Router::new().route("/path", get(handler))` patterns.
               - **Rocket**: Detect `#[get("/path")]`, `#[post("/path")]` attribute macros.
               For attribute-based routes, look for `attribute_item` nodes on function items
               whose content matches route method patterns. Create `route_handler` nodes and
               `handles_route` edges.

            **Qualified name format:** `{repoURL}://{moduleRoot}/{filePath}.{ImplType}.{SymbolName}`

            **Provenance and confidence:** `provenance: "ast_inferred"`, `confidence: 0.7`.

            **Sorting and deduplication:** Same pattern as gotsextractor.

            ### Interface contracts
            Implement `types.Extractor` interface:
            - `Name() string` - returns `"treesitter-rust"`
            - `CanHandle(path string) bool` - matches `.rs`
            - `Extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)`

            ### Tests
            Required test cases:

            1. `TestRustExtractor_Name` - verify name
            2. `TestRustExtractor_CanHandle` - .rs true, .go/.py false, target/ excluded
            3. `TestRustExtractor_ExtractFunctions` - standalone fn items
            4. `TestRustExtractor_ExtractStructsAndEnums` - struct and enum declarations
            5. `TestRustExtractor_ExtractTraits` - trait declarations as interface kind
            6. `TestRustExtractor_ExtractImplMethods` - methods inside impl blocks
            7. `TestRustExtractor_ExtractUseStatements` - use declarations as import edges
            8. `TestRustExtractor_ExtractCallEdges` - function calls with call-site positions
            9. `TestRustExtractor_ExtractMacroInvocations` - macro calls as call edges
            10. `TestRustExtractor_ActixRoutes` - Actix-web attribute route detection
            11. `TestRustExtractor_AxumRoutes` - Axum Router::new().route() detection
            12. `TestRustExtractor_EdgeProvenanceAndConfidence` - verify ast_inferred/0.7
            13. `TestRustExtractor_EmptyFile` - empty source returns empty result

            Use real Rust source code snippets. Example:
            ```rust
            use actix_web::{web, App, HttpServer, get};
            use serde::Deserialize;

            #[get("/hello")]
            async fn hello() -> &'static str { "Hello!" }

            struct AppState { db: Pool }

            impl AppState {
                fn new(pool: Pool) -> Self { Self { db: pool } }
                fn get_db(&self) -> &Pool { &self.db }
            }

            trait Repository {
                fn find(&self, id: u64) -> Option<Entity>;
            }
            ```

            ### Verification gate
