            ### Implementation details

            **Package and imports:**
            ```go
            package csharpextractor

            import (
                sitter "github.com/smacker/go-tree-sitter"
                "github.com/smacker/go-tree-sitter/csharp"
                "github.com/blackwell-systems/knowing/internal/types"
            )
            ```

            Use `csharp.GetLanguage()` to get the language grammar.

            **Struct and constructor:**
            ```go
            type CSharpExtractor struct {
                parser *sitter.Parser
            }

            func NewCSharpExtractor() *CSharpExtractor {
                parser := sitter.NewParser()
                parser.SetLanguage(csharp.GetLanguage())
                return &CSharpExtractor{parser: parser}
            }
            ```

            **Name:** Return `"treesitter-csharp"`

            **CanHandle:** Return true for `.cs` files. Exclude files in `bin/` and `obj/`
            directories (.NET build output).

            **Extract method - node types to handle (C# tree-sitter grammar):**

            1. **Method declarations** (`method_declaration`): Extract `name` field.
               Inside a class/struct context, kind is `"method"`.

            2. **Class declarations** (`class_declaration`): Extract `name` field.
               Create a node with kind `"type"`. Walk the `body` (declaration_list)
               to extract methods with class context.

            3. **Interface declarations** (`interface_declaration`): Extract `name` field.
               Create a node with kind `"interface"`.

            4. **Struct declarations** (`struct_declaration`): Extract `name` field.
               Create a node with kind `"type"`.

            5. **Enum declarations** (`enum_declaration`): Extract `name` field.
               Create a node with kind `"type"`.

            6. **Constructor declarations** (`constructor_declaration`): Extract `name` field.
               Create a node with kind `"method"`.

            7. **Using directives** (`using_directive`): Extract the namespace from the
               name/qualified_name child. Create an import edge from the file-level
               context to the imported namespace.

            8. **Invocation expressions** (`invocation_expression`): Extract the `function`
               field. Handle both `object.Method()` (member_access_expression) and
               simple `Method()` calls. Create call edges with call-site positions.

            9. **Object creation** (`object_creation_expression`): Extract the `type` field.
               Create a call edge to the constructor.

            10. **ASP.NET route detection**: Detect `[HttpGet]`, `[HttpPost]`, `[HttpPut]`,
                `[HttpDelete]`, `[HttpPatch]`, `[Route("...")]` attributes on methods.
                Look for `attribute_list` > `attribute` nodes whose name matches these patterns.
                Extract the route path from the attribute argument. Also handle
                `[ApiController]` and `[Route("api/[controller]")]` on classes.
                Create `route_handler` nodes and `handles_route` edges.

            **Qualified name format:** `{repoURL}://{moduleRoot}/{filePath}.{Namespace}.{ClassName}.{SymbolName}`
            If namespace is not easily extractable, use `{repoURL}://{moduleRoot}/{filePath}.{ClassName}.{SymbolName}`.

            **Provenance and confidence:** `provenance: "ast_inferred"`, `confidence: 0.7`.

            **Sorting and deduplication:** Same pattern as gotsextractor.

            ### Interface contracts
            Implement `types.Extractor` interface:
            - `Name() string` - returns `"treesitter-csharp"`
            - `CanHandle(path string) bool` - matches `.cs`
            - `Extract(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, error)`

