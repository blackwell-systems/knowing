            # Postcondition: CanHandle implemented
            grep -q "func.*CanHandle" /Users/dayna.blackwell/code/knowing/internal/indexer/tsextractor/extractor.go
            # Postcondition: route detection implemented
            grep -q "route_handler" /Users/dayna.blackwell/code/knowing/internal/indexer/tsextractor/extractor.go
