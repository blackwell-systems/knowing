            10. `TestCSharpExtractor_ExtractInvocations` - method calls with positions
            11. `TestCSharpExtractor_AspNetRoutes` - ASP.NET attribute route detection
            12. `TestCSharpExtractor_NoRoutes` - file without ASP.NET attributes
            13. `TestCSharpExtractor_EdgeProvenanceAndConfidence` - verify ast_inferred/0.7
            14. `TestCSharpExtractor_EmptyFile` - empty source returns empty result

