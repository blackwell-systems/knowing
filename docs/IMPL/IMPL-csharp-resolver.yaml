pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Wave 1 agents define duplicate symbols in the same Go package (csresolve),
            causing merge-time compile errors (e.g., two definitions of parseCS helper
            in test files, or duplicate UsingInfo struct).
          likelihood: medium
          impact: medium
          mitigation: |
            Agent C explicitly omits UsingInfo (owned by Agent A) and uses a reduced
            ResolveContext without Usings field. Agent D adds the field in wave 2.
            Test helpers (parseCS) are defined in each agent's own test file, which is
            fine since Go allows duplicate function names across test files in the same
            package. Actually, Go does NOT allow duplicate function names in the same
            package even across test files. Solution: Agents A and C should use different
            helper names (parseCSA, parseCSC) or Agent A's types_test.go defines parseCS
            and Agent C's eval_test.go defines a local parseCSForEval. Agent D consolidates.
        - scenario: |
            Agent C's EvalExprType for member_access_expression uses a stub that only does
            direct registry lookup (no inheritance walking), causing incorrect type inference
            for inherited methods in wave 1 tests.
          likelihood: low
          impact: low
          mitigation: |
            Wave 1 tests for Agent C should only test direct method/field access, not
            inherited members. Inheritance-dependent tests go in Agent D's resolver_test.go.
        - scenario: |
            The tree-sitter C# grammar uses different node type names than expected
            (e.g., "identifier_name" vs "identifier"), causing AST walking misses.
          likelihood: low
          impact: medium
          mitigation: |
            The existing csharpextractor already uses tree-sitter C# grammar and documents
            the node types. Agents should reference internal/indexer/csharpextractor/extractor.go
            for the correct node type strings. The C reference (cs_lsp.c) also documents the
            grammar reference in its header comment (lines 24-39).
        - scenario: |
            C# namespace resolution is more complex than Go imports. Files may have deeply
            nested namespaces, file-scoped namespaces (C# 10), or no namespace at all
            (top-level statements). ResolveTypeName may miss some resolution paths.
          likelihood: medium
          impact: low
          mitigation: |
            The C reference implements a 10-step resolution chain. Agent A ports all 10 steps.
            Missing edge cases will surface during ocelot benchmark validation (post-merge)
            and can be fixed incrementally.
