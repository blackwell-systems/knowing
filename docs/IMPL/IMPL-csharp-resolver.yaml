title: C# In-Process Type Resolver
feature_slug: csharp-resolver
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: All new files in internal/typresolve/csharp/ (12+ files).
       No existing files modified. Agents have fully disjoint file ownership.
       Follows the exact same pattern as the Go resolver (IMPL-go-resolver.yaml),
       Python resolver (IMPL-python-resolver.yaml), and TypeScript resolver
       (IMPL-typescript-resolver.yaml).

    2. Investigation-first: No unknowns. The C reference implementation (cs_lsp.c,
       3,021 lines) documents the complete C# resolution algorithm including namespace
       resolution, partial classes, using directives, extension methods, async/await
       unwrapping, properties, indexers, and target-typed new. The shared infrastructure
       (typresolve package) is completed and defines the exact interface contracts. The
       Go resolver establishes the structural pattern.

    3. Interface discoverability: All interfaces are defined. The typresolve.Resolver
       interface, Registry, Scope, and Type are implemented and tested. Cross-agent
       contracts are limited to Go function signatures within the new csharp/ subpackage.

    4. Pre-implementation: The shared infrastructure (in-process-resolver-infra) was
       completed previously. The Go/Python/TypeScript/Ruby resolver IMPLs show the exact
       structural pattern. The existing C# extractor (internal/indexer/csharpextractor/)
       handles class/struct/interface/enum declarations, method extraction, using
       directives, and invocation edges, providing the definition data the resolver
       will consume. No overlap with existing code.

    5. Parallelization value: High. Build/test cycle is ~30s with GOWORK=off.
       3 agents in wave 1 with 3-4 files each. Wave 2 integrates and tests.
       Independent type system components (type parsing + using/namespace resolution,
       builtins + member lookup, expression evaluator + scope binding) can be built
       in parallel, matching the Go/Python/TS/Ruby resolver decomposition.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (4 agents, 2 waves, ~5 min avg per agent)
    - Merge and verification: ~5 min
    Total Polywave time: ~30 min

    Sequential baseline: ~40 min (4 agents x 10 min avg)
    Time savings: ~10 min (25% faster)

    Recommendation: Clear speedup. Wave 1 agents are fully independent (type parsing +
    using/namespace resolution, builtins + member lookup with inheritance, expression
    evaluator + scope binding). Wave 2 integrates them into the resolver and adds
    integration tests.
test_command: GOWORK=off go test -short ./... -timeout 5m
lint_command: GOWORK=off go vet ./...
