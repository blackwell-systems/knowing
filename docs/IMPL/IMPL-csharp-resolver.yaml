interface_contracts:
    - name: ParseTypeNode
      description: |
        Converts a tree-sitter C# type AST node to a typresolve.Type. Handles
        predefined_type, nullable_type, array_type, pointer_type, tuple_type,
        generic_name, qualified_name, identifier, ref_type, implicit_type.
        Uses cs_resolve_type_name logic to resolve type names through the namespace
        stack, using directives, and predefined aliases (int -> System.Int32, etc.).
      definition: |
        func ParseTypeNode(node *sitter.Node, content []byte, ctx *ResolveContext) *typresolve.Type
      location: internal/typresolve/csharp/types.go
    - name: ResolveTypeName
      description: |
        Resolves a bare type name through the C# resolution chain:
        1. Predefined alias (int -> System.Int32)
        2. Exact registry hit
        3. Nested type / enclosing class
        4. Each namespace prefix from innermost outward
        5. Module-prefixed (file-local QN)
        6. using namespace X -> try X.bare
        7. using A = X alias substitution
        8. Short-name fallback (best match by namespace prefix)
        Port of cs_resolve_type_name from cs_lsp.c lines 317-442.
      definition: |
        func ResolveTypeName(ctx *ResolveContext, raw string) string
      location: internal/typresolve/csharp/usings.go
    - name: UsingInfo
      description: |
        Represents a single using directive with its kind (namespace, static, alias),
        local name (for aliases), target qualified name, and global flag.
      definition: |
        type UsingKind int
        const (
            UsingNamespace UsingKind = iota
            UsingStatic
            UsingAlias
        )
        type UsingInfo struct {
            Kind      UsingKind
            LocalName string
            TargetQN  string
            IsGlobal  bool
        }
      location: internal/typresolve/csharp/usings.go
    - name: BuildUsingMap
      description: |
        Extracts all using directives from the C# AST root and returns a slice
        of UsingInfo. Handles: using Namespace, using static Class, using Alias = Type,
        global using. Always includes implicit "using System".
      definition: |
        func BuildUsingMap(root *sitter.Node, content []byte) []UsingInfo
      location: internal/typresolve/csharp/usings.go
    - name: PredefinedAlias
      description: |
        Returns the System.* fully qualified name for C# predefined type aliases.
        Maps: int -> System.Int32, string -> System.String, bool -> System.Boolean,
        float -> System.Single, double -> System.Double, decimal -> System.Decimal,
        object -> System.Object, void -> System.Void, dynamic -> System.Object, etc.
        Returns empty string if name is not a predefined alias.
      definition: |
        func PredefinedAlias(name string) string
      location: internal/typresolve/csharp/builtins.go
    - name: IsBuiltinFunc
      description: |
        Returns true if the given name is a C# expression keyword that should not
        be resolved as a call (typeof, nameof, sizeof, default, checked, unchecked).
      definition: |
        func IsBuiltinFunc(name string) bool
      location: internal/typresolve/csharp/builtins.go
    - name: LookupMethod
      description: |
        Looks up a method on a named type, walking the inheritance chain (base classes
        and interfaces via EmbeddedTypes) up to 32 levels deep with cycle detection.
        Falls back to System.Object methods (ToString, Equals, GetHashCode).
        Port of cs_lookup_method from cs_lsp.c lines 445-499.
      definition: |
        func LookupMethod(reg *typresolve.Registry, typeQN string, methodName string) *typresolve.RegisteredFunc
      location: internal/typresolve/csharp/methods.go
    - name: LookupField
      description: |
        Looks up a field on a named type, walking the inheritance chain.
        Returns the field's type if found.
      definition: |
        func LookupField(reg *typresolve.Registry, typeQN string, fieldName string) *typresolve.Type
      location: internal/typresolve/csharp/methods.go
    - name: LookupExtensionMethod
      description: |
        Searches for a static extension method accessible via using-imported namespaces.
        An extension method is a static method whose first parameter is prefixed with
        "this". Checks receiver compatibility via type match or base class match.
        Port of cs_lookup_extension from cs_lsp.c lines 506-569.
      definition: |
        func LookupExtensionMethod(reg *typresolve.Registry, receiverQN string, methodName string) *typresolve.RegisteredFunc
      location: internal/typresolve/csharp/methods.go
    - name: ResolveContext
      description: |
        Per-file resolution context holding the registry, scope, usings,
        namespace stack, content bytes, enclosing function/class/base QN,
        module QN, and eval depth counter.
      definition: |
        type ResolveContext struct {
            Registry         *typresolve.Registry
            Scope            *typresolve.Scope
            Usings           []UsingInfo
            NamespaceStack   []string
            Content          []byte
            EnclosingFuncQN  string
            EnclosingClassQN string
            EnclosingBaseQN  string
            ModuleQN         string
            EvalDepth        int
        }
      location: internal/typresolve/csharp/eval.go
    - name: EvalExprType
      description: |
        Recursive expression type evaluator for C#. Evaluates the type of a C# expression
        AST node using scope lookup, registry lookup, using resolution, member access,
        invocation, object creation, cast, as, await unwrapping, tuple expressions,
        element access, and literal types.
        Port of cs_eval_expr_type from cs_lsp.c lines 716-884.
      definition: |
        func EvalExprType(ctx *ResolveContext, node *sitter.Node) *typresolve.Type
      location: internal/typresolve/csharp/eval.go
    - name: ProcessStatement
      description: |
        Processes a C# statement node to bind variables into the current scope.
        Handles local_declaration_statement (var x = ..., Type x = ...),
        foreach_statement (foreach var x in collection), using_statement,
        for_statement, variable_declaration, and pattern matching bindings.
      definition: |
        func ProcessStatement(ctx *ResolveContext, node *sitter.Node)
      location: internal/typresolve/csharp/scope_bind.go
    - name: CSharpResolver
      description: |
        Implements typresolve.Resolver for C#. Language() returns "csharp".
        InitWorkspace builds a Registry from C# definitions (classes, interfaces,
        structs, enums, methods, properties, constructors).
        ResolveFile walks the C# AST and resolves calls and references.
      definition: |
        type CSharpResolver struct {
            registry *typresolve.Registry
        }
        func NewCSharpResolver() *CSharpResolver
        func (r *CSharpResolver) Language() string
        func (r *CSharpResolver) InitWorkspace(ctx context.Context, defs []typresolve.ResolverDef) error
        func (r *CSharpResolver) ResolveFile(ctx context.Context, opts typresolve.ResolveFileOpts) ([]types.Edge, error)
      location: internal/typresolve/csharp/resolver.go
    - name: BuildRegistry
      description: |
        Builds a typresolve.Registry from ResolverDef entries. Registers classes,
        interfaces, structs, enums, methods (with receiver type), constructors,
        and properties (as methods). Handles partial class merging by accumulating
        methods and fields from multiple definitions of the same type QN.
      definition: |
        func BuildRegistry(defs []typresolve.ResolverDef) *typresolve.Registry
      location: internal/typresolve/csharp/registry_builder.go
    - name: ResolveCallsInFile
      description: |
        Walks a C# file's AST resolving call expressions and emitting edges.
        Uses the shared registry, per-file scope chain, using map, and namespace stack.
        Processes: namespace_declaration, file_scoped_namespace_declaration,
        class/struct/interface/enum declarations (for enclosing type tracking),
        method/constructor declarations (scope + call resolution), invocation_expression,
        object_creation_expression, implicit_object_creation_expression.
      definition: |
        func ResolveCallsInFile(ctx *ResolveContext, root *sitter.Node, fileHash types.Hash, repoURL string, filePath string) []types.Edge
      location: internal/typresolve/csharp/resolve.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A: C# Type Parsing and Using/Namespace Resolution

            Build the foundational type AST parsing and using/namespace resolution
            for the C# resolver. This mirrors the Go resolver's types.go + imports.go,
            adapted for C#'s namespace system, using directives, and predefined type aliases.

            ### What to implement

            **File 1: `internal/typresolve/csharp/doc.go`**
            Package doc comment for the `csharp` subpackage:
            ```go
            // Package csresolve implements the C# language in-process type resolver.
            // It implements the typresolve.Resolver interface, resolving C# call
            // expressions and type references using tree-sitter AST walking and a
            // shared type registry built from extracted definitions.
            package csresolve
            ```

            **File 2: `internal/typresolve/csharp/types.go`**
            Port the `cs_parse_type_node` function from the C reference at
            `~/code/codebase-memory/internal/cbm/lsp/cs_lsp.c` (lines 573-677).

            Implement `ParseTypeNode(node *sitter.Node, content []byte, ctx *ResolveContext) *typresolve.Type`

            Handle these C# type AST node kinds:
            - **`predefined_type`**: Map via `PredefinedAlias()` from builtins.go (Agent B).
              Since Agent B builds builtins in parallel, define a local `predefinedAlias()`
              stub in types.go that returns the System.* mapping. Agent D will wire the
              final version. Actually, to avoid duplicate declarations at merge: call
              `PredefinedAlias()` from builtins.go directly. The function is in the same
              package (csresolve), so it compiles. Agent B defines it, Agent A calls it.
              BUT: Agent A's worktree won't have Agent B's builtins.go. Solution: Agent A
              must define a minimal `predefinedAlias()` (lowercase, unexported) local to
              types.go. Agent D in wave 2 will replace the call with the canonical version.
              REVISED: Use a simpler approach. ParseTypeNode should accept the ResolveContext
              which will have a method or the registry available. For predefined types, just
              use typresolve.Named("System.Int32") directly in the predefined_type handler
              with a local map. No cross-agent dependency needed.
            - **`nullable_type`**: Unwrap to inner type (C# nullable is value-type wrapper;
              for resolution purposes, treat T? as T)
            - **`array_type`**: `typresolve.Slice(elemType)`
            - **`pointer_type`**: `typresolve.Pointer(elemType)` (unsafe pointer)
            - **`tuple_type`**: Parse tuple_element children -> `typresolve.Tuple(elems)`
            - **`generic_name`**: Extract base name + type_argument_list. Resolve base name.
              For well-known generics (List<T> -> Slice, Dictionary<K,V> -> Map,
              Task<T>/ValueTask<T> -> unwrap for async), produce appropriate types.
              Otherwise produce `typresolve.Named(resolvedBase)`
            - **`qualified_name`**, **`identifier`**, **`alias_qualified_name`**: Resolve
              through `ResolveTypeName()` and produce `typresolve.Named(resolved)`
            - **`ref_type`**: `typresolve.Ref(innerType)` (reference parameter)
            - **`implicit_type`** / **`var`**: `typresolve.Unknown()` (inferred at usage)

            Include a local predefined type alias map (duplicated from builtins.go for
            compile-time independence):
            ```go
            var csPredefTypes = map[string]string{
                "int": "System.Int32", "uint": "System.UInt32",
                "long": "System.Int64", "ulong": "System.UInt64",
                "short": "System.Int16", "ushort": "System.UInt16",
                "byte": "System.Byte", "sbyte": "System.SByte",
                "float": "System.Single", "double": "System.Double",
                "decimal": "System.Decimal", "bool": "System.Boolean",
                "char": "System.Char", "string": "System.String",
                "object": "System.Object", "void": "System.Void",
                "nint": "System.IntPtr", "nuint": "System.UIntPtr",
                "dynamic": "System.Object",
            }
            ```

            Forward-declare the ResolveContext type that Agent C will define (eval.go).
            Since all files are in the same package (csresolve), Agent A can reference
            the type without importing it. However, Agent A's isolated worktree won't
            have eval.go. Solution: Agent A should define a minimal forward-compatible
            struct in types.go that ParseTypeNode uses. Agent D will consolidate in wave 2.

            REVISED approach: ParseTypeNode should NOT depend on ResolveContext. Instead,
            take explicit parameters:
            ```go
            func ParseTypeNode(node *sitter.Node, content []byte, namespaceQN string,
                usings []UsingInfo, registry *typresolve.Registry) *typresolve.Type
            ```
            This way Agent A only depends on UsingInfo (defined in usings.go, same agent)
            and typresolve.Registry (shared infrastructure). No cross-agent compile dependency.

            **File 3: `internal/typresolve/csharp/usings.go`**
            Port the using directive handling from cs_lsp.c (lines 220-442).

            Define the UsingInfo type and UsingKind enum:
            ```go
            type UsingKind int
            const (
                UsingNamespace UsingKind = iota
                UsingStatic
                UsingAlias
            )
            type UsingInfo struct {
                Kind      UsingKind
                LocalName string  // for aliases: the local alias name
                TargetQN  string  // the target namespace/class/type
                IsGlobal  bool
            }
            ```

            Implement `BuildUsingMap(root *sitter.Node, content []byte) []UsingInfo`:
            - Walk root children for `using_directive` nodes
            - Detect `static` modifier for UsingStatic
            - Detect `=` for UsingAlias (using Alias = Target)
            - Extract namespace/type name from the directive
            - Always include implicit `using System` (UsingNamespace, TargetQN: "System")
            - Handle `global using` (IsGlobal: true)

            Implement `ResolveTypeName(raw string, namespaceQN string, usings []UsingInfo,
            registry *typresolve.Registry, enclosingClassQN string, moduleQN string) string`:
            - Follow the 9-step resolution chain from cs_lsp.c:
              1. Strip global:: prefix, normalize :: to .
              2. Strip generic args for lookup
              3. Check predefined alias (use local csPredefTypes map)
              4. Exact registry hit
              5. Nested type under enclosing class
              6. Each namespace prefix from innermost outward
              7. Module-prefixed
              8. using namespace X -> try X.bare
              9. using A = X alias substitution
              10. Short-name fallback
              11. Return bare name as last resort

            Also implement helper functions:
            ```go
            func stripGlobalPrefix(name string) string
            func stripGenericArgs(name string) string
            func normalizeCSName(name string) string
            ```

            **File 4: `internal/typresolve/csharp/types_test.go`**
            Tests for ParseTypeNode and usings:
            - Test predefined_type parsing (int -> System.Int32, string -> System.String)
            - Test nullable_type unwrapping
            - Test array_type -> Slice
            - Test tuple_type parsing
            - Test generic_name with type arguments
            - Test qualified_name resolution
            - Test BuildUsingMap extraction
            - Test ResolveTypeName through namespace/using chain
            - Test using alias resolution

            Use the tree-sitter C# parser:
            ```go
            import (
                sitter "github.com/smacker/go-tree-sitter"
                "github.com/smacker/go-tree-sitter/csharp"
            )
            func parseCS(t *testing.T, src string) *sitter.Node {
                t.Helper()
                parser := sitter.NewParser()
                parser.SetLanguage(csharp.GetLanguage())
                tree, err := parser.ParseCtx(context.Background(), nil, []byte(src))
                if err != nil { t.Fatalf("parse: %v", err) }
                return tree.RootNode()
            }
            ```

            ### Interfaces this agent produces (consumed by Agent D in wave 2)
            - `ParseTypeNode(node, content, namespaceQN, usings, registry) *typresolve.Type`
            - `UsingInfo` struct and `UsingKind` enum
            - `BuildUsingMap(root, content) []UsingInfo`
            - `ResolveTypeName(raw, namespaceQN, usings, registry, enclosingClassQN, moduleQN) string`
            - `stripGlobalPrefix(name) string`
            - `stripGenericArgs(name) string`
            - `normalizeCSName(name) string`
            - `csPredefTypes` map (local predefined alias table)

            ### Verification gate
            ```bash
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go build ./internal/typresolve/csharp/
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go vet ./internal/typresolve/csharp/
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go test ./internal/typresolve/csharp/ -run TestParseTypeNode -v -timeout 30s
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go test ./internal/typresolve/csharp/ -run TestBuildUsingMap -v -timeout 30s
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go test ./internal/typresolve/csharp/ -run TestResolveTypeName -v -timeout 30s
            ```

            Postcondition checks:
            ```bash
            # ParseTypeNode function exists
            grep -c 'func ParseTypeNode' /Users/dayna.blackwell/code/knowing/internal/typresolve/csharp/types.go
            # Expected: 1
            # UsingInfo struct exists
            grep -c 'type UsingInfo struct' /Users/dayna.blackwell/code/knowing/internal/typresolve/csharp/usings.go
            # Expected: 1
            # ResolveTypeName function exists
            grep -c 'func ResolveTypeName' /Users/dayna.blackwell/code/knowing/internal/typresolve/csharp/usings.go
            # Expected: 1
            ```

            ### Constraints
            - Do NOT define ResolveContext in types.go or usings.go. That struct is owned
              by Agent C (eval.go). Use explicit parameters instead.
            - Do NOT modify files outside your ownership list.
            - Do NOT import the csharpextractor package. This resolver is independent.
          files: []
        - id: B
          task: |
            ## Agent B: C# Builtins and Member/Extension Method Lookup

            Build the C# builtin type/function handling and the member lookup system
            with inheritance chain walking and extension method dispatch.

            ### What to implement

            **File 1: `internal/typresolve/csharp/builtins.go`**
            C# predefined type aliases and builtin function detection.

            Implement `PredefinedAlias(name string) string`:
            Map C# keyword types to their System.* equivalents:
            ```
            int -> System.Int32, uint -> System.UInt32, long -> System.Int64,
            ulong -> System.UInt64, short -> System.Int16, ushort -> System.UInt16,
            byte -> System.Byte, sbyte -> System.SByte, float -> System.Single,
            double -> System.Double, decimal -> System.Decimal, bool -> System.Boolean,
            char -> System.Char, string -> System.String, object -> System.Object,
            nint -> System.IntPtr, nuint -> System.UIntPtr, void -> System.Void,
            dynamic -> System.Object
            ```
            Return empty string if not a predefined alias.

            Implement `IsBuiltinFunc(name string) bool`:
            Returns true for C# expression keywords that should not be resolved as
            user-defined calls: typeof, nameof, sizeof, default, checked, unchecked,
            stackalloc.

            Implement `IsKeywordSelf(name string) bool`:
            Returns true for "this" and "base".

            Implement `UnwrapTask(t *typresolve.Type) *typresolve.Type`:
            If the type is Named "System.Threading.Tasks.Task" or
            "System.Threading.Tasks.ValueTask" with a generic type argument,
            return the type argument (unwrap async). Since typresolve.Type doesn't
            have a template/generic wrapper, use a heuristic: if the type name starts
            with "System.Threading.Tasks.Task" or "System.Threading.Tasks.ValueTask",
            check TypeParams or use the Name convention. For simplicity, if the name
            contains generic info, strip and return inner. Otherwise, for bare Task/ValueTask,
            return Unknown (void-returning async).

            Actually, typresolve.Type has no generic argument storage at the Named level.
            Use this approach: store generic types as Named with the base name, and track
            generic args separately in the resolve context. For UnwrapTask, accept a
            *typresolve.Type and if it is Named with name matching Task/ValueTask patterns,
            return Unknown (the caller should handle generic unwrapping at the call site
            using the registry's return type signature). This matches how the Go resolver
            handles generics: through registry lookup, not type-level generic tracking.

            Implement `UnwrapNullable(t *typresolve.Type) *typresolve.Type`:
            If the type is Named "System.Nullable" (or Nullable<T>), return the inner type.
            Same heuristic as UnwrapTask.

            **File 2: `internal/typresolve/csharp/methods.go`**
            Member lookup with inheritance chain walking and extension method search.
            Port of cs_lookup_method (cs_lsp.c lines 445-499) and cs_lookup_extension
            (cs_lsp.c lines 506-569).

            Implement `LookupMethod(reg *typresolve.Registry, typeQN string, methodName string) *typresolve.RegisteredFunc`:
            - Direct method lookup via `reg.LookupMethod(typeQN, methodName)`
            - If not found, get the RegisteredType and walk its EmbeddedTypes (base classes
              and interfaces) using BFS with visited set, up to 32 levels deep
            - Fall back to System.Object methods (ToString, Equals, GetHashCode, GetType)
            - Use cycle detection via visited array to prevent infinite loops

            Implement `LookupField(reg *typresolve.Registry, typeQN string, fieldName string) *typresolve.Type`:
            - Direct field lookup on RegisteredType.Fields
            - Walk inheritance chain (EmbeddedTypes) with BFS
            - Same cycle detection as LookupMethod

            Implement `LookupExtensionMethod(reg *typresolve.Registry, receiverQN string, methodName string) *typresolve.RegisteredFunc`:
            - Scan all registered functions for a static method with matching short name
            - Check if the method's first parameter name starts with "this" (extension
              method convention)
            - Check receiver compatibility: first param type must match receiverQN or
              one of its base types
            - This is a linear scan (O(N) over all funcs), acceptable for Tier 1

            **File 3: `internal/typresolve/csharp/builtins_test.go`**
            Tests for builtins and methods:
            - Test PredefinedAlias for all C# keyword types
            - Test IsBuiltinFunc for typeof, nameof, sizeof, etc.
            - Test IsKeywordSelf for this, base
            - Test LookupMethod with direct and inherited methods
            - Test LookupMethod falls back to System.Object
            - Test LookupField with direct and inherited fields
            - Test LookupExtensionMethod finds extension methods
            - Test cycle detection in inheritance chain

            ### Interfaces this agent produces (consumed by Agent D in wave 2)
            - `PredefinedAlias(name) string`
            - `IsBuiltinFunc(name) bool`
            - `IsKeywordSelf(name) bool`
            - `UnwrapTask(t) *typresolve.Type`
            - `UnwrapNullable(t) *typresolve.Type`
            - `LookupMethod(reg, typeQN, methodName) *typresolve.RegisteredFunc`
            - `LookupField(reg, typeQN, fieldName) *typresolve.Type`
            - `LookupExtensionMethod(reg, receiverQN, methodName) *typresolve.RegisteredFunc`

            ### Verification gate
            ```bash
