            ## Register extractors and enable multi-extractor dispatch

            Wire the event extractor and schema extractor into the system. The key
            architectural change: the indexer currently dispatches each file to only the
            FIRST matching extractor (FindExtractor). The event extractor handles the same
            file extensions (.go, .ts, .py, .java) as existing language extractors, so it
            would never be reached. Add a `FindAllExtractors` method and update the indexer
            to run ALL matching extractors per file, merging their results.

            ### Files to modify
            - `internal/indexer/extractor.go` - add FindAllExtractors method
            - `internal/indexer/indexer.go` - change extractFile to run all matching extractors
            - `cmd/knowing/main.go` - add imports and registration calls

            ### Changes to internal/indexer/extractor.go

            Add this method after the existing `FindExtractor` method. Find this exact text:

            ```go
            // FindExtractor returns the first registered extractor that can handle
            // the given file path, or nil if none matches.
            func (r *ExtractorRegistry) FindExtractor(path string) types.Extractor {
            	for _, ext := range r.extractors {
            		if ext.CanHandle(path) {
            			return ext
            		}
            	}
            	return nil
            }
            ```

            Add immediately after:

            ```go

            // FindAllExtractors returns all registered extractors that can handle
            // the given file path. This enables supplementary extractors (like event
            // pattern detection) to run in addition to the primary language extractor,
            // producing additional nodes and edges for the same file.
            func (r *ExtractorRegistry) FindAllExtractors(path string) []types.Extractor {
            	var result []types.Extractor
            	for _, ext := range r.extractors {
            		if ext.CanHandle(path) {
            			result = append(result, ext)
            		}
            	}
            	return result
            }
            ```

            ### Changes to internal/indexer/indexer.go

            Modify the `extractFile` method to run all matching extractors and merge results.
            Find this exact text:

            ```go
            // extractFile extracts nodes and edges from a single file without storing them.
            func (idx *Indexer) extractFile(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, *types.File, error) {
            	ext := idx.registry.FindExtractor(opts.FilePath)
            	if ext == nil {
            		return &types.ExtractResult{}, nil, nil
            	}

            	result, err := ext.Extract(ctx, opts)
            	if err != nil {
            		return nil, nil, fmt.Errorf("extract %s: %w", opts.FilePath, err)
            	}

            	contentHash := types.NewHash(opts.Content)
            	file := &types.File{
            		FileHash:    opts.FileHash,
            		RepoHash:    opts.RepoHash,
            		Path:        opts.FilePath,
            		ContentHash: contentHash,
            	}

            	return result, file, nil
            }
            ```

            Replace with:

            ```go
            // extractFile extracts nodes and edges from a single file without storing them.
            // It runs ALL matching extractors (not just the first) and merges their results,
            // enabling supplementary extractors like event-mq to add edges alongside the
            // primary language extractor.
            func (idx *Indexer) extractFile(ctx context.Context, opts types.ExtractOptions) (*types.ExtractResult, *types.File, error) {
            	extractors := idx.registry.FindAllExtractors(opts.FilePath)
            	if len(extractors) == 0 {
            		return &types.ExtractResult{}, nil, nil
            	}

            	merged := &types.ExtractResult{}
            	for _, ext := range extractors {
            		result, err := ext.Extract(ctx, opts)
            		if err != nil {
            			return nil, nil, fmt.Errorf("extract %s (%s): %w", opts.FilePath, ext.Name(), err)
            		}
            		merged.Nodes = append(merged.Nodes, result.Nodes...)
            		merged.Edges = append(merged.Edges, result.Edges...)
            	}

            	contentHash := types.NewHash(opts.Content)
            	file := &types.File{
            		FileHash:    opts.FileHash,
            		RepoHash:    opts.RepoHash,
            		Path:        opts.FilePath,
            		ContentHash: contentHash,
            	}

            	return merged, file, nil
            }
            ```

