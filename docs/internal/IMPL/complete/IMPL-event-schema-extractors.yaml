            ## Schema Extractor (internal/indexer/schemaextractor/)

            Create a new extractor package that parses OpenAPI 3.x specs and JSON Schema
            files, producing nodes for API endpoints and schema definitions plus edges
            for their relationships.

            ### Files to create
            - `internal/indexer/schemaextractor/doc.go` - package documentation
            - `internal/indexer/schemaextractor/extractor.go` - main implementation
            - `internal/indexer/schemaextractor/extractor_test.go` - comprehensive tests

            ### Implementation details

            **CanHandle:** Return true for .yaml, .yml, and .json file extensions.
            NOTE: The K8s extractor also handles .yaml/.yml but only in specific directories
            (k8s/, kubernetes/, manifests/, deploy/, helm/). The schema extractor handles
            ALL .yaml/.yml/.json files broadly, but returns an empty result in Extract if
            the content does not contain OpenAPI/Swagger/JSON Schema markers. This is the
            established pattern (return empty ExtractResult, not error, for non-matching content).

            **Extract implementation:**

            1. First, detect the file type by examining content:
               - For .yaml/.yml files: unmarshal with gopkg.in/yaml.v3 into map[string]interface{}
                 Check for "openapi" or "swagger" top-level key
               - For .json files: unmarshal with encoding/json into map[string]interface{}
                 Check for "openapi", "swagger", or "$schema" containing "json-schema.org"
               - If no marker found, return empty ExtractResult (not an error)

            2. **OpenAPI 3.x extraction** (top-level "openapi" field with value starting "3"):
               - Parse `paths` map: for each path (e.g., "/users/{id}"), for each method
                 (get, post, put, delete, patch), create a Node:
                 - Kind: "route"
                 - QualifiedName: `{repoURL}://{filePath}.route.{METHOD} {path}`
                   (METHOD is uppercase, e.g., "GET /users/{id}")
                 - NodeHash: `types.ComputeNodeHash(repoURL, filePath, types.EmptyHash, "METHOD path", "route")`
               - Parse `components.schemas` map: for each schema name, create a Node:
                 - Kind: "type"
                 - QualifiedName: `{repoURL}://{filePath}.schema.{SchemaName}`
                 - NodeHash: `types.ComputeNodeHash(repoURL, filePath, types.EmptyHash, schemaName, "type")`
               - Parse $ref values in request/response bodies and schema properties:
                 - Pattern: `$ref: "#/components/schemas/Foo"` -> extract "Foo"
                 - Create "references" edge from the referencing node to the schema node
                 - For endpoint refs: source=route node, target=schema node
                 - For schema-to-schema refs: source=parent schema, target=referenced schema

            3. **Swagger 2.x extraction** (top-level "swagger" field with value "2.0"):
               - Same as OpenAPI 3.x but schemas are under `definitions` instead of
                 `components.schemas`
               - $ref pattern: `#/definitions/Foo`

            4. **JSON Schema extraction** (has "$schema" containing "json-schema.org"):
               - Root schema -> Node with kind "type"
                 - Name from "title" field, or derive from filename (without extension)
                 - QualifiedName: `{repoURL}://{filePath}.schema.{title}`
               - Parse `definitions` entries -> additional "type" nodes
               - Parse `$ref` in properties -> "references" edges

            All edges: provenance "ast_inferred", confidence 0.7.

            **Helper functions:**
            - `isOpenAPISpec(data map[string]interface{}) bool` - checks for openapi/swagger key
            - `isJSONSchema(data map[string]interface{}) bool` - checks for $schema key
            - `parseRef(ref string) string` - extracts schema name from $ref value
            - `buildQualifiedName(repoURL, filePath, kind, name string) string`
            - `makeEdge(sourceHash, targetHash types.Hash, edgeType string) types.Edge`

            ### Reference implementation pattern
            Follow k8sextractor structure: use gopkg.in/yaml.v3 (already in go.mod),
            package-level constants for provenance/confidence, helper functions.

            ### Tests
            Write tests with real OpenAPI and JSON Schema content:
            - TestSchemaExtractor_Name (returns "openapi-schema")
            - TestSchemaExtractor_CanHandle (positive: api.yaml, spec.json, openapi.yml;
              negative: main.go, app.ts)
            - TestSchemaExtractor_OpenAPI3Paths (real OpenAPI 3.0 snippet with /users and
              /users/{id} paths, verify route nodes created for each method)
            - TestSchemaExtractor_OpenAPI3Schemas (components.schemas with User and Error
              schemas, verify type nodes created)
            - TestSchemaExtractor_OpenAPI3References (endpoint with requestBody $ref to
              schema, verify "references" edge created)
            - TestSchemaExtractor_Swagger2 (swagger: "2.0" with definitions, verify
              type nodes and reference edges)
            - TestSchemaExtractor_JSONSchema (standalone JSON Schema with title, $schema,
              properties with $ref, verify nodes and edges)
            - TestSchemaExtractor_NonOpenAPIYAML (regular YAML without openapi/swagger key,
              verify empty result returned)
            - TestSchemaExtractor_JSONFile (OpenAPI spec in .json format, verify parsing works)

            ### Verification gate
            ```bash
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go build ./internal/indexer/schemaextractor/...
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go vet ./internal/indexer/schemaextractor/...
            cd /Users/dayna.blackwell/code/knowing && GOWORK=off go test ./internal/indexer/schemaextractor/... -v -timeout 2m
            ```

