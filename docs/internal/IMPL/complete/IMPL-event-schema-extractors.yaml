pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Event extractor CanHandle overlaps with existing language extractors, never reached by FindExtractor
          likelihood: high
          impact: high
          mitigation: |
            Agent C modifies the indexer to use FindAllExtractors instead of FindExtractor
            in the extraction path. All matching extractors run and their results merge.
            The event extractor is registered last but still runs via FindAllExtractors.
        - scenario: Multi-extractor merge produces duplicate nodes when both extractors find the same symbol
          likelihood: low
          impact: low
          mitigation: |
            Nodes are content-addressed (NodeHash is deterministic from repo+path+name+kind).
            Duplicate nodes with the same hash get deduplicated by the store's upsert semantics
            (INSERT OR REPLACE). No data corruption, just redundant computation.
        - scenario: Schema extractor CanHandle (.yaml/.json) conflicts with K8s extractor for k8s directory files
          likelihood: medium
          impact: low
          mitigation: |
            With FindAllExtractors, both run on the same file. K8s extractor produces K8s nodes,
            schema extractor returns empty result (no openapi/swagger marker in K8s manifests).
            No conflict; just a minor performance cost of parsing K8s YAML twice.
        - scenario: Existing tests break because extractFile now returns merged results from multiple extractors
          likelihood: low
          impact: medium
          mitigation: |
            The change is additive. Files that previously matched only one extractor will still
            produce the same nodes/edges from that extractor, plus potentially additional ones
            from supplementary extractors. Tests that assert exact counts may need updating, but
            the existing extractors do not overlap in practice (each handles different extensions).
            The only overlap is event extractor on .go/.ts/.py/.java (which produces additional
            edges, not conflicting ones).
