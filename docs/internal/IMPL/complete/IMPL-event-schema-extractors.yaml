            - `grep -c '"route"' internal/indexer/schemaextractor/extractor.go` returns at least 1
            - `grep -c '"references"' internal/indexer/schemaextractor/extractor.go` returns at least 1
            - `grep -c "func Test" internal/indexer/schemaextractor/extractor_test.go` returns at least 7

            ### Constraints
