            ## Event Extractor (internal/indexer/eventextractor/)

            Create a new extractor package that detects message queue producer and consumer
            patterns across Go, TypeScript, Python, and Java source code. Uses tree-sitter
            for AST parsing (reuse existing grammars from go-tree-sitter library).

            ### Files to create
            - `internal/indexer/eventextractor/doc.go` - package documentation
            - `internal/indexer/eventextractor/extractor.go` - main implementation
            - `internal/indexer/eventextractor/extractor_test.go` - comprehensive tests

            ### Implementation details

            **CanHandle:** Accept files with extensions: .go, .ts, .tsx, .js, .jsx, .py, .java
            Exclude files under node_modules/ directories (same check as tsextractor).

            **Extract:** Use tree-sitter to parse the file AST for each language. Create one
            parser per language in the constructor (store in a map keyed by extension).
            Detect these patterns by walking the AST:

            **Go patterns (tree-sitter node types: call_expression, selector_expression):**
            - `sarama.NewSyncProducer`, `sarama.NewAsyncProducer` -> producer context
            - `sarama.ProducerMessage{Topic: "..."}` -> extract topic from composite literal
            - `nats.Subscribe("topic", ...)` or `nc.Subscribe("topic", ...)` -> consumer, topic is first string arg
            - `nats.Publish("topic", ...)` or `nc.Publish("topic", ...)` -> producer, topic is first string arg
            - `sqs.SendMessage(...)` with `QueueUrl: "..."` -> producer
            - `sqs.ReceiveMessage(...)` -> consumer
            - `ch.Publish("exchange", "routingKey", ...)` (amqp) -> producer
            - `ch.Consume("queue", ...)` (amqp) -> consumer

            **TypeScript patterns (tree-sitter node types: call_expression, member_expression, decorator):**
            - `producer.send({ topic: "..." })` (kafkajs) -> producer
            - `consumer.subscribe({ topic: "..." })` (kafkajs) -> consumer
            - `@MessagePattern("...")` decorator -> consumer
            - `@EventPattern("...")` decorator -> consumer

            **Python patterns (tree-sitter node types: call, attribute, argument_list):**
            - `KafkaProducer(...)` instantiation -> producer context
            - `producer.send("topic", ...)` -> producer with topic
            - `KafkaConsumer("topic", ...)` -> consumer with topic
            - `channel.basic_publish(exchange='', routing_key='topic')` -> producer
            - `channel.basic_consume(queue='topic')` -> consumer

            **Java patterns (tree-sitter node types: method_invocation, annotation):**
            - `@KafkaListener(topics = "...")` or `@KafkaListener(topics = {"...", "..."})` -> consumer
            - `kafkaTemplate.send("topic", ...)` -> producer
            - `jmsTemplate.send("destination", ...)` -> producer
            - `@JmsListener(destination = "...")` -> consumer

            **Node and Edge production:**
            - Topic/queue names extracted as Node with kind "topic"
              - Qualified name: `{repoURL}://{filePath}.topic.{topicName}`
              - NodeHash: `types.ComputeNodeHash(repoURL, filePath, types.EmptyHash, topicName, "topic")`
            - The enclosing function/method where the pattern is found becomes the source/target node
              - Use the function's qualified name and "function" kind
              - If no enclosing function, use the file-level scope
            - Edges:
              - Producer pattern: source=function node, target=topic node, edgeType="publishes"
              - Consumer pattern: source=topic node, target=function node, edgeType="subscribes"
            - All edges: provenance "ast_inferred", confidence 0.7

            **Tree-sitter usage:** Import language grammars:
            ```go
            import (
                sitter "github.com/smacker/go-tree-sitter"
                "github.com/smacker/go-tree-sitter/golang"
                "github.com/smacker/go-tree-sitter/typescript/typescript"
                "github.com/smacker/go-tree-sitter/python"
                "github.com/smacker/go-tree-sitter/java"
            )
            ```

            In the constructor, create parsers for each language:
            ```go
            func NewEventExtractor() *EventExtractor {
                parsers := map[string]*sitter.Parser{}
                // Go
                goParser := sitter.NewParser()
                goParser.SetLanguage(golang.GetLanguage())
                parsers[".go"] = goParser
                // TypeScript/JavaScript
                tsParser := sitter.NewParser()
                tsParser.SetLanguage(typescript.GetLanguage())
                parsers[".ts"] = tsParser
                parsers[".tsx"] = tsParser
                parsers[".js"] = tsParser
                parsers[".jsx"] = tsParser
                // Python
                pyParser := sitter.NewParser()
                pyParser.SetLanguage(python.GetLanguage())
                parsers[".py"] = pyParser
                // Java
                javaParser := sitter.NewParser()
                javaParser.SetLanguage(java.GetLanguage())
                parsers[".java"] = javaParser
                return &EventExtractor{parsers: parsers}
            }
            ```

            Walk the parsed tree recursively. For each node type that matches a pattern,
            extract the topic string from the argument list. Use helper functions to find
            the enclosing function declaration node for context.

            ### Reference implementation pattern
            Follow the same structure as k8sextractor: package-level constants for
            provenance/confidence, a makeEdge helper, and a buildQualifiedName helper.

            ### Tests
            Write tests with real code snippets for each language:
            - TestEventExtractor_Name
            - TestEventExtractor_CanHandle (positive + negative cases including node_modules exclusion)
            - TestEventExtractor_GoKafkaProducer (sarama SendMessage with topic)
            - TestEventExtractor_GoNatsSubscribe (nats.Subscribe pattern)
            - TestEventExtractor_TypeScriptKafkaJS (producer.send with topic object)
            - TestEventExtractor_PythonKafkaConsumer (KafkaConsumer with topic arg)
            - TestEventExtractor_JavaKafkaListener (@KafkaListener annotation)
            - TestEventExtractor_RabbitMQPython (pika basic_publish/basic_consume)

            Each test should provide a realistic code snippet as content, call Extract, and
            verify the expected nodes (with kind "topic") and edges (with types "publishes"
            or "subscribes") are produced.

