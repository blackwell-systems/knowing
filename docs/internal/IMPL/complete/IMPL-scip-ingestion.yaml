interface_contracts:
    - name: SCIPIngestOptions
      description: Configuration struct for SCIP ingestion
      definition: |
        // SCIPIngestOptions configures a SCIP index ingestion run.
        type SCIPIngestOptions struct {
            FilePath string // path to the .scip index file on disk
            RepoURL  string // repo URL to associate with the ingested symbols
        }
      location: internal/indexer/scipingest/ingest.go
    - name: SCIPIngester
      description: Main ingester struct with IngestFile method
      definition: |
        // SCIPIngester reads SCIP index files and imports their symbols and
        // edges into the knowing knowledge graph.
        type SCIPIngester struct {
            store types.GraphStore
        }

        // NewSCIPIngester creates an ingester backed by the given store.
        func NewSCIPIngester(store types.GraphStore) *SCIPIngester

        // IngestFile reads a .scip index file and imports all symbols and
        // reference edges into the graph. Returns the number of nodes and
        // edges created.
        func (s *SCIPIngester) IngestFile(ctx context.Context, opts SCIPIngestOptions) (*SCIPIngestResult, error)

        // SCIPIngestResult reports what was imported.
        type SCIPIngestResult struct {
            NodesCreated int
            EdgesCreated int
            DocsProcessed int
        }
      location: internal/indexer/scipingest/ingest.go
    - name: ParseSCIPSymbol
      description: Parses a SCIP symbol string into knowing qualified name components
      definition: |
        // ParseSCIPSymbol parses a SCIP symbol string (e.g.,
        // "scip-go gomod github.com/org/repo v1.0.0 pkg/Name.") into
        // its components: scheme, manager, package path, version, and descriptor.
        func ParseSCIPSymbol(symbol string) (repo, pkgPath, symbolName, symbolKind string, err error)
      location: internal/indexer/scipingest/symbol.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Task: Implement SCIP ingestion package

            Create the package `internal/indexer/scipingest/` that parses SCIP
            (Source Code Intelligence Protocol) index files and imports their
            symbol definitions and references into the knowing knowledge graph.

            ### Files to create

            **internal/indexer/scipingest/symbol.go**
            - Implement `ParseSCIPSymbol(symbol string) (repo, pkgPath, symbolName, symbolKind string, err error)`
            - SCIP symbol format: `"scip-go gomod github.com/org/repo v1.0.0 pkg/Name."`
              - Fields separated by spaces: scheme, package-manager, package-name, version, descriptor
              - Descriptor suffixes indicate kind: `.` = type/namespace, `#` = field, `()` = method/function
            - Map SCIP descriptor suffixes to knowing kinds:
              - suffix `.` -> "type"
              - suffix `#` -> "var" (field)
              - suffix `().` -> "method"
              - suffix `()` at end -> "function"
              - no recognized suffix -> "function" (fallback)
            - Return repo as the package-name field (e.g., "github.com/org/repo")
            - Return pkgPath as the descriptor path portion before the symbol name
            - Return symbolName as the final descriptor component (without suffix)
            - Handle local symbols (prefix `local `) by returning empty repo/pkg and the local name

            **internal/indexer/scipingest/ingest.go**
            - Import `google.golang.org/protobuf/proto` and `github.com/sourcegraph/scip` for protobuf definitions
            - Define types:
              ```go
              type SCIPIngestOptions struct {
                  FilePath string
                  RepoURL  string
              }

              type SCIPIngestResult struct {
                  NodesCreated  int
                  EdgesCreated  int
                  DocsProcessed int
              }

              type SCIPIngester struct {
                  store types.GraphStore
              }
              ```
            - `NewSCIPIngester(store types.GraphStore) *SCIPIngester`
            - `IngestFile(ctx context.Context, opts SCIPIngestOptions) (*SCIPIngestResult, error)`:
              1. Read the .scip file from disk with os.ReadFile
              2. Unmarshal using `proto.Unmarshal` into `scip.Index`
              3. For each `Document` in the index:
                 a. Extract symbol definitions: for each SymbolInformation entry,
                    parse the SCIP symbol name, compute a node hash using
                    `types.ComputeNodeHash(repo, pkgPath, types.EmptyHash, symbolName, kind)`,
                    create a Node with:
                    - QualifiedName: `"{repo}://{pkgPath}.{symbolName}"`
                    - Kind: derived from ParseSCIPSymbol
                    - FileHash: compute from repo + relative_path
                    - Signature: use the documentation field if available
                 b. For each Occurrence with role "Reference" (SymbolRole_Definition is 1,
                    check if role does NOT include Definition bit):
                    - Parse the referenced symbol to get its node hash
                    - Find the enclosing definition (the symbol at the containing scope)
                    - Create a "references" edge from the enclosing symbol to the referenced symbol
                    - Set provenance to "scip_resolved", confidence to 0.95
                 c. For cross-package references (where the referenced symbol's repo differs
                    from opts.RepoURL), create the target node if it doesn't exist, marking
                    it as an external symbol
              4. Use batch operations if available (check for BatchPutNodes/BatchPutEdges interfaces)
              5. Return the result with counts

            - Use `types.GraphStore` interface methods: PutNode, PutEdge, PutFile
            - Set provenance to "scip_resolved" for all SCIP-derived edges
            - Set confidence to 0.95 (compiler-accurate, higher than LSP 0.9)

            **internal/indexer/scipingest/symbol_test.go**
            - Test ParseSCIPSymbol with:
              - Standard Go symbol: `"scip-go gomod github.com/org/repo v1.0.0 pkg/MyType."`
              - Method: `"scip-go gomod github.com/org/repo v1.0.0 pkg/MyType.Method()."`
              - Function: `"scip-go gomod github.com/org/repo v1.0.0 pkg/DoThing()."`
              - Local symbol: `"local 42"`
              - TypeScript symbol: `"scip-typescript npm @types/node 16.0.0 path/posix.resolve()."`
              - Invalid/empty input

            **internal/indexer/scipingest/ingest_test.go**
            - Test IngestFile with a synthetic SCIP index created programmatically:
              - Create a scip.Index with Metadata and one Document
              - Marshal to protobuf, write to temp file
              - Call IngestFile, verify nodes and edges were created
              - Use an in-memory SQLite store (store.NewSQLiteStore with ":memory:" or temp file)
            - Test error cases: missing file, invalid protobuf

            ### Dependencies
            - Add `github.com/sourcegraph/scip` to go.mod (run `go get github.com/sourcegraph/scip`)
            - This brings in the SCIP protobuf definitions (scip.Index, scip.Document, scip.Occurrence, etc.)

            ### Constraints
            - Do NOT implement this as a types.Extractor. SCIP files are not source files to discover during repo walks.
            - Do NOT modify cmd/knowing/main.go or any file outside your ownership list.
            - Do NOT modify internal/types/types.go. Use existing ComputeNodeHash and ComputeEdgeHash functions.

            ### Verification
            ```bash
            GOWORK=off go build ./internal/indexer/scipingest/...
            GOWORK=off go vet ./internal/indexer/scipingest/...
            GOWORK=off go test ./internal/indexer/scipingest/... -v
            ```

            Postconditions:
            - `grep -c "func.*IngestFile" internal/indexer/scipingest/ingest.go` should output `1`
            - `grep -c "func ParseSCIPSymbol" internal/indexer/scipingest/symbol.go` should output `1`
            - `grep -c "scip_resolved" internal/indexer/scipingest/ingest.go` should output at least `1`
          files:
            - internal/indexer/scipingest/ingest.go
            - internal/indexer/scipingest/symbol.go
            - internal/indexer/scipingest/symbol_test.go
            - internal/indexer/scipingest/ingest_test.go
          context_source: prepared-brief
    - number: 2
      agents:
        - id: B
          task: |
            ## Task: Add ingest-scip CLI subcommand

            Add the `ingest-scip` subcommand to the knowing CLI that invokes the
            SCIPIngester from `internal/indexer/scipingest/`.

            ### Files to create/modify

            **cmd/knowing/ingestscip.go** (new file)
            - Implement `func cmdIngestSCIP(args []string) error`
            - Define flags:
              - `-file` (required): path to the .scip index file
              - `-repo` (required): repository URL to associate (e.g., "github.com/org/repo")
              - `-db`: path to SQLite database (default from `defaultDB()`)
            - Implementation:
              1. Parse flags, validate -file and -repo are provided
              2. Open SQLiteStore with the db path
              3. Create `scipingest.NewSCIPIngester(store)`
              4. Call `ingester.IngestFile(ctx, scipingest.SCIPIngestOptions{FilePath: file, RepoURL: repo})`
              5. Print summary: "Ingested N nodes, M edges from D documents"
              6. Close store

            **cmd/knowing/ingestscip_test.go** (new file)
            - Test the flag parsing and basic error cases (missing flags)
            - Test with a non-existent file path (should error gracefully)

            **cmd/knowing/main.go** (modify)
            - Add case to the switch in `run()`:

              Insert after this exact text:
              ```go
