title: SCIP Index Ingestion
feature_slug: scip-ingestion
verdict: SUITABLE
suitability_assessment: |
    The feature decomposes cleanly into two independent work streams:
    (1) the SCIP ingestion package (internal/indexer/scipingest/) with parser,
    symbol mapping, and tests; and (2) the CLI integration in cmd/knowing/main.go
    adding the ingest-scip subcommand. These have disjoint file ownership except
    for the CLI file which only agent B touches.

    File decomposition: 5+ distinct new files plus one existing file modification.
    No investigation-first items; SCIP protobuf format is well-documented.
    Interface discoverability: the SCIPIngester struct and IngestFile method can
    be fully specified upfront. Cross-agent interface is a single function call.

    Parallelization value: moderate. Build/test cycle is ~30s (go test ./...),
    agents touch 3+ files each, and tasks involve non-trivial logic (protobuf
    parsing, symbol name translation, graph edge construction). Two agents in
    a single wave provides clear speedup over sequential.

    Estimated times:
    - Scout phase: ~5 min
    - Agent execution: ~8 min (2 agents x 8 min avg, fully parallel single wave)
    - Merge and verification: ~3 min
    Total Polywave time: ~16 min

    Sequential baseline: ~20 min (2 tasks x 10 min avg)
    Time savings: ~4 min (20% faster)

    Recommendation: Clear speedup with coordination value for interface contract.
