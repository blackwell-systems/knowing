            GOWORK=off go vet ./cmd/knowing/...
            GOWORK=off go test ./cmd/knowing/... -v -run TestIngestSCIP
            ```

            Postconditions:
            - `grep -c "ingest-scip" cmd/knowing/main.go` should output at least `2` (switch case + usage)
            - `grep -c "cmdIngestSCIP" cmd/knowing/ingestscip.go` should output at least `1`
            - `go build -o /dev/null ./cmd/knowing && echo OK` should print OK
          files:
