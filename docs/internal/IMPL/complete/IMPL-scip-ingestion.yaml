pre_mortem:
    overall_risk: low
    rows:
        - scenario: github.com/sourcegraph/scip protobuf module has breaking API or version conflict with existing google.golang.org/protobuf
          likelihood: low
          impact: high
          mitigation: Agent A pins to latest stable scip version; go mod tidy resolves conflicts. If proto version conflict, use replace directive.
        - scenario: SCIP symbol format varies between languages (scip-go vs scip-typescript) causing parse failures
          likelihood: medium
          impact: low
          mitigation: ParseSCIPSymbol handles variable field counts gracefully; tests cover both Go and TypeScript symbol formats.
        - scenario: Agent B cannot compile because scipingest package not yet merged from wave 1
          likelihood: low
          impact: low
          mitigation: Wave 2 depends on wave 1 completing; Agent B runs after Agent A's code is merged.
