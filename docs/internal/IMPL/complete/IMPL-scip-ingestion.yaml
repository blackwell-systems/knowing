              ```

            - Add import for scipingest package:
              ```go
              "github.com/blackwell-systems/knowing/internal/indexer/scipingest"
              ```

            ### Constraints
            - Do NOT modify any files in internal/indexer/scipingest/ (owned by Agent A, wave 1).
            - Do NOT add the `github.com/sourcegraph/scip` dependency; Agent A handles that.
            - Follow the existing CLI subcommand pattern exactly (see cmdIndex, cmdReindex for reference).

            ### Verification
