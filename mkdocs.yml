site_name: knowing
site_description: Content-addressed knowledge graph for software systems
site_url: https://blackwell-systems.github.io/knowing
repo_url: https://github.com/blackwell-systems/knowing
repo_name: blackwell-systems/knowing

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/overview.md
    - Concepts: architecture/concepts.md
    - System Overview: architecture/system-overview.md
    - Data Flow: architecture/data-flow.md
    - Concurrency: architecture/concurrency.md
    - Context Engine: architecture/context-engine.md
    - Wire Formats: architecture/wire-formats.md
    - CLI Commands: architecture/cli-commands.md
    - Design Principles: architecture/design-principles.md
    - Deep Dives: architecture/deep-dives.md
    - Retrieval Pipeline: architecture/retrieval-pipeline.md
    - Context Packing: architecture/context-packing.md
    - Edge Types: architecture/edge-types.md
    - Equivalence Classes: architecture/equivalence-classes.md
    - Hooks Integration: architecture/hooks-integration.md
    - Runtime Traces: architecture/runtime-traces.md
  - Guide:
    - CLI Reference: guide/cli.md
    - MCP Tools: guide/mcp-tools.md
    - Features: guide/features.md
    - Distribution: guide/distribution.md
  - Research:
    - Whitepaper: research/whitepaper.md
    - Eval Framework: research/eval-framework.md
  - Operations:
    - Deployment: operations/deployment.md
    - Runtime Traces: operations/runtime-traces.md
  - Roadmap: roadmap.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - tables
  - fenced_code
  - codehilite
